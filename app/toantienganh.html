<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATH MASTER ENGLISH - CUTE EDITION</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js@7.23.6/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Roboto+Slab:wght@500;700&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdfa; /* Teal 50 */
            color: #1e293b; /* Slate 800 */
            -webkit-tap-highlight-color: transparent;
            font-size: 20px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #5eead4; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2dd4bf; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 3px solid #fff;
            box-shadow: 0 20px 40px -10px rgba(20, 184, 166, 0.15);
            border-radius: 2rem;
        }
        
        .cute-pattern {
            background-image: radial-gradient(#ccfbf1 2px, transparent 2px);
            background-size: 24px 24px;
        }

        /* 3D Button Style */
        .btn-cute {
            position: relative;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            outline-offset: 4px;
            transition: filter 250ms;
            width: 100%;
            font-family: 'Nunito', sans-serif;
        }
        .btn-cute .shadow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 9999px;
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(6px);
            transition: transform 100ms;
        }
        .btn-cute .edge {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 9999px;
            background: linear-gradient(to left, #0891b2 0%, #06b6d4 8%, #06b6d4 92%, #0891b2 100%);
        }
        .btn-cute .front {
            display: block; position: relative;
            padding: 18px 32px;
            border-radius: 9999px;
            font-size: 1.25rem;
            color: white;
            background: #06b6d4;
            transform: translateY(-6px);
            transition: transform 100ms;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .btn-cute:active .front { transform: translateY(-2px); }
        .btn-cute:active .shadow { transform: translateY(2px); }
        
        .katex { font-size: 1.2em !important; color: #0f172a; font-family: 'Roboto Slab', serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useLayoutEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            BookOpen, Brain, Save, Download, Upload, RefreshCw, 
            Check, X, ArrowRight, Home, History, Calendar, 
            Zap, Copy, Play, Settings, Lightbulb, RotateCcw, 
            Sigma, Star, Sparkles, Pencil, Eye, Info, Volume2, VolumeX,
            ExternalLink, Repeat, Calculator, FunctionSquare, Globe, GraduationCap, Bot, PenTool, Wrench, MessageCircle
        } from 'lucide-react';

        // --- TRANSLATIONS ---
        const TRANSLATIONS = {
            en: {
                appTitle: "PROFESSOR CAT",
                appSubtitle: "MATH ENGLISH MASTER",
                startSession: "START LEARNING",
                startDesc: "Fun Math English Practice",
                import: "Import",
                backup: "Backup",
                history: "HISTORY",
                sessions: "Lessons",
                accuracy: "Accuracy",
                problems: "Problems",
                noData: "No data yet. Let's learn!",
                setupTitle: "LESSON SETUP",
                manual: "Manual Input",
                auto: "AI Auto-Gen",
                topic: "TOPIC / LESSON",
                context: "CONTEXT (Optional)",
                count: "QUESTIONS",
                step1: "Step 1: Get Prompt",
                copyPrompt: "COPY PROMPT",
                step1Desc: "Copy -> Paste to AI",
                step2: "Step 2: Paste JSON",
                execute: "START LESSON",
                apiKey: "API KEY",
                generating: "CREATING...",
                generate: "AUTO CREATE",
                question: "Question",
                correct: "YAY! CORRECT!",
                incorrect: "OOPS! INCORRECT",
                explanation: "Explanation",
                vocab: "Vocabulary",
                next: "NEXT",
                finish: "FINISH",
                summary: "LESSON COMPLETE",
                correctCount: "Right",
                wrongCount: "Wrong",
                home: "HOME",
                review: "Review",
                yourAns: "You",
                correctAns: "Key",
                relearn: "Re-learn",
                promptAlert: "Prompt copied! Paste it into Copilot/ChatGPT/Gemini.",
                jsonError: "Invalid JSON.",
                aiError: "AI Error: ",
                enterKey: "Press Enter",
                typeAns: "Type answer...",
                fixJson: "Fixing JSON...",
                check: "CHECK ANSWER",
                reset: "RESET",
                clickSpeak: "Listen"
            },
            vi: {
                appTitle: "GIÁO SƯ MÈO",
                appSubtitle: "TIẾNG ANH TOÁN HỌC",
                startSession: "HỌC BÀI MỚI",
                startDesc: "Luyện tập vui vẻ mỗi ngày",
                import: "Nhập File",
                backup: "Sao Lưu",
                history: "NHẬT KÝ HỌC",
                sessions: "Bài học",
                accuracy: "Chính xác",
                problems: "Câu hỏi",
                noData: "Chưa có bài nào. Học đi nào!",
                setupTitle: "CHUẨN BỊ BÀI",
                manual: "Nhập Thủ Công",
                auto: "AI Tự Động",
                topic: "CHỦ ĐỀ BÀI HỌC",
                context: "NỘI DUNG (Dán văn bản vào đây)",
                count: "SỐ CÂU",
                step1: "Bước 1: Lấy Lệnh",
                copyPrompt: "COPY LỆNH",
                step1Desc: "Copy lệnh -> Dán vào AI",
                step2: "Bước 2: Dán kết quả JSON",
                execute: "VÀO HỌC NGAY",
                apiKey: "KHÓA API GEMINI",
                generating: "ĐANG TẠO...",
                generate: "TẠO BÀI TẬP",
                question: "Câu hỏi",
                correct: "CHÍNH XÁC LUÔN!",
                incorrect: "TIẾC QUÁ, SAI RỒI!",
                explanation: "Giải thích chi tiết",
                vocab: "Từ vựng Toán",
                next: "TIẾP TỤC",
                finish: "XEM KẾT QUẢ",
                summary: "HOÀN THÀNH",
                correctCount: "Đúng",
                wrongCount: "Sai",
                home: "VỀ TRANG CHỦ",
                review: "Xem lại",
                yourAns: "Bạn chọn",
                correctAns: "Đáp án",
                relearn: "Học lại",
                promptAlert: "Đã copy lệnh chuẩn! Dán vào Copilot/AI để lấy đề.",
                jsonError: "Lỗi JSON.",
                aiError: "Lỗi AI: ",
                enterKey: "Nhấn Enter",
                typeAns: "Nhập đáp án...",
                fixJson: "Đang sửa lỗi JSON...",
                check: "KIỂM TRA",
                reset: "XẾP LẠI",
                clickSpeak: "Nghe"
            }
        };

        // --- MATH PROMPT ---
        const MASTER_PROMPT = `
ACT AS A CAMBRIDGE MATHEMATICS PROFESSOR & IELTS EXAMINER.
Task: Create a STRICT JSON dataset for "English for Mathematics".
Lesson Topic: "{TOPIC}"
Context Material: "{CONTENT}"
Quantity: {NUM} questions.

CRITICAL RULES FOR JSON FORMAT (MUST FOLLOW):
1. **NO MARKDOWN**: Output ONLY the raw JSON array. Do not use \`\`\`json blocks.
2. **ESCAPE BACKSLASHES**: LaTeX macros like \\int MUST be escaped as \\\\int. Example: "$\\\\int f(x) dx$".
3. **ARRAY ONLY**: Output a SINGLE array of objects.
4. **ACCURACY**: Content must be 100% mathematically and linguistically correct (Academic English).
5. **EXPLANATION**: Provide detailed explanations in VIETNAMESE.

Structure:
[
  {
    "type": "mc",
    "question": "Choose the correct reading for: $\\\\frac{dy}{dx}$",
    "options": ["d y d x", "The derivative of y with respect to x", "d y over d x", "derivative y x"],
    "answer": 1,
    "explanation": "Trong giải tích, dy/dx đọc chuẩn là 'The derivative of y with respect to x'.",
    "vocabulary": ["Derivative: Đạo hàm", "With respect to: Theo biến"]
  },
  {
    "type": "order",
    "question": "Arrange the words to form a correct sentence.",
    "options": [],
    "answer": "The sum of the angles in a triangle is 180 degrees",
    "explanation": "Câu khẳng định định lý tổng ba góc trong tam giác.",
    "vocabulary": ["Triangle: Tam giác", "Angle: Góc"]
  }
]
`;

        // --- COMPONENTS & UTILS ---
        const LatexText = ({ text, className = "" }) => {
            const containerRef = useRef(null);
            useLayoutEffect(() => {
                if (containerRef.current && window.renderMathInElement) {
                    containerRef.current.textContent = text; 
                    try { window.renderMathInElement(containerRef.current, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}], throwOnError: false }); } catch (e) {}
                }
            }, [text]);
            return <span ref={containerRef} className={className}></span>;
        };

        // --- TTS HOOK ---
        const useTTS = () => {
            const speak = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                // Remove LaTeX delimiters for cleaner reading of question text
                let cleanText = text.replace(/\$\$/g, '').replace(/\$/g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            };
            return { speak };
        };

        const useSound = () => {
            const [isMuted, setIsMuted] = useState(false);
            const play = (type) => {
                if (isMuted) return;
                const sounds = {
                    correct: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3',
                    wrong: 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3',
                    click: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3',
                    win: 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'
                };
                try { new Audio(sounds[type]).play().catch(()=>{}); } catch (e) {}
            };
            return { isMuted, setIsMuted, play };
        };

        const cleanJson = (str) => {
            let cleaned = str.replace(/^```json\s*/, '').replace(/\s*```$/, '').trim();
            cleaned = cleaned.replace(/\]\s*\[/g, ', ');
            try { JSON.parse(cleaned); return cleaned; } catch (e) {
                let fixed = cleaned.replace(/\\\\/g, '@@DBL_BS@@');
                fixed = fixed.replace(/\\(?![/u"\\bfnrt])/g, '\\\\');
                fixed = fixed.replace(/@@DBL_BS@@/g, '\\\\');
                fixed = fixed.replace(/"\s*\n\s*"/g, '",\n"');
                fixed = fixed.replace(/(true|false|null|[0-9]+)\s*\n\s*"/g, '$1,\n"');
                return fixed;
            }
        };

        const useLocalStorage = (key, init) => {
            const [val, setVal] = useState(() => { try { return JSON.parse(window.localStorage.getItem(key)) || init; } catch { return init; } });
            const set = (v) => { try { setVal(v); window.localStorage.setItem(key, JSON.stringify(v)); } catch (e) {} };
            return [val, set];
        };

        const checkAnswer = (type, user, correct) => {
            if (type === 'mc') return Number(user) === Number(correct);
            if (type === 'tf') return String(user).toLowerCase() === String(correct).toString().toLowerCase(); 
            return String(user).trim().toLowerCase() === String(correct).trim().toLowerCase();
        };

        // --- CUTE BACKGROUND ---
        const CuteBackground = () => (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden bg-[#f0fdfa]">
                <div className="absolute inset-0 cute-pattern opacity-30"></div>
                {[...Array(12)].map((_, i) => (
                    <motion.div key={i} 
                        className="absolute text-teal-200/50 font-bold"
                        initial={{ opacity: 0, y: 100 }}
                        animate={{ opacity: [0.3, 0.6, 0.3], y: [0, -80, 0], rotate: [0, 20, -20, 0] }}
                        transition={{ duration: 10 + Math.random()*15, repeat: Infinity, delay: Math.random()*5 }}
                        style={{ top: `${Math.random()*95}%`, left: `${Math.random()*95}%`, fontSize: `${2+Math.random()*3}rem` }}>
                        {['∫', '∑', 'π', '√', '🐱', '🐾', '∆', 'Ω', '🐈', '✨'][i % 10]}
                    </motion.div>
                ))}
            </div>
        );

        const FeedbackPopup = ({ feedback, data, onNext, isLast, playSound, t }) => {
            if (!feedback) return null;
            const { speak } = useTTS(); 
            useEffect(() => playSound(feedback.isCorrect ? 'correct' : 'wrong'), []);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                    <motion.div initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="w-full max-w-xl relative">
                        <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-white">
                            <div className={`h-28 ${feedback.isCorrect ? 'bg-emerald-100' : 'bg-rose-100'} flex items-center justify-center relative`}>
                                <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className={`p-5 rounded-full shadow-lg border-4 border-white ${feedback.isCorrect ? 'bg-emerald-400' : 'bg-rose-400'} absolute -bottom-10`}>
                                    <div className="text-5xl">{feedback.isCorrect ? '😺' : '😿'}</div>
                                </motion.div>
                            </div>
                            
                            <div className="pt-14 pb-8 px-8 text-center">
                                <h3 className={`text-3xl font-black mb-2 font-Nunito ${feedback.isCorrect ? 'text-emerald-500' : 'text-rose-500'}`}>
                                    {feedback.isCorrect ? t.correct : t.incorrect}
                                </h3>
                                
                                <div className="max-h-[50vh] overflow-y-auto custom-scrollbar text-left mt-6 space-y-4">
                                    {!feedback.isCorrect && (
                                        <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-center">
                                            <div className="text-xs text-rose-400 font-bold uppercase mb-1">{t.correctAns}</div>
                                            <div className="text-2xl font-bold text-rose-600 font-serif">
                                                {data.type === 'mc' ? <LatexText text={data.options[data.answer]}/> : <LatexText text={String(data.answer)}/>}
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-sky-50 p-5 rounded-2xl border border-sky-100">
                                        <h4 className="flex items-center gap-2 font-bold text-sky-600 text-sm mb-2 uppercase"><Info size={18}/> {t.explanation}</h4>
                                        <div className="text-slate-700 text-lg leading-relaxed font-medium">
                                            <LatexText text={data.explanation} />
                                        </div>
                                    </div>

                                    {data.vocabulary && data.vocabulary.length > 0 && (
                                        <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100">
                                            <h4 className="flex items-center gap-2 font-bold text-amber-600 text-sm mb-2 uppercase"><BookOpen size={18}/> {t.vocab}</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {data.vocabulary.map((v, i) => (
                                                    <button key={i} onClick={() => speak(v.split(':')[0])} className="bg-white px-3 py-1.5 rounded-xl text-base font-bold text-slate-700 shadow-sm border border-amber-100 flex items-center gap-1 hover:bg-amber-100 transition group">
                                                        {v} <Volume2 size={16} className="text-amber-400 opacity-50 group-hover:opacity-100"/>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="mt-8">
                                    <button onClick={() => { playSound('click'); onNext(); }} className="btn-cute">
                                        <span className="shadow"></span><span className="edge"></span>
                                        <span className="front flex items-center justify-center gap-2">
                                            {isLast ? t.finish : t.next} <ArrowRight/>
                                        </span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const Dashboard = ({ history, onStartNew, onImport, onExport, onViewHistory, onRelearn, sound, lang, setLang, t }) => {
            const totalSessions = history.length;
            const totalQuestions = history.reduce((a, c) => a + c.total, 0);
            const totalCorrect = history.reduce((a, c) => a + c.score, 0);
            const accuracy = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;

            return (
                <div className="w-full max-w-5xl mx-auto p-6 relative z-10 pb-20">
                    <div className="flex justify-between items-center mb-10 bg-white/70 backdrop-blur p-3 rounded-full shadow-sm border border-white">
                        <div className="flex items-center gap-2 pl-2">
                            <button onClick={() => setLang(lang === 'en' ? 'vi' : 'en')} className="flex items-center gap-2 px-4 py-2 bg-white text-teal-600 rounded-full font-bold hover:bg-teal-50 transition shadow-sm border border-teal-100">
                                <Globe size={20}/> {lang === 'en' ? 'ENG' : 'VN'}
                            </button>
                            <button onClick={() => sound.setIsMuted(!sound.isMuted)} className="p-2 text-slate-400 hover:text-teal-500 transition">
                                {sound.isMuted ? <VolumeX size={24}/> : <Volume2 size={24}/>}
                            </button>
                        </div>
                    </div>

                    <div className="text-center mb-12">
                        <motion.div whileHover={{ scale: 1.05, rotate: 5 }} className="inline-block p-6 bg-white rounded-3xl mb-4 shadow-xl border-4 border-teal-100">
                            <GraduationCap size={80} className="text-teal-500" strokeWidth={2} />
                        </motion.div>
                        <h1 className="text-5xl font-black text-slate-800 tracking-tight mb-2">{t.appTitle}</h1>
                        <p className="text-slate-500 font-bold text-xl uppercase tracking-widest bg-white/50 inline-block px-4 py-1 rounded-full">{t.appSubtitle}</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
                        <motion.div whileHover={{ translateY: -5 }} className="lg:col-span-2 glass-panel p-8 rounded-[2.5rem] relative overflow-hidden group bg-gradient-to-br from-white to-teal-50 border-white">
                            <div className="absolute right-0 top-0 p-10 opacity-10 group-hover:opacity-20 transition duration-500 text-teal-500"><FunctionSquare size={180}/></div>
                            <h2 className="text-3xl font-black mb-2 text-slate-800">{t.startSession}</h2>
                            <p className="text-slate-500 mb-8 text-lg font-bold">{t.startDesc}</p>
                            <div className="max-w-xs">
                                <button onClick={() => { sound.play('click'); onStartNew(); }} className="btn-cute">
                                    <span className="shadow"></span><span className="edge"></span>
                                    <span className="front flex items-center justify-center gap-3"><Play size={24}/> {t.startSession}</span>
                                </button>
                            </div>
                        </motion.div>

                        <div className="glass-panel p-6 rounded-[2.5rem] flex flex-col gap-4 bg-white justify-center">
                            <label className="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-teal-300 hover:bg-teal-50 transition group">
                                <div className="bg-white p-3 rounded-full shadow-sm text-teal-500 group-hover:scale-110 transition"><Upload size={24}/></div>
                                <div className="font-bold text-slate-600">{t.import}</div>
                                <input type="file" className="hidden" accept=".json" onChange={onImport} />
                            </label>
                            <button onClick={onExport} className="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition group text-left">
                                <div className="bg-white p-3 rounded-full shadow-sm text-blue-500 group-hover:scale-110 transition"><Download size={24}/></div>
                                <div className="font-bold text-slate-600">{t.backup}</div>
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-6 mb-12">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                            <div className="text-4xl font-black text-indigo-500">{totalSessions}</div>
                            <div className="text-sm font-bold text-slate-400 uppercase mt-2">{t.sessions}</div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                            <div className="text-4xl font-black text-emerald-500">{accuracy}%</div>
                            <div className="text-sm font-bold text-slate-400 uppercase mt-2">{t.accuracy}</div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                            <div className="text-4xl font-black text-amber-500">{totalQuestions}</div>
                            <div className="text-sm font-bold text-slate-400 uppercase mt-2">{t.problems}</div>
                        </div>
                    </div>

                    <div className="glass-panel p-8 rounded-[2.5rem] bg-white">
                        <h2 className="text-2xl font-black mb-6 flex items-center gap-3 text-slate-700 pb-4 border-b border-slate-100"><History size={28} className="text-teal-500"/> {t.history}</h2>
                        <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                            {history.length === 0 ? (
                                <div className="text-center text-slate-400 py-12 font-bold text-lg">{t.noData}</div>
                            ) : (
                                [...history].reverse().map((session, idx) => (
                                    <div key={idx} className="flex items-center justify-between p-5 bg-white rounded-3xl border border-slate-100 hover:border-teal-300 hover:shadow-lg transition group cursor-pointer" onClick={() => { sound.play('click'); onViewHistory(session); }}>
                                        <div className="flex items-center gap-5 flex-1">
                                            <div className={`font-black w-16 h-16 rounded-2xl flex items-center justify-center text-xl shadow-inner ${session.score/session.total >= 0.8 ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                {Math.round(session.score/session.total*100)}%
                                            </div>
                                            <div>
                                                <div className="font-bold text-slate-800 text-xl group-hover:text-teal-600 transition font-Nunito">{session.topic || "Untitled"}</div>
                                                <div className="text-sm text-slate-500 font-bold mt-1 bg-slate-50 inline-block px-2 py-0.5 rounded">{new Date(session.date).toLocaleDateString()} • {session.score}/{session.total}</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-3">
                                            {session.questions && (
                                                <button onClick={(e) => { e.stopPropagation(); sound.play('click'); onRelearn(session); }} className="p-3 bg-blue-50 text-blue-500 rounded-2xl hover:bg-blue-500 hover:text-white transition shadow-sm" title={t.relearn}>
                                                    <Repeat size={20}/>
                                                </button>
                                            )}
                                            <button className="p-3 bg-slate-50 text-slate-400 rounded-2xl hover:bg-slate-200 hover:text-slate-600 transition shadow-sm">
                                                <ArrowRight size={20}/>
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const SetupSession = ({ onStart, onBack, sound, t }) => {
            const [mode, setMode] = useState('manual');
            const [apiKey, setApiKey] = useState('');
            const [topic, setTopic] = useState('');
            const [content, setContent] = useState('');
            const [numQuestions, setNumQuestions] = useState(10);
            const [jsonInput, setJsonInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const copyPrompt = () => {
                sound.play('click');
                const finalPrompt = MASTER_PROMPT.replace("{TOPIC}", topic || "Math").replace("{CONTENT}", content || "N/A").replace("{NUM}", numQuestions);
                navigator.clipboard.writeText(finalPrompt);
                alert(t.promptAlert);
            };

            const openAI = (url) => window.open(url, '_blank');

            const handleStartAI = async () => {
                sound.play('click');
                if (!apiKey || !topic) return setError(t.aiError + "Missing Key/Topic");
                setLoading(true); setError('');
                try {
                    const finalPrompt = MASTER_PROMPT.replace("{TOPIC}", topic).replace("{CONTENT}", content || "N/A").replace("{NUM}", numQuestions);
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    let text = data.candidates[0].content.parts[0].text;
                    const cleaned = cleanJson(text);
                    onStart(JSON.parse(cleaned), topic);
                } catch (err) { setError(t.aiError + err.message); } finally { setLoading(false); }
            };

            const handleStartManual = () => {
                sound.play('click');
                try {
                    const cleaned = cleanJson(jsonInput);
                    const q = JSON.parse(cleaned);
                    if (!Array.isArray(q)) throw new Error("Format invalid");
                    onStart(q, topic || "Manual Session");
                } catch (err) { setError(t.jsonError + " " + err.message); }
            };

            return (
                <div className="w-full max-w-4xl mx-auto p-6 min-h-screen flex flex-col relative z-10">
                    <button onClick={onBack} className="self-start flex items-center text-slate-500 hover:text-teal-600 font-bold mb-8 gap-2 bg-white px-6 py-3 rounded-full shadow-sm hover:shadow-md transition border border-slate-100"><Home size={20}/> {t.home}</button>
                    
                    <div className="glass-panel p-10 rounded-[3rem] shadow-2xl flex-1 flex flex-col bg-white">
                        <h2 className="text-4xl font-black text-slate-800 mb-8 flex items-center gap-3 border-b-2 border-slate-100 pb-6">
                             <Calculator size={44} className="text-teal-500"/> {t.setupTitle}
                        </h2>

                        <div className="flex gap-3 justify-center mb-8 flex-wrap">
                            <button onClick={() => openAI('https://chatgpt.com')} className="flex items-center gap-2 px-5 py-3 bg-emerald-50 text-emerald-700 rounded-full font-bold hover:bg-emerald-100 transition border border-emerald-200 shadow-sm transform hover:scale-105"><Bot size={20}/> ChatGPT</button>
                            <button onClick={() => openAI('https://gemini.google.com')} className="flex items-center gap-2 px-5 py-3 bg-blue-50 text-blue-700 rounded-full font-bold hover:bg-blue-100 transition border border-blue-200 shadow-sm transform hover:scale-105"><Sparkles size={20}/> Gemini</button>
                            <button onClick={() => openAI('https://claude.ai')} className="flex items-center gap-2 px-5 py-3 bg-orange-50 text-orange-700 rounded-full font-bold hover:bg-orange-100 transition border border-orange-200 shadow-sm transform hover:scale-105"><Brain size={20}/> Claude</button>
                            <button onClick={() => openAI('https://copilot.microsoft.com')} className="flex items-center gap-2 px-5 py-3 bg-pink-50 text-pink-700 rounded-full font-bold hover:bg-pink-100 transition border border-pink-200 shadow-sm transform hover:scale-105"><MessageCircle size={20}/> Copilot</button>
                        </div>

                        <div className="flex bg-slate-100 p-2 rounded-2xl mb-8">
                            <button onClick={() => setMode('manual')} className={`flex-1 py-3 rounded-xl text-lg font-bold transition ${mode==='manual' ? 'bg-white text-teal-700 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>{t.manual}</button>
                            <button onClick={() => setMode('ai')} className={`flex-1 py-3 rounded-xl text-lg font-bold transition ${mode==='ai' ? 'bg-white text-purple-700 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>{t.auto}</button>
                        </div>

                        <div className="space-y-6 flex-1">
                            <div>
                                <label className="block text-sm font-bold text-slate-400 mb-2 pl-2">{t.topic}</label>
                                <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. Linear Algebra..." className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-teal-400 outline-none text-slate-800 font-bold text-lg transition"/>
                            </div>
                            
                            {mode === 'manual' && (
                                <div className="space-y-6 animate-in fade-in">
                                    <div className="grid grid-cols-3 gap-6">
                                        <div className="col-span-2">
                                            <label className="block text-sm font-bold text-slate-400 mb-2 pl-2">{t.context}</label>
                                            <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="..." className="w-full p-4 h-28 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-teal-400 outline-none text-base text-slate-700 resize-none"/>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-400 mb-2 pl-2">{t.count}</label>
                                            <input type="number" value={numQuestions} onChange={e=>setNumQuestions(e.target.value)} className="w-full p-4 h-28 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-teal-400 outline-none text-3xl font-black text-center text-slate-700"/>
                                        </div>
                                    </div>
                                    <div className="bg-sky-50 p-6 rounded-3xl border border-sky-100 flex justify-between items-center shadow-sm">
                                        <div>
                                            <div className="font-bold text-sky-700 text-lg">{t.step1}</div>
                                            <div className="text-sm text-sky-500 font-bold">{t.step1Desc}</div>
                                        </div>
                                        <button onClick={copyPrompt} className="text-sm bg-sky-500 hover:bg-sky-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition">{t.copyPrompt}</button>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-400 mb-2 pl-2">{t.step2}</label>
                                        <textarea value={jsonInput} onChange={e=>setJsonInput(e.target.value)} placeholder="[ ... ]" className="w-full h-40 p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-emerald-400 outline-none font-mono text-sm text-slate-600"/>
                                        <p className="text-xs text-emerald-500 mt-2 font-bold flex items-center gap-1 pl-2"><Wrench size={14}/> {t.fixJson}</p>
                                    </div>
                                    <button onClick={handleStartManual} className="btn-cute">
                                        <span className="shadow"></span><span className="edge"></span><span className="front">{t.execute}</span>
                                    </button>
                                </div>
                            )}

                            {mode === 'ai' && (
                                <div className="space-y-6 animate-in fade-in">
                                    <div>
                                        <label className="block text-sm font-bold text-purple-400 mb-2 pl-2">{t.apiKey}</label>
                                        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-..." className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-purple-400 outline-none text-slate-800 font-mono text-lg"/>
                                    </div>
                                    <button onClick={handleStartAI} disabled={loading} className="btn-cute">
                                        <span className="shadow"></span><span className="edge"></span>
                                        <span className="front flex items-center justify-center gap-3">
                                            {loading ? <RefreshCw className="animate-spin"/> : <Zap/>} {loading ? t.generating : t.generate}
                                        </span>
                                    </button>
                                </div>
                            )}
                            {error && <div className="p-4 bg-rose-50 text-rose-600 border border-rose-200 rounded-2xl text-center font-bold">{error}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const QuestionCard = ({ data, onAnswer, feedback, sound, t }) => {
            const [userAnswer, setUserAnswer] = useState(null);
            const { speak } = useTTS(); // Use TTS hook
            
            useEffect(() => { setUserAnswer(null); }, [data]);

            const submit = (ans) => {
                if (feedback) return;
                sound.play('click');
                setUserAnswer(ans);
                onAnswer(checkAnswer(data.type, ans, data.answer), ans);
            };

            const renderContent = () => {
                const btnBase = "p-5 rounded-2xl border-b-4 text-left transition text-xl relative overflow-hidden group";
                const btnNormal = "bg-white border-slate-200 hover:border-teal-300 hover:bg-teal-50 text-slate-700 shadow-sm";
                const btnSelected = "bg-teal-100 border-teal-400 text-teal-800 font-bold";

                if (data.type === 'mc') return (
                    <div className="grid grid-cols-1 gap-4 mt-8">
                        {data.options.map((opt, i) => (
                            <button key={i} disabled={!!feedback} onClick={() => submit(i)} className={`${btnBase} ${userAnswer === i ? btnSelected : btnNormal}`}>
                                <div className="flex items-center gap-4">
                                    <span className="font-bold text-sm opacity-60 border-2 border-current w-8 h-8 flex items-center justify-center rounded-lg">{String.fromCharCode(65+i)}</span>
                                    <div className="font-serif"><LatexText text={opt}/></div>
                                </div>
                            </button>
                        ))}
                    </div>
                );
                
                if (data.type === 'tf') return (
                    <div className="flex gap-6 mt-10">
                        {[true, false].map(v => (
                            <button key={v} onClick={() => submit(v)} disabled={!!feedback} className={`flex-1 py-8 rounded-3xl border-b-8 font-black text-2xl transition ${userAnswer===v ? 'bg-teal-500 border-teal-700 text-white' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}>
                                {v ? 'TRUE' : 'FALSE'}
                            </button>
                        ))}
                    </div>
                );

                if (data.type === 'fill') return (
                    <div className="mt-10">
                        <input type="text" onKeyDown={e=>e.key==='Enter'&&submit(e.target.value)} onBlur={e=>e.target.value&&submit(e.target.value)} disabled={!!feedback} placeholder={t.typeAns} className="w-full p-6 bg-white border-4 border-slate-100 rounded-3xl focus:border-teal-400 outline-none text-center text-3xl font-bold text-teal-600 placeholder-slate-200 shadow-inner font-Nunito"/>
                        <div className="text-center text-slate-400 font-bold mt-4 uppercase text-sm">{t.enterKey}</div>
                    </div>
                );

                if (data.type === 'order') {
                    const [currentOrder, setCurrentOrder] = useState([]);
                    const [scrambleOrder, setScrambleOrder] = useState([]);
                    
                    useEffect(() => {
                        if (data.type === 'order') {
                            const words = data.answer.split(' ').map((w, i) => ({ id: i, text: w }));
                            for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [words[i], words[j]] = [words[j], words[i]]; }
                            setScrambleOrder(words); setCurrentOrder([]);
                        }
                    }, [data]);

                    const handleWordClick = (word) => { 
                        if (feedback) return; 
                        sound.play('click');
                        setCurrentOrder([...currentOrder, word]); 
                        setScrambleOrder(scrambleOrder.filter(w => w.id !== word.id)); 
                    };
                    const handleReset = () => { 
                        if (feedback) return; 
                        sound.play('click');
                        const words = data.answer.split(' ').map((w, i) => ({ id: i, text: w })); for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [words[i], words[j]] = [words[j], words[i]]; } setScrambleOrder(words); setCurrentOrder([]); 
                    };
                    const checkOrder = () => { submit(currentOrder.map(w => w.text).join(' ')); };

                    return (
                        <div className="mt-8 space-y-6">
                            <div className="min-h-[100px] p-6 bg-white border-2 border-dashed border-teal-200 rounded-3xl flex flex-wrap gap-3 items-center justify-center">
                                {currentOrder.map((word, idx) => (<motion.span layout key={idx} className="bg-teal-100 text-teal-700 px-4 py-2 rounded-xl font-bold text-lg shadow-sm">{word.text}</motion.span>))}
                                {currentOrder.length === 0 && <span className="text-slate-300 text-lg font-bold">{t.chooseBelow}</span>}
                            </div>
                            <div className="flex flex-wrap gap-3 justify-center">
                                <AnimatePresence>
                                {scrambleOrder.map((word) => (<motion.button layout initial={{scale: 0}} animate={{scale: 1}} exit={{scale: 0}} key={word.id} onClick={() => handleWordClick(word)} disabled={!!feedback} className="bg-white border-b-4 border-slate-200 text-slate-600 px-4 py-3 rounded-2xl font-bold active:border-b-0 active:translate-y-1 transition-all text-lg hover:bg-teal-50 hover:text-teal-500 hover:border-teal-200">{word.text}</motion.button>))}
                                </AnimatePresence>
                            </div>
                            {!feedback && (
                                <div className="grid grid-cols-3 gap-4 mt-6 max-w-xl mx-auto">
                                    <button onClick={handleReset} className="col-span-1 bg-slate-100 text-slate-500 rounded-2xl font-bold py-4 text-base hover:bg-slate-200 transition">{t.reset}</button>
                                    <button onClick={checkOrder} className="col-span-2 bg-teal-500 text-white rounded-2xl font-bold py-4 shadow-xl active:scale-95 transition text-lg hover:bg-teal-600">{t.check}</button>
                                </div>
                            )}
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="glass-panel p-10 rounded-[3rem] shadow-2xl relative z-10 w-full max-w-4xl mx-auto mt-4 border-t-8 border-teal-400 bg-white">
                    <div className="mb-8">
                        <span className="text-xs font-black text-teal-600 border border-teal-100 px-3 py-1 rounded-full bg-teal-50 uppercase tracking-widest">
                            {data.type === 'mc' ? 'Multiple Choice' : data.type === 'tf' ? 'True / False' : data.type === 'fill' ? 'Fill Blank' : 'Sentence Order'}
                        </span>
                        <div className="flex items-start gap-4 mt-6">
                            <h3 className="text-3xl md:text-4xl font-bold text-slate-800 leading-relaxed font-serif flex-1">
                                <LatexText text={data.question} />
                            </h3>
                            <button onClick={() => speak(data.question)} className="bg-teal-50 p-3 rounded-full text-teal-500 hover:bg-teal-100 transition shadow-sm" title={t.clickSpeak}>
                                <Volume2 size={24}/>
                            </button>
                        </div>
                    </div>
                    {renderContent()}
                </div>
            );
        };

        const LearningSession = ({ questions, topic, onFinish, sound, t }) => {
            const [idx, setIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [history, setHistory] = useState([]);

            const handleAns = (isCorrect, userAns) => {
                setFeedback({ isCorrect, userAns });
                if (isCorrect) setScore(s => s + 1);
                setHistory([...history, { ...questions[idx], isCorrect, userAns }]);
            };

            const next = () => {
                setFeedback(null);
                if (idx < questions.length - 1) setIdx(i => i + 1);
                else onFinish(score, questions.length, history);
            };

            return (
                <div className="min-h-screen pt-24 px-4 pb-10 flex flex-col items-center">
                    <div className="fixed top-0 left-0 w-full bg-white/90 backdrop-blur z-40 border-b border-slate-100 flex justify-between px-8 py-4 shadow-sm">
                        <div className="text-teal-600 font-black truncate max-w-xs text-xl">{topic}</div>
                        <div className="font-bold text-slate-500 bg-slate-100 px-4 py-1 rounded-full">{idx + 1} / {questions.length}</div>
                    </div>
                    <QuestionCard data={questions[idx]} onAnswer={handleAns} feedback={feedback} sound={sound} t={t} />
                    <AnimatePresence>
                        {feedback && <FeedbackPopup feedback={feedback} data={questions[idx]} onNext={next} isLast={idx === questions.length - 1} playSound={sound.play} t={t} />}
                    </AnimatePresence>
                </div>
            );
        };

        const Summary = ({ score, total, onHome, sound, t }) => {
            useEffect(() => { if(score/total > 0.5) sound.play('win'); }, []);
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-panel p-12 rounded-[3rem] text-center max-w-lg w-full bg-white">
                        <h2 className="text-4xl font-black text-slate-800 mb-4">{t.summary}</h2>
                        <div className="text-9xl font-black text-teal-400 my-10 drop-shadow-sm">{Math.round(score/total*100)}%</div>
                        <div className="grid grid-cols-2 gap-6 mb-10">
                            <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100"><div className="text-4xl text-emerald-500 font-black">{score}</div><div className="text-sm text-emerald-400 font-bold uppercase mt-1">{t.correctCount}</div></div>
                            <div className="bg-rose-50 p-6 rounded-3xl border border-rose-100"><div className="text-4xl text-rose-500 font-black">{total - score}</div><div className="text-sm text-rose-400 font-bold uppercase mt-1">{t.wrongCount}</div></div>
                        </div>
                        <button onClick={() => { sound.play('click'); onHome(); }} className="btn-cute"><span className="shadow"></span><span className="edge"></span><span className="front">{t.home}</span></button>
                    </div>
                </div>
            );
        };

        const HistoryDetailModal = ({ session, onClose, sound, t }) => {
            if (!session) return null;
            const { speak } = useTTS(); // Use TTS hook
            
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/50 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-4xl h-[85vh] rounded-[3rem] flex flex-col shadow-2xl overflow-hidden border-4 border-white">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h2 className="text-2xl font-black text-teal-600 flex items-center gap-2"><BookOpen/> {t.review}: {session.topic}</h2>
                            <button onClick={onClose} className="p-3 bg-white rounded-full text-slate-400 hover:text-rose-500 shadow-sm transition"><X size={24}/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar bg-slate-50/50">
                            {session.details.map((item, idx) => (
                                <div key={idx} className={`p-6 rounded-3xl border-2 bg-white ${item.isCorrect ? 'border-emerald-100' : 'border-rose-100'}`}>
                                    <div className="flex gap-4 mb-4 items-start">
                                        <div className={`w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-bold text-white text-lg ${item.isCorrect ? 'bg-emerald-400' : 'bg-rose-400'}`}>{idx+1}</div>
                                        <div className="font-serif text-slate-800 text-lg font-bold flex-1"><LatexText text={item.question}/></div>
                                        <button onClick={() => speak(item.question)} className="p-2 text-slate-400 hover:text-teal-500"><Volume2 size={20}/></button>
                                    </div>
                                    <div className="pl-14 text-base space-y-3">
                                        <div className="flex gap-4">
                                            <div className="text-slate-400 font-bold text-sm uppercase">{t.correctAns}: <span className="text-emerald-500 font-black text-lg ml-1">{String(item.answer)}</span></div>
                                            {!item.isCorrect && <div className="text-slate-400 font-bold text-sm uppercase">{t.yourAns}: <span className="text-rose-500 font-black text-lg ml-1 line-through">{String(item.userAns)}</span></div>}
                                        </div>
                                        <div className="bg-sky-50 p-5 rounded-2xl text-slate-700 border border-sky-100 leading-relaxed font-medium"><LatexText text={item.explanation}/></div>
                                        
                                        {/* Vocabulary in History */}
                                        {item.vocab && item.vocab.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {item.vocab.map((v, vIdx) => (
                                                    <button key={vIdx} onClick={() => speak(v.split(':')[0])} className="bg-white px-3 py-1 rounded-lg text-sm font-bold text-slate-600 shadow-sm border border-slate-200 flex items-center gap-1 hover:bg-slate-50 transition">
                                                        {v} <Volume2 size={12}/>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState('dashboard');
            const [lang, setLang] = useState('vi'); 
            const [history, setHistory] = useLocalStorage('math_english_history', []);
            const [sessionData, setSessionData] = useState({});
            const [viewSession, setViewSession] = useState(null);
            const sound = useSound();
            
            const t = TRANSLATIONS[lang];

            const startSession = (questions, topic) => {
                setSessionData({ questions, topic });
                setScreen('learning');
            };

            const finishSession = (score, total, details) => {
                const rec = { date: new Date(), topic: sessionData.topic, score, total, details, questions: sessionData.questions };
                setHistory([...history, rec]);
                setSessionData({ ...sessionData, score, total, details });
                setScreen('summary');
            };

            const exportData = () => {
                const a = document.createElement("a");
                a.href = URL.createObjectURL(new Blob([JSON.stringify(history)], {type: "application/json"}));
                a.download = "math_english_backup.json";
                a.click();
            };

            const importData = (e) => {
                const r = new FileReader();
                r.onload = ev => { try { setHistory(JSON.parse(ev.target.result)); alert("Data Loaded."); } catch(e){ alert("Invalid File"); } };
                r.readAsText(e.target.files[0]);
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden text-slate-800">
                    <CuteBackground />
                    {screen === 'dashboard' && <Dashboard history={history} onStartNew={() => setScreen('setup')} onExport={exportData} onImport={importData} onViewHistory={setViewSession} onRelearn={(s) => startSession(s.questions, s.topic)} sound={sound} lang={lang} setLang={setLang} t={t} />}
                    {screen === 'setup' && <SetupSession onBack={() => setScreen('dashboard')} onStart={startSession} sound={sound} t={t} />}
                    {screen === 'learning' && <LearningSession questions={sessionData.questions} topic={sessionData.topic} onFinish={finishSession} sound={sound} t={t} />}
                    {screen === 'summary' && <Summary score={sessionData.score} total={sessionData.total} onHome={() => setScreen('dashboard')} sound={sound} t={t} />}
                    {viewSession && <HistoryDetailModal session={viewSession} onClose={() => setViewSession(null)} sound={sound} t={t} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
