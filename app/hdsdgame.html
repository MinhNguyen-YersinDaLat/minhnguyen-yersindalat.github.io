<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HƯỚNG DẪN SỬ DỤNG - GAME GIÁO DỤC</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX CSS (Cho công thức Toán) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <!-- Libraries for Live Preview -->
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <script src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Custom Scrollbar - Orange Theme */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #fff7ed; }
        ::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
        
        .code-block { font-family: 'Consolas', 'Monaco', monospace; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-orange-50 text-slate-900 selection:bg-orange-200 text-lg">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            BookOpen, Info, FileJson, Activity, Beaker, Table, Shapes, 
            Copy, Check, ChevronRight, Play, Settings, Menu, X, Lightbulb,
            GraduationCap, Zap, Users, Monitor, Shuffle, Grid, Key, Edit3
        } from 'lucide-react';

        // --- COMPONENTS FOR LIVE PREVIEW ---

        const PreviewBox = ({ title, children }) => (
            <div className="mt-6 bg-white rounded-2xl border-2 border-slate-200 shadow-md overflow-hidden">
                <div className="bg-slate-100 px-6 py-3 border-b border-slate-200 flex items-center justify-between">
                    <span className="text-sm font-bold text-slate-600 uppercase tracking-wider flex items-center gap-2">
                        <Monitor size={18}/> Kết quả hiển thị
                    </span>
                </div>
                <div className="p-8 flex justify-center items-center bg-[url('https://www.transparenttextures.com/patterns/grid-me.png')]">
                    {children}
                </div>
            </div>
        );

        // 1. Graph Preview
        const GraphPreview = ({ formula }) => {
            const rootRef = useRef(null);
            useEffect(() => {
                if (!rootRef.current) return;
                try {
                    rootRef.current.innerHTML = '';
                    window.functionPlot({
                        target: rootRef.current,
                        width: 400, height: 300,
                        yAxis: { domain: [-5, 5] }, xAxis: { domain: [-5, 5] },
                        grid: true, data: [{ fn: formula, color: '#ea580c' }]
                    });
                } catch (e) {}
            }, [formula]);
            return <div ref={rootRef} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"></div>;
        };

        // 2. Chemistry Preview
        const ChemPreview = ({ smiles }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!canvasRef.current || !window.SmilesDrawer) return;
                const options = { width: 400, height: 300, padding: 10, themes: { light: { BACKGROUND: '#fff' } } };
                const drawer = new window.SmilesDrawer.Drawer(options);
                window.SmilesDrawer.parse(smiles, (tree) => drawer.draw(tree, canvasRef.current, 'light', false));
            }, [smiles]);
            return <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-2"><canvas ref={canvasRef} width="400" height="300"></canvas></div>;
        };

        // 3. Table Preview
        const TablePreview = ({ data }) => {
            const rows = data.trim().split('\n').map(r => r.split(','));
            return (
                <div className="bg-white rounded-xl border border-orange-200 p-0 overflow-hidden shadow-sm w-full max-w-lg">
                    <table className="w-full text-base border-collapse">
                        <thead><tr className="bg-gradient-to-r from-orange-100 to-amber-100 text-orange-900">{rows[0].map((h,i)=><th key={i} className="border-b border-orange-200 p-4 font-bold text-left">{h.trim()}</th>)}</tr></thead>
                        <tbody>{rows.slice(1).map((r,i)=><tr key={i} className="hover:bg-orange-50">{r.map((c,j)=><td key={j} className="border-b border-slate-100 p-4 text-slate-700">{c.trim()}</td>)}</tr>)}</tbody>
                    </table>
                </div>
            );
        };

        // 4. SVG Preview
        const SVGPreview = ({ code }) => (
            <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm" dangerouslySetInnerHTML={{ __html: code }} />
        );

        // --- MAIN GUIDE APP ---

        const CopyButton = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                navigator.clipboard.writeText(text);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };
            return (
                <button onClick={handleCopy} className="absolute top-3 right-3 p-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition text-slate-300 hover:text-white" title="Sao chép">
                    {copied ? <Check size={20} className="text-green-400"/> : <Copy size={20}/>}
                </button>
            );
        };

        const CodeSnippet = ({ label, code, lang = "json" }) => (
            <div className="relative group mt-4 mb-8">
                {label && <div className="text-sm font-bold text-slate-600 uppercase mb-2 flex items-center gap-2"><div className="w-3 h-3 bg-orange-500 rounded-full"></div>{label}</div>}
                <div className="bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700">
                    <div className="bg-slate-900/50 px-5 py-3 border-b border-slate-700 flex justify-between items-center">
                        <div className="flex gap-2">
                            <div className="w-3 h-3 rounded-full bg-red-500"></div>
                            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div className="w-3 h-3 rounded-full bg-green-500"></div>
                        </div>
                        <div className="text-sm text-slate-400 font-mono font-bold uppercase">{lang}</div>
                    </div>
                    <pre className="p-6 text-base overflow-x-auto code-block leading-relaxed text-blue-100">
                        {code}
                    </pre>
                </div>
                <CopyButton text={code} />
            </div>
        );

        const Section = ({ title, icon: Icon, children }) => (
            <motion.div 
                initial={{ opacity: 0, y: 20 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true }}
                className="mb-24 scroll-mt-28" 
                id={title}
            >
                <div className="flex items-center gap-5 mb-10 pb-6 border-b-4 border-orange-100">
                    <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-600 text-white flex items-center justify-center shadow-xl transform rotate-3">
                        <Icon size={36} strokeWidth={2.5} />
                    </div>
                    <h2 className="text-4xl font-black text-slate-800 uppercase tracking-tight">{title}</h2>
                </div>
                <div className="space-y-8 text-slate-700 leading-relaxed text-xl">
                    {children}
                </div>
            </motion.div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('tong-quan');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);

            const menuItems = [
                { id: 'tong-quan', label: '1. Tổng Quan & Bắt Đầu', icon: Info },
                { id: 'api-key', label: '2. Lấy API Key (Gemini)', icon: Key },
                { id: 'cau-hinh', label: '3. Cấu Hình Đội & HS', icon: Settings },
                { id: 'nhap-lieu', label: '4. Nhập Liệu JSON', icon: FileJson },
                { id: 'do-thi', label: '5. Đồ Thị Hàm Số', icon: Activity },
                { id: 'hoa-hoc', label: '6. Cấu Trúc Hóa Học', icon: Beaker },
                { id: 'bang', label: '7. Bảng Dữ Liệu', icon: Table },
                { id: 'svg', label: '8. Hình Học Vector', icon: Shapes },
            ];

            const scrollToSection = (id) => {
                setActiveTab(id);
                const el = document.getElementById(id);
                if(el) el.scrollIntoView({ behavior: 'smooth' });
                if (window.innerWidth < 1280) setIsSidebarOpen(false);
            };

            return (
                <div className="flex h-screen overflow-hidden bg-orange-50 font-sans">
                    {/* Sidebar */}
                    <motion.div 
                        initial={false}
                        animate={{ 
                            width: isSidebarOpen ? 350 : 0, 
                            opacity: isSidebarOpen ? 1 : 0,
                            x: isSidebarOpen ? 0 : -350
                        }}
                        className="fixed inset-y-0 left-0 z-50 xl:relative bg-white border-r border-orange-200 flex flex-col shadow-2xl xl:shadow-none"
                    >
                        {/* Sidebar Header */}
                        <div className="p-8 bg-gradient-to-br from-orange-500 to-amber-600 text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10">
                                <BookOpen size={120} />
                            </div>
                            <div className="relative z-10">
                                <h1 className="font-black text-3xl tracking-tight mb-2">HƯỚNG DẪN</h1>
                                <p className="text-orange-100 text-base font-medium opacity-90">Hệ thống Game Giáo Dục</p>
                                <div className="mt-6 pt-6 border-t border-white/20 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
                                        <GraduationCap size={24} />
                                    </div>
                                    <div>
                                        <div className="text-xs uppercase tracking-widest opacity-80 mb-1">Tác giả</div>
                                        <div className="font-bold text-lg">Thầy THÁI MINH NGUYÊN</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 p-5 space-y-3 overflow-y-auto">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => scrollToSection(item.id)}
                                    className={`w-full flex items-center gap-4 px-5 py-4 rounded-xl transition-all font-bold text-base text-left group
                                    ${activeTab === item.id 
                                        ? 'bg-orange-50 text-orange-700 shadow-md border border-orange-200 scale-[1.02]' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}>
                                    <div className={`p-2 rounded-lg transition-colors ${activeTab === item.id ? 'bg-orange-200 text-orange-700' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200 group-hover:text-slate-600'}`}>
                                        <item.icon size={20}/>
                                    </div>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        
                         {/* Sidebar Footer */}
                        <div className="p-6 bg-slate-50 border-t border-slate-100 text-center">
                            <p className="text-sm text-slate-400 font-bold">Phiên bản 7.1 - Big Font Update</p>
                        </div>
                    </motion.div>

                    {/* Overlay for mobile */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-black/50 z-40 xl:hidden" onClick={() => setIsSidebarOpen(false)}></div>
                    )}

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden relative w-full">
                        {/* Top Bar */}
                        <div className="flex-shrink-0 h-24 bg-white/90 backdrop-blur-md border-b border-orange-100 flex items-center justify-between px-8 z-30 sticky top-0 shadow-sm">
                            <div className="flex items-center gap-6">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-3 hover:bg-orange-50 text-orange-600 rounded-xl transition-colors border-2 border-transparent hover:border-orange-100">
                                    {isSidebarOpen ? <X size={28}/> : <Menu size={28}/>}
                                </button>
                                <h2 className="font-black text-slate-800 text-2xl hidden sm:block uppercase tracking-wide">Tài liệu hướng dẫn sử dụng</h2>
                            </div>
                            
                            {/* Logo Floating Area */}
                            <div className="flex items-center gap-5">
                                <div className="text-right hidden md:block">
                                    <div className="text-base font-black text-orange-600 uppercase">GAME GIÁO DỤC</div>
                                    <div className="text-sm text-slate-500 font-medium">Học mà chơi - Chơi mà học</div>
                                </div>
                                <img src="logo.png" alt="Logo" className="w-16 h-16 object-contain drop-shadow-lg transform hover:scale-105 transition-transform duration-300" onError={(e) => e.target.style.display = 'none'} />
                            </div>
                        </div>

                        {/* Content Scroll Area */}
                        <div className="flex-1 overflow-y-auto p-6 md:p-16 scroll-smooth bg-orange-50/50">
                            <div className="max-w-6xl mx-auto pb-40">
                                
                                {/* 1. TỔNG QUAN */}
                                <Section title="1. Tổng Quan & Bắt Đầu" icon={Info}>
                                    <div id="tong-quan">
                                        <div className="bg-white p-10 rounded-3xl shadow-md border border-orange-100 mb-8">
                                            <p className="mb-6 leading-loose">
                                                Chào mừng quý thầy cô đến với <strong>Game Giáo Dục</strong>. Đây là ứng dụng hỗ trợ tổ chức trò chơi trắc nghiệm trên lớp học. 
                                                Điểm đặc biệt là hệ thống kết hợp giữa việc trả lời câu hỏi và các <strong>Minigame ngẫu nhiên</strong> (Đá banh, Bóng rổ, Đua thú...) 
                                                giúp học sinh hào hứng hơn.
                                            </p>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                                                <div className="p-6 bg-green-50 rounded-2xl border border-green-100">
                                                    <div className="font-black text-green-700 mb-2 flex items-center gap-2 text-xl"><Check size={24}/> Dễ sử dụng</div>
                                                    <p className="text-base text-slate-600">Giao diện tiếng Việt, trực quan, không cần cài đặt phức tạp.</p>
                                                </div>
                                                <div className="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                                                    <div className="font-black text-blue-700 mb-2 flex items-center gap-2 text-xl"><Check size={24}/> Đa dạng</div>
                                                    <p className="text-base text-slate-600">Hỗ trợ Toán (công thức), Hóa học, Hình ảnh và nhiều chế độ chơi.</p>
                                                </div>
                                                <div className="p-6 bg-purple-50 rounded-2xl border border-purple-100">
                                                    <div className="font-black text-purple-700 mb-2 flex items-center gap-2 text-xl"><Check size={24}/> Linh hoạt</div>
                                                    <p className="text-base text-slate-600">Chơi theo đội nhóm hoặc quay số gọi tên cá nhân ngẫu nhiên.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* 2. LẤY API KEY */}
                                <Section title="2. Cách Lấy API Key (Miễn Phí)" icon={Key}>
                                    <div id="api-key">
                                        <p className="mb-6">
                                            Để sử dụng tính năng <strong>AI Tự Động Soạn Câu Hỏi</strong>, thầy cô cần có một "chìa khóa" (API Key) từ Google. Việc này hoàn toàn miễn phí và chỉ cần làm 1 lần.
                                        </p>
                                        
                                        <div className="bg-white p-8 rounded-3xl border-l-8 border-blue-500 shadow-sm space-y-6">
                                            <div className="flex gap-4">
                                                <div className="flex-shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-2xl">1</div>
                                                <div>
                                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Truy cập Google AI Studio</h3>
                                                    <p>Thầy cô vào trang web: <a href="https://aistudio.google.com/" target="_blank" className="text-blue-600 font-bold underline hover:text-blue-800">https://aistudio.google.com/</a></p>
                                                </div>
                                            </div>

                                            <div className="flex gap-4">
                                                <div className="flex-shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-2xl">2</div>
                                                <div>
                                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Đăng nhập & Tạo Key</h3>
                                                    <p>Đăng nhập bằng tài khoản Gmail của thầy cô. Sau đó tìm nút <strong>"Get API key"</strong> (ở menu bên trái) -> Bấm <strong>"Create API key"</strong>.</p>
                                                </div>
                                            </div>

                                            <div className="flex gap-4">
                                                <div className="flex-shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-2xl">3</div>
                                                <div>
                                                    <h3 className="text-xl font-bold text-slate-800 mb-2">Sao chép Key</h3>
                                                    <p>Một chuỗi ký tự dài bắt đầu bằng <code>AIza...</code> sẽ hiện ra. Thầy cô bấm Copy và dán vào ô nhập Key trong game.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* 3. CẤU HÌNH ĐỘI & HỌC SINH */}
                                <Section title="3. Cấu Hình Đội & Học Sinh" icon={Users}>
                                    <div id="cau-hinh">
                                        <p className="mb-6">Tại màn hình <strong>"Cấu Hình Trò Chơi"</strong> (Bước 2), thầy cô có thể chọn 1 trong 2 chế độ chơi:</p>

                                        <div className="grid lg:grid-cols-2 gap-8">
                                            {/* Chế độ Đội */}
                                            <div className="bg-orange-50 p-8 rounded-3xl border-2 border-orange-200">
                                                <h3 className="text-2xl font-black text-orange-700 mb-4 flex items-center gap-3"><Grid size={32}/> 1. Chế độ Chia Đội (Teams)</h3>
                                                <p className="mb-4 text-base">Phù hợp khi chia lớp thành các nhóm lớn để thi đua.</p>
                                                <ul className="space-y-4 text-base">
                                                    <li className="flex gap-3 items-start">
                                                        <span className="bg-orange-200 text-orange-800 font-bold px-2 rounded">B1</span>
                                                        <span>Kéo thanh trượt để chọn số lượng đội (2 đến 16 đội).</span>
                                                    </li>
                                                    <li className="flex gap-3 items-start">
                                                        <span className="bg-orange-200 text-orange-800 font-bold px-2 rounded">B2</span>
                                                        <span><strong>Đổi tên đội:</strong> Nhập trực tiếp vào các ô tên đội (Ví dụ: Đội Hổ, Đội Báo...) để tăng phần sinh động.</span>
                                                    </li>
                                                </ul>
                                            </div>

                                            {/* Chế độ Cá Nhân */}
                                            <div className="bg-green-50 p-8 rounded-3xl border-2 border-green-200">
                                                <h3 className="text-2xl font-black text-green-700 mb-4 flex items-center gap-3"><Shuffle size={32}/> 2. Chế độ Cá Nhân (Random)</h3>
                                                <p className="mb-4 text-base">Hệ thống sẽ quay số ngẫu nhiên tên học sinh để trả lời.</p>
                                                <div className="bg-white p-4 rounded-xl border border-green-100 shadow-sm">
                                                    <h4 className="font-bold text-green-800 mb-2 uppercase text-sm">Cách nhập danh sách lớp:</h4>
                                                    <p className="mb-2 text-sm">Thầy cô mở file Excel danh sách lớp -> Copy cột "Họ và Tên" -> Dán vào khung nhập liệu trong game.</p>
                                                    <div className="p-3 bg-slate-100 rounded text-sm font-mono text-slate-600 border border-slate-200">
                                                        Nguyễn Văn An<br/>
                                                        Trần Thị Bình<br/>
                                                        Lê Văn Cường<br/>
                                                        ...
                                                    </div>
                                                    <p className="mt-2 text-sm text-slate-500 italic">Mỗi tên nằm trên 1 dòng.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* 4. NHẬP LIỆU JSON */}
                                <Section title="4. Nhập Liệu Thủ Công (JSON)" icon={FileJson}>
                                    <div id="nhap-lieu">
                                        <p>Nếu không dùng AI, thầy cô có thể tự soạn câu hỏi. Dữ liệu cần tuân thủ cấu trúc <strong>JSON</strong>.</p>
                                        
                                        <div className="my-8 bg-yellow-50 border-l-8 border-yellow-400 p-6 rounded-r-2xl shadow-sm">
                                            <h4 className="font-bold text-yellow-800 flex items-center gap-2 mb-2 text-xl"><Lightbulb size={24}/> Mẹo hay từ chuyên gia</h4>
                                            <p className="text-yellow-900">
                                                Đừng gõ tay! Hãy copy đề bài vào <strong>ChatGPT</strong> và dùng câu lệnh thần thánh sau:<br/>
                                                <span className="font-mono bg-yellow-100 px-3 py-2 rounded mt-3 inline-block text-slate-800 font-bold border border-yellow-200 shadow-sm text-lg w-full">"Hãy chuyển đổi đề trắc nghiệm này sang định dạng JSON theo mẫu sau..."</span>
                                            </p>
                                        </div>

                                        <h4 className="font-bold text-slate-800 mb-4 text-xl">Cấu trúc mẫu chuẩn cho 1 câu hỏi:</h4>
                                        <CodeSnippet label="Template JSON" code={`[
  {
    "question": "Nội dung câu hỏi (hỗ trợ LaTeX như $x^2$)",
    "options": ["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"],
    "correctAnswer": 0, 
    "explanation": "Giải thích chi tiết (hiện sau khi trả lời)",
    "visualType": "none",
    "visualData": ""
  }
]`} />
                                        <p className="text-base text-slate-500 bg-slate-100 p-4 rounded-xl inline-block border border-slate-200">
                                            <strong>Lưu ý quan trọng:</strong> <code>correctAnswer</code> tính từ 0. (0=A, 1=B, 2=C, 3=D).
                                        </p>
                                    </div>
                                </Section>

                                {/* 5. ĐỒ THỊ */}
                                <Section title="5. Vẽ Đồ Thị Hàm Số" icon={Activity}>
                                    <div id="do-thi">
                                        <p className="mb-8">Hệ thống tự động vẽ đồ thị cực đẹp. Thầy cô chỉ cần nhập công thức vào mục <code>visualData</code>.</p>
                                        
                                        <div className="grid lg:grid-cols-2 gap-10">
                                            {/* Cột hướng dẫn */}
                                            <div>
                                                <div className="bg-orange-100/50 p-6 rounded-2xl border border-orange-100 mb-8">
                                                    <h5 className="font-bold text-orange-800 mb-3 uppercase text-sm flex items-center gap-2"><Settings size={16}/> Thiết lập trong JSON</h5>
                                                    <ul className="space-y-3 text-base">
                                                        <li>• <strong>visualType:</strong> <code>"graph"</code></li>
                                                        <li>• <strong>visualData:</strong> Nhập biểu thức vế phải (theo biến x).</li>
                                                    </ul>
                                                </div>

                                                <h5 className="font-bold text-slate-700 text-lg mb-3">Ví dụ 1: Hàm bậc 3</h5>
                                                <CodeSnippet label="visualData" code="x^3 - 3x" lang="math" />

                                                <h5 className="font-bold text-slate-700 text-lg mb-3 mt-6">Ví dụ 2: Hàm lượng giác</h5>
                                                <CodeSnippet label="visualData" code="sin(x) + cos(2x)" lang="math" />
                                            </div>

                                            {/* Cột Preview */}
                                            <div>
                                                <PreviewBox>
                                                    <div className="space-y-4">
                                                        <div className="text-center text-sm text-slate-400 font-mono">y = x^3 - 3x</div>
                                                        <GraphPreview formula="x^3 - 3x" />
                                                    </div>
                                                </PreviewBox>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* 6. HÓA HỌC */}
                                <Section title="6. Vẽ Cấu Trúc Hóa Học" icon={Beaker}>
                                    <div id="hoa-hoc">
                                        <p className="mb-8">Sử dụng chuẩn <strong>SMILES</strong> để vẽ công thức phân tử. Không cần ảnh, chỉ cần mã text.</p>

                                        <div className="grid lg:grid-cols-2 gap-10">
                                            <div>
                                                <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100 mb-8">
                                                    <h5 className="font-bold text-blue-800 mb-3 uppercase text-sm flex items-center gap-2"><Settings size={16}/> Thiết lập trong JSON</h5>
                                                    <ul className="space-y-3 text-base">
                                                        <li>• <strong>visualType:</strong> <code>"chemistry"</code></li>
                                                        <li>• <strong>visualData:</strong> Nhập chuỗi SMILES.</li>
                                                    </ul>
                                                </div>

                                                <h5 className="font-bold text-slate-700 text-lg mb-3">Ví dụ 1: Axit Axetic ($CH_3COOH$)</h5>
                                                <CodeSnippet label="visualData" code="CC(=O)O" lang="smiles" />

                                                <h5 className="font-bold text-slate-700 text-lg mb-3 mt-6">Ví dụ 2: Vòng Benzen</h5>
                                                <CodeSnippet label="visualData" code="c1ccccc1" lang="smiles" />
                                                
                                                <h5 className="font-bold text-slate-700 text-lg mb-3 mt-6">Ví dụ 3: Aspirin</h5>
                                                <CodeSnippet label="visualData" code="CC(=O)OC1=CC=CC=C1C(=O)O" lang="smiles" />
                                            </div>

                                            <div>
                                                <PreviewBox>
                                                    <div className="space-y-8 flex flex-col items-center w-full">
                                                        <div className="w-full flex flex-col items-center">
                                                            <div className="text-center text-sm text-slate-400 mb-2 font-bold">Aspirin</div>
                                                            <ChemPreview smiles="CC(=O)OC1=CC=CC=C1C(=O)O" />
                                                        </div>
                                                        <div className="w-full flex flex-col items-center pt-6 border-t border-slate-100">
                                                            <div className="text-center text-sm text-slate-400 mb-2 font-bold">Benzen</div>
                                                            <ChemPreview smiles="c1ccccc1" />
                                                        </div>
                                                    </div>
                                                </PreviewBox>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* 7. BẢNG DỮ LIỆU */}
                                <Section title="7. Tạo Bảng Dữ Liệu" icon={Table}>
                                    <div id="bang">
                                        <p className="mb-8">Dùng cho các câu hỏi Địa lý, Sinh học hoặc Toán thống kê.</p>

                                        <div className="grid lg:grid-cols-2 gap-10">
                                            <div>
                                                <div className="bg-green-50 p-6 rounded-2xl border border-green-100 mb-8">
                                                    <h5 className="font-bold text-green-800 mb-3 uppercase text-sm flex items-center gap-2"><Settings size={16}/> Thiết lập trong JSON</h5>
                                                    <ul className="space-y-3 text-base">
                                                        <li>• <strong>visualType:</strong> <code>"table"</code></li>
                                                        <li>• <strong>visualData:</strong> Nhập dữ liệu CSV (cách nhau dấu phẩy).</li>
                                                    </ul>
                                                </div>

                                                <h5 className="font-bold text-slate-700 text-lg mb-3">Ví dụ mẫu:</h5>
                                                <CodeSnippet label="visualData" code={`Năm, Dân số (triệu), Tăng trưởng (%)
2019, 96.48, 1.15
2020, 97.58, 1.14
2021, 98.50, 0.94`} lang="csv" />
                                            </div>

                                            <div>
                                                <PreviewBox>
                                                    <TablePreview data={`Năm, Dân số (triệu), Tăng trưởng (%)
2019, 96.48, 1.15
2020, 97.58, 1.14
2021, 98.50, 0.94`} />
                                                </PreviewBox>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* 8. SVG */}
                                <Section title="8. Hình Học Vector (SVG)" icon={Shapes}>
                                    <div id="svg">
                                        <p className="mb-8">Dành cho các hình vẽ phức tạp. Thầy cô có thể vẽ trên các trang web SVG Editor online rồi dán code vào.</p>

                                        <div className="grid lg:grid-cols-2 gap-10">
                                            <div>
                                                <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100 mb-8">
                                                    <h5 className="font-bold text-purple-800 mb-3 uppercase text-sm flex items-center gap-2"><Settings size={16}/> Thiết lập trong JSON</h5>
                                                    <ul className="space-y-3 text-base">
                                                        <li>• <strong>visualType:</strong> <code>"svg"</code></li>
                                                        <li>• <strong>visualData:</strong> Dán nguyên khối thẻ <code>&lt;svg&gt;...&lt;/svg&gt;</code>.</li>
                                                    </ul>
                                                </div>

                                                <h5 className="font-bold text-slate-700 text-lg mb-3">Ví dụ: Hình tròn đỏ</h5>
                                                <CodeSnippet label="visualData" code={`<svg viewBox="0 0 100 100" width="150" height="150">
  <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="#ef4444" />
</svg>`} lang="xml" />
                                            </div>

                                            <div>
                                                <PreviewBox>
                                                    <SVGPreview code={`<svg viewBox="0 0 100 100" width="150" height="150">
  <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="#ef4444" />
</svg>`} />
                                                </PreviewBox>
                                            </div>
                                        </div>
                                    </div>
                                </Section>

                                {/* Footer Content */}
                                <div className="mt-32 pt-12 border-t-2 border-orange-200 text-center">
                                    <div className="inline-flex items-center justify-center p-4 bg-white rounded-full shadow-md mb-6 transform hover:scale-110 transition-transform duration-300">
                                        <img src="logo.png" className="w-16 h-16 object-contain" onError={(e) => e.target.style.display = 'none'} />
                                    </div>
                                    <h3 className="font-black text-slate-800 uppercase tracking-widest text-lg mb-3">Game Giáo Dục - Phiên bản 7.1</h3>
                                    <p className="text-slate-600 text-lg">Được thiết kế và phát triển bởi <span className="font-black text-orange-600">Thầy Thái Minh Nguyên</span></p>
                                    <p className="text-slate-400 text-base mt-2 font-medium">Trường TH, THCS & THPT YERSIN ĐÀ LẠT</p>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
