<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <!-- THƯ VIỆN VISUALIZATION -->

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",

        }

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #fb923c; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ea580c; 
        }

        /* NEW: PROFESSIONAL BACKGROUND PATTERN */
        .bg-graph-paper {
            background-color: #f8fafc; /* Slate-50 base */
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            position: relative;
        }
        /* Vignette effect for depth */
        .bg-graph-paper::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(15, 23, 42, 0.08) 100%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* Style cho Visual Content */
        .visual-container {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin: 16px auto;
            border: 2px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            max-width: 100%;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
            transition: all 0.3s ease;
        }

        /* Function Plot Customization */
        .function-plot text {
            font-family: 'Segoe UI', sans-serif !important;
            font-size: 14px !important;
            fill: #333 !important;
        }
        .function-plot .axis-label {
            font-weight: bold;
            font-size: 16px !important;
        }
    </style>

    <!-- SCRIPT BẢO VỆ MÃ NGUỒN -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.keyCode === 13) return true;
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && ['I', 'C', 'J'].includes(e.key.toUpperCase())) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.key.toUpperCase() === 'U') {
                e.preventDefault();
                return false;
            }
        });
    </script>
</head>
<body class="bg-graph-paper min-h-screen">
    <div id="root" class="relative z-10"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            Trophy, Activity, Check, Play, Settings, RefreshCw, Calculator, 
            FlaskConical, Atom, Key, BookOpen, Users, Loader2, Edit3, Save, 
            Trash2, ArrowRight, ArrowLeft, Dna, Target, Timer, Zap, Crown, Skull, Swords, Medal, Gift, AlertTriangle, GraduationCap, Maximize, Minimize, Send, Hand, HelpCircle, Repeat, Home, Eye, Sigma, Beaker, Shapes, Monitor, FileText, Info, Lightbulb, Download, Upload, Copy, FileJson, Grid, Shuffle, User, X, Wand2, Image as ImageIcon, Brain, Table2, List, GitBranch, BarChart3, Cloud, LogOut, LogIn, Library, Plus, FileType2
        } from 'lucide-react';

        // --- FIREBASE SETUP ---
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, serverTimestamp, orderBy } from "firebase/firestore";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDUJiSbxjmyvnTR1pzNzwDw2h9xr-MzPW0",
            authDomain: "thay-thaiminhnguyen.firebaseapp.com",
            projectId: "thay-thaiminhnguyen",
            storageBucket: "thay-thaiminhnguyen.firebasestorage.app",
            messagingSenderId: "407056816096",
            appId: "1:407056816096:web:7fd8d02ab9210a1a96fd85",
            measurementId: "G-9F8S1P3NQF"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // --- CUSTOM DOWNLOAD FUNCTION (FALLBACK) ---
        const safeSaveAs = (blob, filename) => {
            if (window.saveAs) {
                window.saveAs(blob, filename);
            } else {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }
        };

        // --- HELPER: KATEX AUTO-RENDER ---
        const useKaTeXAutoRender = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            useEffect(() => {
                const loadScript = (src, globalKey) => {
                    return new Promise((resolve, reject) => {
                        if (window[globalKey]) return resolve();
                        const existing = document.querySelector(`script[src="${src}"]`);
                        if (existing) {
                            const interval = setInterval(() => {
                                if (window[globalKey]) { clearInterval(interval); resolve(); }
                            }, 100); return;
                        }
                        const script = document.createElement('script');
                        script.src = src; script.async = true;
                        script.onload = () => {
                            const interval = setInterval(() => {
                                if (window[globalKey]) { clearInterval(interval); resolve(); }
                            }, 50);
                        };
                        script.onerror = reject; document.body.appendChild(script);
                    });
                };
                loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js', 'katex')
                .then(() => loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js', 'renderMathInElement'))
                .then(() => setIsLoaded(true))
                .catch(err => console.error("Lỗi tải KaTeX:", err));
            }, []);
            return isLoaded;
        };

        const MathContent = ({ content, className = "" }) => {
            const containerRef = useRef(null);
            const isKaTeXLoaded = useKaTeXAutoRender();
            
            const safeContent = useMemo(() => {
                let text = typeof content === 'object' ? JSON.stringify(content) : String(content || "");
                return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }, [content]);

            useEffect(() => {
                if (isKaTeXLoaded && window.renderMathInElement && containerRef.current) {
                    try {
                        window.renderMathInElement(containerRef.current, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true }
                            ],
                            throwOnError: false, trust: true 
                        });
                    } catch (e) { console.warn("Lỗi render Math:", e); }
                }
            }, [safeContent, isKaTeXLoaded]);

            return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{ __html: safeContent }} />;
        };

        // --- VISUAL RENDERERS ---

        // 1. GraphRenderer
        const GraphRenderer = ({ formula }) => {
            const rootRef = useRef(null);
            useEffect(() => {
                if (!rootRef.current || !formula) return;
                let cleanFormula = formula.trim();
                cleanFormula = cleanFormula.replace(/^(y|f\(x\))\s*=\s*/i, "");
                cleanFormula = cleanFormula
                    .replace(/×/g, "*").replace(/•/g, "*").replace(/⋅/g, "*")
                    .replace(/\\sin/g, "sin").replace(/\\cos/g, "cos").replace(/\\tan/g, "tan")
                    .replace(/\\ln/g, "ln").replace(/\^\{(.+?)\}/g, "^($1)").replace(/\\/g, "");
                cleanFormula = cleanFormula
                    .replace(/Math\.PI/g, "PI").replace(/Math\.E/g, "E")
                    .replace(/Math\.pow\(([^,]+),\s*([^)]+)\)/g, "($1)^($2)")
                    .replace(/Math\.abs/g, "abs").replace(/Math\.sqrt/g, "sqrt")
                    .replace(/Math\.sin/g, "sin").replace(/Math\.cos/g, "cos")
                    .replace(/Math\.tan/g, "tan").replace(/Math\.log/g, "ln")
                    .replace(/Math\.exp/g, "exp").replace(/Math\./g, "");
                try {
                    rootRef.current.innerHTML = '';
                    window.functionPlot({
                        target: rootRef.current,
                        width: Math.min(window.innerWidth - 80, 500),
                        height: 350,
                        xAxis: { domain: [-6, 6], label: 'x' },
                        yAxis: { domain: [-5, 5], label: 'y' },
                        grid: true,
                        data: [{ fn: cleanFormula, color: '#ea580c', graphType: 'polyline' }]
                    });
                } catch (e) { 
                    rootRef.current.innerHTML = `<div class="text-red-500 font-bold p-4 text-center">Lỗi cú pháp: ${cleanFormula}<br/><span class="text-xs text-slate-400">${e.message}</span></div>`; 
                }
            }, [formula]);
            return (
                <div className="flex flex-col items-center">
                    <div ref={rootRef} className="rounded-lg overflow-hidden bg-white shadow-sm border border-slate-100"></div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <Activity size={12}/> Đồ thị hàm số: {formula}
                    </div>
                </div>
            );
        };

        // 2. TableRenderer
        const TableRenderer = ({ data }) => {
            if (!data) return null;
            const rows = data.trim().split(/\r?\n/).map(row => row.split(',')); 
            const cellClass = 'p-3 text-sm';
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="overflow-x-auto w-full max-w-4xl rounded-xl border border-orange-200 shadow-sm">
                        <table className="min-w-full border-collapse bg-white">
                            <thead className="bg-gradient-to-r from-orange-100 to-amber-100 text-orange-900">
                                <tr>
                                    {rows[0] && rows[0].map((header, i) => (
                                        <th key={i} className={`${cellClass} font-bold border-b border-orange-200 uppercase tracking-wider`}>
                                            {header.trim()}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-orange-100">
                                {rows.slice(1).map((row, i) => (
                                    <tr key={i} className="hover:bg-orange-50/50 transition-colors">
                                        {row.map((cell, j) => (
                                            <td key={j} className={`${cellClass} text-center text-slate-700 font-medium ${j===0 ? 'font-bold text-orange-800 bg-orange-50/30' : ''}`}>
                                                {cell.trim()}
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="mt-2 italic flex items-center gap-1 text-xs text-slate-500">
                        <Sigma size={12}/> Bảng số liệu
                    </div>
                </div>
            );
        };

        // 3. VariationTableRenderer
        const VariationTableRenderer = ({ data }) => {
            if (!data) return null;
            const lines = data.trim().split(/\r?\n/);
            let xRow = [], ypRow = [], yRow = [];
            lines.forEach(line => {
                const lowerLine = line.toLowerCase();
                if (lowerLine.startsWith('x:')) xRow = line.substring(2).split(',').map(s => s.trim());
                else if (lowerLine.startsWith("y':") || lowerLine.startsWith("y’:")) ypRow = line.substring(3).split(',').map(s => s.trim());
                else if (lowerLine.startsWith('y:')) yRow = line.substring(2).split(',').map(s => s.trim());
            });
            if (xRow.length === 0) return <div className="text-red-500 text-xs">Dữ liệu bảng biến thiên không hợp lệ.</div>;

            const getHeight = (val) => {
                if(!val) return 50;
                const v = val.toLowerCase().replace(/\s/g, '');
                if (v.includes('-inf') || v.includes('-vc') || v.includes('amvo')) return 90; 
                if (v.includes('+inf') || v.includes('+vc') || v.includes('duongvo')) return 10;
                const nums = yRow.filter(n => {
                    const clean = n.toLowerCase().replace(/\s/g, '');
                    return !clean.includes('inf') && !clean.includes('vc') && !isNaN(parseFloat(clean));
                }).map(n => parseFloat(n));
                if (nums.length === 0) return 50;
                const min = Math.min(...nums);
                const max = Math.max(...nums);
                if (min === max) return 50;
                const current = parseFloat(val);
                if (isNaN(current)) return 50;
                return 70 - ((current - min) / (max - min)) * 40; 
            };

            const formatLatex = (val) => {
                if(!val) return "";
                let text = val.replace(/\s*-\s*(inf|vc|vo\s*cung)\s*/gi, '-\\infty').replace(/\s*\+\s*(inf|vc|vo\s*cung)\s*/gi, '+\\infty').replace(/\s*(inf|vc|vo\s*cung)\s*/gi, '\\infty');
                if (!text.includes('$')) return `$${text}$`;
                return text;
            };

            return (
                <div className="flex flex-col items-center w-full my-4">
                    <div className="w-full max-w-4xl border border-slate-900 rounded bg-white shadow-lg overflow-hidden text-base select-none">
                        <div className="flex border-b border-slate-900">
                            <div className="w-16 border-r border-slate-900 flex items-center justify-center font-bold bg-slate-50 italic font-serif py-3 text-lg">$x$</div>
                            <div className="flex-1 flex justify-between px-10 py-3 items-center">
                                {xRow.map((val, i) => (<div key={i} className="font-bold text-slate-900 text-lg"><MathContent content={formatLatex(val)}/></div>))}
                            </div>
                        </div>
                        <div className="flex border-b border-slate-900">
                            <div className="w-16 border-r border-slate-900 flex items-center justify-center font-bold bg-slate-50 italic font-serif py-3 text-lg">$y'$</div>
                            <div className="flex-1 flex justify-between items-center px-4 h-12">
                                {ypRow.map((val, i) => {
                                    const isDoubleBar = val === '||';
                                    return (<div key={i} className="text-center font-bold text-lg w-full flex justify-center">{isDoubleBar ? (<div className="border-l-2 border-r-2 border-slate-900 h-12 w-1"></div>) : (<MathContent content={formatLatex(val)}/>)}</div>);
                                })}
                            </div>
                        </div>
                        <div className="flex h-48">
                            <div className="w-16 border-r border-slate-900 flex items-center justify-center font-bold bg-slate-50 italic font-serif text-lg">$y$</div>
                            <div className="flex-1 relative p-0 w-full bg-white">
                                <svg className="absolute inset-0 w-full h-full z-0">
                                    <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#0f172a" /></marker></defs>
                                    {yRow.map((val, i) => {
                                        if (i === yRow.length - 1) return null;
                                        const valNext = yRow[i+1];
                                        if (val === '||' || valNext === '||') return null; 
                                        const x1Perc = (i / (yRow.length - 1)) * 100;
                                        const x2Perc = ((i + 1) / (yRow.length - 1)) * 100;
                                        return (<line key={i} x1={`${x1Perc + 4}%`} y1={`${getHeight(val)}%`} x2={`${x2Perc - 4}%`} y2={`${getHeight(valNext)}%`} stroke="#0f172a" strokeWidth="2" markerEnd="url(#arrowhead)" />);
                                    })}
                                </svg>
                                <div className="absolute inset-0 w-full h-full z-10 pointer-events-none flex justify-between px-10">
                                     {yRow.map((val, i) => {
                                        return (<div key={i} className="relative flex flex-col items-center justify-start w-10 h-full"><div className="absolute transform -translate-y-1/2 flex justify-center items-center bg-white/90 px-1 rounded z-20" style={{top: `${getHeight(val)}%`}}>{val === '||' ? (<div className="h-48 w-1 border-l-2 border-r-2 border-slate-900 -mt-[100px]"></div>) : (<MathContent content={formatLatex(val)} className="font-bold text-slate-900 text-lg shadow-sm"/>)}</div></div>);
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="mt-3 italic flex items-center gap-1 text-sm text-slate-600 font-bold"><Table2 size={16}/> Bảng biến thiên (Chuẩn SGK)</div>
                </div>
            );
        };

        // 4. ChemistryRenderer
        const ChemistryRenderer = ({ structure }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!structure || !canvasRef.current || !window.SmilesDrawer) return;
                const drawChemistry = () => {
                    const options = { width: 400, height: 300, bondThickness: 1.2, bondLength: 18, shortBondLength: 0.85, bondSpacing: 0.18 * 18, atomVisualization: 'default', isomeric: true, debug: false, terminalCarbons: true, explicitHydrogens: false, overlapSensitivity: 0.42, overlapResolutionIterations: 1, compactDrawing: false, fontSizeLarge: 7, fontSizeSmall: 5, padding: 10.0, themes: { light: { C: '#222', O: '#e11d48', N: '#2563eb', F: '#059669', CL: '#16a34a', BR: '#9a3412', I: '#7c3aed', P: '#ea580c', S: '#d97706', B: '#db2777', SI: '#ca8a04', H: '#64748b', BACKGROUND: '#fff' } } };
                    try {
                        const smilesDrawer = new window.SmilesDrawer.Drawer(options);
                        window.SmilesDrawer.parse(structure, (tree) => { smilesDrawer.draw(tree, canvasRef.current, 'light', false); }, (err) => console.error("Lỗi parse SMILES:", err));
                    } catch (e) { console.error("Lỗi khởi tạo SmilesDrawer:", e); }
                };
                if (window.SmilesDrawer) drawChemistry(); else setTimeout(drawChemistry, 500);
            }, [structure]);
            return (
                <div className="flex flex-col items-center">
                    <div className="bg-white p-2 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>
                        <canvas ref={canvasRef} width="400" height="300" className="max-w-full h-auto"></canvas>
                    </div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <Beaker size={12}/> Cấu trúc: {structure}
                    </div>
                </div>
            );
        };

        // 5. SVGRenderer
        const SVGRenderer = ({ svgCode }) => {
            const cleanSvg = useMemo(() => {
                if (!svgCode) return "";
                let code = svgCode;
                if (!code.trim().startsWith('<svg')) return `<div class='text-red-500'>Invalid SVG</div>`;
                if (!code.includes('class="')) { code = code.replace('<svg', '<svg class="w-full h-full"'); }
                return code;
            }, [svgCode]);
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-center items-center min-w-[300px] min-h-[200px]">
                        <div dangerouslySetInnerHTML={{ __html: cleanSvg }} className="w-full flex justify-center" />
                    </div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <Shapes size={12}/> Hình minh họa (Vector/Biểu đồ)
                    </div>
                </div>
            );
        };

        // 6. MermaidRenderer
        const MermaidRenderer = ({ chart }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (!chart || !window.mermaid) return;
                try {
                    window.mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
                    const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                    window.mermaid.render(id, chart).then(({ svg }) => {
                        setSvg(svg);
                    });
                } catch (e) {
                    console.error("Mermaid render error:", e);
                    setSvg(`<div class="text-red-500 text-sm p-4">Lỗi vẽ sơ đồ: ${e.message}</div>`);
                }
            }, [chart]);

            return (
                <div className="flex flex-col items-center w-full">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-center items-center min-w-[300px] overflow-x-auto">
                        <div dangerouslySetInnerHTML={{ __html: svg }} className="w-full flex justify-center" />
                    </div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <GitBranch size={12}/> Sơ đồ / Quy trình / Dòng thời gian
                    </div>
                </div>
            );
        };

        // --- IMAGE CODE GENERATOR ---
        const ImageCodeGenerator = () => {
            const [input, setInput] = useState('');
            const [generatedCode, setGeneratedCode] = useState('');
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                if (!input.trim()) {
                    setGeneratedCode('');
                    return;
                }
                const cleanInput = input.trim();
                const code = `<svg viewBox="0 0 512 512" width="100%" height="100%">\n  <image href="${cleanInput}" x="0" y="0" width="512" height="512" preserveAspectRatio="xMidYMid meet"/>\n</svg>`;
                setGeneratedCode(code);
            }, [input]);

            const handleCopy = () => {
                navigator.clipboard.writeText(generatedCode);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg relative overflow-hidden h-full">
                    <h4 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                        <ImageIcon size={20} className="text-orange-400"/> Công Cụ Tạo Mã Ảnh Tự Động
                    </h4>
                    <div className="space-y-4 relative z-10">
                        <div>
                            <label className="text-slate-300 text-xs font-bold mb-2 block uppercase">1. Dán Link ảnh (URL) hoặc Mã Base64:</label>
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                className="w-full h-20 bg-slate-700/50 text-white p-3 rounded-xl border border-slate-600 focus:ring-2 focus:ring-orange-500 outline-none text-xs font-mono placeholder:text-slate-500"
                                placeholder="Ví dụ: https://example.com/anh.jpg..."
                            />
                        </div>
                        {generatedCode && (
                            <div className="animate-fade-in space-y-2">
                                <div className="flex justify-between items-end">
                                    <label className="text-green-400 text-xs font-bold block uppercase">2. Kết quả (Copy dán vào visualData):</label>
                                    <button onClick={handleCopy} className={`flex items-center gap-1 px-3 py-1 rounded-lg font-bold text-xs transition-all shadow-lg ${copied ? 'bg-green-500 text-white' : 'bg-white text-slate-900 hover:bg-orange-50'}`}>
                                        {copied ? <><Check size={14}/> Đã Copy!</> : <><Copy size={14}/> COPY</>}
                                    </button>
                                </div>
                                <pre className="bg-black/40 text-blue-200 p-3 rounded-xl overflow-x-auto text-[10px] font-mono border border-slate-600 shadow-inner h-20">{generatedCode}</pre>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- PROMPT HELPER (UPDATED FOR ALL SUBJECTS) ---
        const PromptHelper = () => {
            const [selectedType, setSelectedType] = useState('graph');
            const [description, setDescription] = useState('');
            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [copied, setCopied] = useState(false);

            const options = [
                { id: 'graph', label: 'Đồ Thị Toán', icon: Activity },
                { id: 'variation_table', label: 'Bảng Biến Thiên', icon: Table2 },
                { id: 'chemistry', label: 'Cấu Trúc Hóa', icon: Beaker },
                { id: 'mermaid', label: 'Sơ đồ Sinh/Sử', icon: GitBranch },
                { id: 'chart', label: 'Biểu đồ (Địa/TK)', icon: BarChart3 }, // New
                { id: 'svg', label: 'Hình Học/Vật Lý', icon: Shapes },
            ];

            const generatePrompt = () => {
                if (!description.trim()) return;
                let prompt = "";
                switch (selectedType) {
                    case 'graph':
                        prompt = `Hãy viết biểu thức toán học Javascript (vế phải của y=) mô tả đồ thị: "${description}".\nYÊU CẦU:\n- Chỉ trả về chuỗi công thức (ví dụ: x^3 - 3*x + 1).\n- Không trả về JSON, không viết "y=", không thêm lời dẫn.`;
                        break;
                    case 'variation_table':
                        prompt = `Hãy tạo dữ liệu cho Bảng Biến Thiên của hàm số: "${description}".\nYÊU CẦU CHÍNH XÁC:\n- Trả về đúng 3 dòng dữ liệu, định dạng Text đơn giản.\n- Dòng 1: x: giá_trị_1, giá_trị_2, ... (Dùng -inf, +inf cho vô cực).\n- Dòng 2: y': +, 0, -, 0, + (Xen kẽ giữa các khoảng và điểm).\n- Dòng 3: y: giá trị tương ứng (Dùng -inf, +inf cho vô cực, dùng || cho điểm gián đoạn).`;
                        break;
                    case 'chemistry':
                        prompt = `Hãy cung cấp chuỗi SMILES chính xác cho chất hóa học: "${description}".\nYÊU CẦU:\n- Chỉ trả về duy nhất chuỗi SMILES (ví dụ: c1ccccc1).\n- Không thêm lời dẫn hay giải thích.`;
                        break;
                    case 'mermaid':
                        prompt = `Hãy viết code Mermaid để vẽ sơ đồ: "${description}".\nYÊU CẦU:\n- Trả về code Mermaid thuần túy.\n- Dùng 'graph TD' (trên xuống) hoặc 'graph LR' (trái sang phải).\n- KHÔNG bọc trong markdown code block.`;
                        break;
                    case 'chart':
                        prompt = `Hãy viết code SVG để vẽ biểu đồ cho: "${description}".\nYÊU CẦU:\n- Kích thước viewBox="0 0 500 300".\n- Sử dụng thẻ <rect> (biểu đồ cột), <circle> (biểu đồ tròn), <line> (trục).\n- Có chú thích trục tung, trục hoành, số liệu cụ thể.\n- Màu sắc: Dùng màu cam (#ea580c) chủ đạo.`;
                        break;
                    case 'svg':
                        prompt = `Hãy viết mã SVG hoàn chỉnh để vẽ hình minh họa: "${description}".\nYÊU CẦU:\n- Kích thước viewBox="0 0 500 300".\n- Phong cách: Nét vẽ màu đen (stroke="black"), nền trắng/trong suốt, đơn giản, sư phạm.\n- Chỉ trả về duy nhất thẻ <svg>...</svg>.`;
                        break;
                }
                setGeneratedPrompt(prompt);
            };

            const handleCopy = () => {
                navigator.clipboard.writeText(generatedPrompt);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-orange-100 shadow-md h-full">
                    <h4 className="font-bold text-orange-700 mb-4 flex items-center gap-2 text-lg">
                        <Wand2 size={20}/> Trợ Lý Tạo Dữ Liệu Visual (Nhờ AI Viết)
                    </h4>
                    
                    <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                        {options.map(opt => (
                            <button 
                                key={opt.id}
                                onClick={() => setSelectedType(opt.id)}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-all border ${selectedType === opt.id ? 'bg-orange-600 text-white border-orange-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-orange-50'}`}
                            >
                                <opt.icon size={16}/> {opt.label}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-4">
                        <div className="flex gap-2">
                            <input 
                                value={description}
                                onChange={(e) => setDescription(e.target.value)}
                                className="flex-1 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-orange-400 outline-none text-sm"
                                placeholder={`Nhập mô tả...`}
                            />
                            <button onClick={generatePrompt} className="bg-orange-600 hover:bg-orange-700 text-white px-6 rounded-xl font-bold text-sm shadow-md transition-all whitespace-nowrap">
                                Tạo Lệnh
                            </button>
                        </div>

                        {generatedPrompt && (
                            <div className="relative group animate-fade-in">
                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase">Copy lệnh này gửi cho AI, sau đó dán kết quả vào ô bên dưới:</label>
                                <textarea readOnly value={generatedPrompt} className="w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono text-slate-700 resize-none focus:outline-none"/>
                                <button onClick={handleCopy} className="absolute top-8 right-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 p-2 rounded-lg shadow-sm">
                                    {copied ? <Check size={16} className="text-green-500"/> : <Copy size={16}/>}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- VISUAL CONTENT CONTROLLER ---
        const VisualContent = ({ type, data }) => {
            if (!type || type === 'none' || !data) return null;
            return (
                <div className="visual-container">
                    {type === 'graph' && <GraphRenderer formula={data} />}
                    {type === 'variation_table' && <VariationTableRenderer data={data} />}
                    {type === 'table' && <TableRenderer data={data} />}
                    {type === 'chemistry' && <ChemistryRenderer structure={data} />}
                    {type === 'svg' && <SVGRenderer svgCode={data} />}
                    {type === 'mermaid' && <MermaidRenderer chart={data} />}
                </div>
            );
        };

        // --- API GEMINI & PARSING FIX ---
        const cleanGeminiJson = (text) => {
            const startIndex = text.indexOf('[');
            const endIndex = text.lastIndexOf(']');
            let cleaned = text;
            if (startIndex !== -1 && endIndex !== -1) {
                cleaned = text.substring(startIndex, endIndex + 1);
            }
            cleaned = cleaned.replace(/""([^"]*)""/g, '"$1"');
            const placeholder = "___DOUBLE_BACKSLASH_PLACEHOLDER___";
            cleaned = cleaned.split("\\\\").join(placeholder);
            cleaned = cleaned.replace(/\\u(?![0-9a-fA-F]{4})/g, "\\\\u");
            const pattern = "\\\\([^\"\\\\/bfnrtu])";
            const regex = new RegExp(pattern, "g");
            cleaned = cleaned.replace(regex, "\\\\$1");
            cleaned = cleaned.split(placeholder).join("\\\\");
            return cleaned;
        };

        const generateQuestionsWithGemini = async (apiKey, topic, counts, bloomLevels) => {
            let bloomInstruction = "Phân bổ độ khó ngẫu nhiên, phù hợp năng lực học sinh.";
            const selectedBlooms = [];
            if(bloomLevels.recall) selectedBlooms.push("Nhận biết (Recall)");
            if(bloomLevels.understand) selectedBlooms.push("Thông hiểu (Understand)");
            if(bloomLevels.apply) selectedBlooms.push("Vận dụng (Apply)");
            if(bloomLevels.analyze) selectedBlooms.push("Vận dụng cao (Analyze/Evaluate)");
            
            if(selectedBlooms.length > 0) {
                bloomInstruction = `Tập trung vào các mức độ nhận thức sau: ${selectedBlooms.join(', ')}. Hãy phân bổ câu hỏi hợp lý theo các mức độ này.`;
            }

            const totalQ = counts.mc + counts.tf + counts.sa;

            const prompt = `
ĐÓNG VAI:
Bạn là TỔ TRƯỞNG CHUYÊN MÔN, chuyên gia tạo dữ liệu JSON giáo dục chuẩn GDPT 2018.

NHIỆM VỤ:
Soạn thảo bộ đề thi về chủ đề: "${topic}" gồm các phần sau:
1. ${counts.mc} câu TRẮC NGHIỆM (4 lựa chọn A, B, C, D). Type: "mc".
2. ${counts.tf} câu ĐÚNG/SAI LỚN (Mỗi câu lớn GỒM 4 Ý NHỎ a, b, c, d độc lập để xét đúng sai). Type: "tf".
3. ${counts.sa} câu TRẢ LỜI NGẮN/TỰ LUẬN (Điền đáp án). Type: "sa".

CÁC NGUYÊN TẮC VÀNG:
1. NỘI DUNG:
- Kiến thức chuẩn SGK. Không dùng kiến thức giảm tải.
- ${bloomInstruction}

2. CẤU TRÚC JSON (QUAN TRỌNG):
- Trả về MỘT mảng JSON duy nhất chứa tất cả câu hỏi.
- Field "type" bắt buộc: "mc" (Trắc nghiệm), "tf" (Đúng/Sai), "sa" (Trả lời ngắn).
- Field "correctAnswer":
  + Với "mc": Là số nguyên index (0=A, 1=B, 2=C, 3=D).
  + Với "tf": Là số nguyên index (0=Đúng, 1=Sai). Options luôn là ["Đúng", "Sai"].
  + Với "sa": Là CHUỖI văn bản đáp án mẫu (Ví dụ: "42 cm", "Nguyễn Du"). Options để trống [].

*LƯU Ý ĐẶC BIỆT VỚI DẠNG ĐÚNG/SAI ("tf")*:
Theo chuẩn mới, một câu hỏi lớn (ví dụ Câu 1) sẽ có đề bài chung và 4 ý a), b), c), d).
Trong JSON output, hãy TÁCH MỖI Ý NHỎ a, b, c, d THÀNH 1 ĐỐI TƯỢNG CÂU HỎI RIÊNG BIỆT để phần mềm dễ xử lý.
Ví dụ: Nếu yêu cầu 1 câu Đ/S -> Hãy sinh ra 4 items trong mảng JSON (Câu 1 - Ý a, Câu 1 - Ý b, Câu 1 - Ý c, Câu 1 - Ý d).
Nội dung câu hỏi ghi rõ: "Câu 1: [Đề bài chung]. Ý a: [Nội dung ý a]".

3. QUY TẮC VISUAL (GIỮ NGUYÊN):
- Tự động chọn "visualType" (graph, variation_table, chemistry, mermaid, svg, none) phù hợp nội dung.

ĐỊNH DẠNG ĐẦU RA (JSON STRICT):
[
  {
    "type": "mc",
    "question": "Câu hỏi trắc nghiệm...",
    "options": ["A", "B", "C", "D"],
    "correctAnswer": 0,
    "explanation": "...",
    "visualType": "none",
    "visualData": ""
  },
  {
    "type": "tf",
    "question": "Câu 1: Cho hàm số y=f(x)... Ý a: Hàm số đồng biến trên (0;1)?",
    "options": ["Đúng", "Sai"],
    "correctAnswer": 0,
    "explanation": "...",
    "visualType": "none",
    "visualData": ""
  },
  {
    "type": "tf",
    "question": "Câu 1: Cho hàm số y=f(x)... Ý b: Giá trị cực đại là 5?",
    "options": ["Đúng", "Sai"],
    "correctAnswer": 1,
    "explanation": "...",
    "visualType": "none",
    "visualData": ""
  },
  {
    "type": "sa",
    "question": "Câu hỏi điền khuyết...",
    "options": [],
    "correctAnswer": "Đáp án mẫu",
    "explanation": "...",
    "visualType": "none",
    "visualData": ""
  }
]
`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                let rawText = data.candidates[0].content.parts[0].text;
                
                let fixedText = cleanGeminiJson(rawText);
                let parsedData = JSON.parse(fixedText);
                
                return parsedData.map(q => ({
                    ...q,
                    type: q.type || 'mc', // Default to mc if missing
                    question: typeof q.question === 'object' ? JSON.stringify(q.question) : String(q.question || ""),
                    options: Array.isArray(q.options) ? q.options.map(o => typeof o === 'object' ? JSON.stringify(o) : String(o || "")) : [],
                    explanation: typeof q.explanation === 'object' ? JSON.stringify(q.explanation) : String(q.explanation || ""),
                    visualType: q.visualType || 'none',
                    visualData: q.visualData || ''
                }));
            } catch (error) { throw error; }
        };

        // --- NEW COMPONENT: SaveModal (POPUP LƯU TRỮ) ---
        const SaveModal = ({ isOpen, onClose, onSave, defaultTopic }) => {
            const [topicName, setTopicName] = useState(defaultTopic || "");
            const [subject, setSubject] = useState('Toán học');
            const [isCustomSubject, setIsCustomSubject] = useState(false);
            const [customSubjectText, setCustomSubjectText] = useState('');

            useEffect(() => {
                if (isOpen && defaultTopic) setTopicName(defaultTopic);
            }, [isOpen, defaultTopic]);

            const subjects = [
                "Toán học", "Vật lý", "Hóa học", "Sinh học", "Lịch sử", "Địa lý", 
                "Tiếng Anh", "GDCD", "Tin học", "Công nghệ", "Ngữ văn"
            ];

            const handleSave = () => {
                const finalSubject = isCustomSubject ? customSubjectText.trim() : subject;
                if (!topicName.trim()) return alert("Vui lòng nhập tên chủ đề!");
                if (isCustomSubject && !finalSubject) return alert("Vui lòng nhập tên môn học!");
                
                onSave(topicName, finalSubject);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                    <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                        <div className="bg-gradient-to-r from-green-500 to-emerald-600 p-4 text-white font-bold text-lg flex justify-between items-center">
                            <span className="flex items-center gap-2"><Upload size={20}/> Lưu trữ Đám mây</span>
                            <button onClick={onClose} className="hover:bg-white/20 p-1 rounded-full"><X size={20}/></button>
                        </div>
                        <div className="p-6 space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">Tên chủ đề</label>
                                <input type="text" value={topicName} onChange={e => setTopicName(e.target.value)} className="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none" placeholder="VD: Ôn tập chương 1..." autoFocus/>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">Môn học</label>
                                {!isCustomSubject ? (
                                    <div className="flex gap-2">
                                        <select value={subject} onChange={e => setSubject(e.target.value)} className="flex-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none bg-white">
                                            {subjects.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                        <button onClick={() => setIsCustomSubject(true)} className="px-3 py-2 border rounded-xl hover:bg-slate-50 text-slate-500 font-bold text-sm flex items-center gap-1" title="Thêm môn khác"><Plus size={16}/> Khác</button>
                                    </div>
                                ) : (
                                    <div className="flex gap-2">
                                        <input type="text" value={customSubjectText} onChange={e => setCustomSubjectText(e.target.value)} className="flex-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none" placeholder="Nhập tên môn..."/>
                                        <button onClick={() => setIsCustomSubject(false)} className="px-4 py-2 border rounded-xl hover:bg-slate-50 text-slate-500 font-bold text-xs">Danh sách</button>
                                    </div>
                                )}
                            </div>

                            <div className="pt-4 flex gap-3">
                                <button onClick={onClose} className="flex-1 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition">Hủy</button>
                                <button onClick={handleSave} className="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-lg transition">Lưu Ngay</button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // --- NEW COMPONENT: CloudLibraryModal ---
        const CloudLibraryModal = ({ user, onClose, onLoad }) => {
            const [sets, setSets] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchSets = async () => {
                    if (!user) return;
                    try {
                        const q = query(collection(db, "users", user.uid, "content"), orderBy("createdAt", "desc"));
                        const snap = await getDocs(q);
                        setSets(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    } catch (e) { console.error(e); } finally { setLoading(false); }
                };
                fetchSets();
            }, [user]);

            const handleDelete = async (id, e) => {
                e.stopPropagation();
                if(!confirm("Bạn có chắc muốn xóa bộ câu hỏi này?")) return;
                try { await deleteDoc(doc(db, "users", user.uid, "content", id)); setSets(sets.filter(s => s.id !== id)); } catch(err) { alert("Lỗi xóa: " + err.message); }
            };

            return (
                <div className="fixed inset-0 z-[150] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                    <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-white glass-panel max-w-5xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
                        <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 flex justify-between items-center text-white">
                            <h2 className="text-xl font-bold flex items-center gap-2"><Library/> THƯ VIỆN CỦA TÔI</h2>
                            <button onClick={onClose} className="hover:bg-white/20 p-2 rounded-full"><X size={24}/></button>
                        </div>
                        <div className="p-6 overflow-y-auto bg-slate-50 flex-1">
                            {loading ? <div className="flex justify-center p-10"><Loader2 className="animate-spin text-blue-500" size={40}/></div> : (
                                sets.length === 0 ? <div className="text-center text-slate-400 p-10">Chưa có dữ liệu đã lưu.</div> : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {sets.map(s => (
                                            <div key={s.id} onClick={() => onLoad(s)} className="bg-white p-5 rounded-2xl border border-slate-200 hover:border-blue-400 cursor-pointer shadow-sm hover:shadow-lg transition group relative flex flex-col h-full">
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className={`text-[10px] uppercase font-bold px-2 py-1 rounded bg-slate-100 text-slate-500`}>{s.subject || "Chung"}</span>
                                                    <div className="text-[10px] text-slate-400 font-mono">{s.createdAt?.seconds ? new Date(s.createdAt.seconds * 1000).toLocaleDateString('vi-VN') : ''}</div>
                                                </div>
                                                <h3 className="font-bold text-slate-800 text-lg mb-2 line-clamp-2 flex-1">{s.topic || "Chủ đề không tên"}</h3>
                                                <div className="text-xs text-slate-500 flex gap-2 items-center mt-2 border-t pt-2 border-slate-100">
                                                    <FileText size={14}/> {s.questions ? JSON.parse(s.questions).length : 0} câu hỏi
                                                </div>

            const handleDownloadTemplate = () => { const t = [{"question": "1+1=?", "options": ["1","2","3","4"], "correctAnswer": 1, "explanation": "..."}]; const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(t, null, 2)); const a = document.createElement('a'); a.href = d; a.download = "mau.json"; a.click(); };

CÁC NGUYÊN TẮC VÀNG (BẮT BUỘC):

*LƯU Ý ĐẶC BIỆT VỚI DẠNG ĐÚNG/SAI ("tf")*:

  }

`;

                                            // Color code by type
                                            let typeColor = "bg-white text-slate-600 border-slate-200";
                                            if (q.type === 'tf') typeColor = "bg-blue-50 text-blue-600 border-blue-200";
                                            if (q.type === 'sa') typeColor = "bg-green-50 text-green-600 border-green-200";
                                            
                                            return (
                                                <button
                                                    key={q.id}
                                                    onClick={() => setActiveEditId(q.id)}
                                                    className={`aspect-square rounded-lg font-bold text-sm flex items-center justify-center transition-all shadow-sm border relative
                                                        ${activeEditId === q.id 
                                                            ? 'bg-orange-500 text-white border-orange-600 scale-105 ring-2 ring-orange-200 z-10' 
                                                            : `${typeColor} hover:bg-orange-50 hover:border-orange-300`
                                                        }
                                                    `}
                                                >
                                                    {idx + 1}
                                                    <span className="absolute bottom-0.5 right-1 text-[8px] opacity-70 uppercase">{q.type || 'mc'}</span>
                                                </button>
                                            );
                                        })}
                                        <button onClick={handleAddQuestion} className="aspect-square rounded-lg border-2 border-dashed border-slate-300 text-slate-400 hover:text-orange-500 hover:border-orange-400 flex items-center justify-center transition-colors">
                                            <span className="text-xl font-bold">+</span>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 p-4 overflow-y-auto">
                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-100 text-xs text-orange-800">
                                        <div className="font-bold flex items-center gap-1 mb-1"><Info size={14}/> Mẹo:</div>
                                        Mc: Trắc nghiệm, Tf: Đúng/Sai, Sa: Tự luận ngắn.
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT MAIN: Detail Edit Form */}
                            <div className="flex-1 bg-slate-100/50 overflow-y-auto p-8">
                                {activeQ && (
                                    <motion.div 
                                        key={activeQ.id} // Key ensures remount animation on switch
                                        initial={{opacity: 0, x: 20}} 
                                        animate={{opacity: 1, x: 0}}
                                        transition={{duration: 0.2}}
                                        className="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"
                                    >
                                        <div className="bg-slate-50 border-b border-slate-200 p-4 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <span className="font-black text-slate-300 text-4xl">#{activeQ.id + 1}</span>
                                                <select 
                                                    value={activeQ.type || 'mc'} 
                                                    onChange={(e) => {
                                                        const newType = e.target.value;
                                                        let newOptions = ["A", "B", "C", "D"];
                                                        let newCorrect = 0;
                                                        
                                                        if(newType === 'tf') { newOptions = ["Đúng", "Sai"]; newCorrect = 0; }
                                                        if(newType === 'sa') { newOptions = []; newCorrect = ""; }

                                                        setQuestions(prev => prev.map(q => q.id === activeQ.id ? { ...q, type: newType, options: newOptions, correctAnswer: newCorrect } : q));
                                                    }}
                                                    className="bg-white border border-slate-300 text-slate-700 text-sm font-bold py-1 px-3 rounded-lg outline-none focus:ring-2 focus:ring-orange-400"
                                                >
                                                    <option value="mc">Trắc nghiệm</option>
                                                    <option value="tf">Đúng / Sai</option>
                                                    <option value="sa">Trả lời ngắn</option>
                                                </select>
                                            </div>
                                            <button onClick={() => handleDeleteQuestion(activeQ.id)} className="text-slate-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition" title="Xóa câu này"><Trash2 size={20}/></button>
                                        </div>

                                        <div className="p-8 space-y-8">
                                            {/* Question Content */}
                                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Nội dung câu hỏi</label>
                                                    <textarea 
                                                        value={activeQ.question} 
                                                        onChange={(e) => handleQuestionChange(activeQ.id, 'question', e.target.value)} 
                                                        className="w-full p-4 border border-slate-300 rounded-xl min-h-[160px] text-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none shadow-inner transition-all"
                                                        placeholder="Nhập câu hỏi tại đây..."
                                                    />
                                                    <div className="text-sm bg-slate-50 p-3 rounded-lg text-slate-600 border border-slate-200 mt-2">
                                                        <span className="font-bold text-xs text-slate-400 uppercase mr-2">Preview:</span> 
                                                        <MathContent content={activeQ.question} />
                                                    </div>
                                                </div>

                                                {/* Visual Editor */}
                                                <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                    <div className="flex flex-col gap-2">
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Loại minh họa</label>
                                                        <select value={activeQ.visualType} onChange={(e) => handleQuestionChange(activeQ.id, 'visualType', e.target.value)} className="p-3 border border-slate-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-orange-400 outline-none w-full shadow-sm">
                                                            <option value="none">Không có</option>
                                                            <option value="graph">Đồ thị Toán học</option>
                                                            <option value="variation_table">Bảng biến thiên</option>
                                                            <option value="chemistry">Cấu trúc Hóa học</option>
                                                            <option value="mermaid">Sơ đồ tư duy (Mermaid)</option>
                                                            <option value="table">Bảng Số Liệu</option>
                                                            <option value="svg">Hình vẽ SVG / Ảnh</option>
                                                        </select>
                                                    </div>
                                                    
                                                    {activeQ.visualType !== 'none' && (
                                                        <>
                                                            <div className="flex flex-col gap-2">
                                                                <label className="text-xs font-bold text-orange-600 uppercase flex items-center gap-1"><Copy size={14}/> Dữ liệu Visual (JSON/Code)</label>
                                                                <textarea 
                                                                    value={activeQ.visualData} 
                                                                    onChange={(e) => handleQuestionChange(activeQ.id, 'visualData', e.target.value)} 
                                                                    className="w-full p-3 border border-orange-200 rounded-lg bg-orange-50/30 text-xs font-mono focus:ring-2 focus:ring-orange-400 outline-none resize-y min-h-[80px]" 
                                                                    placeholder="Nhập mã dữ liệu tương ứng..."
                                                                />
                                                            </div>
                                                            <div className="bg-white p-2 rounded-lg border border-slate-200 shadow-sm flex justify-center min-h-[150px] items-center">
                                                                <VisualContent type={activeQ.visualType} data={activeQ.visualData} />
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Options Section - Render based on TYPE */}
                                            {/* CẬP NHẬT 5: Giao diện nhập đáp án tùy biến */}
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">
                                                    {activeQ.type === 'sa' ? "Đáp án đúng (Mẫu)" : "Lựa chọn đáp án"}
                                                </label>
                                                
                                                {activeQ.type === 'sa' ? (
                                                    // Render cho Tự luận/Trả lời ngắn
                                                    <div className="bg-green-50 p-4 rounded-xl border border-green-200">
                                                        <input 
                                                            type="text" 
                                                            value={activeQ.correctAnswer} 
                                                            onChange={(e) => handleQuestionChange(activeQ.id, 'correctAnswer', e.target.value)} 
                                                            className="w-full p-3 border border-green-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500 font-bold text-green-800"
                                                            placeholder="Nhập đáp án đúng (VD: 15 cm, Nguyễn Trãi...)"
                                                        />
                                                        <div className="mt-2 text-xs text-green-600 italic">* Đây là đáp án dùng để đối chiếu hoặc hiển thị trong lời giải.</div>
                                                    </div>
                                                ) : (
                                                    // Render cho Trắc nghiệm & Đúng sai
                                                    <div className={`grid ${activeQ.type === 'tf' ? 'grid-cols-2' : 'grid-cols-1 md:grid-cols-2'} gap-4`}>
                                                        {activeQ.options.map((opt, oIdx) => (
                                                            <div key={oIdx} onClick={()=>handleQuestionChange(activeQ.id,'correctAnswer',oIdx)} className={`cursor-pointer flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${activeQ.correctAnswer===oIdx ? 'border-green-500 bg-green-50 shadow-md' : 'border-transparent bg-slate-50 hover:bg-slate-100'}`}>
                                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${activeQ.correctAnswer===oIdx ? 'bg-green-500 text-white' : 'bg-slate-300 text-slate-600'}`}>
                                                                    {activeQ.type === 'tf' ? (oIdx === 0 ? 'Đ' : 'S') : String.fromCharCode(65+oIdx)}
                                                                </div>
                                                                
                                                                {/* Đúng/Sai thì không cho sửa text option, Trắc nghiệm thì cho sửa */}
                                                                {activeQ.type === 'tf' ? (
                                                                    <span className={`flex-1 font-bold ${activeQ.correctAnswer===oIdx ? 'text-green-800' : 'text-slate-700'}`}>{opt}</span>
                                                                ) : (
                                                                    <input 
                                                                        type="text" 
                                                                        value={opt} 
                                                                        onChange={(e)=>{e.stopPropagation(); handleOptionChange(activeQ.id,oIdx,e.target.value)}} 
                                                                        className={`flex-1 bg-transparent outline-none font-medium ${activeQ.correctAnswer===oIdx ? 'text-green-800' : 'text-slate-700'}`}
                                                                    />
                                                                )}
                                                                
                                                                {activeQ.correctAnswer===oIdx && <Check size={18} className="text-green-600"/>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Explanation */}
                                            <div className="pt-6 border-t border-dashed border-slate-300">
                                                <label className="text-sm font-bold text-slate-600 uppercase mb-3 flex items-center gap-2"><Lightbulb size={18}/> Giải thích chi tiết</label>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <textarea value={activeQ.explanation} onChange={(e)=>handleQuestionChange(activeQ.id,'explanation',e.target.value)} className="w-full p-4 border border-yellow-200 rounded-xl min-h-[120px] bg-yellow-50/30 focus:ring-2 focus:ring-yellow-400 outline-none text-slate-700 font-mono text-sm shadow-inner" placeholder="Nhập lời giải chi tiết (hỗ trợ LaTeX)..."/>
                                                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 min-h-[120px] max-h-[300px] overflow-y-auto">
                                                        <div className="text-xs text-yellow-600 uppercase mb-2 font-bold opacity-70">Xem trước hiển thị:</div>
                                                        {/* ADDED className="whitespace-pre-wrap" to preserve line breaks in preview */}
                                                        <div className="prose prose-sm max-w-none"><MathContent content={activeQ.explanation || "Chưa có giải thích"} className="whitespace-pre-wrap" /></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>

                        {/* Floating Action Button */}
                        <button 
                            onClick={() => setShowHelperTools(true)}
                            className="absolute bottom-6 right-8 z-50 bg-gradient-to-r from-orange-500 to-amber-600 text-white p-3 pr-5 pl-4 rounded-full shadow-2xl hover:scale-105 transition-transform border-2 border-white/20 group flex items-center gap-2"
                        >
                            <Wand2 size={24} className="group-hover:rotate-12 transition-transform"/>
                            <span className="font-bold text-sm">Trợ lý AI</span>
                        </button>

                        {/* Helper Modal (RESTORED) */}
                        {showHelperTools && (
                            <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                                <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-slate-100 max-w-6xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
                                    <div className="bg-gradient-to-r from-orange-500 to-amber-600 p-5 flex justify-between items-center text-white">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Wand2/> TRỢ LÝ SOẠN THẢO</h2>
                                        <button onClick={() => setShowHelperTools(false)} className="hover:bg-white/20 p-2 rounded-full transition"><X size={24}/></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto bg-slate-200/50 grid grid-cols-1 lg:grid-cols-2 gap-6 flex-1">
                                         <PromptHelper />
                                         <ImageCodeGenerator />
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </motion.div>
                );
            };

            return (
                <div className="min-h-screen font-sans text-slate-800 bg-orange-50 selection:bg-orange-200">
                    {showLibrary && user && <CloudLibraryModal user={user} onClose={() => setShowLibrary(false)} onLoad={handleLoadFromLibrary} />}
                    {showSaveModal && <SaveModal isOpen={showSaveModal} onClose={() => setShowSaveModal(false)} onSave={handleConfirmSave} defaultTopic={topic} />}
                    
                    {wizardStep === 0 && renderIntro()}
                    
                    {/* STEP 0.5: MODE SELECTION */}
                    {wizardStep === 0.5 && renderModeSelection()}

                    {wizardStep > 0 && wizardStep < 5 && (
                        <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-orange-400 to-amber-600">
                            {wizardStep === 1 && renderStep1_Key()}
                            {wizardStep === 2 && renderStep2_Config()}
                            {wizardStep === 3 && <div className="text-center text-white"><Loader2 size={80} className="animate-spin mb-6 mx-auto opacity-80"/><h2 className="text-3xl font-bold">{loadingMsg}</h2></div>}
                            {wizardStep === 4 && renderStep4_Edit()}
                        </div>
                    )}
                </div>
            );
        };

        // Render React App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
