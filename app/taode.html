                                                        value={activeQ.question} 
                                                        onChange={(e) => handleQuestionChange(activeQ.id, 'question', e.target.value)} 
                                                        className="w-full p-4 border border-slate-300 rounded-xl min-h-[160px] text-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none shadow-inner transition-all"
                                                        placeholder="Nhập câu hỏi tại đây..."
                                                    />
                                                    <div className="text-sm bg-slate-50 p-3 rounded-lg text-slate-600 border border-slate-200 mt-2">
                                                        <span className="font-bold text-xs text-slate-400 uppercase mr-2">Preview:</span> 
                                                        <MathContent content={activeQ.question} />
                                                    </div>
                                                </div>

                                                {/* Visual Editor */}
                                                <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                    <div className="flex flex-col gap-2">
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Loại minh họa</label>
                                                        <select value={activeQ.visualType} onChange={(e) => handleQuestionChange(activeQ.id, 'visualType', e.target.value)} className="p-3 border border-slate-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-orange-400 outline-none w-full shadow-sm">
                                                            <option value="none">Không có</option>
                                                            <option value="graph">Đồ thị Toán học</option>
                                                            <option value="variation_table">Bảng biến thiên</option>
                                                            <option value="chemistry">Cấu trúc Hóa học</option>
                                                            <option value="mermaid">Sơ đồ tư duy (Mermaid)</option>
                                                            <option value="table">Bảng Số Liệu</option>
                                                            <option value="svg">Hình vẽ SVG / Ảnh</option>
                                                        </select>
                                                    </div>
                                                    
                                                    {activeQ.visualType !== 'none' && (
                                                        <>
                                                            <div className="flex flex-col gap-2">
                                                                <label className="text-xs font-bold text-orange-600 uppercase flex items-center gap-1"><Copy size={14}/> Dữ liệu Visual (JSON/Code)</label>
                                                                <textarea 
                                                                    value={activeQ.visualData} 
                                                                    onChange={(e) => handleQuestionChange(activeQ.id, 'visualData', e.target.value)} 
                                                                    className="w-full p-3 border border-orange-200 rounded-lg bg-orange-50/30 text-xs font-mono focus:ring-2 focus:ring-orange-400 outline-none resize-y min-h-[80px]" 
                                                                    placeholder="Nhập mã dữ liệu tương ứng..."
                                                                />
                                                            </div>
                                                            <div className="bg-white p-2 rounded-lg border border-slate-200 shadow-sm flex justify-center min-h-[150px] items-center">
                                                                <VisualContent type={activeQ.visualType} data={activeQ.visualData} />
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Options Section - Render based on TYPE */}
                                            {/* CẬP NHẬT 5: Giao diện nhập đáp án tùy biến */}
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">
                                                    {activeQ.type === 'sa' ? "Đáp án đúng (Mẫu)" : "Lựa chọn đáp án"}
                                                </label>
                                                
                                                {activeQ.type === 'sa' ? (
                                                    // Render cho Tự luận/Trả lời ngắn
                                                    <div className="bg-green-50 p-4 rounded-xl border border-green-200">
                                                        <input 
                                                            type="text" 
                                                            value={activeQ.correctAnswer} 
                                                            onChange={(e) => handleQuestionChange(activeQ.id, 'correctAnswer', e.target.value)} 
                                                            className="w-full p-3 border border-green-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500 font-bold text-green-800"
                                                            placeholder="Nhập đáp án đúng (VD: 15 cm, Nguyễn Trãi...)"
                                                        />
                                                        <div className="mt-2 text-xs text-green-600 italic">* Đây là đáp án dùng để đối chiếu hoặc hiển thị trong lời giải.</div>
                                                    </div>
                                                ) : (
                                                    // Render cho Trắc nghiệm & Đúng sai
                                                    <div className={`grid ${activeQ.type === 'tf' ? 'grid-cols-2' : 'grid-cols-1 md:grid-cols-2'} gap-4`}>
                                                        {activeQ.options.map((opt, oIdx) => (
                                                            <div key={oIdx} onClick={()=>handleQuestionChange(activeQ.id,'correctAnswer',oIdx)} className={`cursor-pointer flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${activeQ.correctAnswer===oIdx ? 'border-green-500 bg-green-50 shadow-md' : 'border-transparent bg-slate-50 hover:bg-slate-100'}`}>
                                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${activeQ.correctAnswer===oIdx ? 'bg-green-500 text-white' : 'bg-slate-300 text-slate-600'}`}>
                                                                    {activeQ.type === 'tf' ? (oIdx === 0 ? 'Đ' : 'S') : String.fromCharCode(65+oIdx)}
                                                                </div>
                                                                
                                                                {/* Đúng/Sai thì không cho sửa text option, Trắc nghiệm thì cho sửa */}
                                                                {activeQ.type === 'tf' ? (
                                                                    <span className={`flex-1 font-bold ${activeQ.correctAnswer===oIdx ? 'text-green-800' : 'text-slate-700'}`}>{opt}</span>
                                                                ) : (
                                                                    <input 
                                                                        type="text" 
                                                                        value={opt} 
                                                                        onChange={(e)=>{e.stopPropagation(); handleOptionChange(activeQ.id,oIdx,e.target.value)}} 
                                                                        className={`flex-1 bg-transparent outline-none font-medium ${activeQ.correctAnswer===oIdx ? 'text-green-800' : 'text-slate-700'}`}
                                                                    />
                                                                )}
                                                                
                                                                {activeQ.correctAnswer===oIdx && <Check size={18} className="text-green-600"/>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Explanation */}
                                            <div className="pt-6 border-t border-dashed border-slate-300">
                                                <label className="text-sm font-bold text-slate-600 uppercase mb-3 flex items-center gap-2"><Lightbulb size={18}/> Giải thích chi tiết</label>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <textarea value={activeQ.explanation} onChange={(e)=>handleQuestionChange(activeQ.id,'explanation',e.target.value)} className="w-full p-4 border border-yellow-200 rounded-xl min-h-[120px] bg-yellow-50/30 focus:ring-2 focus:ring-yellow-400 outline-none text-slate-700 font-mono text-sm shadow-inner" placeholder="Nhập lời giải chi tiết (hỗ trợ LaTeX)..."/>
                                                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 min-h-[120px] max-h-[300px] overflow-y-auto">
                                                        <div className="text-xs text-yellow-600 uppercase mb-2 font-bold opacity-70">Xem trước hiển thị:</div>
                                                        {/* ADDED className="whitespace-pre-wrap" to preserve line breaks in preview */}
                                                        <div className="prose prose-sm max-w-none"><MathContent content={activeQ.explanation || "Chưa có giải thích"} className="whitespace-pre-wrap" /></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>

                        {/* Floating Action Button */}
                        <button 
                            onClick={() => setShowHelperTools(true)}
                            className="absolute bottom-6 right-8 z-50 bg-gradient-to-r from-orange-500 to-amber-600 text-white p-3 pr-5 pl-4 rounded-full shadow-2xl hover:scale-105 transition-transform border-2 border-white/20 group flex items-center gap-2"
                        >
                            <Wand2 size={24} className="group-hover:rotate-12 transition-transform"/>
                            <span className="font-bold text-sm">Trợ lý AI</span>
                        </button>

                        {/* Helper Modal */}
                        {showHelperTools && (
                            <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                                <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-slate-100 max-w-6xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
                                    <div className="bg-gradient-to-r from-orange-500 to-amber-600 p-5 flex justify-between items-center text-white">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Wand2/> TRỢ LÝ SOẠN THẢO</h2>
                                        <button onClick={() => setShowHelperTools(false)} className="hover:bg-white/20 p-2 rounded-full transition"><X size={24}/></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto bg-slate-200/50 grid grid-cols-1 lg:grid-cols-2 gap-6 flex-1">
                                         <PromptHelper />
                                         <ImageCodeGenerator />
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </motion.div>
                );
            };

            // --- CẬP NHẬT: HÀM RENDER CHẾ ĐỘ TRÌNH CHIẾU ---
            // --- GIAO DIỆN TRÌNH CHIẾU (CÓ Ô NHẬP PHÚT) ---
            const renderPresentation = () => {
                const q = questions[currentSlide];
                if (!q) return null;

                return (
                    <div className="fixed inset-0 z-[200] bg-slate-100 flex flex-col overflow-hidden font-sans">
                        {/* 1. Header Slide */}
                        <div className="bg-slate-900 text-white px-4 py-2 flex justify-between items-center shadow-md shrink-0 z-20 h-16">
                            <div className="flex items-center gap-4">
                                <span className="bg-orange-600 px-3 py-1 rounded font-bold text-lg">Câu {currentSlide + 1}</span>
                                <span className="text-slate-400 text-sm hidden sm:inline">/ {questions.length}</span>
                            </div>

                            {/* --- ĐỒNG HỒ ĐẾM NGƯỢC CẢI TIẾN --- */}
                            <div className="hidden md:flex items-center gap-3 bg-slate-800 rounded-xl px-2 py-1 border border-slate-700 mx-4 shadow-inner">
                                <div className="relative pl-2">
                                    <Timer className={timer < 10 && isTimerRunning && timer > 0 ? "text-red-500 animate-bounce" : "text-orange-500"} size={20}/>
                                    {isTimerRunning && <span className="absolute -top-1 -right-0 flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>}
                                </div>
                                
                                {/* Số hiển thị giờ */}
                                <span className={`font-mono text-3xl font-black tracking-widest min-w-[100px] text-center ${timer < 10 && isTimerRunning && timer > 0 ? "text-red-500 animate-pulse" : "text-white"}`}>
                                    {formatTime(timer)}
                                </span>
                                
                                {/* Khu vực điều khiển & Nhập phút */}
                                <div className="flex flex-col justify-center gap-1 border-l border-slate-600 pl-3 pr-2">
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Phút:</span>
                                        <input 
                                            type="number" 
                                            min="1" max="180" 
                                            value={inputMin} 
                                            onChange={(e) => setInputMin(Number(e.target.value))}
                                            className="w-10 h-5 text-center text-xs font-bold text-slate-900 rounded bg-white outline-none focus:ring-2 focus:ring-orange-500"
                                        />
                                        <button 
                                            onClick={() => { setTimer(inputMin * 60); setIsTimerRunning(true); }}
                                            className="text-[10px] bg-blue-600 hover:bg-blue-500 px-2 py-0.5 rounded text-white font-bold transition whitespace-nowrap"
                                        >
                                            ĐẶT & CHẠY
                                        </button>
                                    </div>
                                    
                                    <button 
                                        onClick={() => setIsTimerRunning(!isTimerRunning)} 
                                        className={`text-[10px] px-2 py-0.5 rounded text-white font-bold w-full transition shadow-sm ${isTimerRunning ? "bg-red-600 hover:bg-red-700" : "bg-green-600 hover:bg-green-700"}`}
                                    >
                                        {isTimerRunning ? "TẠM DỪNG" : "TIẾP TỤC"}
                                    </button>
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button onClick={() => setShowSlideAns(!showSlideAns)} className={`px-3 py-2 rounded-lg font-bold text-sm transition flex items-center gap-2 ${showSlideAns ? 'bg-green-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                    {showSlideAns ? <><Eye size={16}/> Ẩn Đ.Án</> : <><Eye size={16}/> Hiện Đ.Án</>}
                                </button>
                                <button onClick={() => setShowSlideExpl(!showSlideExpl)} className={`px-3 py-2 rounded-lg font-bold text-sm transition flex items-center gap-2 ${showSlideExpl ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
                                    {showSlideExpl ? <><Lightbulb size={16}/> Ẩn Giải</> : <><Lightbulb size={16}/> Hiện Giải</>}
                                </button>
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <button onClick={() => setIsPresentationMode(false)} className="text-slate-400 hover:text-white transition flex items-center gap-1 font-bold text-sm">
                                    <LogOut size={16}/> Thoát
                                </button>
                            </div>
                        </div>

                        {/* 2. Body Slide */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 flex justify-center bg-slate-100">
                            <div className="max-w-7xl w-full bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 min-h-fit flex flex-col">
                                <div className="flex-1 flex flex-col lg:flex-row gap-8">
                                    <div className="flex-1 flex flex-col">
                                        <div className="text-2xl md:text-3xl leading-snug font-medium text-slate-800 mb-6">
                                            <MathContent content={q.question} />
                                        </div>
                                        
                                        {q.type !== 'sa' && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-auto">
                                                {q.options.map((opt, idx) => {
                                                    const isCorrect = idx === Number(q.correctAnswer);
                                                    let cardClass = "border-2 border-slate-100 bg-slate-50 text-slate-600 hover:border-slate-300";
                                                    if (showSlideAns) {
                                                        if (isCorrect) cardClass = "border-green-500 bg-green-50 text-green-900 shadow-sm ring-1 ring-green-400";
                                                        else cardClass = "border-slate-100 bg-slate-50 opacity-40";
                                                    }
                                                    
                                                    return (
                                                        <div key={idx} className={`p-4 rounded-xl text-3xl transition-all flex items-start gap-3 ${cardClass}`}>
                                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold border text-sm shrink-0 ${showSlideAns && isCorrect ? 'border-green-600 bg-green-600 text-white' : 'border-slate-300 bg-white'}`}>
                                                                {q.type === 'tf' ? (idx===0?'Đ':'S') : String.fromCharCode(65 + idx)}
                                                            </span>
                                                            <div className="font-medium pt-0.5"><MathContent content={opt}/></div>
                                                            {showSlideAns && isCorrect && <Check className="text-green-600 ml-auto" size={24}/>}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                        
                                        {q.type === 'sa' && showSlideAns && (
                                            <div className="mt-6 p-6 bg-green-50 border-l-4 border-green-500 rounded-r-xl shadow-sm">
                                                <div className="text-green-800 font-bold text-sm mb-1 uppercase tracking-wider">Đáp án đúng:</div>
                                                <div className="text-3xl font-black text-green-700"><MathContent content={q.correctAnswer}/></div>
                                            </div>
                                        )}
                                    </div>

                                    {q.visualType !== 'none' && (
                                        <div className="lg:w-5/12 flex items-start justify-center border-l border-slate-100 pl-8">
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 w-full shadow-inner">
                                                <VisualContent type={q.visualType} data={q.visualData} />
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {showSlideExpl && (
                                    <motion.div initial={{opacity:0, height:0}} animate={{opacity:1, height:'auto'}} className="mt-8 pt-6 border-t border-dashed border-slate-300">
                                        <h3 className="text-lg font-bold text-blue-700 mb-2 flex items-center gap-2"><Lightbulb size={20}/> Lời giải chi tiết:</h3>
                                        <div className="text-lg text-slate-700 leading-relaxed bg-blue-50/50 p-6 rounded-xl border border-blue-100">
                                            <MathContent content={q.explanation} className="whitespace-pre-wrap"/>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>

                        {/* 3. Footer Controls */}
                        <div className="bg-white border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                            <button onClick={() => { if(currentSlide > 0) { setCurrentSlide(c => c-1); setShowSlideAns(false); setShowSlideExpl(false); }}} disabled={currentSlide === 0} className="px-5 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold flex items-center gap-2 disabled:opacity-30 transition"><ArrowLeft size={18}/> Câu Trước</button>
                            <div className="flex gap-1 overflow-x-auto max-w-[50%] py-2 scrollbar-hide px-4">
                                {questions.map((_, idx) => (
                                    <div key={idx} onClick={() => { setCurrentSlide(idx); setShowSlideAns(false); setShowSlideExpl(false); }} className={`h-2 rounded-full cursor-pointer transition-all ${idx === currentSlide ? 'bg-orange-500 w-8' : 'bg-slate-300 w-2 hover:bg-slate-400'}`}></div>
                                ))}
                            </div>
                            <button onClick={() => { if(currentSlide < questions.length - 1) { setCurrentSlide(c => c+1); setShowSlideAns(false); setShowSlideExpl(false); }}} disabled={currentSlide === questions.length - 1} className="px-5 py-2.5 rounded-xl bg-slate-900 text-white hover:bg-slate-700 font-bold flex items-center gap-2 disabled:opacity-30 transition shadow-lg">Câu Sau <ArrowRight size={18}/></button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen font-sans text-slate-800 bg-orange-50 selection:bg-orange-200">
                    {showTutorial && <InstructionModal onClose={() => setShowTutorial(false)} />}
                    {showLibrary && user && <CloudLibraryModal user={user} onClose={() => setShowLibrary(false)} onLoad={handleLoadFromLibrary} />}
                    {showSaveModal && <SaveModal isOpen={showSaveModal} onClose={() => setShowSaveModal(false)} onSave={handleConfirmSave} defaultTopic={topic} />}
                    {showMixModal && <MixExamModal isOpen={showMixModal} onClose={() => setShowMixModal(false)} onMix={processMixing} />}
                    {/* CẬP NHẬT: HIỂN THỊ CHẾ ĐỘ TRÌNH CHIẾU */}
                    {isPresentationMode && renderPresentation()}

                    {!isPresentationMode && wizardStep === 0 && renderIntro()}
                    
                    {/* STEP 0.5: MODE SELECTION */}
                    {!isPresentationMode && wizardStep === 0.5 && renderModeSelection()}

                    {!isPresentationMode && wizardStep > 0 && wizardStep < 5 && (
                        <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-orange-400 to-amber-600">
                            {wizardStep === 1 && renderStep1_Key()}
                            {wizardStep === 2 && renderStep2_Config()}
                            {wizardStep === 3 && <div className="text-center text-white"><Loader2 size={80} className="animate-spin mb-6 mx-auto opacity-80"/><h2 className="text-3xl font-bold">{loadingMsg}</h2></div>}
                            {wizardStep === 4 && renderStep4_Edit()}
                        </div>
                    )}
                </div>
            );
        };

        // Render React App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
