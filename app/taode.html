    <!-- SCRIPT BẢO VỆ MÃ NGUỒN -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.keyCode === 13) return true;
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && ['I', 'C', 'J'].includes(e.key.toUpperCase())) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.key.toUpperCase() === 'U') {
                e.preventDefault();
                return false;
            }
        });
    </script>

<body class="bg-graph-paper min-h-screen">
    <div id="root" class="relative z-10"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            Trophy, Activity, Check, Play, Settings, RefreshCw, Calculator, 
            FlaskConical, Atom, Key, BookOpen, Users, Loader2, Edit3, Save, 
            Trash2, ArrowRight, ArrowLeft, Dna, Target, Timer, Zap, Crown, Skull, Swords, Medal, Gift, AlertTriangle, GraduationCap, Maximize, Minimize, Send, Hand, HelpCircle, Repeat, Home, Eye, Sigma, Beaker, Shapes, Monitor, FileText, Info, Lightbulb, Download, Upload, Copy, FileJson, Grid, Shuffle, User, X, Wand2, Image as ImageIcon, Brain, Table2, List, GitBranch, BarChart3, Cloud, LogOut, LogIn, Library, Plus, FileType2
        } from 'lucide-react';

        // --- FIREBASE SETUP ---
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, serverTimestamp, orderBy } from "firebase/firestore";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDUJiSbxjmyvnTR1pzNzwDw2h9xr-MzPW0",
            authDomain: "thay-thaiminhnguyen.firebaseapp.com",
            projectId: "thay-thaiminhnguyen",
            storageBucket: "thay-thaiminhnguyen.firebasestorage.app",
            messagingSenderId: "407056816096",
            appId: "1:407056816096:web:7fd8d02ab9210a1a96fd85",
            measurementId: "G-9F8S1P3NQF"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // --- CUSTOM DOWNLOAD FUNCTION (FALLBACK) ---
        const safeSaveAs = (blob, filename) => {
            if (window.saveAs) {
                window.saveAs(blob, filename);
            } else {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            }
        };

        // --- HELPER: KATEX AUTO-RENDER ---
        const useKaTeXAutoRender = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            useEffect(() => {
                const loadScript = (src, globalKey) => {
                    return new Promise((resolve, reject) => {
                        if (window[globalKey]) return resolve();
                        const existing = document.querySelector(`script[src="${src}"]`);
                        if (existing) {
                            const interval = setInterval(() => {
                                if (window[globalKey]) { clearInterval(interval); resolve(); }
                            }, 100); return;
                        }
                        const script = document.createElement('script');
                        script.src = src; script.async = true;
                        script.onload = () => {
                            const interval = setInterval(() => {
                                if (window[globalKey]) { clearInterval(interval); resolve(); }
                            }, 50);
                        };
                        script.onerror = reject; document.body.appendChild(script);
                    });
                };
                loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js', 'katex')
                .then(() => loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js', 'renderMathInElement'))
                .then(() => setIsLoaded(true))
                .catch(err => console.error("Lỗi tải KaTeX:", err));
            }, []);
            return isLoaded;
        };

        const MathContent = ({ content, className = "" }) => {
            const containerRef = useRef(null);
            const isKaTeXLoaded = useKaTeXAutoRender();
            
            const safeContent = useMemo(() => {
                let text = typeof content === 'object' ? JSON.stringify(content) : String(content || "");
                return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }, [content]);

            useEffect(() => {
                if (isKaTeXLoaded && window.renderMathInElement && containerRef.current) {
                    try {
                        window.renderMathInElement(containerRef.current, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true }
                            ],
                            throwOnError: false, trust: true 
                        });
                    } catch (e) { console.warn("Lỗi render Math:", e); }
                }
            }, [safeContent, isKaTeXLoaded]);

            return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{ __html: safeContent }} />;
        };

        // --- VISUAL RENDERERS ---

        // 1a. FunctionPlotRenderer (Renderer Cũ - Dự phòng)
        const FunctionPlotRenderer = ({ formula }) => {
            const rootRef = useRef(null);
            useEffect(() => {
                if (!rootRef.current || !formula || !window.functionPlot) return;
                
                let cleanFormula = formula.trim();
                cleanFormula = cleanFormula.replace(/^(y|f\(x\))\s*=\s*/i, "");
                cleanFormula = cleanFormula
                    .replace(/×/g, "*").replace(/•/g, "*").replace(/⋅/g, "*")
                    .replace(/\\sin/g, "sin").replace(/\\cos/g, "cos").replace(/\\tan/g, "tan")
                    .replace(/\\ln/g, "ln").replace(/\^\{(.+?)\}/g, "^($1)").replace(/\\/g, "");

                cleanFormula = cleanFormula
                    .replace(/Math\.PI/g, "PI").replace(/Math\.E/g, "E")
                    .replace(/Math\.pow\(([^,]+),\s*([^)]+)\)/g, "($1)^($2)")
                    .replace(/Math\.abs/g, "abs").replace(/Math\.sqrt/g, "sqrt")
                    .replace(/Math\.sin/g, "sin").replace(/Math\.cos/g, "cos")
                    .replace(/Math\.tan/g, "tan").replace(/Math\.log/g, "ln")
                    .replace(/Math\.exp/g, "exp").replace(/Math\./g, "");

                try {
                    rootRef.current.innerHTML = '';
                    window.functionPlot({
                        target: rootRef.current,
                        width: Math.min(window.innerWidth - 80, 500),
                        height: 350,
                        xAxis: { domain: [-6, 6], label: 'x' },
                        yAxis: { domain: [-5, 5], label: 'y' },
                        grid: true,
                        data: [{ fn: cleanFormula, color: '#ea580c', graphType: 'polyline' }]
                    });
                } catch (e) { 
                    rootRef.current.innerHTML = `<div class="text-red-500 font-bold p-4 text-center">Lỗi FunctionPlot: ${cleanFormula}</div>`; 
                }
            }, [formula]);
            return (
                <div className="flex flex-col items-center">
                    <div ref={rootRef} className="rounded-lg overflow-hidden bg-white shadow-sm border border-slate-100"></div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-400">
                        <Activity size={12}/> (Chế độ dự phòng)
                    </div>
                </div>
            );
        };

        // 1b. DesmosRenderer (Renderer Mới - Đẹp hơn & Resizable)
        const DesmosRenderer = ({ formula }) => {
            const eltRef = useRef(null);
            const calculatorRef = useRef(null);

            // Effect khởi tạo Desmos
            useEffect(() => {
                if (!eltRef.current || !window.Desmos) return;

                if (!calculatorRef.current) {
                    calculatorRef.current = window.Desmos.GraphingCalculator(eltRef.current, {
                        keypad: false, expressions: false, settingsMenu: false,
                        zoomButtons: true, lockViewport: false, border: false,
                        autosize: true
                    });
                }

                let expression = formula.trim();
                if (!expression.includes('=') && !expression.includes('f(x)')) {
                    expression = `y=${expression}`;
                }
                
                calculatorRef.current.setExpression({ id: 'graph1', latex: expression, color: '#ea580c' });

                return () => {
                    if (calculatorRef.current) {
                        calculatorRef.current.destroy();
                        calculatorRef.current = null;
                    }
                };
            }, [formula]);

            // Effect lắng nghe thay đổi kích thước thẻ div cha để resize Desmos
            useEffect(() => {
                if (!eltRef.current || !calculatorRef.current) return;
                
                const resizeObserver = new ResizeObserver(() => {
                    calculatorRef.current.resize();
                });
                
                resizeObserver.observe(eltRef.current);
                
                return () => resizeObserver.disconnect();
            }, []);

            return (
                <div className="flex flex-col items-center w-full">
                    {/* Container có thể kéo giãn (resize) */}
                    <div 
                        className="rounded-lg overflow-hidden bg-white shadow-sm border border-slate-100 relative group"
                        style={{ 
                            width: '100%', 
                            minHeight: '400px',
                            resize: 'both', 
                            overflow: 'hidden',
                            maxWidth: '100%'
                        }}
                    >
                        {/* Desmos Element */}
                        <div ref={eltRef} className="w-full h-full absolute inset-0"></div>
                        
                        {/* Hint kéo giãn */}
                        <div className="absolute bottom-0 right-0 p-1 cursor-nwse-resize pointer-events-none z-10 opacity-50 group-hover:opacity-100 transition-opacity">
                            <Maximize size={16} className="text-slate-400 rotate-90"/>
                        </div>
                    </div>
                    
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-orange-600 font-bold">
                        <Activity size={12}/> Desmos Pro (Kéo góc dưới bên phải để chỉnh kích thước)
                    </div>
                </div>
            );
        };

        // 1c. GraphRenderer (Bộ điều khiển thông minh)
        const GraphRenderer = ({ formula }) => {
            const [hasDesmos, setHasDesmos] = useState(true);

            useEffect(() => {
                if (typeof window.Desmos === 'undefined') {
                    console.warn("Desmos không tải được, chuyển sang FunctionPlot.");
                    setHasDesmos(false);
                }
            }, []);

            if (hasDesmos) {
                return <DesmosRenderer formula={formula} />;
            }
            return <FunctionPlotRenderer formula={formula} />;
        };

        // 2. TableRenderer
        const TableRenderer = ({ data }) => {
            if (!data) return null;
            const rows = data.trim().split(/\r?\n/).map(row => row.split(',')); 
            const cellClass = 'p-3 text-sm';
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="overflow-x-auto w-full max-w-4xl rounded-xl border border-orange-200 shadow-sm">
                        <table className="min-w-full border-collapse bg-white">
                            <thead className="bg-gradient-to-r from-orange-100 to-amber-100 text-orange-900">
                                <tr>
                                    {rows[0] && rows[0].map((header, i) => (
                                        <th key={i} className={`${cellClass} font-bold border-b border-orange-200 uppercase tracking-wider`}>
                                            {header.trim()}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-orange-100">
                                {rows.slice(1).map((row, i) => (
                                    <tr key={i} className="hover:bg-orange-50/50 transition-colors">
                                        {row.map((cell, j) => (
                                            <td key={j} className={`${cellClass} text-center text-slate-700 font-medium ${j===0 ? 'font-bold text-orange-800 bg-orange-50/30' : ''}`}>
                                                {cell.trim()}
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="mt-2 italic flex items-center gap-1 text-xs text-slate-500">
                        <Sigma size={12}/> Bảng số liệu
                    </div>
                </div>
            );
        };

// --- 3. VariationTableRenderer (PHIÊN BẢN COMPACT: THU NHỎ ĐỂ VỪA KHUNG) ---
        const VariationTableRenderer = ({ data }) => {
            if (!data) return null;
            const arrowId = "arrow-" + Math.random().toString(36).substr(2, 9);

            // 1. Render Toán (Size chữ nhỏ hơn để vừa khung)
            const renderMathSafe = (latex) => {
                if (!latex) return <span>&nbsp;</span>;
                // Nếu chưa phải Latex chuẩn, render text thường
                if (!window.katex) return <span className="font-serif text-xs">{latex}</span>;
                try {
                    return <span dangerouslySetInnerHTML={{ __html: window.katex.renderToString(latex, { throwOnError: false, displayMode: false }) }} />;
                } catch (e) { return <span className="text-red-500 text-xs">{latex}</span>; }
            };

            // 2. Chuẩn hóa (Giữ nguyên logic thông minh cũ)
            const fmt = (s) => {
                if (!s) return "";
                let str = s.toString().trim();
                str = str.replace(/(-?)(inf|vc|vo\s*cung|infinity)/gi, "$1\\infty");
                str = str.replace(/sqrt\s*\(([^)]+)\)/gi, "\\sqrt{$1}").replace(/sqrt([0-9a-zA-Z]+)/gi, "\\sqrt{$1}");
                if (str.includes('/') && !str.includes('{')) str = str.replace(/([0-9a-zA-Z\\sqrt{}]+)\/([0-9a-zA-Z]+)/g, "\\dfrac{$1}{$2}");
                return str;
            };

            try {
                const lines = data.trim().split(/\r?\n/).filter(l => l.trim());
                let xRaw = [], ypRaw = [], yRaw = [];
                
                lines.forEach(line => {
                    const parts = line.match(/^([a-zA-Z0-9']+\s*):(.*)/);
                    if (!parts) return;
                    const head = parts[1].toLowerCase().replace(/\s/g, ''); 
                    const content = parts[2].replace(/;/g, ',').trim();
                    if (head === 'x') xRaw = content.split(',').map(s => s.trim());
                    else if (head.includes("y'")) ypRaw = content.split(',').map(s => s.trim());
                    else if (head === 'y') yRaw = content.split(',').map(s => s.trim());
                });

                if (xRaw.length === 0) return null;

                const totalCols = xRaw.length * 2 - 1;
                let finalYP = new Array(totalCols).fill("");
                if (ypRaw.length > 0 && ypRaw.length <= totalCols - 2) {
                    for(let i=0; i<ypRaw.length; i++) finalYP[i+1] = ypRaw[i];
                } else {
                    for(let i=0; i<Math.min(ypRaw.length, totalCols); i++) finalYP[i] = ypRaw[i];
                }

                let finalY_Nodes = new Array(xRaw.length).fill("");
                xRaw.forEach((_, i) => { if (yRaw[i]) finalY_Nodes[i] = yRaw[i]; });

                return (
                    <div className="flex flex-col items-center w-full my-2">
                        {/* Container giới hạn max-width và có thanh cuộn nếu tràn */}
                        <div className="bg-white rounded-lg border border-slate-400 shadow-sm overflow-x-auto w-full max-w-full">
                            <div className="inline-grid border-collapse min-w-full" 
                                 style={{
                                     fontFamily: '"Times New Roman", serif',
                                     // THU NHỎ: Cột tiêu đề giảm còn 30px, cột nội dung tối thiểu 40px
                                     gridTemplateColumns: `35px repeat(${xRaw.length - 1}, auto minmax(40px, 1fr)) auto`,
                                     // THU NHỎ: Chiều cao dòng giảm xuống
                                     gridTemplateRows: '35px 35px minmax(100px, auto)' 
                                 }}>

                                {/* === HÀNG 1: X === */}
                                <div className="border-r border-b border-black flex items-center justify-center font-bold italic bg-slate-50 text-sm">x</div>
                                {xRaw.map((val, i) => (
                                    <React.Fragment key={`x-${i}`}>
                                        <div className="border-b border-black flex items-center justify-center px-2 font-bold text-slate-900 text-sm whitespace-nowrap">
                                            {renderMathSafe(fmt(val))}
                                        </div>
                                        {i < xRaw.length - 1 && <div className="border-b border-black"></div>}
                                    </React.Fragment>
                                ))}

                                {/* === HÀNG 2: Y' === */}
                                <div className="border-r border-b border-black flex items-center justify-center font-bold italic bg-slate-50 text-sm">y'</div>
                                {xRaw.map((_, i) => {
                                    const nodeVal = finalYP[i * 2]; 
                                    const intervalVal = finalYP[i * 2 + 1];
                                    const isDoubleBar = nodeVal === '||';
                                    return (
                                        <React.Fragment key={`yp-${i}`}>
                                            <div className="border-b border-black flex items-center justify-center relative min-w-[20px]">
                                                {isDoubleBar ? (
                                                    <div className="absolute inset-y-0 left-1/2 -translate-x-1/2 w-[3px] border-l border-r border-black bg-white h-full"></div>
                                                ) : (
                                                    <span className="font-bold text-sm">{renderMathSafe(fmt(nodeVal))}</span>
                                                )}
                                            </div>
                                            {i < xRaw.length - 1 && (
                                                <div className="border-b border-black flex items-center justify-center text-slate-900 font-bold text-sm">
                                                    {renderMathSafe(fmt(intervalVal))}
                                                </div>
                                            )}
                                        </React.Fragment>
                                    );
                                })}

                                {/* === HÀNG 3: Y === */}
                                <div className="border-r border-black flex items-center justify-center font-bold italic bg-slate-50 text-sm">y</div>
                                {xRaw.map((_, i) => {
                                    const val = finalY_Nodes[i];
                                    const prevSign = i > 0 ? finalYP[(i-1)*2 + 1] : "";
                                    const nextSign = i < xRaw.length - 1 ? finalYP[i*2 + 1] : "";
                                    
                                    let isHigh = false;
                                    const sVal = String(val || "").toLowerCase();
                                    if (prevSign.includes('+') || prevSign.includes('u')) isHigh = true; 
                                    if (nextSign.includes('-') || nextSign.includes('d')) isHigh = true; 
                                    if (sVal.includes('+inf') || sVal.includes('duongvo')) isHigh = true;
                                    if (sVal.includes('-inf') || sVal.includes('amvo')) isHigh = false;

                                    const isDoubleBar = finalYP[i * 2] === '||';

                                    return (
                                        <React.Fragment key={`y-${i}`}>
                                            <div className="relative p-1 min-w-[40px] z-10 h-full">
                                                {isDoubleBar && <div className="absolute inset-y-0 left-1/2 -translate-x-1/2 w-[3px] border-l border-r border-black bg-white h-full z-20"></div>}
                                                <div className={`h-full flex flex-col items-center ${isHigh ? 'justify-start' : 'justify-end'}`}>
                                                    <span className="font-bold z-10 bg-white px-1 rounded text-slate-900 text-sm whitespace-nowrap">
                                                        {renderMathSafe(fmt(val))}
                                                    </span>
                                                </div>
                                            </div>

                                            {/* MŨI TÊN (SVG) */}
                                            {i < xRaw.length - 1 && (
                                                <div className="relative w-full h-full z-0">
                                                    <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                                                        <defs>
                                                            <marker id={arrowId} markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                                                <path d="M0,0 L0,6 L9,3 z" fill="black" />
                                                            </marker>
                                                        </defs>
                                                        {finalYP[i*2+1].includes('+') && <line x1="15%" y1="80%" x2="85%" y2="20%" stroke="black" strokeWidth="1.2" markerEnd={`url(#${arrowId})`} />}
                                                        {finalYP[i*2+1].includes('-') && <line x1="15%" y1="20%" x2="85%" y2="80%" stroke="black" strokeWidth="1.2" markerEnd={`url(#${arrowId})`} />}
                                                        {(finalYP[i*2+1].includes('u') || finalYP[i*2+1].includes('/')) && <line x1="15%" y1="80%" x2="85%" y2="20%" stroke="black" strokeWidth="1.2" markerEnd={`url(#${arrowId})`} />}
                                                        {(finalYP[i*2+1].includes('d') || finalYP[i*2+1].includes('\\')) && <line x1="15%" y1="20%" x2="85%" y2="80%" stroke="black" strokeWidth="1.2" markerEnd={`url(#${arrowId})`} />}
                                                    </svg>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            } catch (e) {
                return <div className="text-red-500 p-2 text-xs">Lỗi BBT: {e.message}</div>;
            }
        };

        // 4. ChemistryRenderer
        const ChemistryRenderer = ({ structure }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!structure || !canvasRef.current || !window.SmilesDrawer) return;
                const drawChemistry = () => {
                    const options = { width: 400, height: 300, bondThickness: 1.2, bondLength: 18, shortBondLength: 0.85, bondSpacing: 0.18 * 18, atomVisualization: 'default', isomeric: true, debug: false, terminalCarbons: true, explicitHydrogens: false, overlapSensitivity: 0.42, overlapResolutionIterations: 1, compactDrawing: false, fontSizeLarge: 7, fontSizeSmall: 5, padding: 10.0, themes: { light: { C: '#222', O: '#e11d48', N: '#2563eb', F: '#059669', CL: '#16a34a', BR: '#9a3412', I: '#7c3aed', P: '#ea580c', S: '#d97706', B: '#db2777', SI: '#ca8a04', H: '#64748b', BACKGROUND: '#fff' } } };
                    try {
                        const smilesDrawer = new window.SmilesDrawer.Drawer(options);
                        window.SmilesDrawer.parse(structure, (tree) => { smilesDrawer.draw(tree, canvasRef.current, 'light', false); }, (err) => console.error("Lỗi parse SMILES:", err));
                    } catch (e) { console.error("Lỗi khởi tạo SmilesDrawer:", e); }
                };
                if (window.SmilesDrawer) drawChemistry(); else setTimeout(drawChemistry, 500);
            }, [structure]);
            return (
                <div className="flex flex-col items-center">
                    <div className="bg-white p-2 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>
                        <canvas ref={canvasRef} width="400" height="300" className="max-w-full h-auto"></canvas>
                    </div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <Beaker size={12}/> Cấu trúc: {structure}
                    </div>
                </div>
            );
        };

        // 5. SVGRenderer
        const SVGRenderer = ({ svgCode }) => {
            const cleanSvg = useMemo(() => {
                if (!svgCode) return "";
                let code = svgCode;
                if (!code.trim().startsWith('<svg')) return `<div class='text-red-500'>Invalid SVG</div>`;
                if (!code.includes('class="')) { code = code.replace('<svg', '<svg class="w-full h-full"'); }
                return code;
            }, [svgCode]);
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-center items-center min-w-[300px] min-h-[200px]">
                        <div dangerouslySetInnerHTML={{ __html: cleanSvg }} className="w-full flex justify-center" />
                    </div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <Shapes size={12}/> Hình minh họa (Vector/Biểu đồ)
                    </div>
                </div>
            );
        };

        // 6. MermaidRenderer
        const MermaidRenderer = ({ chart }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (!chart || !window.mermaid) return;
                try {
                    window.mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
                    const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                    window.mermaid.render(id, chart).then(({ svg }) => {
                        setSvg(svg);
                    });
                } catch (e) {
                    console.error("Mermaid render error:", e);
                    setSvg(`<div class="text-red-500 text-sm p-4">Lỗi vẽ sơ đồ: ${e.message}</div>`);
                }
            }, [chart]);

            return (
                <div className="flex flex-col items-center w-full">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-center items-center min-w-[300px] overflow-x-auto">
                        <div dangerouslySetInnerHTML={{ __html: svg }} className="w-full flex justify-center" />
                    </div>
                    <div className="mt-2 italic font-mono flex items-center gap-1 text-xs text-slate-500">
                        <GitBranch size={12}/> Sơ đồ / Quy trình / Dòng thời gian
                    </div>
                </div>
            );
        };

        // --- INSTRUCTION MODAL ---
        const InstructionModal = ({ onClose }) => (
            <div className="fixed inset-0 z-[130] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-white glass-panel max-w-4xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                    <div className="bg-gradient-to-r from-orange-500 to-amber-600 p-6 flex justify-between items-center text-white">
                        <h2 className="text-2xl font-black flex items-center gap-2"><Info/> HƯỚNG DẪN SỬ DỤNG - CÔNG CỤ TẠO ĐỀ 2025</h2>
                        <button onClick={onClose} className="hover:bg-white/20 p-2 rounded-full"><Trash2 size={24} className="rotate-45"/></button>
                    </div>
                    <div className="p-8 overflow-y-auto bg-slate-50/50 space-y-6 text-slate-800 text-sm leading-relaxed">
                        <div className="bg-blue-50 p-5 rounded-xl border border-blue-100">
                            <h3 className="text-lg font-bold text-blue-800 mb-3 flex items-center gap-2"><Zap size={20}/> 1. Tạo Đề Tự Động Với AI</h3>
                            <p className="mb-2">Hệ thống hỗ trợ tạo đề chuẩn cấu trúc thi Tốt nghiệp THPT 2025:</p>
                            <ul className="list-disc pl-5 space-y-2 text-slate-700">
                                <li><strong>Phần I - Trắc nghiệm (4 chọn 1):</strong> AI sẽ tạo câu hỏi với 4 đáp án A, B, C, D.</li>
                                <li><strong>Phần II - Đúng/Sai:</strong> Câu hỏi chùm. Mỗi câu hỏi lớn sẽ có 4 ý nhỏ (a, b, c, d). Phần mềm tự động tách thành 4 dòng để thầy cô dễ dàng chỉnh sửa đáp án Đúng/Sai cho từng ý.</li>
                                <li><strong>Phần III - Trả lời ngắn:</strong> Dạng câu hỏi điền số hoặc kết quả ngắn.</li>
                            </ul>
                            <div className="mt-3 bg-blue-100 p-3 rounded-lg text-blue-800 text-xs font-bold">Lưu ý: Thầy cô cần nhập API Key của Google Gemini (miễn phí) để sử dụng tính năng này.</div>
                        </div>
                        <div className="bg-green-50 p-5 rounded-xl border border-green-100">
                            <h3 className="text-lg font-bold text-green-800 mb-3 flex items-center gap-2"><FileJson size={20}/> 2. Nhập Liệu Thủ Công & Prompt</h3>
                            <ul className="list-disc pl-5 space-y-2 text-slate-700">
                                <li><strong>Bước 1:</strong> Tại màn hình "Thủ Công", nhập số lượng câu hỏi cho từng phần (Trắc nghiệm, Đúng/Sai, Điền khuyết).</li>
                                <li><strong>Bước 2:</strong> Bấm nút <strong>"Sao chép Prompt mẫu"</strong>. Hệ thống sẽ tạo một câu lệnh chi tiết chứa đúng cấu trúc đề thầy cô mong muốn.</li>
                                <li><strong>Bước 3:</strong> Dán lệnh vào ChatGPT hoặc Gemini. AI sẽ trả về mã JSON.</li>
                                <li><strong>Bước 4:</strong> Copy mã JSON đó dán ngược lại vào ô nhập liệu của ứng dụng để tiến hành biên tập.</li>
                            </ul>
                        </div>
                        <div className="bg-purple-50 p-5 rounded-xl border border-purple-100">
                            <h3 className="text-lg font-bold text-purple-800 mb-3 flex items-center gap-2"><Edit3 size={20}/> 3. Biên Tập & Xuất File Word</h3>
                            <ul className="list-disc pl-5 space-y-2 text-slate-700">
                                <li><strong>Chỉnh sửa trực quan:</strong> Sửa nội dung, công thức Toán (LaTeX), và hình ảnh minh họa ngay trên màn hình.</li>
                                <li><strong>Hỗ trợ hình ảnh:</strong> Dùng công cụ "Trợ lý AI" để vẽ đồ thị hàm số, bảng biến thiên, sơ đồ tư duy (Mermaid) hoặc hình học phẳng.</li>
                                <li><strong>Xuất Word:</strong> Bấm "Xuất Word" để tải file .docx được định dạng đẹp, canh lề chuẩn, kèm lời giải chi tiết phía sau (rất tiện để in ấn phát cho học sinh).</li>
                            </ul>
                        </div>
                    </div>
                    <div className="p-4 border-t bg-white flex justify-end gap-3">
                        <button onClick={onClose} className="bg-orange-600 hover:bg-orange-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all">Đã Hiểu & Bắt Đầu</button>
                    </div>
                </motion.div>
            </div>
        );

        // --- EXPLANATION MODAL ---
        const ExplanationModal = ({ content, onClose }) => {
            return (
                <div className="fixed inset-0 z-[110] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
                    <motion.div initial={{scale:0.8, opacity:0}} animate={{scale:1, opacity:1}} className="glass-panel w-full max-w-[90%] md:max-w-5xl rounded-3xl shadow-2xl overflow-hidden flex flex-col border-4 border-orange-500 max-h-[90vh]">
                        <div className="bg-gradient-to-r from-orange-500 to-amber-500 text-white p-6 font-bold text-2xl flex items-center gap-3 shadow-md">
                            <Activity size={32}/>
                            <span>Giải Thích Chi Tiết</span>
                        </div>
                        <div className="p-8 overflow-y-auto flex-1 bg-orange-50/80">
                            <div className="text-2xl text-slate-900 leading-relaxed font-medium bg-white/60 p-6 rounded-2xl shadow-sm border border-orange-100">
                                <MathContent content={content} className="whitespace-pre-wrap" />
                            </div>
                        </div>
                        <div className="p-6 bg-white border-t border-orange-100 flex justify-end">
                            <button onClick={onClose} className="bg-green-600 hover:bg-green-700 text-white py-3 px-8 rounded-full font-bold text-xl shadow-lg flex items-center gap-2 transform hover:-translate-y-1 transition-all">
                                Tiếp tục <ArrowRight size={24}/>
                            </button>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // --- IMAGE CODE GENERATOR ---
        const ImageCodeGenerator = () => {
            const [input, setInput] = useState('');
            const [generatedCode, setGeneratedCode] = useState('');
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                if (!input.trim()) {
                    setGeneratedCode('');
                    return;
                }
                const cleanInput = input.trim();
                const code = `<svg viewBox="0 0 512 512" width="100%" height="100%">\n  <image href="${cleanInput}" x="0" y="0" width="512" height="512" preserveAspectRatio="xMidYMid meet"/>\n</svg>`;
                setGeneratedCode(code);
            }, [input]);

            const handleCopy = () => {
                navigator.clipboard.writeText(generatedCode);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg relative overflow-hidden h-full">
                    <h4 className="text-white font-bold text-lg mb-4 flex items-center gap-2">
                        <ImageIcon size={20} className="text-orange-400"/> Công Cụ Tạo Mã Ảnh Tự Động
                    </h4>
                    <div className="space-y-4 relative z-10">
                        <div>
                            <label className="text-slate-300 text-xs font-bold mb-2 block uppercase">1. Dán Link ảnh (URL) hoặc Mã Base64:</label>
                            <textarea
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                className="w-full h-20 bg-slate-700/50 text-white p-3 rounded-xl border border-slate-600 focus:ring-2 focus:ring-orange-500 outline-none text-xs font-mono placeholder:text-slate-500"
                                placeholder="Ví dụ: https://example.com/anh.jpg..."
                            />
                        </div>
                        {generatedCode && (
                            <div className="animate-fade-in space-y-2">
                                <div className="flex justify-between items-end">
                                    <label className="text-green-400 text-xs font-bold block uppercase">2. Kết quả (Copy dán vào visualData):</label>
                                    <button onClick={handleCopy} className={`flex items-center gap-1 px-3 py-1 rounded-lg font-bold text-xs transition-all shadow-lg ${copied ? 'bg-green-500 text-white' : 'bg-white text-slate-900 hover:bg-orange-50'}`}>
                                        {copied ? <><Check size={14}/> Đã Copy!</> : <><Copy size={14}/> COPY</>}
                                    </button>
                                </div>
                                <pre className="bg-black/40 text-blue-200 p-3 rounded-xl overflow-x-auto text-[10px] font-mono border border-slate-600 shadow-inner h-20">{generatedCode}</pre>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- PROMPT HELPER (UPDATED FOR ALL SUBJECTS) ---
        const PromptHelper = () => {
            const [selectedType, setSelectedType] = useState('graph');
            const [description, setDescription] = useState('');
            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [copied, setCopied] = useState(false);

            const options = [
                { id: 'graph', label: 'Đồ Thị Toán', icon: Activity },
                { id: 'variation_table', label: 'Bảng Biến Thiên', icon: Table2 },
                { id: 'chemistry', label: 'Cấu Trúc Hóa', icon: Beaker },
                { id: 'mermaid', label: 'Sơ đồ Sinh/Sử', icon: GitBranch },
                { id: 'chart', label: 'Biểu đồ (Địa/TK)', icon: BarChart3 }, // New
                { id: 'svg', label: 'Hình Học/Vật Lý', icon: Shapes },
            ];

            const generatePrompt = () => {
                if (!description.trim()) return;
                let prompt = "";
                switch (selectedType) {
                    case 'graph':
                        prompt = `Hãy viết biểu thức toán học Javascript (vế phải của y=) mô tả đồ thị: "${description}".\nYÊU CẦU:\n- Chỉ trả về chuỗi công thức (ví dụ: x^3 - 3*x + 1).\n- Không trả về JSON, không viết "y=", không thêm lời dẫn.`;
                        break;
                    case 'variation_table':
                        prompt = `Hãy tạo dữ liệu cho Bảng Biến Thiên của hàm số: "${description}".\nYÊU CẦU CHÍNH XÁC:\n- Trả về đúng 3 dòng dữ liệu, định dạng Text đơn giản.\n- Dòng 1: x: giá_trị_1, giá_trị_2, ... (Dùng -inf, +inf cho vô cực).\n- Dòng 2: y': +, 0, -, 0, + (Xen kẽ giữa các khoảng và điểm).\n- Dòng 3: y: giá trị tương ứng (Dùng -inf, +inf cho vô cực, dùng || cho điểm gián đoạn).`;
                        break;
                    case 'chemistry':
                        prompt = `Hãy cung cấp chuỗi SMILES chính xác cho chất hóa học: "${description}".\nYÊU CẦU:\n- Chỉ trả về duy nhất chuỗi SMILES (ví dụ: c1ccccc1).\n- Không thêm lời dẫn hay giải thích.`;
                        break;
                    case 'mermaid':
                        prompt = `Hãy viết code Mermaid để vẽ sơ đồ: "${description}".\nYÊU CẦU:\n- Trả về code Mermaid thuần túy.\n- Dùng 'graph TD' (trên xuống) hoặc 'graph LR' (trái sang phải).\n- KHÔNG bọc trong markdown code block.`;
                        break;
                    case 'chart':
                        prompt = `Hãy viết code SVG để vẽ biểu đồ cho: "${description}".\nYÊU CẦU:\n- Kích thước viewBox="0 0 500 300".\n- Sử dụng thẻ <rect> (biểu đồ cột), <circle> (biểu đồ tròn), <line> (trục).\n- Có chú thích trục tung, trục hoành, số liệu cụ thể.\n- Màu sắc: Dùng màu cam (#ea580c) chủ đạo.`;
                        break;
                    case 'svg':
                        prompt = `Hãy viết mã SVG hoàn chỉnh để vẽ hình minh họa: "${description}".\nYÊU CẦU:\n- Kích thước viewBox="0 0 500 300".\n- Phong cách: Nét vẽ màu đen (stroke="black"), nền trắng/trong suốt, đơn giản, sư phạm.\n- Chỉ trả về duy nhất thẻ <svg>...</svg>.`;
                        break;
                }
                setGeneratedPrompt(prompt);
            };

            const handleCopy = () => {
                navigator.clipboard.writeText(generatedPrompt);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-orange-100 shadow-md h-full">
                    <h4 className="font-bold text-orange-700 mb-4 flex items-center gap-2 text-lg">
                        <Wand2 size={20}/> Trợ Lý Tạo Dữ Liệu Visual (Nhờ AI Viết)
                    </h4>
                    
                    <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                        {options.map(opt => (
                            <button 
                                key={opt.id}
                                onClick={() => setSelectedType(opt.id)}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-all border ${selectedType === opt.id ? 'bg-orange-600 text-white border-orange-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-orange-50'}`}
                            >
                                <opt.icon size={16}/> {opt.label}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-4">
                        <div className="flex gap-2">
                            <input 
                                value={description}
                                onChange={(e) => setDescription(e.target.value)}
                                className="flex-1 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-orange-400 outline-none text-sm"
                                placeholder={`Nhập mô tả...`}
                            />
                            <button onClick={generatePrompt} className="bg-orange-600 hover:bg-orange-700 text-white px-6 rounded-xl font-bold text-sm shadow-md transition-all whitespace-nowrap">
                                Tạo Lệnh
                            </button>
                        </div>

                        {generatedPrompt && (
                            <div className="relative group animate-fade-in">
                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase">Copy lệnh này gửi cho AI, sau đó dán kết quả vào ô bên dưới:</label>
                                <textarea readOnly value={generatedPrompt} className="w-full h-32 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono text-slate-700 resize-none focus:outline-none"/>
                                <button onClick={handleCopy} className="absolute top-8 right-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 p-2 rounded-lg shadow-sm">
                                    {copied ? <Check size={16} className="text-green-500"/> : <Copy size={16}/>}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- VISUAL CONTENT ROUTER (ĐÃ KẾT NỐI CHUẨN) ---
        const VisualContent = ({ type, data }) => {
            if (!type || type === 'none' || !data) return null;
            return (
                <div className="visual-container w-full flex justify-center">
                    {/* 1. Đồ thị: Dùng 'graph' để gọi Desmos Renderer có sẵn */}
                    {type === 'graph' && <GraphRenderer formula={data} />}
                    
                    {/* 2. Bảng biến thiên: Gọi cái mới vừa thay ở Bước 1 */}
                    {type === 'variation_table' && <VariationTableRenderer data={data} />}
                    
                    {/* 3. Các Visual khác giữ nguyên */}
                    {type === 'table' && <TableRenderer data={data} />}
                    {type === 'chemistry' && <ChemistryRenderer structure={data} />}
                    {type === 'svg' && <SVGRenderer svgCode={data} />}
                    {type === 'mermaid' && <MermaidRenderer chart={data} />}
                    
                    {/* 4. Ảnh URL */}
                    {type === 'image_url' && (
                        <img src={data} className="max-h-64 rounded-lg shadow-sm border border-slate-200" alt="Minh họa"/>
                    )}
                </div>
            );
        };

        // --- API GEMINI & PARSING FIX ---
        // --- API GEMINI & PARSING FIX (ĐÃ SỬA LỖI LATEX) ---
        const cleanGeminiJson = (text) => {
            const startIndex = text.indexOf('[');
            const endIndex = text.lastIndexOf(']');
            let cleaned = text;
            if (startIndex !== -1 && endIndex !== -1) {
                cleaned = text.substring(startIndex, endIndex + 1);
            }
            // Xóa markdown json tag nếu AI lỡ thêm vào
            cleaned = cleaned.replace(/```json/g, "").replace(/```/g, "").trim();

            cleaned = cleaned.replace(/""([^"]*)""/g, '"$1"');
            const placeholder = "___DOUBLE_BACKSLASH_PLACEHOLDER___";
            cleaned = cleaned.split("\\\\").join(placeholder);
            cleaned = cleaned.replace(/\\u(?![0-9a-fA-F]{4})/g, "\\\\u");
            
            // --- ĐÂY LÀ DÒNG QUAN TRỌNG ĐÃ SỬA ---
            // Chỉ escape n (xuống dòng), u (unicode) và " (ngoặc kép).
            // GIỮ NGUYÊN b, f, r, t để các lệnh \frac, \beta, \right, \times hoạt động.
            const pattern = "\\\\([^\"\\\\nu])"; 
            
            const regex = new RegExp(pattern, "g");
            cleaned = cleaned.replace(regex, "\\\\$1");
            cleaned = cleaned.split(placeholder).join("\\\\");
            return cleaned;
        };

            // --- CẬP NHẬT: STATE CHO CHẾ ĐỘ TRÌNH CHIẾU ---
            const [isPresentationMode, setIsPresentationMode] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [showSlideAns, setShowSlideAns] = useState(false);
            const [showSlideExpl, setShowSlideExpl] = useState(false);

            // --- FIREBASE STATE ---
            const [user, setUser] = useState(null);
            const [showLibrary, setShowLibrary] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            // --- NEW: SAVE MODAL STATE ---
            const [showSaveModal, setShowSaveModal] = useState(false);
const [showMixModal, setShowMixModal] = useState(false);
// --- LOGIC ĐỒNG HỒ (CÓ NHẬP SỐ PHÚT) ---
            const [timer, setTimer] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [inputMin, setInputMin] = useState(5); // Mặc định 5 phút

            useEffect(() => {
                let interval = null;
                if (isTimerRunning && timer > 0) {
                    interval = setInterval(() => setTimer(t => t - 1), 1000);
                } else if (timer === 0) {
                    setIsTimerRunning(false);
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timer]);

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const sec = s % 60;
                return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            };

            // --- CẬP NHẬT: XỬ LÝ PHÍM TẮT TRÌNH CHIẾU ---
            useEffect(() => {
                if (!isPresentationMode) return;
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'Space') {
                        if (currentSlide < questions.length - 1) {
                            setCurrentSlide(p => p + 1);
                            setShowSlideAns(false);
                            setShowSlideExpl(false);
                        }
                    } else if (e.key === 'ArrowLeft') {
                        if (currentSlide > 0) {
                            setCurrentSlide(p => p - 1);
                            setShowSlideAns(false);
                            setShowSlideExpl(false);
                        }
                    } else if (e.key === 'Escape') {
                        setIsPresentationMode(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isPresentationMode, currentSlide, questions.length]);

            // --- CẬP NHẬT: CÁC HÀM XỬ LÝ MA TRẬN ---
            const addMatrixRow = () => {
                setMatrix([...matrix, { topic: "", mc: 0, tf: 0, sa: 0 }]);
            };

            const removeMatrixRow = (index) => {
                const newMatrix = [...matrix];
                newMatrix.splice(index, 1);
                setMatrix(newMatrix);
                updateTotalCounts(newMatrix);
            };

            const updateMatrixRow = (index, field, value) => {
                const newMatrix = [...matrix];
                newMatrix[index][field] = field === 'topic' ? value : Number(value);
                setMatrix(newMatrix);
                updateTotalCounts(newMatrix);
            };

            const updateTotalCounts = (currentMatrix) => {
                const totalMC = currentMatrix.reduce((acc, row) => acc + row.mc, 0);
                const totalTF = currentMatrix.reduce((acc, row) => acc + row.tf, 0);
                const totalSA = currentMatrix.reduce((acc, row) => acc + row.sa, 0);
                setQuestionCounts({ mc: totalMC, tf: totalTF, sa: totalSA });
            };

            const handleLogin = async () => {

            };

            const handleLogout = async () => { await signOut(auth); };

            // CLICK "LƯU CLOUD" -> OPEN POPUP
            const handleOpenSaveModal = () => {
                if (!user) return alert("Vui lòng đăng nhập để lưu!");
                if (questions.length === 0) return alert("Chưa có câu hỏi nào để lưu.");

            };

            // CONFIRM SAVE (INSIDE POPUP)
            const handleConfirmSave = async (finalTopicName, finalSubject) => {
                setIsSaving(true);

                    await addDoc(collection(db, "users", user.uid, "content"), {

                        type: 'quiz'
                    });

                    if (e.code === 'permission-denied') {
                        alert("⚠️ LỖI QUYỀN TRUY CẬP! Hãy cấu hình Rules trên Firebase.");
                    } else {
                        alert("Lỗi lưu: " + e.message); 
                    }
                } finally { setIsSaving(false); }
            };

            const handleLoadFromLibrary = (setData) => {
                try {
                    const parsedQs = JSON.parse(setData.questions);
                    setQuestions(parsedQs);
                    setTopic(setData.topic);
                    setWizardStep(4);
                    setActiveEditId(0);
                    setShowLibrary(false);
                } catch (e) { alert("Dữ liệu lỗi, không thể tải."); }
            };

            // --- NEW FEATURE: EXPORT DOCX (WITH TABS - NO TABLE) ---
            // --- HÀM XUẤT DOCX (ĐÃ NÂNG CẤP) ---
            // --- HÀM TẠO FILE DOCX (LOGIC KÉP: ĐỀ HOẶC ĐÁP ÁN) ---
            const generateDocxBlob = async (dataToExport, titleSuffix, isKey = false) => {
                if (!window.docx) throw new Error("Thư viện DOCX chưa tải xong.");
                const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, HeadingLevel, PageBreak, AlignmentType } = window.docx;
                const docChildren = [];

                // HEADER
                docChildren.push(
                    new Paragraph({ children: [new TextRun({ text: isKey ? `BẢNG ĐÁP ÁN: ${titleSuffix}` : `ĐỀ THI: ${topic.toUpperCase()} ${titleSuffix}`, bold: true, size: 28 })], heading: HeadingLevel.HEADING_1, alignment: AlignmentType.CENTER, spacing: { after: 200 } }),
                    new Paragraph({ children: [new TextRun({ text: "GV: Thái Minh Nguyên", italics: true, size: 24 })], alignment: AlignmentType.CENTER, spacing: { after: 400 } })
                );

                if (isKey) {
                    // === CHẾ ĐỘ 1: FILE ĐÁP ÁN (BẢNG RÚT GỌN) ===
                    const rows = [new TableRow({ children: [
                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "Câu", bold: true })], alignment: AlignmentType.CENTER })], width: { size: 15, type: WidthType.PERCENTAGE } }),
                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "Đáp án", bold: true })], alignment: AlignmentType.CENTER })], width: { size: 85, type: WidthType.PERCENTAGE } }),
                    ]})];

                    dataToExport.forEach((q, idx) => {
                        let ansText = "";
                        if (q.type === 'sa') {
                            ansText = q.correctAnswer; // Tự luận: Hiện đáp án text
                        } else if (q.type === 'tf') {
                             ansText = q.correctAnswer === 0 ? "Đúng" : "Sai"; // Đ/S: Hiện chữ
                        } else {
                            // Trắc nghiệm: Hiện A, B, C, D
                            ansText = String.fromCharCode(65 + parseInt(q.correctAnswer || 0));
                        }
                        
                        rows.push(new TableRow({ children: [
                            new TableCell({ children: [new Paragraph({ text: `${idx + 1}`, alignment: AlignmentType.CENTER })] }),
                            new TableCell({ children: [new Paragraph({ text: ansText, alignment: AlignmentType.CENTER })] }),
                        ]}));
                    });
                    docChildren.push(new Table({ rows: rows, width: { size: 100, type: WidthType.PERCENTAGE } }));

                } else {
                    // === CHẾ ĐỘ 2: FILE ĐỀ THI (CÓ CÂU HỎI + LỜI GIẢI CUỐI) ===
                    // 1. Phần câu hỏi
                    dataToExport.forEach((q, idx) => {
                        let label = q.type === 'tf' ? " (Đ/S)" : (q.type === 'sa' ? " (TL)" : "");
                        docChildren.push(new Paragraph({ children: [ new TextRun({ text: `Câu ${idx + 1}${label}: `, bold: true, size: 24 }), new TextRun({ text: q.question, size: 24 }) ], spacing: { before: 200, after: 100 } }));
                        
                        if (q.visualType !== 'none') docChildren.push(new Paragraph({ children: [new TextRun({ text: `[Hình minh họa: ${q.visualType}]`, italics: true, color: "888888", size: 20 })], spacing: { after: 100 } }));

                        if (q.type === 'sa') docChildren.push(new Paragraph({ children: [new TextRun({ text: "Trả lời: ...........................................................", size: 24 })], spacing: { after: 200 } }));
                        else if (q.type === 'tf') docChildren.push(new Paragraph({ children: [ new TextRun({ text: `A. Đúng` }), new TextRun({ text: `\tB. Sai` }) ], tabStops: [{ type: "left", position: 4500 }], spacing: { after: 200 } }));
                        else {
                            docChildren.push(new Paragraph({ children: [ new TextRun({ text: `A. ${q.options[0]}` }), new TextRun({ text: `\tB. ${q.options[1]}` }) ], tabStops: [ { type: "left", position: 4500 } ], spacing: { after: 50 } }));
                            docChildren.push(new Paragraph({ children: [ new TextRun({ text: `C. ${q.options[2]}` }), new TextRun({ text: `\tD. ${q.options[3]}` }) ], tabStops: [ { type: "left", position: 4500 } ], spacing: { after: 200 } }));
                        }
                    });

                    // 2. Phần lời giải chi tiết (Trang mới)
                    docChildren.push(new Paragraph({ children: [new PageBreak()] }));
                    docChildren.push(new Paragraph({ children: [new TextRun({ text: "LỜI GIẢI CHI TIẾT", bold: true, size: 28, color: "EA580C" })], heading: HeadingLevel.HEADING_1, alignment: AlignmentType.CENTER, spacing: { after: 300 } }));
                    
                    dataToExport.forEach((q, idx) => {
                        let ansText = q.type === 'sa' ? q.correctAnswer : (q.type === 'tf' ? (q.correctAnswer === 0 ? "Đúng" : "Sai") : String.fromCharCode(65 + parseInt(q.correctAnswer || 0)));
                        docChildren.push(new Paragraph({ children: [ new TextRun({ text: `Câu ${idx + 1}: `, bold: true, color: "EA580C" }), new TextRun({ text: `Đáp án: ${ansText}`, bold: true }) ], spacing: { before: 100 } }), new Paragraph({ children: [new TextRun({ text: "Giải thích: ", italics: true }), new TextRun(q.explanation)], spacing: { after: 200 } }));
                    });
                }
                const doc = new Document({ sections: [{ children: docChildren }] });
                return await Packer.toBlob(doc);
            };

            // --- HÀM XỬ LÝ TRỘN VÀ NÉN ZIP ---
            // --- HÀM XỬ LÝ TRỘN + ZIP + EXCEL TỔNG HỢP ---
            const processMixing = async (config) => {
                if (config.useZip && !window.JSZip) return alert("Chưa tải xong thư viện ZIP!");
                if (!window.XLSX) return alert("Chưa tải xong thư viện Excel!"); // Kiểm tra thư viện mới

                setShowMixModal(false);
                setLoadingMsg("Đang trộn đề, tạo Word và Excel...");
                setWizardStep(3); // Hiện màn hình loading

                try {
                    const zip = config.useZip ? new window.JSZip() : null;
                    const folderName = `Bo_De_${topic ? topic.replace(/\s+/g, '_') : 'Moi'}`;
                    const folder = zip ? zip.folder(folderName) : null;
                    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
                    
                    // Logic gom nhóm Đ/S
                    const groupTF = (list) => {
                        const g = {};
                        list.forEach(q => { const k = (q.question.match(/Câu\s+(\d+)/i)||[])[1] || "r_"+Math.random(); if(!g[k]) g[k]=[]; g[k].push(q); });
                        return Object.values(g);
                    };

                    const mc = questions.filter(q=>q.type==='mc');
                    const sa = questions.filter(q=>q.type==='sa');
                    const tf = questions.filter(q=>q.type==='tf');
                    
                    // --- MẢNG CHỨA DỮ LIỆU ĐỂ XUẤT EXCEL ---
                    const allAnswersData = [];

                    for(let i=0; i<config.numVariants; i++) {
                        // 1. Trộn đề
                        let fMC = config.mixMC ? shuffle(mc) : [...mc];
                        let fSA = config.mixSA ? shuffle(sa) : [...sa];
                        let fTF = [];
                        if(config.mixTF_Question || config.mixTF_Items) {
                            let grp = groupTF(tf);
                            if(config.mixTF_Question) grp = shuffle(grp);
                            if(config.mixTF_Items) grp = grp.map(x=>shuffle(x));
                            fTF = grp.flat();
                        } else fTF = [...tf];

                        const mixed = [...fMC, ...fTF, ...fSA];
                        const code = 101 + i;
                        
                        // 2. Thu thập đáp án vào bảng Excel tổng hợp
                        const rowData = { "Mã Đề": code };
                        mixed.forEach((q, idx) => {
                             let ansVal = "";
                             if (q.type === 'sa') ansVal = q.correctAnswer;
                             else if (q.type === 'tf') ansVal = q.correctAnswer === 0 ? "Đ" : "S";
                             else ansVal = String.fromCharCode(65 + parseInt(q.correctAnswer || 0));
                             
                             // Tạo cột: Câu 01, Câu 02...
                             const colName = `Câu ${String(idx + 1).padStart(2, '0')}`;
                             rowData[colName] = ansVal;
                        });
                        allAnswersData.push(rowData);
                        
                        // 3. Tạo file Word Đề Thi
                        const examBlob = await generateDocxBlob(mixed, `(Mã ${code})`, false);
                        const examName = `De_Ma_${code}.docx`;
                        if(zip) folder.file(examName, examBlob);
                        else safeSaveAs(examBlob, examName);

                        // 4. Tạo file Word Đáp Án (Nếu chọn)
                        if(config.exportKey) {
                            const keyBlob = await generateDocxBlob(mixed, `(Mã ${code})`, true);
                            const keyName = `DapAn_Ma_${code}.docx`;
                            if(zip) folder.file(keyName, keyBlob);
                            else safeSaveAs(keyBlob, keyName);
                        }
                        if(!zip) await new Promise(r=>setTimeout(r, 200));
                    }

                    // --- 5. TẠO FILE EXCEL TỔNG HỢP VÀO ZIP ---
                    if (zip && allAnswersData.length > 0) {
                        const worksheet = window.XLSX.utils.json_to_sheet(allAnswersData);
                        const workbook = window.XLSX.utils.book_new();
                        window.XLSX.utils.book_append_sheet(workbook, worksheet, "Dap_An_Tong_Hop");
                        const excelBuffer = window.XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
                        folder.file(`Tong_Hop_Dap_An.xlsx`, excelBuffer);
                    }

                    if(zip) {
                        const content = await zip.generateAsync({type:"blob"});
                        safeSaveAs(content, `${folderName}.zip`);
                        alert("✅ Đã xuất xong: Các file Word và 1 file Excel tổng hợp!");
                    } else alert("✅ Đã tải xong các file!");

                } catch(e) { console.error(e); alert("Lỗi: " + e.message); }
                setWizardStep(4);
            };

            // Hàm tương thích cho nút Xuất Word cũ (nếu còn dùng)

- TOÁN (Đồ thị): "visualType": "graph", "visualData": "x^3 - 3*x" (Chỉ ghi biểu thức Javascript Math theo biến x).
- TOÁN (BBT): "visualType": "variation_table", "visualData": "x: -inf, 0, 2, +inf\\ny': +, 0, -, 0, +\\ny: -inf, 2, -2, +inf" (Đúng 3 dòng chuẩn SGK).
- HÓA (Cấu trúc): "visualType": "chemistry", "visualData": "CC(=O)O" (Chuỗi SMILES chuẩn).

  + Yêu cầu: viewBox="0 0 500 300". Dùng <rect>, <circle>, <line>. Có chú thích trục và số liệu.

  + Font chữ: font-family="sans-serif" font-size="12".
  + Nhãn: Các điểm A, B, C, lực F, v... phải có text rõ ràng.

ĐỊNH DẠNG ĐẦU RA (JSON STRICT):

                                    <div className="text-xs text-slate-500 font-medium flex gap-3">

                                    <Monitor size={18}/> Trình Chiếu

                                    <Download size={18}/> Lưu JSON

                            {/* LEFT SIDEBAR: Navigation Grid */}
