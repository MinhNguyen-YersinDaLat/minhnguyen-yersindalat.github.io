<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Soạn Đề Thi 2025 - Công Cụ Hỗ Trợ Giáo Viên</title>
    <meta name="description" content="Công cụ hỗ trợ giáo viên soạn đề thi chuẩn cấu trúc 2025, tích hợp AI, vẽ đồ thị tự động và xuất file Word chuyên nghiệp.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Import Map for React -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        
        .bg-grid-subtle {
            background-size: 40px 40px;
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .feature-card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(234, 88, 12, 0.15);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'framer-motion';
        import { 
            Zap, FileText, Download, Monitor, 
            Brain, BarChart3, ChevronRight, 
            CheckCircle2, ArrowRight, Menu, X,
            Layout, Image as ImageIcon, Sparkles, GraduationCap,
            LogOut, Lock, Phone, CheckCircle, Copy, CreditCard 
        } from 'lucide-react';

        const APP_LINK = "https://tao-de.web.app";

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenu, setMobileMenu] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'glass-header py-3' : 'bg-transparent py-5'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-orange-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-orange-500/30">
                                TĐ
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-900 leading-none">Tạo Đề Nhanh</h1>
                                <span className="text-[10px] font-medium text-slate-500 uppercase tracking-wider">Education Tools</span>
                            </div>
                        </div>

                        {/* Desktop Menu */}
                        <div className="hidden md:flex items-center gap-8">
                            <a href="#tinh-nang" className="text-sm font-medium text-slate-600 hover:text-orange-600 transition">Tính năng</a>
                            <a href="#quy-trinh" className="text-sm font-medium text-slate-600 hover:text-orange-600 transition">Quy trình</a>
                            <a href="#bang-gia" className="text-sm font-bold text-orange-600 hover:text-orange-700 transition flex items-center gap-1"><Sparkles size={14}/> Nâng cấp Pro</a>
                            <a 
                                href={APP_LINK} 
                                target="_blank"
                                className="bg-slate-900 hover:bg-orange-600 text-white px-5 py-2.5 rounded-full font-semibold text-sm transition-all shadow-lg hover:shadow-orange-500/25 flex items-center gap-2"
                            >
                                Sử dụng ngay <ArrowRight size={16}/>
                            </a>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-slate-600" onClick={() => setMobileMenu(!mobileMenu)}>
                            {mobileMenu ? <X /> : <Menu />}
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {mobileMenu && (
                        <div className="md:hidden bg-white border-t border-slate-100 absolute w-full left-0 top-full shadow-xl">
                            <div className="p-4 flex flex-col gap-4">
                                <a href="#tinh-nang" onClick={() => setMobileMenu(false)} className="text-sm font-medium text-slate-600">Tính năng</a>
                                <a href="#quy-trinh" onClick={() => setMobileMenu(false)} className="text-sm font-medium text-slate-600">Quy trình</a>
                                <a href="#bang-gia" onClick={() => setMobileMenu(false)} className="text-sm font-bold text-orange-600">Nâng cấp Pro</a>
                                <a href={APP_LINK} className="bg-orange-600 text-white p-3 rounded-lg text-center font-bold">Mở Ứng Dụng</a>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden bg-slate-50">
                    <div className="absolute inset-0 bg-grid-subtle opacity-60 z-0"></div>
                    
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="grid lg:grid-cols-2 gap-12 items-center">
                            
                            {/* Left Content */}
                            <motion.div 
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ duration: 0.6 }}
                            >
                                <div className="inline-flex items-center gap-2 bg-orange-100 border border-orange-200 text-orange-800 px-3 py-1 rounded-full text-xs font-bold mb-6">
                                    <Sparkles size={14} /> Chuẩn cấu trúc GDPT 2018
                                </div>
                                <h1 className="text-4xl lg:text-6xl font-extrabold text-slate-900 leading-tight mb-6">
                                    Giải phóng sức lao động <br/>
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600">trong việc soạn đề</span>
                                </h1>
                                <p className="text-lg text-slate-600 mb-8 leading-relaxed">
                                    Công cụ hỗ trợ giáo viên tạo đề Trắc nghiệm, Đúng/Sai và Tự luận. 
                                    Tích hợp AI để sinh câu hỏi, tự động vẽ hình minh họa và xuất bản in Word chuẩn format.
                                </p>
                                
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <a 
                                        href={APP_LINK}
                                        target="_blank"
                                        className="px-8 py-4 bg-orange-600 hover:bg-orange-700 text-white rounded-xl font-bold text-lg shadow-xl shadow-orange-500/20 flex items-center justify-center gap-2 transition-all transform hover:-translate-y-1"
                                    >
                                        <Zap size={20} fill="currentColor"/>
                                        Bắt đầu sử dụng
                                    </a>
                                    <a href="#tinh-nang" className="px-8 py-4 bg-white border border-slate-200 hover:border-orange-200 hover:bg-orange-50 text-slate-700 rounded-xl font-bold text-lg transition-all flex items-center justify-center">
                                        Tìm hiểu thêm
                                    </a>
                                </div>
                                <div className="mt-8 flex items-center gap-4 text-sm text-slate-500">
                                    <div className="flex items-center gap-1"><CheckCircle2 size={16} className="text-green-500"/> Miễn phí</div>
                                    <div className="flex items-center gap-1"><CheckCircle2 size={16} className="text-green-500"/> Không cần cài đặt</div>
                                    <div className="flex items-center gap-1"><CheckCircle2 size={16} className="text-green-500"/> Xuất Word/Excel</div>
                                </div>
                            </motion.div>

                            {/* Right Mockup */}
                            <motion.div 
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.8, delay: 0.2 }}
                                className="relative"
                            >
                                <div className="absolute -inset-1 bg-gradient-to-r from-orange-500 to-amber-500 rounded-2xl blur opacity-20"></div>
                                <div className="relative bg-white rounded-xl shadow-2xl border border-slate-200 overflow-hidden">
                                    {/* App Header Mockup */}
                                    <div className="bg-white border-b border-slate-200 p-3 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 rounded-full bg-red-400"></div>
                                            <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
                                            <div className="w-3 h-3 rounded-full bg-green-400"></div>
                                            <div className="ml-4 h-6 w-px bg-slate-200"></div>
                                            <span className="text-xs font-bold text-slate-500">Bộ đề: Hàm Số Lượng Giác</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="px-3 py-1 bg-blue-50 text-blue-600 rounded text-[10px] font-bold">Xuất Word</div>
                                            <div className="px-3 py-1 bg-purple-50 text-purple-600 rounded text-[10px] font-bold">Trình chiếu</div>
                                        </div>
                                    </div>
                                    
                                    {/* App Body Mockup */}
                                    <div className="flex h-[350px]">
                                        {/* Sidebar */}
                                        <div className="w-16 bg-slate-50 border-r border-slate-200 flex flex-col items-center py-4 gap-2">
                                            {[1,2,3].map(n => (
                                                <div key={n} className={`w-8 h-8 rounded flex items-center justify-center text-xs font-bold ${n===1 ? 'bg-orange-500 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-400'}`}>
                                                    {n}
                                                </div>
                                            ))}
                                            <div className="mt-auto w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center"><Zap size={14}/></div>
                                        </div>

                                        {/* Main Area */}
                                        <div className="flex-1 p-6">
                                            <div className="bg-white border border-orange-100 rounded-lg p-4 shadow-sm mb-4">
                                                <div className="flex justify-between mb-2">
                                                    <span className="text-xs font-bold text-orange-600 uppercase">Câu 1 (Trắc nghiệm)</span>
                                                    <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500">NB</span>
                                                </div>
                                                <p className="text-sm text-slate-800 font-medium mb-3">Hàm số nào sau đây đồng biến trên R?</p>
                                                
                                                {/* Visual Mockup */}
                                                <div className="bg-slate-50 border border-slate-200 rounded h-24 mb-3 flex items-center justify-center relative overflow-hidden">
                                                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#000_1px,transparent_1px)] [background-size:8px_8px]"></div>
                                                    <svg viewBox="0 0 100 40" className="w-32 stroke-orange-500 fill-none stroke-2">
                                                        <path d="M 0 40 Q 50 40 50 20 T 100 0" />
                                                    </svg>
                                                    <span className="absolute bottom-1 right-2 text-[8px] text-slate-400">Visual: Desmos API</span>
                                                </div>

                                                <div className="grid grid-cols-2 gap-2">
                                                    <div className="border p-2 rounded text-xs text-slate-500">A. y = x²</div>
                                                    <div className="border border-green-500 bg-green-50 p-2 rounded text-xs text-green-700 font-bold flex justify-between">
                                                        B. y = x³ + x <CheckCircle2 size={12}/>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    </div>
                </section>
            );
        };

        const FeatureCard = ({ icon: Icon, title, desc, color }) => (
            <div className="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm feature-card-hover transition-all h-full">
                <div className={`w-12 h-12 rounded-xl ${color} flex items-center justify-center mb-6`}>
                    <Icon size={24} className="text-white" />
                </div>
                <h3 className="text-lg font-bold text-slate-900 mb-3">{title}</h3>
                <p className="text-slate-500 text-sm leading-relaxed">{desc}</p>
            </div>
        );

        const Features = () => {
            const features = [
                {
                    icon: Brain,
                    color: "bg-gradient-to-br from-purple-500 to-indigo-600",
                    title: "AI Soạn Đề Tự Động",
                    desc: "Nhập chủ đề và AI Gemini sẽ tạo câu hỏi theo chuẩn Bloom (NB, TH, VD, VDC) và định dạng JSON để xử lý."
                },
                {
                    icon: ImageIcon,
                    color: "bg-gradient-to-br from-orange-500 to-red-500",
                    title: "Visual Hóa Tự Động",
                    desc: "Điểm đặc biệt nhất: Tự động vẽ Đồ thị (Desmos), Bảng biến thiên, Cấu trúc Hóa học và Sơ đồ tư duy ngay trong đề."
                },
                {
                    icon: FileText,
                    color: "bg-gradient-to-br from-blue-500 to-cyan-500",
                    title: "Xuất Word Chuyên Nghiệp",
                    desc: "Xuất file .docx với format chuẩn để in ấn. Tách riêng đề thi và phần lời giải chi tiết phía sau."
                },
                {
                    icon: Monitor,
                    color: "bg-gradient-to-br from-emerald-500 to-teal-500",
                    title: "Chế Độ Trình Chiếu",
                    desc: "Biến bộ đề thành Slide bài giảng với công cụ che/hiện đáp án, kính lúp phóng to hình ảnh và đồng hồ đếm ngược."
                },
                {
                    icon: Layout,
                    color: "bg-gradient-to-br from-pink-500 to-rose-500",
                    title: "Đa Dạng Loại Câu Hỏi",
                    desc: "Hỗ trợ đầy đủ 3 dạng thức thi 2025: Trắc nghiệm 4 lựa chọn, Đúng/Sai (Câu chùm) và Trả lời ngắn."
                },
                {
                    icon: Download,
                    color: "bg-gradient-to-br from-slate-600 to-slate-800",
                    title: "Trộn Đề & Xuất Excel",
                    desc: "Tự động đảo câu hỏi để tạo nhiều mã đề. Xuất file Excel tổng hợp đáp án (Key) để chấm thi nhanh."
                }
            ];

            return (
                <section id="tinh-nang" className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <span className="text-orange-600 font-bold tracking-wider text-sm uppercase">Tính năng nổi bật</span>
                            <h2 className="text-3xl font-bold text-slate-900 mt-2">Mọi công cụ giáo viên cần</h2>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {features.map((f, i) => <FeatureCard key={i} {...f} />)}
                        </div>
                    </div>
                </section>
            );
        };

        const HowItWorks = () => {
            return (
                <section id="quy-trinh" className="py-24 bg-slate-50 border-t border-slate-200">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid lg:grid-cols-2 gap-16 items-center">
                            <div>
                                <h2 className="text-3xl font-bold text-slate-900 mb-6">Quy trình đơn giản hóa</h2>
                                <div className="space-y-8">
                                    <div className="flex gap-4">
                                        <div className="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold shrink-0">1</div>
                                        <div>
                                            <h3 className="font-bold text-slate-900 mb-1">Nhập chủ đề hoặc Prompt</h3>
                                            <p className="text-sm text-slate-600">Sử dụng AI để sinh câu hỏi hoặc nhập thủ công từ file JSON có sẵn.</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold shrink-0">2</div>
                                        <div>
                                            <h3 className="font-bold text-slate-900 mb-1">Biên tập & Visual hóa</h3>
                                            <p className="text-sm text-slate-600">Chỉnh sửa nội dung. Hệ thống tự động nhận diện công thức Toán (LaTeX) và vẽ hình tương ứng.</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold shrink-0">3</div>
                                        <div>
                                            <h3 className="font-bold text-slate-900 mb-1">Xuất bản</h3>
                                            <p className="text-sm text-slate-600">Tải về file Word (.docx) để in ấn hoặc sử dụng chế độ Trình chiếu trên lớp.</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-10">
                                    <a href={APP_LINK} target="_blank" className="text-orange-600 font-bold hover:text-orange-700 inline-flex items-center gap-2">
                                        Thử ngay bây giờ <ArrowRight size={16}/>
                                    </a>
                                </div>
                            </div>
                            
                            {/* Graphic Right */}
                            <div className="relative">
                                <div className="absolute inset-0 bg-gradient-to-tr from-orange-200 to-amber-100 rounded-3xl transform rotate-3"></div>
                                <div className="relative bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                                    <div className="space-y-4">
                                        {/* Fake Prompt UI */}
                                        <div className="flex gap-3">
                                            <div className="w-8 h-8 bg-orange-100 rounded-full flex items-center justify-center text-orange-600"><Zap size={16}/></div>
                                            <div className="bg-slate-100 p-3 rounded-2xl rounded-tl-none text-xs text-slate-600 w-3/4">
                                                Tạo 5 câu trắc nghiệm về "Hàm số mũ" mức độ Vận dụng. Kèm đồ thị.
                                            </div>
                                        </div>
                                        {/* Fake Response UI */}
                                        <div className="flex gap-3 flex-row-reverse">
                                            <div className="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600"><Brain size={16}/></div>
                                            <div className="bg-blue-50 p-3 rounded-2xl rounded-tr-none text-xs text-slate-700 w-3/4 border border-blue-100">
                                                Đã tạo xong! Dữ liệu bao gồm 5 câu hỏi và mã vẽ đồ thị Desmos tương ứng.
                                                <div className="mt-2 bg-white p-2 rounded border border-blue-200 flex items-center gap-2 text-blue-600 font-bold">
                                                    <Download size={14}/> Download_De_Thi.docx
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const PricingSection = () => {
            const [copied, setCopied] = useState(false);

            // BANK INFO CONSTANTS (Từ file Paywall.tsx)
            const BANK_INFO = {
                BANK_ID: 'VIETCOMBANK', 
                ACCOUNT_NO: '0561000544968',
                ACCOUNT_NAME: 'THÁI MINH NGUYÊN',
                AMOUNT: 50000, 
                // Default content for generic QR
                CONTENT_DISPLAY: 'KH [Email_Của_Bạn]',
                CONTENT_QR: 'TAODE_PRO' 
            };

            const qrUrl = `https://img.vietqr.io/image/${BANK_INFO.BANK_ID}-${BANK_INFO.ACCOUNT_NO}-compact2.png?amount=${BANK_INFO.AMOUNT}&addInfo=${encodeURIComponent(BANK_INFO.CONTENT_QR)}&accountName=${encodeURIComponent(BANK_INFO.ACCOUNT_NAME)}`;

            const handleCopy = (text) => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const benefits = [
                "Soạn đề và trình chiếu nhanh chóng tự động hoặc bán tự động",
                "Trình chiếu kết hợp mini game (Đua thú, Gắp quà...)",
                "Xuất đề file word và đáp án chi tiết",
                "Lưu trữ qua tài khoản google",
                "Hỗ trợ kỹ thuật qua zalo 0924.336.827"
            ];

            return (
                <section id="bang-gia" className="py-24 bg-slate-900 relative overflow-hidden">
                     {/* Background decoration */}
                    <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none text-white"><Lock size={400}/></div>
                    
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <motion.div 
                            initial={{scale: 0.95, opacity: 0}} 
                            whileInView={{scale: 1, opacity: 1}}
                            viewport={{ once: true }}
                            className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]"
                        >
                            {/* CỘT TRÁI: GIÁ TRỊ SẢN PHẨM (SALES) */}
                            <div className="md:w-5/12 bg-slate-50 p-8 md:p-12 flex flex-col justify-center border-r border-slate-100">
                                <div className="mb-8">
                                    <span className="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-black uppercase tracking-wider mb-4 inline-block border border-orange-200">
                                        Thành viên Premium
                                    </span>
                                    <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-2 leading-tight">
                                        Nâng cấp lên <span className="text-orange-600">PRO</span>
                                    </h2>
                                    <p className="text-slate-500 text-lg">ỦNG HỘ TÁC GIẢ.</p>
                                </div>

                                <div className="space-y-5 mb-8">
                                    {benefits.map((item, idx) => (
                                        <div key={idx} className="flex items-start gap-3 text-slate-700 font-medium">
                                            <div className="p-1 bg-green-100 rounded-full text-green-600 mt-0.5"><CheckCircle size={16}/></div>
                                            <span className="text-sm md:text-base">{item}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-auto pt-6 border-t border-slate-200">
                                    <a 
                                        href={APP_LINK}
                                        className="text-slate-500 hover:text-orange-600 font-bold text-sm flex items-center gap-2 transition"
                                    >
                                        <LogOut size={16} className="rotate-180"/> Quay lại ứng dụng
                                    </a>
                                </div>
                            </div>

                            {/* CỘT PHẢI: THANH TOÁN (PAYMENT) */}
                            <div className="md:w-7/12 p-8 md:p-12 flex flex-col items-center justify-center bg-white relative">
                                <div className="text-center mb-6 relative z-10">
                                    <h3 className="text-xl font-bold text-slate-800 uppercase flex items-center justify-center gap-2">
                                        <CreditCard size={20} className="text-blue-600"/> Thông tin chuyển khoản
                                    </h3>
                                    <p className="text-sm text-slate-500 mt-1">Quét mã QR để kích hoạt (nếu chưa liên hệ zalo 0924.336.827)</p>
                                </div>

                                {/* QR CODE & BANK INFO */}
                                <div className="bg-white p-6 rounded-3xl shadow-[0_10px_40px_-15px_rgba(0,0,0,0.1)] border border-slate-100 w-full max-w-sm relative z-10">
                                    {/* Ảnh QR tự sinh */}
                                    <div className="aspect-square bg-slate-100 rounded-xl mb-6 overflow-hidden relative group">
                                        <img src={qrUrl} alt="VietQR" className="w-full h-full object-contain mix-blend-multiply" />
                                        <div className="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span className="bg-white px-3 py-1 rounded-full text-xs font-bold shadow-sm">Quét bằng App Ngân hàng</span>
                                        </div>
                                    </div>

                                    {/* Thông tin Text */}
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-200">
                                            <div className="text-left">
                                                <div className="text-[10px] text-slate-400 uppercase font-bold">Số tài khoản</div>
                                                <div className="font-mono font-bold text-lg text-slate-800">{BANK_INFO.ACCOUNT_NO}</div>
                                            </div>
                                            <button onClick={() => handleCopy(BANK_INFO.ACCOUNT_NO)} className="p-2 hover:bg-white rounded-lg text-blue-600 transition">
                                                {copied ? <CheckCircle size={20}/> : <Copy size={20}/>}
                                            </button>
                                        </div>

                                        <div className="flex justify-between items-center px-2">
                                            <span className="text-sm text-slate-500">Chủ TK:</span>
                                            <span className="font-bold text-slate-800 uppercase">{BANK_INFO.ACCOUNT_NAME}</span>
                                        </div>
                                        <div className="flex justify-between items-center px-2">
                                            <span className="text-sm text-slate-500">Nội dung:</span>
                                            <span className="font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded text-xs md:text-sm">{BANK_INFO.CONTENT_DISPLAY}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* NÚT LIÊN HỆ */}
                                <div className="mt-8 w-full max-w-sm relative z-10">
                                    <a 
                                        href="https://zalo.me/0924336827" 
                                        target="_blank" 
                                        rel="noreferrer" 
                                        className="flex items-center justify-center gap-2 w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/30 transition-all transform hover:-translate-y-1"
                                    >
                                        <Phone size={20}/> Xác nhận qua Zalo (0924.336.827)
                                    </a>
                                    <p className="text-center text-xs text-slate-400 mt-3">
                                        <span className="text-red-500">*</span> Liên hệ zalo 0924.336.827 để được hỗ trợ nhanh nhất.
                                    </p>
                                </div>
                            </div>
                        </motion.div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer id="tac-gia" className="bg-slate-900 text-white py-12 border-t border-slate-800">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <div className="flex items-center gap-2 mb-2">
                                <div className="w-8 h-8 bg-orange-600 rounded flex items-center justify-center font-bold">TĐ</div>
                                <span className="font-bold text-lg">Tạo Đề Nhanh</span>
                            </div>
                            <p className="text-slate-400 text-sm">Công cụ hỗ trợ giáo viên 4.0</p>
                        </div>
                        
                        <div className="text-center md:text-right">
                            <div className="flex items-center justify-center md:justify-end gap-2 text-orange-400 font-bold mb-1">
                                <GraduationCap size={20}/>
                                <span>Thầy Thái Minh Nguyên</span>
                            </div>
                            <p className="text-slate-500 text-sm">Trường TH, THCS & THPT Yersin Đà Lạt</p>
                        </div>
                    </div>
                    <div className="border-t border-slate-800 mt-8 pt-8 text-center text-slate-600 text-xs">
                        &copy; 2025 Tao De Nhanh. All rights reserved.
                    </div>
                </div>
            </footer>
        );

        const LandingPage = () => {
            return (
                <div className="antialiased">
                    <Navbar />
                    <Hero />
                    <Features />
                    <HowItWorks />
                    <PricingSection />
                    <Footer />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<LandingPage />);
    </script>
</body>
</html>
