                                )}

                                {/* NEW: EXPORT DOCX BUTTON */}
                                <button onClick={handleExportDocx} className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 transition shadow-sm ml-2">
                                    <FileType2 size={18}/> Xuất Word
                                </button>

                                <button onClick={handleExportQuestions} className="bg-white border-2 border-slate-200 hover:border-orange-400 text-slate-700 hover:text-orange-600 px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 transition shadow-sm ml-2">
                                    <Download size={18}/> Lưu JSON
                                </button>
                                <button onClick={handleStartGame} className="bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 text-white px-6 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow-lg transition transform hover:-translate-y-0.5">
                                    <Play size={18} fill="currentColor"/> BẮT ĐẦU
                                </button>
                            </div>
                        </div>

                        {/* 2. Main Content (Master-Detail Layout) */}
                        <div className="flex flex-1 overflow-hidden">
                            
                            {/* LEFT SIDEBAR: Navigation Grid */}
                            <div className="w-80 bg-slate-50 border-r border-slate-200 flex flex-col">
                                <div className="p-4 border-b border-slate-200 bg-slate-100/50">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Mục lục nhanh</h3>
                                    <div className="grid grid-cols-5 gap-2">
                                        {questions.map((q, idx) => (
                                            <button
                                                key={q.id}
                                                onClick={() => setActiveEditId(q.id)}
                                                className={`aspect-square rounded-lg font-bold text-sm flex items-center justify-center transition-all shadow-sm border
                                                    ${activeEditId === q.id 
                                                        ? 'bg-orange-500 text-white border-orange-600 scale-105 ring-2 ring-orange-200 z-10' 
                                                        : 'bg-white text-slate-600 border-slate-200 hover:bg-orange-50 hover:border-orange-300'
                                                    }
                                                `}
                                            >
                                                {idx + 1}
                                            </button>
                                        ))}
                                        <button onClick={handleAddQuestion} className="aspect-square rounded-lg border-2 border-dashed border-slate-300 text-slate-400 hover:text-orange-500 hover:border-orange-400 flex items-center justify-center transition-colors">
                                            <span className="text-xl font-bold">+</span>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 p-4 overflow-y-auto">
                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-100 text-xs text-orange-800">
                                        <div className="font-bold flex items-center gap-1 mb-1"><Info size={14}/> Mẹo:</div>
                                        Chọn số câu hỏi ở trên để chỉnh sửa chi tiết. Bấm dấu + để thêm câu mới.
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT MAIN: Detail Edit Form */}
                            <div className="flex-1 bg-slate-100/50 overflow-y-auto p-8">
                                {activeQ && (
                                    <motion.div 
                                        key={activeQ.id} // Key ensures remount animation on switch
                                        initial={{opacity: 0, x: 20}} 
                                        animate={{opacity: 1, x: 0}}
                                        transition={{duration: 0.2}}
                                        className="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"
                                    >
                                        <div className="bg-slate-50 border-b border-slate-200 p-4 flex justify-between items-center">
                                            <span className="font-black text-slate-300 text-4xl">#{activeQ.id + 1}</span>
                                            <button onClick={() => handleDeleteQuestion(activeQ.id)} className="text-slate-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition" title="Xóa câu này"><Trash2 size={20}/></button>
                                        </div>

                                        <div className="p-8 space-y-8">
                                            {/* Question Content */}
                                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Nội dung câu hỏi</label>
                                                    <textarea 
                                                        value={activeQ.question} 
                                                        onChange={(e) => handleQuestionChange(activeQ.id, 'question', e.target.value)} 
                                                        className="w-full p-4 border border-slate-300 rounded-xl min-h-[160px] text-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none shadow-inner transition-all"
                                                        placeholder="Nhập câu hỏi tại đây..."
                                                    />
                                                    <div className="text-sm bg-slate-50 p-3 rounded-lg text-slate-600 border border-slate-200 mt-2">
                                                        <span className="font-bold text-xs text-slate-400 uppercase mr-2">Preview:</span> 
                                                        <MathContent content={activeQ.question} />
                                                    </div>
                                                </div>

                                                {/* Visual Editor */}
                                                <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                    <div className="flex flex-col gap-2">
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Loại minh họa</label>
                                                        <select value={activeQ.visualType} onChange={(e) => handleQuestionChange(activeQ.id, 'visualType', e.target.value)} className="p-3 border border-slate-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-orange-400 outline-none w-full shadow-sm">
                                                            <option value="none">Không có</option>
                                                            <option value="graph">Đồ thị Toán học</option>
                                                            <option value="variation_table">Bảng biến thiên</option>
                                                            <option value="chemistry">Cấu trúc Hóa học</option>
                                                            <option value="mermaid">Sơ đồ tư duy (Mermaid)</option>
                                                            <option value="table">Bảng Số Liệu</option>
                                                            <option value="svg">Hình vẽ SVG / Ảnh</option>
                                                        </select>
                                                    </div>
                                                    
                                                    {activeQ.visualType !== 'none' && (
                                                        <>
                                                            <div className="flex flex-col gap-2">
                                                                <label className="text-xs font-bold text-orange-600 uppercase flex items-center gap-1"><Copy size={14}/> Dữ liệu Visual (JSON/Code)</label>
                                                                <textarea 
                                                                    value={activeQ.visualData} 
                                                                    onChange={(e) => handleQuestionChange(activeQ.id, 'visualData', e.target.value)} 
                                                                    className="w-full p-3 border border-orange-200 rounded-lg bg-orange-50/30 text-xs font-mono focus:ring-2 focus:ring-orange-400 outline-none resize-y min-h-[80px]" 
                                                                    placeholder="Nhập mã dữ liệu tương ứng..."
                                                                />
                                                            </div>
                                                            <div className="bg-white p-2 rounded-lg border border-slate-200 shadow-sm flex justify-center min-h-[150px] items-center">
                                                                <VisualContent type={activeQ.visualType} data={activeQ.visualData} />
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Options */}
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Đáp án (Chọn đáp án đúng)</label>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {activeQ.options.map((opt, oIdx) => (
                                                        <div key={oIdx} onClick={()=>handleQuestionChange(activeQ.id,'correctAnswer',oIdx)} className={`cursor-pointer flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${activeQ.correctAnswer===oIdx ? 'border-green-500 bg-green-50 shadow-md' : 'border-transparent bg-slate-50 hover:bg-slate-100'}`}>
                                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${activeQ.correctAnswer===oIdx ? 'bg-green-500 text-white' : 'bg-slate-300 text-slate-600'}`}>
                                                                {String.fromCharCode(65+oIdx)}
                                                            </div>
                                                            <input 
                                                                type="text" 
                                                                value={opt} 
                                                                onChange={(e)=>{e.stopPropagation(); handleOptionChange(activeQ.id,oIdx,e.target.value)}} 
                                                                className={`flex-1 bg-transparent outline-none font-medium ${activeQ.correctAnswer===oIdx ? 'text-green-800' : 'text-slate-700'}`}
                                                            />
                                                            {activeQ.correctAnswer===oIdx && <Check size={18} className="text-green-600"/>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Explanation */}
                                            <div className="pt-6 border-t border-dashed border-slate-300">
                                                <label className="text-sm font-bold text-slate-600 uppercase mb-3 flex items-center gap-2"><Lightbulb size={18}/> Giải thích chi tiết</label>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <textarea value={activeQ.explanation} onChange={(e)=>handleQuestionChange(activeQ.id,'explanation',e.target.value)} className="w-full p-4 border border-yellow-200 rounded-xl min-h-[120px] bg-yellow-50/30 focus:ring-2 focus:ring-yellow-400 outline-none text-slate-700 font-mono text-sm shadow-inner" placeholder="Nhập lời giải chi tiết (hỗ trợ LaTeX)..."/>
                                                    <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 min-h-[120px] max-h-[300px] overflow-y-auto">
                                                        <div className="text-xs text-yellow-600 uppercase mb-2 font-bold opacity-70">Xem trước hiển thị:</div>
                                                        {/* ADDED className="whitespace-pre-wrap" to preserve line breaks in preview */}
                                                        <div className="prose prose-sm max-w-none"><MathContent content={activeQ.explanation || "Chưa có giải thích"} className="whitespace-pre-wrap" /></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>

                        {/* Floating Action Button */}
                        <button 
                            onClick={() => setShowHelperTools(true)}
                            className="absolute bottom-6 right-8 z-50 bg-gradient-to-r from-orange-500 to-amber-600 text-white p-3 pr-5 pl-4 rounded-full shadow-2xl hover:scale-105 transition-transform border-2 border-white/20 group flex items-center gap-2"
                        >
                            <Wand2 size={24} className="group-hover:rotate-12 transition-transform"/>
                            <span className="font-bold text-sm">Trợ lý AI</span>
                        </button>

                        {/* Helper Modal (RESTORED) */}
                        {showHelperTools && (
                            <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                                <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} className="bg-slate-100 max-w-6xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
                                    <div className="bg-gradient-to-r from-orange-500 to-amber-600 p-5 flex justify-between items-center text-white">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Wand2/> TRỢ LÝ SOẠN THẢO</h2>
                                        <button onClick={() => setShowHelperTools(false)} className="hover:bg-white/20 p-2 rounded-full transition"><X size={24}/></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto bg-slate-200/50 grid grid-cols-1 lg:grid-cols-2 gap-6 flex-1">
                                         <PromptHelper />
                                         <ImageCodeGenerator />
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </motion.div>
                );
            };

            // --- STEP 5: PLAYING (IMPROVED UI & BACK BUTTON) ---
            const renderPlaying = () => (
                <div className="flex flex-col h-screen overflow-hidden relative">
                    {/* Header Bar */}
                    <div className="bg-white/90 backdrop-blur-sm px-6 py-3 border-b border-slate-200 flex justify-between items-center shadow-sm z-40">
                        <button onClick={() => setWizardStep(4)} className="flex items-center gap-2 text-slate-600 hover:text-orange-600 font-bold transition">
                            <ArrowLeft size={20}/> <span className="hidden sm:inline">Quay lại Chỉnh sửa</span>
                        </button>
                        
                        <div className="flex flex-col items-center">
                            <div className="text-xs text-slate-400 font-bold uppercase tracking-wider">Tiến độ ôn tập</div>
                            <div className="flex items-center gap-2">
                                <div className="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-green-500 transition-all duration-500" style={{width: `${(boardCards.filter(c=>c.status==='solved').length / boardCards.length) * 100}%`}}></div>
                                </div>
                                <span className="text-sm font-bold text-slate-700">{boardCards.filter(c=>c.status==='solved').length}/{boardCards.length}</span>
                            </div>
                        </div>

                        <button onClick={toggleFullscreen} className="p-2 rounded-full shadow-sm hover:bg-slate-100 text-slate-600 transition">
                            {isFullscreen ? <Minimize size={20}/> : <Maximize size={20}/>}
                        </button>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto flex items-center justify-center bg-slate-50/50">
                        {activeCard ? (
                            <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 transition-colors duration-500">
                                <motion.div initial={{scale:0.95, opacity:0}} animate={{scale:1, opacity:1}} className="rounded-3xl shadow-2xl overflow-hidden flex flex-col transition-all duration-500 bg-white/95 glass-panel w-[95%] max-w-[1920px] h-[95vh] border-4 border-orange-500 relative">
                                    
                                    {/* Modal Header */}
                                    <div className="bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-4 flex justify-between items-center shadow-md text-white z-10">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-white/20 px-3 py-1 rounded-lg text-sm font-bold backdrop-blur-sm">Câu hỏi</span>
                                        </div>
                                        <button onClick={() => { setActiveCard(null); setShowAnswer(false); }} className="bg-white/20 hover:bg-white/40 p-2 rounded-full transition text-white">
                                            <X size={24}/>
                                        </button>
                                    </div>

                                    <div className="p-8 overflow-y-auto flex-1 bg-slate-50/50 flex flex-col lg:flex-row gap-8 relative">
                                        {/* Left Column: Content */}
                                        <div className="flex-1 flex flex-col">
                                            {/* UPDATE: Increased font size for Desktop (lg:text-5xl) */}
                                            <div className="text-3xl lg:text-5xl text-slate-800 leading-snug font-bold mb-10">
                                                <MathContent content={activeCard.question} />
                                            </div>
                                            
                                            <div className="grid gap-4 lg:gap-6 mt-auto grid-cols-1 lg:grid-cols-2">
                                                {activeCard.options.map((opt, i) => (
                                                    <button key={i} disabled={showAnswer} onClick={() => handleAnswerSelect(i === activeCard.correctAnswer)}
                                                        className={`
                                                            p-6 lg:p-8 rounded-2xl border-2 text-left transition-all flex items-center gap-6 lg:gap-8 shadow-sm group
                                                            text-xl lg:text-3xl hover:border-orange-400 border-slate-200 text-slate-800
                                                            ${showAnswer 
                                                                ? (i===activeCard.correctAnswer ? 'bg-green-600 border-green-500 text-white shadow-md' : 'opacity-40 bg-slate-100') 
                                                                : 'bg-white hover:bg-orange-50'
                                                            }
                                                        `}>
                                                        {/* UPDATE: Larger circle for letter options */}
                                                        <span className={`font-bold w-12 h-12 lg:w-16 lg:h-16 flex items-center justify-center rounded-full flex-shrink-0 text-xl lg:text-2xl transition-colors ${showAnswer && i===activeCard.correctAnswer ? 'bg-white text-green-600' : 'bg-slate-100 text-slate-600 group-hover:bg-white'}`}>{String.fromCharCode(65+i)}</span>
                                                        <div className="flex-1 font-medium leading-relaxed"><MathContent content={opt}/></div>
                                                        {showAnswer && i === activeCard.correctAnswer && <Check className="text-white w-8 h-8 lg:w-10 lg:h-10"/>}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Right Column: Visuals (If present) */}
                                        {activeCard.visualType !== 'none' && (
                                            <div className="lg:w-1/2 flex items-center justify-center border-l border-slate-200 lg:pl-8 py-4 bg-white/50 lg:bg-transparent rounded-2xl lg:rounded-none">
                                                <div className="w-full flex justify-center">
                                                     <VisualContent type={activeCard.visualType} data={activeCard.visualData} />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* Modal Footer with Back Button */}
                                    <div className="bg-white border-t border-slate-200 p-4 flex justify-between items-center">
                                        <button onClick={() => { setActiveCard(null); setShowAnswer(false); }} className="text-slate-500 hover:text-slate-800 font-bold text-sm flex items-center gap-2 px-4 py-2 hover:bg-slate-100 rounded-lg transition">
                                            <ArrowLeft size={16}/> Chọn câu khác
                                        </button>
                                        {showAnswer && (
                                            <div className="text-green-600 font-bold animate-pulse text-lg">Đang xem kết quả...</div>
                                        )}
                                    </div>

                                </motion.div>
                            </div>
                        ) : (
                            <div className="w-[95%] max-w-[1920px]">
                                <div className="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-6 content-start">
                                    {boardCards.map((card, idx) => (
                                        <motion.button key={idx} 
                                            onClick={() => {
                                                if (card.status === 'hidden') {
                                                    card.status = 'active'; setActiveCard(card.question); setShowAnswer(false);
                                                }
                                            }}
                                            disabled={card.status !== 'hidden'} 
                                            whileHover={{ scale: 1.05 }}
                                            whileTap={{ scale: 0.95 }}
                                            className={`aspect-square rounded-3xl shadow-lg flex items-center justify-center text-4xl font-black transition-all glass-panel relative overflow-hidden
                                            ${card.status === 'solved' 
                                                ? 'bg-slate-200/50 text-slate-300 shadow-none border-transparent cursor-default' 
                                                : 'bg-white text-orange-600 border-b-8 border-orange-200 hover:border-orange-400'
                                            }`}>
                                            {card.status === 'solved' ? <Check size={48}/> : idx+1}
                                            {card.status === 'hidden' && <div className="absolute inset-0 bg-gradient-to-br from-white/0 to-orange-100/30 pointer-events-none"/>}
                                        </motion.button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {showExplanation && activeCard && <ExplanationModal content={activeCard.explanation} onClose={handleExplanationNext} />}
                </div>
            );

            const renderSummary = () => {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-b from-indigo-900 to-purple-900 relative overflow-hidden text-white">
                        <Confetti />
                        <h1 className="text-5xl font-black text-yellow-400 mb-8 uppercase drop-shadow-[0_0_15px_rgba(250,204,21,0.8)] tracking-wide relative z-10 animate-bounce">🏆 HOÀN THÀNH XUẤT SẮC 🏆</h1>
                        <div className="text-2xl text-center max-w-2xl text-slate-200 mb-12 relative z-10">
                            Chúc mừng bạn đã hoàn thành tất cả các câu hỏi ôn tập. Hãy tiếp tục phát huy tinh thần học tập nhé!
                        </div>
                        <div className="flex gap-4 relative z-10"><button onClick={() => setWizardStep(0)} className="bg-white/20 hover:bg-white/30 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 transition"><Home/> Về Trang Chủ</button><button onClick={() => setWizardStep(2)} className="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 transition animate-pulse"><Repeat/> Ôn Tập Lại</button></div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen font-sans text-slate-800 bg-orange-50 selection:bg-orange-200">
                    {showTutorial && <InstructionModal onClose={() => setShowTutorial(false)} />}
                    {showLibrary && user && <CloudLibraryModal user={user} onClose={() => setShowLibrary(false)} onLoad={handleLoadFromLibrary} />}
                    {showSaveModal && <SaveModal isOpen={showSaveModal} onClose={() => setShowSaveModal(false)} onSave={handleConfirmSave} defaultTopic={topic} />}
                    
                    {wizardStep === 0 && renderIntro()}
                    
                    {/* STEP 0.5: MODE SELECTION */}
                    {wizardStep === 0.5 && renderModeSelection()}

                    {wizardStep > 0 && wizardStep < 5 && (
                        <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-orange-400 to-amber-600">
                            {wizardStep === 1 && renderStep1_Key()}
                            {wizardStep === 2 && renderStep2_Config()}
                            {wizardStep === 3 && <div className="text-center text-white"><Loader2 size={80} className="animate-spin mb-6 mx-auto opacity-80"/><h2 className="text-3xl font-bold">{loadingMsg}</h2></div>}
                            {wizardStep === 4 && renderStep4_Edit()}
                        </div>
                    )}
                    
                    {wizardStep === 5 && renderPlaying()}
                    {wizardStep === 6 && renderSummary()}
                </div>
            );
        };

        // Render React App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
