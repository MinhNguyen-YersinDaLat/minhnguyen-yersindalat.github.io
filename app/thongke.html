<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hỗ trợ Thống kê Toán THPT - Yersin Edition (Teacher Mode)</title>
    
    <!-- Core Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- KaTeX (Toán học chuyên nghiệp) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- Chart.js (Thư viện biểu đồ) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Be Vietnam Pro"', 'sans-serif'] },
                    colors: {
                        yersin: {
                            50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
                            400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412',
                        }
                    },
                    animation: {
                        'float-slow': 'float 10s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0;
            background: radial-gradient(circle at top left, #fff7ed, #ffedd5, #fed7aa);
            font-family: 'Be Vietnam Pro', sans-serif;
            overflow: hidden;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px -10px rgba(249, 115, 22, 0.2);
        }

        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.3); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.6); }

        .floating-icon { position: absolute; color: #f97316; opacity: 0.1; z-index: 0; pointer-events: none; }
        
        /* KaTeX Font Fix & Size Increase */
        .katex { font-size: 1.3rem; }
        .katex-display { margin: 0.5em 0; }
        
        /* Gradient Text Helper */
        .text-gradient-yersin {
            background: linear-gradient(to right, #ea580c, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        /* --- 1. CORE LOGIC (GIỮ NGUYÊN 100%) --- */
        const MathSolver = {
            sum: (arr) => arr.reduce((a, b) => a + b, 0),
            
            solveUngrouped: (data) => {
                const n = data.length;
                const sorted = [...data].sort((a, b) => a - b);
                const sumX = MathSolver.sum(data);
                const mean = sumX / n;

                const sumSqDiff = data.reduce((acc, x) => acc + Math.pow(x - mean, 2), 0);
                const variance = sumSqDiff / n;
                const stdDev = Math.sqrt(variance);

                const median = (arr) => {
                    const len = arr.length;
                    const mid = Math.floor(len / 2);
                    return len % 2 !== 0 ? arr[mid] : (arr[mid - 1] + arr[mid]) / 2;
                };
                const q2 = median(sorted);
                const lowerHalf = n % 2 === 0 ? sorted.slice(0, n/2) : sorted.slice(0, Math.floor(n/2));
                const upperHalf = n % 2 === 0 ? sorted.slice(n/2) : sorted.slice(Math.floor(n/2) + 1);
                const q1 = median(lowerHalf);
                const q3 = median(upperHalf);

                const min = sorted[0];
                const max = sorted[n - 1];
                const range = max - min;
                const iqr = q3 - q1;
                
                const lowerBound = q1 - 1.5 * iqr;
                const upperBound = q3 + 1.5 * iqr;
                const outliers = sorted.filter(x => x < lowerBound || x > upperBound);

                const f = {}; let maxF = 0;
                data.forEach(x => { f[x] = (f[x]||0)+1; if(f[x]>maxF) maxF=f[x]; });
                const modes = maxF > 1 ? Object.keys(f).filter(k => f[k] === maxF).map(Number).sort((a,b)=>a-b) : [];

                return { 
                    type: 'ungrouped', n, sorted, mean, variance, stdDev, 
                    q1, q2, q3, modes,
                    min, max, range, iqr, lowerBound, upperBound, outliers 
                };
            },

            solveGrouped: (rows) => {
                const n = rows.reduce((acc, r) => acc + r.f, 0);
                let cf = 0;
                const processed = rows.map(r => {
                    cf += r.f;
                    return { ...r, c: (r.l + r.r) / 2, cf };
                });

                const sumNC = processed.reduce((acc, r) => acc + r.f * r.c, 0);
                const mean = sumNC / n;

                const sumN_SqDiff = processed.reduce((acc, r) => acc + r.f * Math.pow(r.c - mean, 2), 0);
                const variance = sumN_SqDiff / n;
                const stdDev = Math.sqrt(variance);

                const findQ = (k) => {
                    const pos = (k * n) / 4;
                    const group = processed.find(r => r.cf >= pos);
                    if (!group) return { val: 0, l: 0, r: 0, f: 0, prevCF: 0 };
                    const prevCF = processed[processed.indexOf(group) - 1]?.cf || 0;
                    const val = group.l + ((pos - prevCF) / group.f) * (group.r - group.l);
                    return { val, group, pos, prevCF };
                };
                const q1Obj = findQ(1), q2Obj = findQ(2), q3Obj = findQ(3);

                // --- FIX: RANGE CALCULATION ---
                // Chỉ lấy các nhóm có tần số > 0 để xác định Min, Max
                const nonZeroGroups = processed.filter(g => g.f > 0);
                
                // Mặc định lấy nhóm đầu/cuối của danh sách đã lọc
                const minBoundary = nonZeroGroups.length > 0 ? nonZeroGroups[0].l : 0;
                const maxBoundary = nonZeroGroups.length > 0 ? nonZeroGroups[nonZeroGroups.length - 1].r : 0;
                
                const range = maxBoundary - minBoundary;
                // ------------------------------

                const iqr = q3Obj.val - q1Obj.val;
                const lowerBound = q1Obj.val - 1.5 * iqr;
                const upperBound = q3Obj.val + 1.5 * iqr;

                const maxF = Math.max(...processed.map(r => r.f));
                const modeGroups = processed.filter(r => r.f === maxF);
                const modeResults = modeGroups.map(g => {
                    const idx = processed.indexOf(g);
                    const prev = processed[idx - 1]?.f || 0;
                    const next = processed[idx + 1]?.f || 0;
                    const d1 = g.f - prev;
                    const d2 = g.f - next;
                    const val = d1+d2 === 0 ? g.l : g.l + (d1 / (d1 + d2)) * (g.r - g.l);
                    return { val, group: g, d1, d2 };
                });

                return { 
                    type: 'grouped', n, data: processed, mean, variance, stdDev, 
                    q1: q1Obj, q2: q2Obj, q3: q3Obj, modes: modeResults,
                    range, iqr, lowerBound, upperBound,
                    minBoundary, maxBoundary 
                };
            }
        };

        /* --- 2. COMPONENTS --- */

        const Latex = ({ children, block = false }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.katex) {
                    const content = children === null || children === undefined ? '' : String(children);
                    try {
                        window.katex.render(content, containerRef.current, {
                            throwOnError: false, displayMode: block, output: 'html'
                        });
                    } catch (e) {
                        console.error('KaTeX Render Error:', e);
                        containerRef.current.textContent = content;
                    }
                }
            }, [children, block]);
            return <span ref={containerRef} className={block ? 'block my-2' : ''} />;
        };

        const Icons = {
            Calculator: () => <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>,
            Chart: () => <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
            Back: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>,
            Trash: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Bolt: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Plus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-12H4" /></svg>,
            Search: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Check: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>,
            X: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
        };

        const FloatingIcons = () => (
            <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
                <div className="floating-icon animate-float-slow" style={{top:'10%', left:'10%'}}><Icons.Calculator /></div>
                <div className="floating-icon animate-float-slow" style={{top:'20%', right:'15%', animationDelay:'2s'}}><Icons.Chart /></div>
                <div className="floating-icon animate-float-slow text-6xl font-serif" style={{bottom:'15%', left:'20%', animationDelay:'4s'}}>Σ</div>
                <div className="floating-icon animate-float-slow text-6xl font-serif" style={{bottom:'25%', right:'10%', animationDelay:'1s'}}>π</div>
            </div>
        );

        /* --- 3. UI HELPERS --- */
        
        const Card = ({ title, children, className = "" }) => (
            <div className={`bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden mb-8 ${className}`}>
                {title && <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 font-bold text-slate-800 uppercase text-base tracking-wide flex items-center gap-2"><span className="w-2 h-6 bg-yersin-500 rounded-full"></span>{title}</div>}
                <div className="p-6">{children}</div>
            </div>
        );

        const CasioNote = () => (
            <div className="bg-yellow-50 border-l-8 border-yellow-500 p-5 mb-8 rounded-r-xl shadow-sm">
                <p className="font-bold text-yellow-900 text-base mb-2 flex items-center gap-2"><span className="text-xl">⚠️</span> LƯU Ý CASIO QUAN TRỌNG:</p>
                <p className="text-base text-yellow-800 leading-relaxed">
                    Kết quả dưới đây là <b>Phương sai tổng thể</b> (<Latex>\sigma^2_x</Latex>) và <b>Độ lệch chuẩn tổng thể</b> (<Latex>\sigma_x</Latex>).
                    Trên máy tính cầm tay, hãy chọn đúng ký hiệu <Latex>\sigma</Latex>, TUYỆT ĐỐI KHÔNG dùng <Latex>s</Latex> (phương sai mẫu hiệu chỉnh).
                </p>
            </div>
        );

        const SolutionStep = ({ title, formula, sub, result, resultSymbol, note, verbal }) => (
            <div className="mb-8 last:mb-0 border-b border-slate-100 pb-8">
                <h4 className="font-bold text-slate-800 text-lg mb-4 flex items-center gap-2">
                    <span className="w-3 h-3 bg-yersin-500 rounded-full"></span>
                    {title}
                </h4>
                {verbal && (
                    <div className="mb-4 text-slate-700 text-base leading-relaxed text-justify bg-slate-50 p-4 rounded-xl border border-slate-100">
                        {verbal}
                    </div>
                )}
                <div className="pl-0 md:pl-6 space-y-4">
                    {formula && (
                        <div>
                            <span className="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1 block">Công thức:</span>
                            <div className="bg-white border border-slate-200 rounded-lg p-2 overflow-x-auto">
                                <Latex block>{formula}</Latex>
                            </div>
                        </div>
                    )}
                    {sub && (
                        <div>
                            <span className="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1 block">Thay số:</span>
                            <div className="bg-white border border-slate-200 rounded-lg p-2 overflow-x-auto">
                                <Latex block>{sub}</Latex>
                            </div>
                        </div>
                    )}
                    <div className="mt-4 bg-yersin-50 p-5 rounded-2xl border border-yersin-200 flex flex-col sm:flex-row items-start sm:items-center gap-4 shadow-sm">
                        <span className="text-yersin-800 font-bold text-base uppercase whitespace-nowrap">Kết quả:</span>
                        <div className="text-2xl font-bold text-slate-900">
                             <Latex>{`${resultSymbol} \\approx ${parseFloat(result.toFixed(4))}`}</Latex>
                        </div>
                    </div>
                    {note && <div className="text-sm text-slate-500 italic mt-2 flex gap-2 items-center"><span className="text-lg">💡</span> {note}</div>}
                </div>
            </div>
        );

        /* --- 4. VIEWS --- */

        const OutlierChecker = ({ q1, q3, iqr, lowerBound, upperBound }) => {
            const [checkVal, setCheckVal] = useState('');
            const [checkResult, setCheckResult] = useState(null);

            const handleCheck = () => {
                const x = parseFloat(checkVal);
                if (isNaN(x)) return alert("Vui lòng nhập số hợp lệ!");
                
                const isOutlier = x < lowerBound || x > upperBound;
                setCheckResult({ x, isOutlier });
            };

            return (
                <div className="mt-8 bg-white p-6 rounded-2xl border-2 border-dashed border-slate-300">
                    <h5 className="font-bold text-slate-800 text-lg uppercase mb-4 flex items-center gap-2"><Icons.Search /> Kiểm tra giá trị bất thường</h5>
                    
                    <div className="mb-4">
                        <div className="text-slate-700 mb-2">Giá trị <Latex>x</Latex> là giá trị ngoại lệ nếu:</div>
                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 inline-block text-sm">
                            <Latex>{`x < Q_1 - 1.5\\Delta_Q`}</Latex> hoặc <Latex>{`x > Q_3 + 1.5\\Delta_Q`}</Latex>
                        </div>
                        <div className="mt-2 text-sm text-slate-600">
                            Với <Latex>{`\\Delta_Q = ${parseFloat(iqr.toFixed(4))}`}</Latex>, ta có khoảng bình thường: <Latex>{`[${parseFloat(lowerBound.toFixed(4))}; ${parseFloat(upperBound.toFixed(4))}]`}</Latex>
                        </div>
                    </div>

                    <div className="flex gap-3">
                        <input 
                            type="number" 
                            value={checkVal} 
                            onChange={e => setCheckVal(e.target.value)} 
                            placeholder="Nhập giá trị x cần kiểm tra..."
                            className="flex-1 p-3 rounded-xl border border-slate-300 outline-none focus:border-yersin-500 font-bold"
                        />
                        <button onClick={handleCheck} className="px-6 py-3 bg-yersin-500 text-white font-bold rounded-xl hover:bg-yersin-600 transition-colors">Kiểm tra</button>
                    </div>

                    {checkResult && (
                        <div className={`mt-4 p-4 rounded-xl border ${checkResult.isOutlier ? 'bg-red-50 border-red-200 text-red-800' : 'bg-green-50 border-green-200 text-green-800'} animate-fade-in`}>
                            <div className="font-bold text-lg mb-1 flex items-center gap-2">
                                {checkResult.isOutlier ? <Icons.X /> : <Icons.Check />}
                                {checkResult.isOutlier ? 'LÀ GIÁ TRỊ NGOẠI LỆ' : 'KHÔNG PHẢI GIÁ TRỊ NGOẠI LỆ'}
                            </div>
                            <div className="text-sm">
                                {checkResult.isOutlier 
                                    ? <span>Vì <Latex>{`${checkResult.x} ${checkResult.x < lowerBound ? '<' : '>'} ${checkResult.x < lowerBound ? parseFloat(lowerBound.toFixed(4)) : parseFloat(upperBound.toFixed(4))}`}</Latex></span>
                                    : <span>Vì <Latex>{`${parseFloat(lowerBound.toFixed(4))} \\le ${checkResult.x} \\le ${parseFloat(upperBound.toFixed(4))}`}</Latex></span>
                                }
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const HomeView = ({ onSelect }) => (
            <div className="h-full flex flex-col items-center justify-center p-6 animate-fade-in relative z-10">
                <div className="text-center mb-12">
                    <img src="logo.png" alt="Logo" className="w-32 h-32 mb-6 object-contain animate-float-slow mx-auto drop-shadow-xl" onError={(e) => { e.target.onerror = null; e.target.style.display = 'none'; }} />
                    <h1 className="text-4xl md:text-6xl font-black uppercase tracking-tight mb-4 drop-shadow-sm text-gradient-yersin p-2 leading-tight">Thống kê Toán THPT</h1>
                    <p className="text-xl text-slate-700 font-bold">Thầy Thái Minh Nguyên</p>
                    <p className="text-lg text-slate-600 font-medium mt-1">GV Toán Trường TH, THCS & THPT YERSIN ĐÀ LẠT</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
                    {[
                        { id: 'ungrouped', title: 'Mẫu Đơn', desc: 'Dữ liệu thô (vd: 5, 6, 7)', icon: <Icons.Calculator /> },
                        { id: 'grouped', title: 'Mẫu Ghép Nhóm', desc: 'Bảng khoảng & tần số', icon: <Icons.Chart /> }
                    ].map((item) => (
                        <button key={item.id} onClick={() => onSelect(item.id)} 
                            className="glass-panel rounded-3xl p-8 flex items-center gap-8 hover:scale-[1.02] active:scale-95 transition-all text-left group shadow-lg hover:shadow-2xl hover:shadow-yersin-500/20"
                        >
                            <div className="w-20 h-20 rounded-2xl bg-yersin-100 text-yersin-600 flex items-center justify-center group-hover:bg-yersin-500 group-hover:text-white transition-colors shadow-inner">
                                {item.icon}
                            </div>
                            <div>
                                <h3 className="text-2xl font-bold text-slate-800 mb-1">{item.title}</h3>
                                <p className="text-slate-500 text-lg">{item.desc}</p>
                            </div>
                        </button>
                    ))}
                </div>
                
                {/* --- UPDATE: THÊM NÚT LINK SANG CHẾ ĐỘ NÂNG CAO --- */}
                <div className="mt-10 animate-fade-in" style={{animationDelay: '0.5s'}}>
                    <a href="thongke_nangcao.html" className="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-slate-800 rounded-2xl hover:bg-slate-700 hover:shadow-xl hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900">
                        <span className="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
                        <span className="relative flex items-center gap-3 text-lg">
                            <svg className="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                            Chế độ Nâng cao & Luyện tập
                        </span>
                    </a>
                    <p className="mt-3 text-slate-500 text-sm italic text-center">So sánh 2 mẫu, dữ liệu Đà Lạt & Quiz</p>
                </div>
                {/* -------------------------------------------------- */}
            </div>
        );

        const InputView = ({ mode, onBack, onAnalyze }) => {
            const [textInput, setTextInput] = useState('');
            const [genConfig, setGenConfig] = useState({ u1: '150', h: '5', k: '5' });
            const [ungroupedType, setUngroupedType] = useState('raw'); // 'raw' | 'table'
            const [ungroupedRows, setUngroupedRows] = useState(() => Array.from({length: 5}, () => ({ id: Date.now()+Math.random(), v: '', f: '' })));
            const [rows, setRows] = useState(() => Array.from({length: 5}, () => ({ id: Date.now()+Math.random(), l: '', r: '', f: '' })));
            
            const addRow = () => setRows(p => [...p, { id: Date.now()+Math.random(), l: '', r: '', f: '' }]);
            const removeRow = (id) => setRows(p => p.filter(r => r.id !== id));
            const updateRow = (id, k, v) => setRows(p => p.map(r => r.id===id ? {...r, [k]: v} : r));

            const addUngroupedRow = () => setUngroupedRows(p => [...p, { id: Date.now()+Math.random(), v: '', f: '' }]);
            const removeUngroupedRow = (id) => setUngroupedRows(p => p.filter(r => r.id !== id));
            const updateUngroupedRow = (id, k, v) => setUngroupedRows(p => p.map(r => r.id===id ? {...r, [k]: v} : r));

            const generateTable = () => {
                const u1 = parseFloat(genConfig.u1);
                const h = parseFloat(genConfig.h);
                const k = parseInt(genConfig.k);
                if(isNaN(u1) || isNaN(h) || isNaN(k)) return alert("Vui lòng nhập số hợp lệ!");
                const newRows = [];
                let curr = u1;
                const fixFloat = (n) => parseFloat(n.toFixed(10));
                for(let i=0; i<k; i++) {
                    const next = fixFloat(curr + h);
                    newRows.push({ id: Date.now() + Math.random(), l: curr, r: next, f: '' });
                    curr = next;
                }
                setRows(newRows);
            };

            const handleEnterKey = (e, index, prefix = 'freq') => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextInput = document.getElementById(`${prefix}-${index + 1}`);
                    if (nextInput) {
                        nextInput.focus();
                        nextInput.select();
                    }
                }
            };

            const handleSubmit = () => {
                let data = null;
                if(mode === 'ungrouped') {
                    if (ungroupedType === 'raw') {
                        if(!textInput.trim()) return alert("Chưa nhập dữ liệu!");
                        data = textInput.split(/[\s,]+/).filter(x=>x).map(Number);
                        if(data.some(isNaN)) return alert("Dữ liệu chứa ký tự lạ!");
                    } else {
                        const rawArr = [];
                        const validRows = ungroupedRows.filter(r => r.v !== '' && r.f !== '');
                        if (validRows.length === 0) return alert("Bảng dữ liệu trống!");
                        for(let r of validRows) {
                            const val = parseFloat(r.v);
                            const freq = parseInt(r.f);
                            if(isNaN(val) || isNaN(freq)) return alert("Dữ liệu không hợp lệ!");
                            for(let i=0; i<freq; i++) rawArr.push(val);
                        }
                        if (rawArr.length === 0) return alert("Tổng tần số phải lớn hơn 0");
                        data = rawArr;
                    }
                } else {
                    data = rows.filter(r => r.l!=='' && r.r!=='' && r.f!=='').map(r => ({ l:parseFloat(r.l), r:parseFloat(r.r), f:parseInt(r.f) }));
                    if(data.length===0) return alert("Bảng trống!");
                }
                onAnalyze(data);
            };

            return (
                <div className="h-full flex flex-col p-4 md:p-8 max-w-7xl mx-auto relative z-10">
                    <button onClick={onBack} className="flex items-center text-slate-600 hover:text-yersin-600 font-bold mb-4 w-fit transition-colors text-lg">
                        <Icons.Back /> <span className="ml-2">Quay lại</span>
                    </button>
                    
                    <div className="glass-panel rounded-3xl flex-1 flex flex-col overflow-hidden shadow-2xl">
                        <div className="p-6 border-b border-slate-200 bg-white/50 backdrop-blur-sm flex justify-between items-center">
                            <h2 className="text-2xl font-bold text-slate-800 uppercase flex items-center gap-3">
                                {mode==='ungrouped' ? <Icons.Calculator /> : <Icons.Chart />}
                                {mode==='ungrouped' ? 'Nhập Dãy Số' : 'Nhập Bảng Ghép Nhóm'}
                            </h2>
                            {mode === 'ungrouped' && (
                                <div className="flex bg-white/50 rounded-lg p-1 border border-slate-200">
                                    <button onClick={() => setUngroupedType('raw')} className={`px-3 py-1 rounded-md text-sm font-bold transition-all ${ungroupedType==='raw' ? 'bg-yersin-500 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>Nhập thô</button>
                                    <button onClick={() => setUngroupedType('table')} className={`px-3 py-1 rounded-md text-sm font-bold transition-all ${ungroupedType==='table' ? 'bg-yersin-500 text-white' : 'text-slate-500 hover:bg-slate-100'}`}>Bảng tần số</button>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scroll p-8 bg-white/40">
                            {mode === 'ungrouped' ? (
                                ungroupedType === 'raw' ? (
                                    <textarea 
                                        value={textInput} onChange={e => setTextInput(e.target.value)}
                                        className="w-full h-full p-6 rounded-2xl border-2 border-slate-200 focus:border-yersin-500 focus:ring-4 focus:ring-yersin-100 outline-none text-xl font-mono bg-white/80 resize-none shadow-inner"
                                        placeholder="Nhập các số cách nhau bởi dấu cách. Ví dụ: 6.5  7.0  8.0 ..."
                                    />
                                ) : (
                                    <div>
                                        <div className="grid grid-cols-[1fr_1fr_60px] gap-4 mb-3 font-bold text-slate-500 text-center text-sm uppercase tracking-wider max-w-3xl mx-auto">
                                            <div className="flex items-center justify-center gap-1"><span className="text-sm">Giá trị</span> <Latex>x_i</Latex></div>
                                            <div className="flex items-center justify-center gap-1"><span className="text-sm">Tần số</span> <Latex>n_i</Latex></div>
                                            <div></div>
                                        </div>
                                        <div className="max-w-3xl mx-auto">
                                            {ungroupedRows.map((r, index) => (
                                                <div key={r.id} className="grid grid-cols-[1fr_1fr_60px] gap-4 mb-3 animate-fade-in">
                                                    <input type="number" value={r.v} onChange={e=>updateUngroupedRow(r.id,'v',e.target.value)} className="p-4 rounded-xl border border-slate-300 text-center font-bold text-lg outline-none focus:border-yersin-500 bg-white/80 shadow-sm" placeholder="Giá trị..." />
                                                    <input 
                                                        id={`ufreq-${index}`}
                                                        type="number" 
                                                        value={r.f} 
                                                        onChange={e=>updateUngroupedRow(r.id,'f',e.target.value)} 
                                                        onKeyDown={(e) => handleEnterKey(e, index, 'ufreq')}
                                                        className="p-4 rounded-xl border border-slate-300 text-center font-bold text-lg text-yersin-600 outline-none focus:border-yersin-500 bg-white/80 shadow-sm" 
                                                        placeholder="Tần số..." 
                                                    />
                                                    <button onClick={()=>removeUngroupedRow(r.id)} className="text-slate-300 hover:text-red-500 flex justify-center items-center transition-colors bg-white/50 rounded-xl hover:bg-red-50"><Icons.Trash /></button>
                                                </div>
                                            ))}
                                            <button onClick={addUngroupedRow} className="w-full py-4 mt-4 border-2 border-dashed border-slate-300 text-slate-500 rounded-2xl font-bold hover:border-yersin-500 hover:text-yersin-600 hover:bg-yersin-50 transition-all flex justify-center gap-3 text-lg"><Icons.Plus /> Thêm dòng</button>
                                        </div>
                                    </div>
                                )
                            ) : (
                                <div>
                                    <div className="mb-8 p-6 bg-yersin-50 rounded-2xl border border-yersin-100 shadow-sm">
                                        <div className="text-base font-bold text-yersin-700 uppercase mb-4 flex items-center gap-2">
                                            <Icons.Bolt /> Tạo khung nhanh
                                        </div>
                                        <div className="grid grid-cols-4 gap-4 items-end">
                                             <div><label className="text-xs text-slate-500 font-bold block mb-2 uppercase">Đầu trái</label><input type="number" value={genConfig.u1} onChange={e=>setGenConfig({...genConfig, u1:e.target.value})} className="w-full p-3 rounded-xl border border-slate-300 text-center font-bold text-lg outline-none focus:border-yersin-500 shadow-sm" placeholder="150" /></div>
                                             <div><label className="text-xs text-slate-500 font-bold block mb-2 uppercase">Độ dài</label><input type="number" value={genConfig.h} onChange={e=>setGenConfig({...genConfig, h:e.target.value})} className="w-full p-3 rounded-xl border border-slate-300 text-center font-bold text-lg outline-none focus:border-yersin-500 shadow-sm" placeholder="5" /></div>
                                             <div><label className="text-xs text-slate-500 font-bold block mb-2 uppercase">Số nhóm</label><input type="number" value={genConfig.k} onChange={e=>setGenConfig({...genConfig, k:e.target.value})} className="w-full p-3 rounded-xl border border-slate-300 text-center font-bold text-lg outline-none focus:border-yersin-500 shadow-sm" placeholder="5" /></div>
                                             <button onClick={generateTable} className="h-[52px] bg-yersin-500 hover:bg-yersin-600 text-white font-bold rounded-xl shadow-md transition-all text-lg transform active:scale-95">Tạo Bảng</button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-[1fr_1fr_1fr_60px] gap-4 mb-3 font-bold text-slate-500 text-center text-sm uppercase tracking-wider">
                                        <div className="flex items-center justify-center gap-1"><span className="text-sm">Trái</span> <Latex>u_i</Latex></div>
                                        <div className="flex items-center justify-center gap-1"><span className="text-sm">Phải</span> <Latex>{`u_{i+1}`}</Latex></div>
                                        <div className="flex items-center justify-center gap-1"><span className="text-sm">Tần số</span> <Latex>n_i</Latex></div>
                                        <div></div>
                                    </div>
                                    {rows.map((r, index) => (
                                        <div key={r.id} className="grid grid-cols-[1fr_1fr_1fr_60px] gap-4 mb-3 animate-fade-in">
                                            <input type="number" value={r.l} onChange={e=>updateRow(r.id,'l',e.target.value)} className="p-4 rounded-xl border border-slate-300 text-center font-bold text-lg outline-none focus:border-yersin-500 bg-white/80 shadow-sm" placeholder="..." />
                                            <input type="number" value={r.r} onChange={e=>updateRow(r.id,'r',e.target.value)} className="p-4 rounded-xl border border-slate-300 text-center font-bold text-lg outline-none focus:border-yersin-500 bg-white/80 shadow-sm" placeholder="..." />
                                            <input 
                                                id={`freq-${index}`}
                                                type="number" 
                                                value={r.f} 
                                                onChange={e=>updateRow(r.id,'f',e.target.value)} 
                                                onKeyDown={(e) => handleEnterKey(e, index)}
                                                className="p-4 rounded-xl border border-slate-300 text-center font-bold text-lg text-yersin-600 outline-none focus:border-yersin-500 bg-white/80 shadow-sm" 
                                                placeholder="..." 
                                            />
                                            <button onClick={()=>removeRow(r.id)} className="text-slate-300 hover:text-red-500 flex justify-center items-center transition-colors bg-white/50 rounded-xl hover:bg-red-50"><Icons.Trash /></button>
                                        </div>
                                    ))}
                                    <button onClick={addRow} className="w-full py-4 mt-4 border-2 border-dashed border-slate-300 text-slate-500 rounded-2xl font-bold hover:border-yersin-500 hover:text-yersin-600 hover:bg-yersin-50 transition-all flex justify-center gap-3 text-lg"><Icons.Plus /> Thêm dòng</button>
                                </div>
                            )}
                        </div>

                        <div className="p-6 border-t border-slate-200 bg-white/60">
                            <button onClick={handleSubmit} className="w-full py-5 bg-gradient-to-r from-yersin-500 to-yersin-600 hover:from-yersin-600 hover:to-yersin-700 text-white text-xl font-bold rounded-2xl shadow-xl shadow-yersin-500/30 transform transition active:scale-[0.98] flex justify-center gap-3">
                                <Icons.Bolt /> PHÂN TÍCH NGAY
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const UngroupedSolution = ({ res, viewStyle }) => {
            const genSubStr = (arr, mean = 0, isVariance = false) => {
                const limit = 5;
                const terms = arr.slice(0, limit).map(x => isVariance ? `(${x} - ${parseFloat(mean.toFixed(2))})^2` : `${x}`);
                if (arr.length > limit) terms.push("\\dots");
                if (isVariance && arr.length > limit) terms.push(`(${arr[arr.length-1]} - ${parseFloat(mean.toFixed(2))})^2`);
                return terms.join(" + ");
            };

            return (
                <div className="space-y-10 animate-fade-in pb-12">
                    <Card title="1. Sắp xếp mẫu số liệu">
                         <div className="text-slate-700 mb-4 text-lg">Đầu tiên, ta sắp xếp các giá trị của mẫu số liệu theo thứ tự không giảm:</div>
                         <div className="font-mono text-lg bg-slate-100 p-6 rounded-xl break-words tracking-wide text-slate-800 border border-slate-200 leading-loose shadow-inner">
                            {res.sorted.join(";  ")}
                         </div>
                         <div className="mt-4 text-base text-slate-600">
                            Kích thước mẫu: <strong className="text-slate-800 text-lg">n = {res.n}</strong>
                         </div>
                    </Card>

                    <Card title="2. Khoảng biến thiên & Tứ phân vị">
                        <SolutionStep 
                            title="a) Khoảng biến thiên (Range)"
                            verbal="Khoảng biến thiên là hiệu số giữa giá trị lớn nhất và giá trị nhỏ nhất của mẫu số liệu."
                            formula={viewStyle === 'academic' ? "R = x_{max} - x_{min}" : null}
                            sub={`R = ${res.max} - ${res.min}`}
                            result={res.range}
                            resultSymbol="R"
                        />
                        <div className="text-slate-700 mb-6 text-base mt-6">
                            Tìm các tứ phân vị dựa trên dãy đã sắp xếp:
                        </div>
                        <div className="grid grid-cols-1 gap-6 mb-6">
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                <div className="text-base font-bold text-slate-500 uppercase mb-2">Q2 (Trung vị)</div>
                                <div className="text-2xl font-bold text-yersin-600"><Latex>{`Q_2 = ${res.q2}`}</Latex></div>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="text-base font-bold text-slate-500 uppercase mb-2">Q1 (Nửa dưới)</div>
                                    <div className="text-2xl font-bold text-slate-800"><Latex>{`Q_1 = ${res.q1}`}</Latex></div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="text-base font-bold text-slate-500 uppercase mb-2">Q3 (Nửa trên)</div>
                                    <div className="text-2xl font-bold text-slate-800"><Latex>{`Q_3 = ${res.q3}`}</Latex></div>
                                </div>
                            </div>
                        </div>
                        <SolutionStep 
                            title="b) Khoảng tứ phân vị (Interquartile Range)"
                            verbal="Khoảng tứ phân vị là hiệu số giữa tứ phân vị thứ ba và tứ phân vị thứ nhất."
                            formula={viewStyle === 'academic' ? "\\Delta_Q = Q_3 - Q_1" : null}
                            sub={`\\Delta_Q = ${res.q3} - ${res.q1}`}
                            result={res.iqr}
                            resultSymbol="\\Delta_Q"
                        />
                    </Card>

                    <Card title="3. Giá trị ngoại lệ (Outliers)">
                        <div className="mb-4">
                            <p className="text-slate-700 text-base mb-2">Giá trị <Latex>x</Latex> là giá trị ngoại lệ nếu:</p>
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 inline-block">
                                <Latex>{`x < Q_1 - 1.5\\Delta_Q`}</Latex> hoặc <Latex>{`x > Q_3 + 1.5\\Delta_Q`}</Latex>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <div className="text-sm font-bold text-blue-700 uppercase mb-1">Cận dưới</div>
                                <Latex block>{`L = Q_1 - 1.5\\Delta_Q = ${parseFloat(res.q1.toFixed(4))} - 1.5(${parseFloat(res.iqr.toFixed(4))}) = ${parseFloat(res.lowerBound.toFixed(4))}`}</Latex>
                            </div>
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <div className="text-sm font-bold text-blue-700 uppercase mb-1">Cận trên</div>
                                <Latex block>{`U = Q_3 + 1.5\\Delta_Q = ${parseFloat(res.q3.toFixed(4))} + 1.5(${parseFloat(res.iqr.toFixed(4))}) = ${parseFloat(res.upperBound.toFixed(4))}`}</Latex>
                            </div>
                        </div>
                        <div className="p-6 bg-white border-2 border-dashed border-slate-300 rounded-xl text-center">
                            {res.outliers.length > 0 ? (
                                <div>
                                    <p className="text-red-500 font-bold mb-2 uppercase">Phát hiện giá trị ngoại lệ trong mẫu:</p>
                                    <div className="text-2xl font-bold text-slate-800">{res.outliers.join(', ')}</div>
                                </div>
                            ) : (
                                <p className="text-green-600 font-bold flex items-center justify-center gap-2"><Icons.Bolt/> Không có giá trị ngoại lệ trong mẫu số liệu này.</p>
                            )}
                        </div>
                        
                        {/* Outlier Checker Tool */}
                        <OutlierChecker q1={res.q1} q3={res.q3} iqr={res.iqr} lowerBound={res.lowerBound} upperBound={res.upperBound} />
                    </Card>

                    <Card title="4. Số trung bình cộng">
                        <SolutionStep 
                            title="Tính số trung bình"
                            verbal={viewStyle === 'verbal' ? "Số trung bình cộng là tổng của tất cả các giá trị chia cho kích thước mẫu." : null}
                            formula={viewStyle === 'academic' ? "\\bar{x} = \\frac{1}{n} \\sum_{i=1}^{n} x_i" : null}
                            sub={`\\bar{x} = \\frac{1}{${res.n}} (${genSubStr(res.sorted)})`}
                            result={res.mean}
                            resultSymbol="\\bar{x}"
                        />
                    </Card>

                    <Card title="5. Phương sai & Độ lệch chuẩn" className="border-l-8 border-l-yellow-500">
                        <CasioNote />
                        
                        <SolutionStep 
                            title="a) Phương sai (Tổng thể)"
                            verbal={viewStyle === 'verbal' ? "Phương sai tổng thể đo độ phân tán của dữ liệu, được tính bằng trung bình cộng của bình phương độ lệch giữa mỗi giá trị và số trung bình." : null}
                            formula={viewStyle === 'academic' ? "S^2 = \\frac{1}{n} \\sum (x_i - \\bar{x})^2" : null}
                            sub={`S^2 = \\frac{1}{${res.n}} [ ${genSubStr(res.sorted, res.mean, true)} ]`}
                            result={res.variance}
                            resultSymbol="S^2 (\\sigma^2_x)"
                        />
                        
                        <SolutionStep 
                            title="b) Độ lệch chuẩn"
                            verbal={viewStyle === 'verbal' ? "Độ lệch chuẩn là căn bậc hai số học của phương sai." : null}
                            formula={viewStyle === 'academic' ? "S = \\sqrt{S^2}" : null}
                            sub={`S = \\sqrt{${parseFloat(res.variance.toFixed(4))}}`}
                            result={res.stdDev}
                            resultSymbol="S_x (\\sigma_x)"
                        />
                    </Card>
                </div>
            );
        };

        const GroupedSolution = ({ res, viewStyle }) => {
            const genMeanSub = () => {
                const terms = res.data.slice(0, 3).map(r => `${r.f}\\cdot${r.c}`);
                if (res.data.length > 3) terms.push("\\dots");
                return terms.join(" + ");
            };

            const genVarSub = () => {
                const terms = res.data.slice(0, 3).map(r => `${r.f}(${r.c} - ${parseFloat(res.mean.toFixed(2))})^2`);
                if (res.data.length > 3) terms.push("\\dots");
                return terms.join(" + ");
            };

            const renderQStepVerbal = (k, qObj) => {
                 if (!qObj.group) return null;
                 const kName = k === 1 ? 'thứ nhất (Q1)' : (k === 2 ? 'thứ hai (Trung vị Q2)' : 'thứ ba (Q3)');
                 const n = res.n;
                 const posVal = k * n / 4;
                 const um = qObj.group.l;
                 const um_next = qObj.group.r;
                 const h = parseFloat((um_next - um).toFixed(4));
                 const nm = qObj.group.f;
                 const cf_tr = qObj.prevCF;

                 return (
                    <div className="mb-10 last:mb-0 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                        <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                            <span className="bg-yersin-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg">{k}</span>
                            <h5 className="font-bold text-slate-800 text-xl uppercase">Tứ phân vị {kName}</h5>
                        </div>

                        <div className="space-y-8">
                            <div>
                                <div className="font-bold text-slate-700 text-lg mb-3 border-l-4 border-yersin-500 pl-4">
                                    1. Công thức xác định
                                </div>
                                {viewStyle === 'verbal' ? (
                                    <div className="bg-slate-50 p-6 rounded-2xl text-slate-800 text-base leading-relaxed mb-4 border border-slate-100">
                                        <p className="mb-4">Tứ phân vị thứ <Latex>{k}</Latex> (<Latex>{`Q_${k}`}</Latex>) được xác định theo công thức chuẩn:</p>
                                        <div className="py-2 overflow-x-auto">
                                            {/* HIỂN THỊ CÔNG THỨC BẰNG LỜI NHƯNG DÙNG LATEX PHÂN SỐ */}
                                            <Latex block>{`Q_${k} = \\text{Đầu mút trái} + \\frac{\\frac{${k}n}{4} - \\text{Tần số tích lũy trước}}{\\text{Tần số của nhóm}} \\cdot \\text{Độ dài nhóm}`}</Latex>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="pl-6 bg-white p-4 rounded-xl border border-slate-200">
                                        <Latex block>{`Q_${k} = u_m + \\frac{\\frac{${k}n}{4} - cf_{tr}}{n_m} \\cdot h`}</Latex>
                                    </div>
                                )}
                            </div>

                            <div>
                                <div className="font-bold text-slate-700 text-lg mb-3 border-l-4 border-yersin-500 pl-4">
                                    2. Xác định các đại lượng
                                </div>
                                <div className="pl-6 text-base text-slate-700 space-y-2">
                                    <p>• Vị trí của <Latex>{`Q_${k}`}</Latex>: <Latex>{`\\frac{${k}n}{4} = \\frac{${k} \\cdot ${n}}{4} = ${posVal}`}</Latex>.</p>
                                    <p>• Dựa vào cột tần số tích lũy, nhóm chứa <Latex>{`Q_${k}`}</Latex> là nhóm <Latex>{`[${um}; ${um_next})`}</Latex>.</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 bg-blue-50 p-5 rounded-xl border border-blue-100 text-base">
                                        <span>- Đầu mút trái: <Latex>{`u_m = ${um}`}</Latex></span>
                                        <span>- Tần số nhóm: <Latex>{`n_m = ${nm}`}</Latex></span>
                                        <span>- Tích lũy trước: <Latex>{`cf_{tr} = ${cf_tr}`}</Latex></span>
                                        <span>- Độ dài nhóm: <Latex>{`h = ${h}`}</Latex></span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <div className="font-bold text-slate-700 text-lg mb-3 border-l-4 border-yersin-500 pl-4">
                                    3. Thay số và tính toán
                                </div>
                                <p className="pl-6 text-slate-700 text-base mb-3">Thay số vào công thức, ta có:</p>
                                <div className="pl-6 bg-white p-4 rounded-xl border border-slate-200">
                                    <Latex block>{`Q_${k} = ${um} + \\frac{${posVal} - ${cf_tr}}{${nm}} \\cdot ${h}`}</Latex>
                                </div>
                            </div>

                            <div>
                                <div className="font-bold text-slate-700 text-lg mb-3 border-l-4 border-yersin-500 pl-4">
                                    4. Kết luận
                                </div>
                                <p className="pl-6 text-slate-700 text-base mb-3">Vậy tứ phân vị thứ <Latex>{k}</Latex> của mẫu số liệu là:</p>
                                <div className="pl-6 text-3xl font-bold text-yersin-700 bg-yersin-50 p-4 rounded-xl border border-yersin-100 inline-block">
                                    <Latex>{`Q_${k} \\approx ${parseFloat(qObj.val.toFixed(4))}`}</Latex>
                                </div>
                            </div>
                        </div>
                    </div>
                 );
            };

            return (
                <div className="space-y-10 animate-fade-in pb-12">
                    <Card title="1. Bảng số liệu & Giá trị đại diện">
                         <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                            <table className="w-full text-base text-center">
                                <thead className="bg-yersin-50 font-bold text-yersin-800 text-lg">
                                    <tr>
                                        <th className="p-4 border-r border-yersin-100">Nhóm</th>
                                        <th className="p-4 border-r border-yersin-100">Đại diện <Latex>c_i</Latex></th>
                                        <th className="p-4 border-r border-yersin-100">Tần số <Latex>n_i</Latex></th>
                                        <th className="p-4">Tích lũy <Latex>cf_i</Latex></th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white">
                                    {res.data.map((r, i) => (
                                        <tr key={i} className="hover:bg-slate-50 border-t border-slate-100">
                                            <td className="p-4 border-r border-slate-100 font-mono text-lg"><Latex>{`[${r.l}; ${r.r})`}</Latex></td>
                                            <td className="p-4 border-r border-slate-100 text-lg"><Latex>{`${r.c}`}</Latex></td>
                                            <td className="p-4 border-r border-slate-100 font-bold text-slate-700 text-lg">{r.f}</td>
                                            <td className="p-4 text-slate-500 text-lg">{r.cf}</td>
                                        </tr>
                                    ))}
                                    <tr className="bg-slate-50 font-bold border-t border-slate-200 text-lg">
                                        <td className="p-4 border-r border-slate-200">Tổng</td>
                                        <td className="p-4 border-r border-slate-200">-</td>
                                        <td className="p-4 border-r border-slate-200 text-yersin-700">{res.n}</td>
                                        <td className="p-4">-</td>
                                    </tr>
                                </tbody>
                            </table>
                         </div>
                    </Card>

                    <Card title="2. Khoảng biến thiên & Tứ phân vị">
                        <SolutionStep 
                            title="a) Khoảng biến thiên (Range)"
                            verbal="Khoảng biến thiên là hiệu giữa đầu mút phải của nhóm cuối cùng (có tần số > 0) và đầu mút trái của nhóm đầu tiên (có tần số > 0)."
                            formula={viewStyle === 'academic' ? "R = u_{max} - u_{min}" : null}
                            sub={`R = ${res.maxBoundary} - ${res.minBoundary}`}
                            result={res.range}
                            resultSymbol="R"
                        />
                        <div className="text-slate-500 text-base mb-6 italic">
                            Áp dụng quy tắc nội suy cho mẫu số liệu ghép nhóm theo SGK:
                        </div>
                        {renderQStepVerbal(1, res.q1)}
                        {renderQStepVerbal(2, res.q2)}
                        {renderQStepVerbal(3, res.q3)}
                        
                        <div className="mt-8 border-t border-slate-100 pt-6">
                            <SolutionStep 
                                title="b) Khoảng tứ phân vị (Interquartile Range)"
                                verbal="Khoảng tứ phân vị là hiệu số giữa tứ phân vị thứ ba và tứ phân vị thứ nhất."
                                formula={viewStyle === 'academic' ? "\\Delta_Q = Q_3 - Q_1" : null}
                                sub={`\\Delta_Q = ${parseFloat(res.q3.val.toFixed(4))} - ${parseFloat(res.q1.val.toFixed(4))}`}
                                result={res.iqr}
                                resultSymbol="\\Delta_Q"
                            />
                        </div>
                    </Card>

                    <Card title="3. Giá trị ngoại lệ (Outliers)">
                        <div className="mb-4">
                            <p className="text-slate-700 text-base mb-2">Giá trị <Latex>x</Latex> là giá trị ngoại lệ nếu:</p>
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 inline-block">
                                <Latex>{`x < Q_1 - 1.5\\Delta_Q`}</Latex> hoặc <Latex>{`x > Q_3 + 1.5\\Delta_Q`}</Latex>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <div className="text-sm font-bold text-blue-700 uppercase mb-1">Cận dưới</div>
                                <Latex block>{`L = Q_1 - 1.5\\Delta_Q = ${parseFloat(res.q1.val.toFixed(4))} - 1.5(${parseFloat(res.iqr.toFixed(4))}) = ${parseFloat(res.lowerBound.toFixed(4))}`}</Latex>
                            </div>
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <div className="text-sm font-bold text-blue-700 uppercase mb-1">Cận trên</div>
                                <Latex block>{`U = Q_3 + 1.5\\Delta_Q = ${parseFloat(res.q3.val.toFixed(4))} + 1.5(${parseFloat(res.iqr.toFixed(4))}) = ${parseFloat(res.upperBound.toFixed(4))}`}</Latex>
                            </div>
                        </div>
                        
                        {/* Outlier Checker Tool */}
                        <OutlierChecker q1={res.q1.val} q3={res.q3.val} iqr={res.iqr} lowerBound={res.lowerBound} upperBound={res.upperBound} />
                    </Card>

                    <Card title="4. Số trung bình cộng">
                        <SolutionStep 
                            title="Tính số trung bình"
                            verbal={viewStyle === 'verbal' ? "Số trung bình cộng được tính bằng cách lấy tổng các tích giữa tần số và giá trị đại diện tương ứng, sau đó chia cho tổng số phần tử của mẫu." : null}
                            formula={viewStyle === 'academic' ? "\\bar{x} = \\frac{1}{n} \\sum n_i c_i" : null}
                            sub={`\\bar{x} = \\frac{1}{${res.n}} (${genMeanSub()})`}
                            result={res.mean}
                            resultSymbol="\\bar{x}"
                        />
                    </Card>

                    <Card title="5. Phương sai & Độ lệch chuẩn" className="border-l-8 border-l-yellow-500">
                        <CasioNote />
                        
                        <SolutionStep 
                            title="a) Phương sai (Tổng thể)"
                            verbal={viewStyle === 'verbal' ? "Phương sai đặc trưng cho độ phân tán của các số liệu so với số trung bình. Ta tính trung bình cộng của bình phương độ lệch giữa giá trị đại diện và số trung bình." : null}
                            formula={viewStyle === 'academic' ? "S^2 = \\frac{1}{n} \\sum n_i (c_i - \\bar{x})^2" : null}
                            sub={`S^2 = \\frac{1}{${res.n}} [ ${genVarSub()} ]`}
                            result={res.variance}
                            resultSymbol="S^2"
                        />
                        
                        <SolutionStep 
                            title="b) Độ lệch chuẩn"
                            verbal={viewStyle === 'verbal' ? "Độ lệch chuẩn bằng căn bậc hai của phương sai." : null}
                            formula={viewStyle === 'academic' ? "S = \\sqrt{S^2}" : null}
                            sub={`S = \\sqrt{${parseFloat(res.variance.toFixed(4))}}`}
                            result={res.stdDev}
                            resultSymbol="S_x"
                        />
                    </Card>

                    <Card title="6. Mốt (Mode)">
                        {res.modes.map((m, i) => (
                            <div key={i} className="mb-8 last:mb-0 bg-white p-6 rounded-xl border border-slate-200">
                                <h5 className="font-bold text-slate-700 text-lg mb-3 flex items-center gap-2"><span className="text-yersin-500">❖</span> Trường hợp {i+1}:</h5>
                                <div className="pl-6 border-l-2 border-slate-200 space-y-3 text-base text-slate-700">
                                    <p>• Nhóm có tần số lớn nhất ({m.group.f}) là nhóm <Latex>{`[${m.group.l}; ${m.group.r})`}</Latex>.</p>
                                    <p>• Ta có các hiệu tần số:
                                       <br/>- Với nhóm trước: <Latex>{`d_1 = ${m.group.f} - ${m.group.f - m.d1} = ${m.d1}`}</Latex>
                                       <br/>- Với nhóm sau: <Latex>{`d_2 = ${m.group.f} - ${m.group.f - m.d2} = ${m.d2}`}</Latex>
                                    </p>
                                    <p>• Áp dụng công thức mốt:</p>
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 my-2">
                                        <Latex block>{`M_o = ${m.group.l} + \\frac{${m.d1}}{${m.d1} + ${m.d2}} \\cdot ${parseFloat((m.group.r - m.group.l).toFixed(4))}`}</Latex>
                                    </div>
                                    <div className="font-bold text-2xl text-slate-800 mt-2">
                                        <Latex>{`\\Rightarrow M_o \\approx ${parseFloat(m.val.toFixed(4))}`}</Latex>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {res.modes.length === 0 && <p className="text-base text-slate-500 italic p-6">Không xác định được mốt theo phương pháp này.</p>}
                    </Card>
                </div>
            );
        };
        
        // --- NEW COMPONENT: FORMULA REFERENCE (Thêm mới theo yêu cầu) ---
        const FormulaReference = ({ mode }) => {
            return (
                <div className="space-y-8 animate-fade-in pb-12">
                     <Card title="Bảng Ký Hiệu & Thuật Ngữ">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 mb-2">Ký hiệu cơ bản</h5>
                                <ul className="space-y-2 text-slate-700 text-sm">
                                    <li><Latex>n</Latex>: Kích thước mẫu (Tổng số liệu).</li>
                                    <li><Latex>x_i</Latex>: Giá trị quan sát thứ <Latex>i</Latex>.</li>
                                    <li><Latex>n_i</Latex>: Tần số của giá trị/nhóm thứ <Latex>i</Latex>.</li>
                                    <li><Latex>c_i</Latex>: Giá trị đại diện của nhóm thứ <Latex>i</Latex> (đối với mẫu ghép nhóm).</li>
                                </ul>
                            </div>
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 mb-2">Các số đặc trưng</h5>
                                <ul className="space-y-2 text-slate-700 text-sm">
                                    <li><Latex>{'\\bar{x}'}</Latex>: Số trung bình cộng.</li>
                                    <li><Latex>M_e</Latex>: Trung vị.</li>
                                    <li><Latex>M_o</Latex>: Mốt.</li>
                                    <li><Latex>{'Q_1, Q_2, Q_3'}</Latex>: Các tứ phân vị.</li>
                                    <li><Latex>{'S^2, S'}</Latex>: Phương sai và độ lệch chuẩn.</li>
                                </ul>
                            </div>
                        </div>
                     </Card>

                    {mode === 'ungrouped' ? (
                        <Card title="Công thức cho Mẫu số liệu ĐƠN">
                            <div className="space-y-8">
                                <div className="border-b border-slate-100 pb-6">
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">1. Số trung bình cộng</h5>
                                    <p className="text-slate-600 mb-2 italic">Là tổng các giá trị chia cho kích thước mẫu.</p>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto">
                                        <Latex block>{'\\bar{x} = \\frac{x_1 + x_2 + ... + x_n}{n}'}</Latex>
                                    </div>
                                </div>

                                <div className="border-b border-slate-100 pb-6">
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">2. Trung vị & Tứ phân vị</h5>
                                    <p className="text-slate-600 mb-2 italic">Sắp xếp mẫu số liệu theo thứ tự không giảm: <Latex>{'x_1 \\le x_2 \\le ... \\le x_n'}</Latex>.</p>
                                    <ul className="list-disc pl-5 space-y-2 text-slate-700">
                                        <li><strong>Trung vị (<Latex>M_e</Latex>):</strong> Là giá trị ở giữa. Nếu <Latex>n</Latex> lẻ thì lấy phần tử chính giữa. Nếu <Latex>n</Latex> chẵn thì lấy trung bình cộng hai phần tử chính giữa.</li>
                                        <li><strong>Tứ phân vị (<Latex>{'Q_1, Q_2, Q_3'}</Latex>):</strong> 
                                            <ul className="list-circle pl-5 mt-1">
                                                <li><Latex>Q_2 = M_e</Latex> (Trung vị của cả mẫu).</li>
                                                <li><Latex>Q_1</Latex> là trung vị của nửa số liệu bên trái <Latex>Q_2</Latex>.</li>
                                                <li><Latex>Q_3</Latex> là trung vị của nửa số liệu bên phải <Latex>Q_2</Latex>.</li>
                                            </ul>
                                        </li>
                                    </ul>
                                </div>

                                <div>
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">3. Phương sai & Độ lệch chuẩn</h5>
                                    <p className="text-slate-600 mb-2 italic">Dùng để đo độ phân tán của dữ liệu.</p>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto mb-2">
                                        <Latex block>{'S^2 = \\frac{1}{n}\\sum_{i=1}^n (x_i - \\bar{x})^2'}</Latex>
                                    </div>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto">
                                        <Latex block>{'S = \\sqrt{S^2}'}</Latex>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    ) : (
                        <Card title="Công thức cho Mẫu số liệu GHÉP NHÓM">
                            <div className="space-y-8">
                                <div className="border-b border-slate-100 pb-6">
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">1. Số trung bình cộng</h5>
                                    <p className="text-slate-600 mb-2 italic">Với <Latex>c_i</Latex> là giá trị đại diện của nhóm thứ <Latex>i</Latex> (trung điểm của khoảng).</p>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto">
                                        <Latex block>{'\\bar{x} = \\frac{n_1c_1 + n_2c_2 + ... + n_kc_k}{n}'}</Latex>
                                    </div>
                                </div>

                                <div className="border-b border-slate-100 pb-6">
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">2. Tứ phân vị (<Latex>Q_k</Latex>)</h5>
                                    <p className="text-slate-600 mb-2 italic">Giả sử nhóm chứa <Latex>Q_k</Latex> là nhóm thứ <Latex>p</Latex>: <Latex>{'[u_m; u_{m+1})'}</Latex>.</p>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto">
                                        <Latex block>{`Q_k = u_m + \\frac{\\frac{kn}{4} - C}{n_m} \\cdot (u_{m+1} - u_m)`}</Latex>
                                    </div>
                                    <ul className="text-sm text-slate-600 mt-2 space-y-1">
                                        <li><Latex>C</Latex>: Tần số tích lũy của các nhóm đứng trước nhóm chứa <Latex>Q_k</Latex>.</li>
                                        <li><Latex>n_m</Latex>: Tần số của nhóm chứa <Latex>Q_k</Latex>.</li>
                                        <li><Latex>{'k \\in \\{1, 2, 3\\}'}</Latex>.</li>
                                    </ul>
                                </div>

                                <div className="border-b border-slate-100 pb-6">
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">3. Mốt (<Latex>M_o</Latex>)</h5>
                                    <p className="text-slate-600 mb-2 italic">Giả sử nhóm chứa mốt (nhóm có tần số lớn nhất) là <Latex>{'[u_m; u_{m+1})'}</Latex> với tần số <Latex>n_m</Latex>.</p>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto">
                                        <Latex block>{`M_o = u_m + \\frac{n_m - n_{m-1}}{(n_m - n_{m-1}) + (n_m - n_{m+1})} \\cdot (u_{m+1} - u_m)`}</Latex>
                                    </div>
                                </div>

                                <div>
                                    <h5 className="font-bold text-slate-800 text-lg mb-2">4. Phương sai & Độ lệch chuẩn</h5>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto mb-2">
                                        <Latex block>{'S^2 = \\frac{1}{n}\\sum_{i=1}^k n_i(c_i - \\bar{x})^2'}</Latex>
                                    </div>
                                    <div className="bg-white p-4 border border-slate-200 rounded-xl overflow-x-auto">
                                        <Latex block>{'S = \\sqrt{S^2}'}</Latex>
                                    </div>
                                </div>
                            </div>
                        </Card>
                    )}
                </div>
            );
        };

        // --- UPDATED COMPONENT: VISUAL CHARTS (Update theo yêu cầu "mỗi dữ liệu 1 màu" & chi tiết hơn) ---
        const VisualCharts = ({ data, mode, result }) => {
            const chartRefBar = useRef(null);
            const chartRefPie = useRef(null);
            const [chartInstanceBar, setChartInstanceBar] = useState(null);
            const [chartInstancePie, setChartInstancePie] = useState(null);

            useEffect(() => {
                let labels = [];
                let frequencies = [];

                if (mode === 'ungrouped') {
                    const f = {};
                    result.sorted.forEach(x => { f[x] = (f[x]||0)+1; });
                    const keys = Object.keys(f).map(Number).sort((a,b)=>a-b);
                    labels = keys.map(String);
                    frequencies = keys.map(k => f[k]);
                } else {
                    labels = result.data.map(r => `[${r.l}; ${r.r})`);
                    frequencies = result.data.map(r => r.f);
                }

                // Hàm tạo màu sắc đa dạng cho từng cột dữ liệu
                const generateColors = (count) => {
                    const bg = [];
                    const border = [];
                    for (let i = 0; i < count; i++) {
                        // Tạo màu sắc dựa trên vòng tròn màu HSL để đảm bảo sự khác biệt
                        const hue = (i * 360 / count) % 360; 
                        bg.push(`hsla(${hue}, 70%, 65%, 0.8)`);
                        border.push(`hsla(${hue}, 80%, 45%, 1)`);
                    }
                    return { bg, border };
                };

                const { bg: bgColors, border: borderColors } = generateColors(labels.length);

                // Cấu hình chung cho Tooltip để hiện %
                const commonTooltipOptions = {
                    callbacks: {
                        label: function(context) {
                            let label = context.dataset.label || '';
                            if (label) {
                                label += ': ';
                            }
                            if (context.parsed.y !== null) { // Biểu đồ cột
                                const val = context.parsed.y;
                                const total = result.n;
                                const percentage = ((val / total) * 100).toFixed(1) + '%';
                                return `Tần số: ${val} (Chiếm ${percentage})`;
                            } else if (context.parsed !== null) { // Biểu đồ tròn
                                const val = context.parsed;
                                const total = result.n;
                                const percentage = ((val / total) * 100).toFixed(1) + '%';
                                return `Tần số: ${val} (${percentage})`;
                            }
                            return label;
                        }
                    }
                };

                // Vẽ biểu đồ Cột (Bar Chart)
                if (chartInstanceBar) chartInstanceBar.destroy();
                if (chartRefBar.current) {
                    const newChartBar = new Chart(chartRefBar.current, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Tần số',
                                data: frequencies,
                                backgroundColor: bgColors, // Mỗi cột 1 màu
                                borderColor: borderColors,
                                borderWidth: 2,
                                borderRadius: 6, // Bo góc cột
                                barPercentage: 0.7,
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false },
                                title: { 
                                    display: true, 
                                    text: 'PHÂN PHỐI TẦN SỐ (Biểu đồ Cột)', 
                                    font: { size: 16, weight: 'bold', family: "'Be Vietnam Pro', sans-serif" },
                                    padding: 20
                                },
                                tooltip: commonTooltipOptions
                            },
                            scales: {
                                y: { 
                                    beginAtZero: true, 
                                    title: { display: true, text: 'Tần số (n)', font: { weight: 'bold' } },
                                    ticks: { stepSize: 1 } 
                                },
                                x: { 
                                    title: { display: true, text: mode === 'ungrouped' ? 'Giá trị (x)' : 'Khoảng giá trị', font: { weight: 'bold' } } 
                                }
                            }
                        }
                    });
                    setChartInstanceBar(newChartBar);
                }

                // Vẽ biểu đồ Quạt (Pie Chart)
                if (chartInstancePie) chartInstancePie.destroy();
                if (chartRefPie.current) {
                    const newChartPie = new Chart(chartRefPie.current, {
                        type: 'pie', // Hoặc 'doughnut' nếu muốn
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Tần số',
                                data: frequencies,
                                backgroundColor: bgColors,
                                borderColor: '#fff',
                                borderWidth: 2,
                                hoverOffset: 15 // Hiệu ứng tách miếng bánh khi hover
                            }]
                        },
                        options: {
                            responsive: true,
                            layout: { padding: 20 },
