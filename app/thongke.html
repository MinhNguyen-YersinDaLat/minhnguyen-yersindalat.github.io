                            plugins: {
                                legend: { 
                                    position: 'right', // Đặt chú thích sang phải cho thoáng
                                    labels: { font: { family: "'Be Vietnam Pro', sans-serif" } }
                                },
                                title: { 
                                    display: true, 
                                    text: 'TỶ LỆ PHẦN TRĂM (Biểu đồ Tròn)', 
                                    font: { size: 16, weight: 'bold', family: "'Be Vietnam Pro', sans-serif" } 
                                },
                                tooltip: commonTooltipOptions
                            }
                        }
                    });
                    setChartInstancePie(newChartPie);
                }

                return () => {
                    if (chartInstanceBar) chartInstanceBar.destroy();
                    if (chartInstancePie) chartInstancePie.destroy();
                }
            }, [data, mode]); 

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <Card title="Trực quan hóa dữ liệu thống kê">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-lg hover:shadow-xl transition-shadow flex flex-col items-center">
                                <div className="w-full h-full min-h-[300px] flex items-center justify-center">
                                    <canvas ref={chartRefBar}></canvas>
                                </div>
                                <p className="mt-6 text-sm text-slate-500 italic text-center px-4">
                                    Biểu đồ cột thể hiện <b>tần số</b> xuất hiện của từng giá trị (hoặc nhóm). Độ cao của cột tương ứng với số lượng dữ liệu.
                                </p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-lg hover:shadow-xl transition-shadow flex flex-col items-center">
                                <div className="w-full h-full min-h-[300px] max-w-[400px] flex items-center justify-center">
                                    <canvas ref={chartRefPie}></canvas>
                                </div>
                                <p className="mt-6 text-sm text-slate-500 italic text-center px-4">
                                    Biểu đồ tròn thể hiện <b>cơ cấu tỷ lệ phần trăm</b>. Tổng các phần luôn là 100%, giúp so sánh tương quan giữa các nhóm.
                                </p>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        const ResultView = ({ data, mode, onBack }) => {
            const [viewStyle, setViewStyle] = useState('verbal'); // 'verbal' | 'academic'
            const [currentTab, setCurrentTab] = useState('solution'); // 'solution' | 'meaning'
            const result = useMemo(() => mode==='ungrouped' ? MathSolver.solveUngrouped(data) : MathSolver.solveGrouped(data), [data, mode]);

            // --- NEW: Hàm chuyển dữ liệu sang file nâng cao ---
            const transferToAdvanced = () => {
                try {
                    const payload = { mode, data };
                    // Mã hóa dữ liệu để gắn vào URL an toàn
                    const encodedData = encodeURIComponent(JSON.stringify(payload));
                    // Chuyển hướng sang file 2 kèm dữ liệu
                    window.location.href = `thongke_nangcao.html?import=${encodedData}`;
                } catch (e) {
                    alert("Dữ liệu quá lớn để chuyển qua đường dẫn!");
                }
            };
            // -------------------------------------------------

            // Nội dung tab Ý nghĩa (Chuẩn SGK Chân trời sáng tạo)
            const MeaningContent = () => (
                <div className="space-y-8 animate-fade-in pb-12">
                    <Card title="Ý nghĩa các số đặc trưng">
                        <div className="space-y-6">
                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 text-lg mb-2 flex items-center gap-2">
                                    <span className="bg-yersin-100 p-1 rounded">1</span> Số trung bình cộng (<Latex>{'\\bar{x}'}</Latex>)
                                </h5>
                                <p className="text-slate-700 text-base leading-relaxed text-justify">
                                    Là giá trị đại diện cho vị trí trung tâm của mẫu số liệu. Số trung bình thường được dùng để so sánh hai mẫu số liệu cùng loại. Tuy nhiên, nó chịu ảnh hưởng bởi các giá trị bất thường (quá lớn hoặc quá nhỏ).
                                </p>
                            </div>

                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 text-lg mb-2 flex items-center gap-2">
                                    <span className="bg-yersin-100 p-1 rounded">2</span> Trung vị (<Latex>{'M_e'}</Latex>)
                                </h5>
                                <p className="text-slate-700 text-base leading-relaxed text-justify">
                                    Là giá trị đứng chính giữa trong dãy số liệu đã sắp xếp. Trung vị chia mẫu số liệu thành hai phần bằng nhau (50% số liệu nhỏ hơn hoặc bằng nó). Điểm mạnh của trung vị là <b>không bị ảnh hưởng bởi các giá trị ngoại lai</b> (bất thường) như số trung bình.
                                </p>
                            </div>

                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 text-lg mb-2 flex items-center gap-2">
                                    <span className="bg-yersin-100 p-1 rounded">3</span> Tứ phân vị (<Latex>{'Q_1, Q_2, Q_3'}</Latex>)
                                </h5>
                                <p className="text-slate-700 text-base leading-relaxed text-justify">
                                    Ba giá trị này chia mẫu số liệu đã sắp xếp thành 4 phần bằng nhau. Chúng giúp ta hình dung sự phân bố của dữ liệu và xác định các <b>giá trị ngoại lai</b>. Khoảng tứ phân vị (<Latex>{'\\Delta_Q = Q_3 - Q_1'}</Latex>) cũng là một chỉ số đo độ phân tán.
                                </p>
                            </div>

                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 text-lg mb-2 flex items-center gap-2">
                                    <span className="bg-yersin-100 p-1 rounded">4</span> Mốt (<Latex>{'M_o'}</Latex>)
                                </h5>
                                <p className="text-slate-700 text-base leading-relaxed text-justify">
                                    Là giá trị xuất hiện nhiều nhất trong mẫu số liệu. Mốt đặc trưng cho giá trị "phổ biến nhất" hoặc xu hướng tập trung của dữ liệu. Một mẫu có thể có nhiều mốt hoặc không có mốt.
                                </p>
                            </div>

                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                <h5 className="font-bold text-yersin-700 text-lg mb-2 flex items-center gap-2">
                                    <span className="bg-yersin-100 p-1 rounded">5</span> Phương sai (<Latex>{'S^2'}</Latex>) & Độ lệch chuẩn (<Latex>{'S'}</Latex>)
                                </h5>
                                <p className="text-slate-700 text-base leading-relaxed text-justify">
                                    Dùng để đo mức độ phân tán của các số liệu quanh số trung bình cộng. Độ lệch chuẩn càng nhỏ thì số liệu càng tập trung sát số trung bình (độ ổn định cao). Ngược lại, độ lệch chuẩn lớn cho thấy số liệu biến động mạnh.
                                </p>
                            </div>
                        </div>
                    </Card>
                </div>
            );

            return (
                <div className="h-full flex flex-col max-w-7xl mx-auto p-4 md:p-8 relative z-10">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <button onClick={onBack} className="flex items-center text-slate-600 hover:text-yersin-600 font-bold transition-colors text-lg">
                            <Icons.Back /> <span className="ml-2">Nhập lại</span>
                        </button>
                        
                        <div className="flex gap-3">
                            {/* --- NEW: Nút chuyển sang nâng cao --- */}
                            <button onClick={transferToAdvanced} className="px-5 py-3 rounded-xl text-base font-bold bg-slate-800 text-white shadow-md hover:bg-slate-700 transition-all flex items-center gap-2">
                                <span>🚀 Chuyển sang Nâng cao</span>
                            </button>
                            {/* ------------------------------------- */}

                            {/* Toggle View Mode (Chỉ hiện khi ở tab Giải Chi Tiết) */}
                            {currentTab === 'solution' && (
                                <div className="bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm flex">
                                    <button onClick={() => setViewStyle('verbal')} className={`px-6 py-3 rounded-xl text-base font-bold transition-all flex items-center gap-2 ${viewStyle === 'verbal' ? 'bg-yersin-500 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <span>🗣️ Sư phạm (Lời)</span>
                                    </button>
                                    <button onClick={() => setViewStyle('academic')} className={`px-6 py-3 rounded-xl text-base font-bold transition-all flex items-center gap-2 ${viewStyle === 'academic' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <span>∫ Hàn lâm (Công thức)</span>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 glass-panel rounded-3xl overflow-hidden flex flex-col shadow-2xl bg-white/40">
                        {/* Header Result with Tabs */}
                        <div className="p-0 border-b border-slate-200 bg-white/60 backdrop-blur flex items-center justify-between flex-wrap">
                            <div className="flex overflow-x-auto">
                                <button 
                                    onClick={() => setCurrentTab('solution')}
                                    className={`px-6 md:px-8 py-6 text-lg md:text-xl font-bold uppercase transition-all whitespace-nowrap ${currentTab === 'solution' ? 'bg-white/40 text-yersin-700 border-b-4 border-yersin-500' : 'text-slate-500 hover:bg-white/20'}`}
                                >
                                    Lời Giải Chi Tiết
                                </button>
                                <button 
                                    onClick={() => setCurrentTab('charts')}
                                    className={`px-6 md:px-8 py-6 text-lg md:text-xl font-bold uppercase transition-all whitespace-nowrap ${currentTab === 'charts' ? 'bg-white/40 text-orange-600 border-b-4 border-orange-500' : 'text-slate-500 hover:bg-white/20'}`}
                                >
                                    Biểu Đồ
                                </button>
                                <button 
                                    onClick={() => setCurrentTab('formula')}
                                    className={`px-6 md:px-8 py-6 text-lg md:text-xl font-bold uppercase transition-all whitespace-nowrap ${currentTab === 'formula' ? 'bg-white/40 text-purple-700 border-b-4 border-purple-500' : 'text-slate-500 hover:bg-white/20'}`}
                                >
                                    Công Thức Toán
                                </button>
                                <button 
                                    onClick={() => setCurrentTab('meaning')}
                                    className={`px-6 md:px-8 py-6 text-lg md:text-xl font-bold uppercase transition-all whitespace-nowrap ${currentTab === 'meaning' ? 'bg-white/40 text-blue-600 border-b-4 border-blue-500' : 'text-slate-500 hover:bg-white/20'}`}
                                >
                                    Ý Nghĩa Số Liệu
                                </button>
                            </div>
                            <span className="hidden lg:inline-block mr-8 bg-yersin-100 text-yersin-700 px-4 py-2 rounded-full text-sm font-bold uppercase tracking-wide border border-yersin-200">
                                {mode === 'ungrouped' ? 'Mẫu số liệu đơn' : 'Mẫu số liệu ghép nhóm'}
                            </span>
                        </div>

                        {/* Scrollable Content */}
                        <div className="flex-1 overflow-y-auto custom-scroll p-8 md:p-12">
                            {currentTab === 'solution' && (
                                mode === 'ungrouped' 
                                    ? <UngroupedSolution res={result} viewStyle={viewStyle} /> 
                                    : <GroupedSolution res={result} viewStyle={viewStyle} />
                            )}
                            {currentTab === 'charts' && <VisualCharts data={data} mode={mode} result={result} />}
                            {currentTab === 'formula' && <FormulaReference mode={mode} />}
                            {currentTab === 'meaning' && <MeaningContent />}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [mode, setMode] = useState('grouped');
            const [data, setData] = useState(null);

            const goInput = (m) => { setMode(m); setStep(2); };
            const goBack = () => setStep(step===3 ? 2 : 1);
            const goResult = (d) => { setData(d); setStep(3); };

            return (
                <div className="h-full w-full relative">
                    <FloatingIcons />
                    {step === 1 && <HomeView onSelect={goInput} />}
                    {step === 2 && <InputView mode={mode} onBack={goBack} onAnalyze={goResult} />}
                    {step === 3 && <ResultView data={data} mode={mode} onBack={goBack} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
