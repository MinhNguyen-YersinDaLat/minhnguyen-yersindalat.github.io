<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEOW ENGLISH - IELTS MASTER PRO</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map cho React & Motion -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff0f5; /* Lavender Blush */
            color: #4a044e; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            font-size: 18px; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #fff;
            box-shadow: 0 15px 35px -5px rgba(255, 182, 193, 0.4);
        }
        
        .cat-pattern {
            background-image: 
                radial-gradient(#fbcfe8 15%, transparent 16%),
                radial-gradient(#fbcfe8 15%, transparent 16%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.3;
        }

        /* 3D Button Style */
        .btn-pushable {
            position: relative;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            outline-offset: 4px;
            transition: filter 250ms;
            width: 100%;
            touch-action: manipulation;
        }
        .shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            background: rgba(0,0,0,0.2);
            transform: translateY(6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
        }
        .edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            background: linear-gradient(to left, #be185d 0%, #db2777 8%, #db2777 92%, #be185d 100%);
        }
        .front {
            display: block;
            position: relative;
            padding: 18px 24px;
            border-radius: 1.5rem;
            font-size: 1.25rem;
            color: white;
            background: #ec4899;
            will-change: transform;
            transform: translateY(-6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        .btn-pushable:active .front { transform: translateY(-2px); }
        .btn-pushable:active .shadow { transform: translateY(2px); }
        .btn-pushable:focus:not(:focus-visible) { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            BookOpen, Brain, Save, Download, Upload, RefreshCw, 
            Check, X, ArrowRight, Home, History, Calendar, 
            Zap, Copy, Play, Settings, Lightbulb, RotateCcw, 
            Cat, Star, Sparkles, Pencil, Eye, Info, Volume2, VolumeX,
            ExternalLink, Repeat
        } from 'lucide-react';

        // --- CẤU HÌNH PROMPT IELTS CHUẨN ---
        const MASTER_PROMPT = `
ACT AS AN EXPERT IELTS EXAMINER & CAMBRIDGE LINGUIST.
Task: Create a JSON dataset for English practice.
Topic/Lesson Name: "{TOPIC}"
Context/Content to analyze (if any): "{CONTENT}"
Number of questions: {NUM}

STRICT REQUIREMENTS:
1. Accuracy: 100% Academic English (IELTS Standard). Use Cambridge/Oxford Dictionary definitions.
2. Format: Pure JSON array. No markdown, no intro/outro text.
3. Question Types: Mix of "mc" (Multiple Choice), "tf" (True/False), "fill" (Fill-in-blank), "order" (Sentence Scramble).
4. For Multiple Choice ("mc"): The "answer" field MUST be the INDEX of the correct option (0, 1, 2, or 3).
5. Explanations: Must be detailed, in VIETNAMESE, explaining why the answer is correct and why others are wrong.

JSON Structure:
[
  {
    "type": "mc",
    "question": "Question text (Academic style)",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "answer": 0, // Integer 0-3
    "explanation": "Giải thích chi tiết bằng Tiếng Việt...",
    "vocabulary": ["Word1: Nghĩa", "Word2: Nghĩa"]
  },
  {
    "type": "tf",
    "question": "Statement...",
    "options": [],
    "answer": true, // or false
    "explanation": "...",
    "vocabulary": []
  },
  {
    "type": "fill",
    "question": "Sentence with ___ blank.",
    "options": [],
    "answer": "missing_word",
    "explanation": "...",
    "vocabulary": []
  },
  {
    "type": "order",
    "question": "Arrange these words:",
    "options": [],
    "answer": "Complete correct sentence.",
    "explanation": "...",
    "vocabulary": []
  }
]
`;

        // --- TTS HOOK (NEW FEATURE) ---
        const useTTS = () => {
            const speak = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel(); // Stop previous
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; // English US
                utterance.rate = 0.9; // Tốc độ vừa phải
                window.speechSynthesis.speak(utterance);
            };
            return { speak };
        };

        // --- SOUND MANAGER ---
        const useSound = () => {
            const [isMuted, setIsMuted] = useState(false);
            const sounds = {
                correct: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3',
                wrong: 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3',
                click: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3',
                win: 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'
            };
            const play = (type) => {
                if (isMuted) return;
                try {
                    const audio = new Audio(sounds[type]);
                    audio.volume = 0.5;
                    audio.play().catch(e => {});
                } catch (e) {}
            };
            return { isMuted, setIsMuted, play };
        };

        // --- STORAGE MANAGER ---
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) { console.error(error); }
            };
            return [storedValue, setValue];
        };

        // --- HELPER: CHECK ANSWER ROBUSTLY ---
        const checkAnswer = (type, userAns, correctAns) => {
            if (type === 'mc') {
                return Number(userAns) === Number(correctAns);
            }
            if (type === 'tf') {
                return userAns === correctAns || String(userAns).toLowerCase() === String(correctAns).toLowerCase();
            }
            if (type === 'fill' || type === 'order') {
                return String(userAns).trim().toLowerCase() === String(correctAns).trim().toLowerCase();
            }
            return false;
        };

        // --- COMPONENTS ---

        const CuteBackground = () => (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden bg-gradient-to-br from-purple-50 via-pink-50 to-white">
                <div className="absolute inset-0 cat-pattern"></div>
                <motion.div animate={{ y: [0, -15, 0], rotate: [0, 5, 0] }} transition={{ duration: 6, repeat: Infinity }} className="absolute top-10 left-[10%] text-5xl opacity-20 filter blur-[1px]">🐾</motion.div>
                <motion.div animate={{ y: [0, 20, 0], rotate: [0, -10, 0] }} transition={{ duration: 7, repeat: Infinity }} className="absolute bottom-20 right-[15%] text-6xl opacity-20 filter blur-[1px]">🧶</motion.div>
                <motion.div animate={{ scale: [1, 1.1, 1] }} transition={{ duration: 5, repeat: Infinity }} className="absolute top-1/2 right-10 text-4xl opacity-20">✨</motion.div>
            </div>
        );

        const FeedbackPopup = ({ feedback, data, onNext, isLast, playSound }) => {
            if (!feedback) return null;
            const { speak } = useTTS(); // Use TTS hook

            useEffect(() => {
                if(feedback.isCorrect) playSound('correct');
                else playSound('wrong');
            }, []);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                    <motion.div 
                        initial={{ scale: 0.8, opacity: 0, y: 50 }}
                        animate={{ scale: 1, opacity: 1, y: 0 }}
                        exit={{ scale: 0.8, opacity: 0, y: 50 }}
                        transition={{ type: "spring", damping: 15, stiffness: 300 }}
                        className="w-full max-w-xl relative"
                    >
                        <div className="absolute -top-16 left-1/2 -translate-x-1/2 z-20">
                            <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className="bg-white p-4 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] border-[6px] border-pink-100">
                                <div className="text-7xl">{feedback.isCorrect ? '😻' : '😿'}</div>
                            </motion.div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white pt-20 pb-8 px-8 relative">
                            <div className={`absolute top-0 left-0 w-full h-28 opacity-20 ${feedback.isCorrect ? 'bg-green-400' : 'bg-rose-400'}`}></div>

                            <div className="text-center relative z-10">
                                <h3 className={`text-4xl font-black mb-2 tracking-tight ${feedback.isCorrect ? 'text-green-600' : 'text-rose-600'}`}>
                                    {feedback.isCorrect ? 'CHÍNH XÁC!' : 'SAI RỒI!'}
                                </h3>
                                <p className="text-slate-400 font-bold text-sm mb-6">{feedback.isCorrect ? 'Giỏi quá đi sen ơi!' : 'Không sao, xem giải thích nào!'}</p>
                            </div>

                            <div className="max-h-[50vh] overflow-y-auto custom-scrollbar space-y-4 px-2">
                                {!feedback.isCorrect && (
                                    <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-center">
                                        <div className="text-xs text-rose-400 font-bold uppercase mb-1">Đáp án đúng</div>
                                        <div className="text-2xl font-black text-rose-600">
                                            {data.type === 'mc' ? data.options[data.answer] : String(data.answer)}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 text-left">
                                    <h4 className="flex items-center gap-2 font-bold text-blue-600 text-base mb-2"><Info size={20}/> Giải thích IELTS:</h4>
                                    <p className="text-slate-700 text-lg leading-relaxed font-medium">{data.explanation}</p>
                                </div>

                                {data.vocabulary && data.vocabulary.length > 0 && (
                                    <div className="bg-yellow-50 p-5 rounded-2xl border border-yellow-100 text-left">
                                        <h4 className="flex items-center gap-2 font-bold text-yellow-600 text-base mb-3"><Sparkles size={20}/> Vocabulary:</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {data.vocabulary.map((v, i) => (
                                                <button key={i} onClick={() => speak(v.split(':')[0])} className="bg-white px-3 py-1.5 rounded-lg text-base font-bold text-slate-700 shadow-sm border border-yellow-200 hover:bg-yellow-100 transition flex items-center gap-1 group">
                                                    {v} <Volume2 size={16} className="text-yellow-500 opacity-50 group-hover:opacity-100"/>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="mt-6 pt-4 border-t border-slate-100">
                                <button onClick={() => { playSound('click'); onNext(); }} className="btn-pushable w-full">
                                    <span className="shadow"></span>
                                    <span className="edge"></span>
                                    <span className="front flex items-center justify-center gap-2">
                                        {isLast ? "XEM KẾT QUẢ" : "CÂU TIẾP THEO"} <ArrowRight/>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const Dashboard = ({ history, onStartNew, onImport, onExport, onViewHistory, onRelearn, sound }) => {
            const totalSessions = history.length;
            const totalQuestions = history.reduce((acc, curr) => acc + curr.total, 0);
            const totalCorrect = history.reduce((acc, curr) => acc + curr.score, 0);
            const accuracy = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;

            return (
                <div className="w-full max-w-4xl mx-auto p-4 md:p-8 relative z-10 pb-20">
                    <div className="flex justify-end mb-4">
                        <button onClick={() => sound.setIsMuted(!sound.isMuted)} className="bg-white p-3 rounded-full shadow-md text-pink-400 hover:scale-110 transition">
                            {sound.isMuted ? <VolumeX size={24}/> : <Volume2 size={24}/>}
                        </button>
                    </div>

                    <div className="text-center mb-10">
                        <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className="inline-block p-6 bg-white rounded-[2rem] mb-6 shadow-xl border-4 border-pink-200">
                            <Cat size={80} className="text-rose-500" strokeWidth={2} />
                        </motion.div>
                        <h1 className="text-5xl md:text-7xl font-black text-rose-600 tracking-tighter drop-shadow-sm mb-2">MEOW IELTS</h1>
                        <p className="text-slate-500 font-bold text-lg md:text-xl bg-white/60 inline-block px-4 py-1 rounded-full backdrop-blur-sm">Master IELTS with AI 😽</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        <motion.div whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }}>
                            <button onClick={() => { sound.play('click'); onStartNew(); }} className="btn-pushable h-full">
                                <span className="shadow"></span>
                                <span className="edge"></span>
                                <span className="front flex flex-col items-center justify-center gap-4 py-10 h-full">
                                    <Play size={48} fill="currentColor" className="opacity-90"/>
                                    <span className="text-2xl md:text-3xl tracking-wide">HỌC BÀI MỚI</span>
                                </span>
                            </button>
                        </motion.div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 h-full">
                             <label className="bg-white hover:bg-pink-50 cursor-pointer rounded-3xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm border-2 border-pink-100 transition h-full group">
                                <div className="bg-pink-100 p-4 rounded-full text-rose-500 group-hover:scale-110 transition"><Upload size={28}/></div>
                                <span className="font-bold text-lg text-slate-600">Nhập File</span>
                                <input type="file" className="hidden" accept=".json" onChange={onImport} />
                            </label>
                            <button onClick={onExport} className="bg-white hover:bg-pink-50 cursor-pointer rounded-3xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm border-2 border-pink-100 transition h-full group">
                                <div className="bg-blue-100 p-4 rounded-full text-blue-500 group-hover:scale-110 transition"><Download size={28}/></div>
                                <span className="font-bold text-lg text-slate-600">Backup</span>
                            </button>
                        </div>
                    </div>

                    <div className="glass-panel p-6 rounded-3xl flex justify-between items-center mb-8 px-8 md:px-12">
                        <div className="text-center"><div className="text-3xl font-black text-purple-500">{totalSessions}</div><div className="text-xs font-bold text-slate-400 uppercase">Bài học</div></div>
                        <div className="w-px h-10 bg-slate-200"></div>
                        <div className="text-center"><div className="text-3xl font-black text-green-500">{accuracy}%</div><div className="text-xs font-bold text-slate-400 uppercase">Điểm TB</div></div>
                        <div className="w-px h-10 bg-slate-200"></div>
                        <div className="text-center"><div className="text-3xl font-black text-blue-500">{totalQuestions}</div><div className="text-xs font-bold text-slate-400 uppercase">Câu hỏi</div></div>
                    </div>

                    <div className="glass-panel rounded-[2.5rem] p-8">
                        <h2 className="text-2xl font-black mb-6 flex items-center gap-3 text-rose-600"><Calendar size={28}/> Lịch Sử Ôn Luyện</h2>
                        <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                            {history.length === 0 ? (
                                <div className="text-center text-slate-400 py-12 text-lg">Chưa có bài học nào. Bắt đầu ngay nhé! 🐾</div>
                            ) : (
                                [...history].reverse().map((session, idx) => (
                                    <div key={idx} className="flex items-center justify-between p-5 bg-white rounded-2xl border border-pink-50 shadow-sm transition hover:shadow-md group">
                                        <div onClick={() => { sound.play('click'); onViewHistory(session); }} className="flex-1 flex items-center gap-4 cursor-pointer overflow-hidden">
                                            <div className={`font-black w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-inner ${session.score/session.total >= 0.8 ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-500'}`}>
                                                {session.score}/{session.total}
                                            </div>
                                            <div className="min-w-0">
                                                <div className="font-bold text-slate-700 text-lg truncate group-hover:text-rose-500 transition">{session.topic || "Bài tập không tên"}</div>
                                                <div className="text-sm text-slate-400 font-medium">{new Date(session.date).toLocaleDateString('vi-VN')}</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                             {session.questions && session.questions.length > 0 && (
                                                <button onClick={() => { sound.play('click'); onRelearn(session); }} className="p-2 bg-blue-50 text-blue-500 rounded-full hover:bg-blue-500 hover:text-white transition" title="Học lại">
                                                    <Repeat size={20}/>
                                                </button>
                                             )}
                                            <button onClick={() => { sound.play('click'); onViewHistory(session); }} className="p-2 bg-slate-50 text-slate-400 rounded-full hover:bg-rose-500 hover:text-white transition">
                                                <ArrowRight size={20}/>
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const SetupSession = ({ onStart, onBack, sound }) => {
            const [mode, setMode] = useState('manual');
            const [apiKey, setApiKey] = useState('');
            const [topic, setTopic] = useState('');
            const [content, setContent] = useState('');
            const [numQuestions, setNumQuestions] = useState(10);
            const [jsonInput, setJsonInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const copyPrompt = () => {
                sound.play('click');
                const finalNum = numQuestions || 10;
                let finalPrompt = MASTER_PROMPT
                    .replace("{TOPIC}", topic || "IELTS General")
                    .replace("{CONTENT}", content || "N/A")
                    .replace("{NUM}", finalNum);
                
                navigator.clipboard.writeText(finalPrompt);
                alert("Đã copy Prompt chuẩn IELTS! Hãy dán vào AI.");
            };

            const openAI = (url) => window.open(url, '_blank');

            const handleStartAI = async () => {
                sound.play('click');
                if (!apiKey || !topic) return setError("Thiếu Key hoặc Chủ đề!");
                setLoading(true); setError('');
                try {
                    let finalPrompt = MASTER_PROMPT
                        .replace("{TOPIC}", topic)
                        .replace("{CONTENT}", content || "N/A")
                        .replace("{NUM}", numQuestions);
                        
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    let text = data.candidates[0].content.parts[0].text.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                    const questions = JSON.parse(text);
                    onStart(questions, topic);
                } catch (err) { setError("Lỗi AI: " + err.message); } finally { setLoading(false); }
            };

            const handleStartManual = () => {
                sound.play('click');
                try {
                    if (!jsonInput) return setError("Chưa dán JSON kìa!");
                    const questions = JSON.parse(jsonInput);
                    if (!Array.isArray(questions)) throw new Error("JSON lỗi format");
                    onStart(questions, topic || "Bài tập thủ công");
                } catch (err) { setError("Lỗi JSON: " + err.message); }
            };

            return (
                <div className="w-full max-w-3xl mx-auto p-4 md:p-8 min-h-screen flex flex-col relative z-10">
                    <button onClick={() => { sound.play('click'); onBack(); }} className="self-start flex items-center text-slate-500 hover:text-rose-500 font-bold mb-6 gap-2 bg-white px-5 py-3 rounded-full shadow-sm hover:bg-rose-50 transition"><Home size={20}/> Quay về</button>
                    
                    <div className="bg-white rounded-[2.5rem] p-6 md:p-10 shadow-2xl border-4 border-white flex-1 flex flex-col">
                        <h2 className="text-3xl md:text-4xl font-black text-rose-500 mb-6 text-center flex items-center justify-center gap-3">
                             Tạo Bài Mới <Pencil className="animate-bounce" />
                        </h2>

                        {/* AI Shortcuts */}
                        <div className="flex gap-3 justify-center mb-8">
                            <button onClick={() => openAI('https://chatgpt.com')} className="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-600 rounded-full font-bold hover:bg-green-100 transition"><ExternalLink size={16}/> ChatGPT</button>
                            <button onClick={() => openAI('https://gemini.google.com')} className="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-600 rounded-full font-bold hover:bg-blue-100 transition"><ExternalLink size={16}/> Gemini</button>
                            <button onClick={() => openAI('https://copilot.microsoft.com')} className="flex items-center gap-2 px-4 py-2 bg-purple-50 text-purple-600 rounded-full font-bold hover:bg-purple-100 transition"><ExternalLink size={16}/> Copilot</button>
                        </div>

                        <div className="flex bg-slate-100 p-2 rounded-2xl mb-8">
                            <button onClick={() => { sound.play('click'); setMode('manual'); }} className={`flex-1 py-4 rounded-xl font-bold text-base md:text-lg transition-all ${mode==='manual' ? 'bg-white text-rose-600 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>Thủ công</button>
                            <button onClick={() => { sound.play('click'); setMode('ai'); }} className={`flex-1 py-4 rounded-xl font-bold text-base md:text-lg transition-all ${mode==='ai' ? 'bg-white text-purple-600 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>Auto AI</button>
                        </div>

                        <div className="space-y-6 flex-1">
                            <div>
                                <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Tên bài học / Chủ đề</label>
                                <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="VD: IELTS Reading Task 1, Past Tense..." className="w-full p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-2xl outline-none font-bold text-lg text-slate-700 placeholder-slate-300 transition"/>
                            </div>
                            
                            {/* Manual Mode Fields */}
                            {mode === 'manual' && (
                                <div className="space-y-6 animate-in fade-in">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Nội dung / Ngữ cảnh (Để tạo câu hỏi)</label>
                                            <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="Dán bài đọc, đoạn văn hoặc ghi chú ngữ pháp vào đây..." className="w-full p-4 h-32 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-2xl outline-none font-medium text-sm text-slate-700 resize-none transition"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Số câu</label>
                                            <input type="number" min="1" max="50" value={numQuestions} onChange={e=>setNumQuestions(e.target.value)} className="w-full p-4 h-32 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-2xl outline-none font-black text-3xl text-slate-700 text-center transition"/>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-blue-700 text-lg flex items-center gap-2">Bước 1: Lấy Prompt</h3>
                                            <button onClick={copyPrompt} className="text-sm bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-blue-700 transition">COPY PROMPT</button>
                                        </div>
                                        <p className="text-sm text-blue-800">Copy prompt này -> Dán vào AI -> Copy JSON trả về -> Dán xuống dưới.</p>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Bước 2: Dán JSON từ AI</label>
                                        <textarea value={jsonInput} onChange={e=>setJsonInput(e.target.value)} placeholder='[{"type":"mc",...}]' className="w-full h-40 p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-3xl outline-none font-mono text-sm transition"></textarea>
                                    </div>
                                    
                                    <button onClick={handleStartManual} className="btn-pushable mt-2">
                                        <span className="shadow"></span><span className="edge"></span><span className="front">BẮT ĐẦU HỌC</span>
                                    </button>
                                </div>
                            )}

                            {/* AI Mode Fields */}
                            {mode === 'ai' && (
                                <div className="space-y-6 animate-in fade-in">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Nội dung bổ sung (Tùy chọn)</label>
                                        <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="Chi tiết thêm cho AI..." className="w-full p-4 h-24 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-purple-400 rounded-2xl outline-none text-sm transition"/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-purple-400 mb-2 uppercase ml-2">API Key Gemini</label>
                                        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full p-5 bg-purple-50 border-2 border-transparent focus:bg-white focus:border-purple-400 rounded-2xl outline-none text-lg transition"/>
                                    </div>
                                    <button onClick={handleStartAI} disabled={loading} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-5 rounded-2xl font-bold text-xl shadow-xl transition-all flex justify-center items-center gap-3 disabled:opacity-70">
                                        {loading ? <RefreshCw className="animate-spin" size={24}/> : <Zap size={24}/>} 
                                        {loading ? 'Đang tạo bài...' : 'TẠO TỰ ĐỘNG'}
                                    </button>
                                </div>
                            )}
                            {error && <div className="p-4 bg-red-50 text-red-500 rounded-2xl text-center text-base font-bold border border-red-100 animate-pulse">{error}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const QuestionCard = ({ data, onAnswer, feedback, sound }) => {
            const [userAnswer, setUserAnswer] = useState(null);
            const { speak } = useTTS(); // Use TTS hook
            
            useEffect(() => { setUserAnswer(null); }, [data]);

            const submitAnswer = (ans) => {
                if (feedback) return;
                sound.play('click');
                setUserAnswer(ans);
                
                // --- STRICT ANSWER CHECKING ---
                const isCorrect = checkAnswer(data.type, ans, data.answer);
                
                onAnswer(isCorrect, ans);
            };

            const renderContent = () => {
                switch (data.type) {
                    case 'mc':
                        return (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                                {data.options.map((opt, idx) => (
                                    <button key={idx} disabled={!!feedback} onClick={() => submitAnswer(idx)} 
                                        className={`p-6 rounded-3xl border-b-[6px] text-left font-bold text-lg text-slate-700 transition-all active:scale-[0.98] 
                                        ${userAnswer === idx ? 'bg-rose-200 border-rose-300' : 'bg-slate-50 border-slate-200 hover:bg-white hover:border-pink-200'}`}>
                                        <span className="inline-block w-8 h-8 bg-white rounded-full text-center text-rose-500 text-lg mr-3 leading-8 shadow-sm">{String.fromCharCode(65+idx)}</span>
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        );
                    case 'tf':
                        return (
                            <div className="flex gap-4 md:gap-8 mt-12">
                                {[true, false].map((val) => (
                                    <button key={val} disabled={!!feedback} onClick={() => submitAnswer(val)} 
                                        className={`flex-1 py-10 rounded-[2.5rem] border-b-[8px] font-black text-3xl transition-all active:scale-95 active:border-b-0 active:translate-y-2
                                        ${val ? (userAnswer===true ? 'bg-green-100 border-green-300 text-green-700' : 'bg-green-50 border-green-200 text-green-600 hover:bg-green-100') 
                                            : (userAnswer===false ? 'bg-rose-100 border-rose-300 text-rose-700' : 'bg-rose-50 border-rose-200 text-rose-600 hover:bg-rose-100')}`}>
                                        {val ? "TRUE" : "FALSE"}
                                    </button>
                                ))}
                            </div>
                        );
                    case 'fill':
                        return (
                            <div className="mt-12">
                                <input type="text" disabled={!!feedback} placeholder="Type answer..." 
                                    className="w-full p-8 border-4 border-slate-200 rounded-3xl text-3xl outline-none focus:border-rose-400 font-bold text-center text-rose-600 placeholder-slate-300 bg-white transition shadow-inner"
                                    onBlur={(e) => { if(!feedback && e.target.value) submitAnswer(e.target.value); }}
                                    onKeyDown={(e) => { if (e.key === 'Enter') submitAnswer(e.target.value); }} />
                                <div className="text-center text-slate-400 text-sm font-bold mt-4 uppercase tracking-widest">(ENTER TO SUBMIT)</div>
                            </div>
                        );
                    case 'order':
                        const [currentOrder, setCurrentOrder] = useState([]);
                        const [scrambleOrder, setScrambleOrder] = useState([]);
                        useEffect(() => {
                            if (data.type === 'order') {
                                const words = data.answer.split(' ').map((w, i) => ({ id: i, text: w }));
                                for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [words[i], words[j]] = [words[j], words[i]]; }
                                setScrambleOrder(words); setCurrentOrder([]);
                            }
                        }, [data]);
                        const handleWordClick = (word) => { if (feedback) return; sound.play('click'); setCurrentOrder([...currentOrder, word]); setScrambleOrder(scrambleOrder.filter(w => w.id !== word.id)); };
                        const handleReset = () => { if (feedback) return; sound.play('click'); const words = data.answer.split(' ').map((w, i) => ({ id: i, text: w })); for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [words[i], words[j]] = [words[j], words[i]]; } setScrambleOrder(words); setCurrentOrder([]); };
                        const checkOrder = () => { submitAnswer(currentOrder.map(w => w.text).join(' ')); };
                        return (
                            <div className="mt-8 space-y-6">
                                <div className="min-h-[120px] p-6 bg-slate-50 border-2 border-dashed border-slate-300 rounded-3xl flex flex-wrap gap-3 items-center justify-center transition">
                                    {currentOrder.map((word, idx) => (<motion.span layout key={idx} className="bg-white border-b-4 border-rose-200 text-rose-700 px-4 py-3 rounded-xl font-bold text-lg shadow-sm">{word.text}</motion.span>))}
                                </div>
                                <div className="flex flex-wrap gap-3 justify-center">
                                    <AnimatePresence>
                                    {scrambleOrder.map((word) => (<motion.button layout initial={{scale: 0}} animate={{scale: 1}} exit={{scale: 0}} key={word.id} onClick={() => handleWordClick(word)} disabled={!!feedback} className="bg-white border-b-4 border-slate-200 text-slate-600 px-4 py-3 rounded-2xl font-bold active:border-b-0 active:translate-y-1 transition-all text-lg hover:bg-rose-50 hover:text-rose-500 hover:border-rose-200">{word.text}</motion.button>))}
                                    </AnimatePresence>
                                </div>
                                {!feedback && (
                                    <div className="grid grid-cols-3 gap-4 mt-6 max-w-xl mx-auto">
                                        <button onClick={handleReset} className="col-span-1 bg-slate-200 text-slate-500 rounded-2xl font-bold py-4 text-base hover:bg-slate-300 transition">Reset</button>
                                        <button onClick={checkOrder} className="col-span-2 bg-rose-500 text-white rounded-2xl font-bold py-4 shadow-xl active:scale-95 transition text-lg">Gửi Đáp Án</button>
                                    </div>
                                )}
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="bg-white/90 backdrop-blur-xl p-6 md:p-10 rounded-[3rem] shadow-2xl relative z-10 w-full max-w-5xl border-4 border-white mx-auto mt-4">
                    <div className="mb-6 md:mb-8 relative">
                        <span className={`inline-block px-4 py-2 rounded-xl text-sm font-black uppercase mb-4 tracking-wider shadow-sm
                            ${data.type === 'mc' ? 'bg-blue-100 text-blue-600' : data.type === 'tf' ? 'bg-purple-100 text-purple-600' : data.type === 'fill' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`}>
                            {data.type === 'mc' ? 'Multiple Choice' : data.type === 'tf' ? 'True / False' : data.type === 'fill' ? 'Fill in Blank' : 'Sentence Order'}
                        </span>
                        <div className="flex gap-4 items-start mt-2">
                            <h3 className="text-2xl md:text-4xl font-black text-slate-800 leading-snug flex-1">{data.question}</h3>
                            <button onClick={() => speak(data.question)} className="p-3 bg-white border-2 border-slate-100 rounded-full text-slate-400 hover:text-rose-500 hover:border-rose-200 transition shadow-sm flex-shrink-0">
                                <Volume2 size={24}/>
                            </button>
                        </div>
                    </div>
                    {renderContent()}
                </div>
            );
        };

        const LearningSession = ({ questions, topic, onFinish, sound }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [history, setHistory] = useState([]);

            const currentQ = questions[currentIdx];
            const progress = ((currentIdx + 1) / questions.length) * 100;

            const handleAnswer = (isCorrect, userAns) => {
                setFeedback({ isCorrect, userAns });
                if (isCorrect) setScore(s => s + 1);
                
                setHistory([...history, {
                    question: currentQ.question,
                    isCorrect,
                    userAns,
                    correctAns: currentQ.answer,
                    vocab: currentQ.vocabulary || [],
                    explanation: currentQ.explanation
                }]);
            };

            const nextQuestion = () => {
                setFeedback(null);
                if (currentIdx < questions.length - 1) {
                    setCurrentIdx(c => c + 1);
                } else {
                    onFinish(score, questions.length, history);
                }
            };

            return (
                <div className="min-h-screen pb-10 flex flex-col items-center justify-start pt-24 px-4 relative">
                    <div className="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md z-40 px-6 py-4 flex justify-between items-center shadow-sm border-b border-white">
                        <div className="font-bold text-rose-500 text-lg truncate max-w-[200px] md:max-w-md">{topic}</div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => sound.setIsMuted(!sound.isMuted)} className="text-slate-400 hover:text-rose-500">{sound.isMuted ? <VolumeX size={20}/> : <Volume2 size={20}/>}</button>
                            <div className="font-black text-slate-700 bg-slate-100 px-4 py-2 rounded-full text-base">{currentIdx + 1}/{questions.length}</div>
                        </div>
                    </div>
                    <div className="fixed top-[72px] left-0 w-full h-3 bg-slate-100 z-40">
                        <motion.div animate={{width: `${progress}%`}} className="h-full bg-rose-500 rounded-r-full shadow-[0_0_10px_rgba(225,29,72,0.5)]"></motion.div>
                    </div>

                    <QuestionCard key={currentIdx} data={currentQ} onAnswer={handleAnswer} feedback={feedback} sound={sound} />

                    <AnimatePresence>
                        {feedback && (
                            <FeedbackPopup feedback={feedback} data={currentQ} onNext={nextQuestion} isLast={currentIdx === questions.length - 1} playSound={sound.play} />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const Summary = ({ score, total, detailHistory, onHome, sound }) => {
            const percentage = score/total;
            useEffect(() => { if(percentage > 0.5) sound.play('win'); }, []);

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative z-10">
                    <div className="glass-panel p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-xl text-center bg-white relative overflow-hidden">
                        <div className="mb-8 mt-4">
                            <div className="text-9xl mb-6 animate-bounce drop-shadow-2xl">{percentage > 0.8 ? '😻' : (percentage > 0.5 ? '😺' : '😿')}</div>
                            <h2 className="text-5xl font-black text-rose-600 mb-3">KẾT QUẢ</h2>
                            <p className="text-slate-500 font-bold text-lg">{percentage > 0.8 ? 'Xuất sắc chuẩn IELTS!' : 'Cố gắng hơn nhé!'}</p>
                        </div>
                        <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 mb-10">
                            <div className="text-8xl font-black text-rose-500 tracking-tighter">{score}<span className="text-4xl text-slate-300">/{total}</span></div>
                            <div className="text-sm font-bold text-slate-400 uppercase tracking-widest mt-2">Câu đúng</div>
                        </div>
                        <button onClick={() => { sound.play('click'); onHome(); }} className="btn-pushable">
                            <span className="shadow"></span><span className="edge"></span><span className="front flex items-center justify-center gap-3 py-6"><Home size={28}/> VỀ TRANG CHỦ</span>
                        </button>
                    </div>
                </div>
            );
        };

        const HistoryDetailModal = ({ session, onClose, sound }) => {
            if (!session) return null;
            const allVocab = [...new Set(session.details.flatMap(d => d.vocab))];
            const { speak } = useTTS(); // Use TTS hook

            return (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/50 backdrop-blur-md">
                    <motion.div initial={{ y: "100%" }} animate={{ y: 0 }} className="bg-white w-full sm:max-w-4xl h-[90vh] sm:h-auto sm:max-h-[90vh] rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl border-4 border-white">
                        <div className="bg-slate-50 p-6 flex justify-between items-center border-b border-slate-100">
                            <h2 className="text-2xl font-black text-rose-600 flex items-center gap-2"><BookOpen size={28}/> Chi Tiết Bài Học</h2>
                            <button onClick={() => { sound.play('click'); onClose(); }} className="bg-white p-3 rounded-full text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition shadow-sm"><X size={24}/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-8 bg-white custom-scrollbar">
                            <section>
                                <h3 className="font-bold text-rose-500 mb-4 text-lg uppercase flex items-center gap-2 tracking-wider"><Sparkles size={20}/> Từ vựng IELTS ({allVocab.length})</h3>
                                {allVocab.length > 0 ? (
                                    <div className="flex flex-wrap gap-3">
                                        {allVocab.map((v, i) => (
                                            <button key={i} onClick={() => speak(v.split(':')[0])} className="bg-yellow-50 px-4 py-2 rounded-xl border border-yellow-200 text-base font-bold text-slate-700 hover:bg-yellow-100 flex items-center gap-2 group transition">
                                                {v} <Volume2 size={16} className="text-yellow-600 opacity-50 group-hover:opacity-100"/>
                                            </button>
                                        ))}
                                    </div>
                                ) : <p className="text-slate-400 italic">Không có từ vựng nào.</p>}
                            </section>
                            <section>
                                <h3 className="font-bold text-blue-500 mb-4 text-lg uppercase flex items-center gap-2 tracking-wider"><Lightbulb size={20}/> Phân Tích Câu Hỏi</h3>
                                <div className="space-y-6">
                                    {session.details.map((item, idx) => (
                                        <div key={idx} className={`p-6 rounded-3xl border-2 ${item.isCorrect ? 'border-green-100 bg-green-50/30' : 'border-rose-100 bg-rose-50/30'}`}>
                                            <div className="flex gap-4 mb-3 items-start">
                                                <div className={`w-4 min-w-[16px] h-4 rounded-full mt-1.5 ${item.isCorrect ? 'bg-green-400' : 'bg-rose-400'}`}></div>
                                                <h4 className="font-bold text-slate-800 text-lg leading-snug flex-1">{item.question}</h4>
                                                <button onClick={() => speak(item.question)} className="p-2 text-slate-400 hover:text-blue-500"><Volume2 size={20}/></button>
                                            </div>
                                            <div className="text-sm text-slate-600 pl-8 space-y-1 mb-4">
                                                <div className="flex gap-2"><span className="font-bold bg-white px-2 rounded border border-slate-200">Đáp án:</span> {String(item.correctAns)}</div>
                                                {!item.isCorrect && <div className="flex gap-2"><span className="font-bold text-rose-500 bg-white px-2 rounded border border-rose-200">Bạn chọn:</span> <span className="text-rose-600 line-through">{String(item.userAns)}</span></div>}
                                            </div>
                                            <div className="bg-white p-5 rounded-2xl text-base text-slate-700 border border-slate-100 leading-relaxed font-medium shadow-sm">
                                                <span className="text-blue-500 font-bold mr-1">Giải thích:</span> {item.explanation || "..."}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState('dashboard');
            const [learnHistory, setLearnHistory] = useLocalStorage('english_meow_history', []);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentTopic, setCurrentTopic] = useState('');
            const [sessionResult, setSessionResult] = useState(null);
            const [viewingHistory, setViewingHistory] = useState(null);
            const sound = useSound();

            const handleExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(learnHistory));
                const a = document.createElement('a'); a.href = dataStr; a.download = "meow_ielts_backup.json";
                document.body.appendChild(a); a.click(); a.remove();
            };

            const handleImport = (event) => {
                const fileReader = new FileReader();
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = e => {
                    try { const d = JSON.parse(e.target.result); if(Array.isArray(d)) { setLearnHistory(d); alert("Đã nhập dữ liệu thành công!"); } } catch(err) { alert("File lỗi rồi sen ơi!"); }
                };
            };

            const startLearning = (questions, topic) => {
                setCurrentQuestions(questions); setCurrentTopic(topic); setScreen('learning');
            };

            const handleRelearn = (session) => {
                // If history saved original questions (new format), use them. 
                // If not (old format), reconstruct roughly or warn user.
                if (session.questions) {
                    startLearning(session.questions, session.topic);
                } else {
                    // Fallback: Reconstruct from details (Warning: might lose some MC options if not saved)
                    // But for now, we assume we start saving questions from now on.
                     if (session.details) {
                        // Attempt reconstruction
                        const reconstructed = session.details.map(d => ({
                            type: 'mc', // Default fallback
                            question: d.question,
                            answer: d.correctAns,
                            explanation: d.explanation || "N/A",
                            vocabulary: d.vocab || [],
                            options: [] // Lost in old format
                        }));
                        alert("Bài học cũ này thiếu dữ liệu đầy đủ. Bạn có thể xem lại nhưng không thể học lại hoàn hảo.");
                     }
                }
            };

            const finishSession = (score, total, detail) => {
                // Save original questions to allow Re-learn
                const newRecord = { 
                    date: new Date().toISOString(), 
                    topic: currentTopic, 
                    score, 
                    total, 
                    details: detail,
                    questions: currentQuestions // IMPORTANT: Save questions for re-learning
                };
                setLearnHistory([...learnHistory, newRecord]);
                setSessionResult({ score, total, detail });
                setScreen('summary');
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden selection:bg-rose-200 selection:text-rose-900">
                    <CuteBackground />
                    {screen === 'dashboard' && <Dashboard history={learnHistory} onStartNew={() => setScreen('setup')} onExport={handleExport} onImport={handleImport} onViewHistory={setViewingHistory} onRelearn={handleRelearn} sound={sound} />}
                    {screen === 'setup' && <SetupSession onBack={() => setScreen('dashboard')} onStart={startLearning} sound={sound} />}
                    {screen === 'learning' && <LearningSession questions={currentQuestions} topic={currentTopic} onFinish={finishSession} sound={sound} />}
                    {screen === 'summary' && sessionResult && <Summary score={sessionResult.score} total={sessionResult.total} detailHistory={sessionResult.detail} onHome={() => setScreen('dashboard')} sound={sound} />}
                    {viewingHistory && <HistoryDetailModal session={viewingHistory} onClose={() => setViewingHistory(null)} sound={sound} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
