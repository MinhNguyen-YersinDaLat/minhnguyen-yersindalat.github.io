<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEOW ENGLISH - IELTS MASTER</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map cho React & Motion -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff0f5; /* Lavender Blush */
            color: #4a044e; /* Slate 900 -> Dark Purple for better contrast */
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            font-size: 18px; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #fff;
            box-shadow: 0 15px 35px -5px rgba(255, 182, 193, 0.4);
        }
        
        .cat-pattern {
            background-image: 
                radial-gradient(#fbcfe8 15%, transparent 16%),
                radial-gradient(#fbcfe8 15%, transparent 16%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.3;
        }

        /* 3D Button Style - Improved */
        .btn-pushable {
            position: relative;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            outline-offset: 4px;
            transition: filter 250ms;
            width: 100%;
            touch-action: manipulation;
        }
        .shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            background: rgba(0,0,0,0.2);
            transform: translateY(6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
        }
        .edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            background: linear-gradient(to left, #be185d 0%, #db2777 8%, #db2777 92%, #be185d 100%);
        }
        .front {
            display: block;
            position: relative;
            padding: 18px 24px;
            border-radius: 1.5rem;
            font-size: 1.25rem;
            color: white;
            background: #ec4899;
            will-change: transform;
            transform: translateY(-6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        .btn-pushable:active .front { transform: translateY(-2px); }
        .btn-pushable:active .shadow { transform: translateY(2px); }
        .btn-pushable:focus:not(:focus-visible) { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            BookOpen, Brain, Save, Download, Upload, RefreshCw, 
            Check, X, ArrowRight, Home, History, Calendar, 
            Zap, Copy, Play, Settings, Lightbulb, RotateCcw, 
            Cat, Star, Sparkles, Pencil, Eye, Info, Volume2, VolumeX
        } from 'lucide-react';

        // --- CẤU HÌNH PROMPT CHO AI (CHUẨN HÓA HỌC THUẬT) ---
        const MASTER_PROMPT = `
ACT AS AN EXPERT IELTS EXAMINER & LINGUIST.
Nhiệm vụ: Tạo bộ dữ liệu bài tập tiếng Anh dưới dạng JSON về chủ đề: "{TOPIC}".
Số lượng: {NUM} câu.
Yêu cầu TỐI MẬT:
1. Dữ liệu phải CHUẨN XÁC 100% về ngữ pháp, từ vựng theo tiêu chuẩn Cambridge/Oxford. KHÔNG được phép sai sót.
2. Giải thích phải chi tiết, học thuật nhưng dễ hiểu (bằng Tiếng Việt).
3. Bao gồm 4 loại câu ngẫu nhiên: "mc" (Trắc nghiệm), "tf" (Đúng/Sai), "fill" (Điền từ), "order" (Sắp xếp câu).

Cấu trúc JSON bắt buộc (Mảng đối tượng):
[
  {
    "type": "mc" | "tf" | "fill" | "order",
    "question": "Nội dung câu hỏi (Nếu là IELTS, hãy dùng câu văn học thuật)",
    "options": ["A", "B", "C", "D"] (Chỉ cho 'mc', còn lại để []),
    "answer": "Đáp án đúng chính xác",
    "explanation": "Giải thích ngữ pháp/ngữ nghĩa chi tiết. Tại sao đúng? Tại sao sai?",
    "vocabulary": ["Word1: Nghĩa Tiếng Việt", "Word2: Nghĩa Tiếng Việt"] (2-4 từ vựng IELTS có trong câu)
  }
]
Chỉ trả về JSON thuần túy.
`;

        // --- SOUND MANAGER ---
        const useSound = () => {
            const [isMuted, setIsMuted] = useState(false);

            // Sử dụng link CDN ổn định cho âm thanh game cơ bản
            const sounds = {
                correct: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3', // Ping success
                wrong: 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3', // Error tone
                click: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3', // Pop click
                win: 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3' // Achievement
            };

            const play = (type) => {
                if (isMuted) return;
                try {
                    const audio = new Audio(sounds[type]);
                    audio.volume = 0.5;
                    audio.play().catch(e => console.error("Audio block:", e));
                } catch (e) { console.error(e); }
            };

            return { isMuted, setIsMuted, play };
        };

        // --- STORAGE MANAGER ---
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) { console.error(error); }
            };
            return [storedValue, setValue];
        };

        // --- BACKGROUND COMPONENT ---
        const CuteBackground = () => (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden bg-gradient-to-br from-purple-50 via-pink-50 to-white">
                <div className="absolute inset-0 cat-pattern"></div>
                {/* Floating Elements */}
                <motion.div animate={{ y: [0, -15, 0], rotate: [0, 5, 0] }} transition={{ duration: 6, repeat: Infinity }} className="absolute top-10 left-[10%] text-5xl opacity-20 filter blur-[1px]">🐾</motion.div>
                <motion.div animate={{ y: [0, 20, 0], rotate: [0, -10, 0] }} transition={{ duration: 7, repeat: Infinity }} className="absolute bottom-20 right-[15%] text-6xl opacity-20 filter blur-[1px]">🧶</motion.div>
                <motion.div animate={{ scale: [1, 1.1, 1] }} transition={{ duration: 5, repeat: Infinity }} className="absolute top-1/2 right-10 text-4xl opacity-20">✨</motion.div>
            </div>
        );

        // --- IMPROVED FEEDBACK POPUP ---
        const FeedbackPopup = ({ feedback, data, onNext, isLast, playSound }) => {
            if (!feedback) return null;

            useEffect(() => {
                if(feedback.isCorrect) playSound('correct');
                else playSound('wrong');
            }, []);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                    {/* Bouncing Animation Wrapper */}
                    <motion.div 
                        initial={{ scale: 0.8, opacity: 0, y: 50 }}
                        animate={{ scale: 1, opacity: 1, y: 0 }}
                        exit={{ scale: 0.8, opacity: 0, y: 50 }}
                        transition={{ type: "spring", damping: 15, stiffness: 300 }}
                        className="w-full max-w-xl relative"
                    >
                        {/* THE ICON - Absolute positioned but managed to not be cut off */}
                        <div className="absolute -top-16 left-1/2 -translate-x-1/2 z-20">
                            <motion.div 
                                initial={{ scale: 0 }} animate={{ scale: 1 }} 
                                className="bg-white p-3 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] border-[6px] border-pink-100"
                            >
                                <div className="text-7xl">
                                    {feedback.isCorrect ? '😻' : '🙀'}
                                </div>
                            </motion.div>
                        </div>

                        {/* CARD CONTENT */}
                        <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white pt-16 pb-8 px-8 relative">
                            {/* Decorative Header Background */}
                            <div className={`absolute top-0 left-0 w-full h-24 opacity-20 ${feedback.isCorrect ? 'bg-green-400' : 'bg-rose-400'}`}></div>

                            <div className="text-center relative z-10">
                                <h3 className={`text-4xl font-black mb-2 tracking-tight ${feedback.isCorrect ? 'text-green-600' : 'text-rose-600'}`}>
                                    {feedback.isCorrect ? 'CHÍNH XÁC!' : 'SAI RỒI!'}
                                </h3>
                                <p className="text-slate-400 font-bold text-sm mb-6">{feedback.isCorrect ? 'Giỏi quá đi meow!' : 'Đừng buồn, xem giải thích nha!'}</p>
                            </div>

                            <div className="max-h-[50vh] overflow-y-auto custom-scrollbar space-y-4 px-2">
                                {/* Answer Info (Only show correct answer if wrong) */}
                                {!feedback.isCorrect && (
                                    <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-center animate-pulse">
                                        <div className="text-xs text-rose-400 font-bold uppercase mb-1">Đáp án đúng là</div>
                                        <div className="text-2xl font-black text-rose-600">{String(data.answer)}</div>
                                    </div>
                                )}

                                {/* Explanation */}
                                <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 text-left">
                                    <h4 className="flex items-center gap-2 font-bold text-blue-600 text-base mb-2"><Info size={20}/> Giải thích chi tiết:</h4>
                                    <p className="text-slate-700 text-lg leading-relaxed font-medium">{data.explanation}</p>
                                </div>

                                {/* Vocabulary */}
                                {data.vocabulary && data.vocabulary.length > 0 && (
                                    <div className="bg-yellow-50 p-5 rounded-2xl border border-yellow-100 text-left">
                                        <h4 className="flex items-center gap-2 font-bold text-yellow-600 text-base mb-3"><Sparkles size={20}/> Từ vựng IELTS:</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {data.vocabulary.map((v, i) => (
                                                <span key={i} className="bg-white px-3 py-1.5 rounded-lg text-base font-bold text-slate-700 shadow-sm border border-yellow-200">{v}</span>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Action Button */}
                            <div className="mt-6 pt-4 border-t border-slate-100">
                                <button onClick={() => { playSound('click'); onNext(); }} className="btn-pushable w-full">
                                    <span className="shadow"></span>
                                    <span className="edge"></span>
                                    <span className="front flex items-center justify-center gap-2">
                                        {isLast ? "XEM KẾT QUẢ" : "CÂU TIẾP THEO"} <ArrowRight/>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // --- DASHBOARD ---
        const Dashboard = ({ history, onStartNew, onImport, onExport, onViewHistory, sound }) => {
            const totalSessions = history.length;
            const totalQuestions = history.reduce((acc, curr) => acc + curr.total, 0);
            const totalCorrect = history.reduce((acc, curr) => acc + curr.score, 0);
            const accuracy = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;

            return (
                <div className="w-full max-w-4xl mx-auto p-4 md:p-8 relative z-10 pb-20">
                    {/* Header */}
                    <div className="flex justify-end mb-4">
                        <button onClick={() => sound.setIsMuted(!sound.isMuted)} className="bg-white p-3 rounded-full shadow-md text-pink-400 hover:scale-110 transition">
                            {sound.isMuted ? <VolumeX size={24}/> : <Volume2 size={24}/>}
                        </button>
                    </div>

                    <div className="text-center mb-10">
                        <motion.div 
                            initial={{ scale: 0 }} animate={{ scale: 1 }} 
                            className="inline-block p-6 bg-white rounded-[2rem] mb-6 shadow-xl border-4 border-pink-200"
                        >
                            <Cat size={80} className="text-rose-500" strokeWidth={2} />
                        </motion.div>
                        <h1 className="text-5xl md:text-7xl font-black text-rose-600 tracking-tighter drop-shadow-sm mb-2">MEOW ENGLISH</h1>
                        <p className="text-slate-500 font-bold text-lg md:text-xl bg-white/60 inline-block px-4 py-1 rounded-full backdrop-blur-sm">
                            Trợ lý IELTS AI Siêu Cấp 😽
                        </p>
                    </div>

                    {/* Main Actions */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        <motion.div whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }}>
                            <button onClick={() => { sound.play('click'); onStartNew(); }} className="btn-pushable h-full">
                                <span className="shadow"></span>
                                <span className="edge"></span>
                                <span className="front flex flex-col items-center justify-center gap-4 py-10 h-full">
                                    <Play size={48} fill="currentColor" className="opacity-90"/>
                                    <span className="text-2xl md:text-3xl tracking-wide">HỌC NGAY</span>
                                    <span className="text-sm font-medium opacity-80 bg-black/10 px-3 py-1 rounded-full">Tự động hoặc Thủ công</span>
                                </span>
                            </button>
                        </motion.div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 h-full">
                             <label className="bg-white hover:bg-pink-50 cursor-pointer rounded-3xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm border-2 border-pink-100 transition h-full group">
                                <div className="bg-pink-100 p-4 rounded-full text-rose-500 group-hover:scale-110 transition"><Upload size={28}/></div>
                                <span className="font-bold text-lg text-slate-600">Nhập bài</span>
                                <input type="file" className="hidden" accept=".json" onChange={onImport} />
                            </label>
                            <button onClick={onExport} className="bg-white hover:bg-pink-50 cursor-pointer rounded-3xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm border-2 border-pink-100 transition h-full group">
                                <div className="bg-blue-100 p-4 rounded-full text-blue-500 group-hover:scale-110 transition"><Download size={28}/></div>
                                <span className="font-bold text-lg text-slate-600">Lưu Backup</span>
                            </button>
                        </div>
                    </div>

                    {/* Stats Bar */}
                    <div className="glass-panel p-6 rounded-3xl flex justify-between items-center mb-8 px-8 md:px-12">
                        <div className="text-center">
                            <div className="text-3xl font-black text-purple-500">{totalSessions}</div>
                            <div className="text-xs font-bold text-slate-400 uppercase">Bài học</div>
                        </div>
                        <div className="w-px h-10 bg-slate-200"></div>
                        <div className="text-center">
                            <div className="text-3xl font-black text-green-500">{accuracy}%</div>
                            <div className="text-xs font-bold text-slate-400 uppercase">Điểm TB</div>
                        </div>
                        <div className="w-px h-10 bg-slate-200"></div>
                        <div className="text-center">
                            <div className="text-3xl font-black text-blue-500">{totalQuestions}</div>
                            <div className="text-xs font-bold text-slate-400 uppercase">Câu hỏi</div>
                        </div>
                    </div>

                    {/* History List */}
                    <div className="glass-panel rounded-[2.5rem] p-8">
                        <h2 className="text-2xl font-black mb-6 flex items-center gap-3 text-rose-600"><Calendar size={28}/> Lịch Sử Ôn Luyện</h2>
                        <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                            {history.length === 0 ? (
                                <div className="text-center text-slate-400 py-12 text-lg">Chưa có dữ liệu nào sen ơi! 🐾</div>
                            ) : (
                                [...history].reverse().map((session, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => { sound.play('click'); onViewHistory(session); }}
                                        className="flex items-center justify-between p-5 bg-white rounded-2xl border border-pink-50 shadow-sm hover:shadow-md hover:-translate-y-1 transition cursor-pointer group"
                                    >
                                        <div className="flex items-center gap-4 overflow-hidden">
                                            <div className={`font-black w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-inner ${session.score/session.total >= 0.8 ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-500'}`}>
                                                {session.score}/{session.total}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="font-bold text-slate-700 text-lg truncate group-hover:text-rose-500 transition">{session.topic}</div>
                                                <div className="text-sm text-slate-400 font-medium">
                                                    {new Date(session.date).toLocaleDateString('vi-VN')}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-2 rounded-full text-slate-300 group-hover:bg-rose-500 group-hover:text-white transition">
                                            <ArrowRight size={20}/>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SETUP SESSION ---
        const SetupSession = ({ onStart, onBack, sound }) => {
            const [mode, setMode] = useState('manual');
            const [apiKey, setApiKey] = useState('');
            const [topic, setTopic] = useState('');
            const [numQuestions, setNumQuestions] = useState(10);
            const [jsonInput, setJsonInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const copyPrompt = () => {
                sound.play('click');
                const finalNum = numQuestions || 10;
                const finalPrompt = MASTER_PROMPT.replace("{TOPIC}", topic || "IELTS General").replace("{NUM}", finalNum);
                navigator.clipboard.writeText(finalPrompt);
                alert("Đã copy lệnh IELTS chuẩn! Hãy dán vào AI.");
            };

            const handleStartAI = async () => {
                sound.play('click');
                if (!apiKey || !topic) return setError("Thiếu Key hoặc Chủ đề rồi!");
                setLoading(true); setError('');
                try {
                    const finalPrompt = MASTER_PROMPT.replace("{TOPIC}", topic).replace("{NUM}", numQuestions);
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    
                    let text = data.candidates[0].content.parts[0].text;
                    text = text.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                    const questions = JSON.parse(text);
                    onStart(questions, topic);
                } catch (err) {
                    setError("Lỗi AI: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleStartManual = () => {
                sound.play('click');
                try {
                    if (!jsonInput) return setError("Chưa dán JSON kìa!");
                    const questions = JSON.parse(jsonInput);
                    if (!Array.isArray(questions)) throw new Error("JSON lỗi format");
                    onStart(questions, topic || "Thủ công");
                } catch (err) {
                    setError("Lỗi JSON: " + err.message);
                }
            };

            return (
                <div className="w-full max-w-3xl mx-auto p-4 md:p-8 min-h-screen flex flex-col relative z-10">
                    <button onClick={() => { sound.play('click'); onBack(); }} className="self-start flex items-center text-slate-500 hover:text-rose-500 font-bold mb-6 gap-2 bg-white px-5 py-3 rounded-full shadow-sm hover:bg-rose-50 transition"><Home size={20}/> Quay về</button>
                    
                    <div className="bg-white rounded-[2.5rem] p-6 md:p-10 shadow-2xl border-4 border-white flex-1 flex flex-col">
                        <h2 className="text-3xl md:text-4xl font-black text-rose-500 mb-8 text-center flex items-center justify-center gap-3">
                             Tạo Bài Mới <Pencil className="animate-bounce" />
                        </h2>

                        {/* Mode Toggle */}
                        <div className="flex bg-slate-100 p-2 rounded-2xl mb-8">
                            <button onClick={() => { sound.play('click'); setMode('manual'); }} className={`flex-1 py-4 rounded-xl font-bold text-base md:text-lg transition-all ${mode==='manual' ? 'bg-white text-rose-600 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>
                                Thủ công
                            </button>
                            <button onClick={() => { sound.play('click'); setMode('ai'); }} className={`flex-1 py-4 rounded-xl font-bold text-base md:text-lg transition-all ${mode==='ai' ? 'bg-white text-purple-600 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>
                                Auto AI
                            </button>
                        </div>

                        <div className="space-y-6 flex-1">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Chủ đề (IELTS Topic)</label>
                                    <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="VD: Environment, Technology..." className="w-full p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-2xl outline-none font-bold text-lg text-slate-700 placeholder-slate-300 transition"/>
                                </div>
                                {mode === 'ai' && (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Số câu</label>
                                        <input type="number" min="1" max="50" value={numQuestions} onChange={e=>setNumQuestions(e.target.value)} className="w-full p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-2xl outline-none font-bold text-lg text-slate-700 text-center transition"/>
                                    </div>
                                )}
                            </div>

                            {mode === 'manual' ? (
                                <div className="space-y-6 pt-4 animate-in fade-in">
                                    <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-10"><Copy size={100}/></div>
                                        <div className="flex justify-between items-center mb-4 relative z-10">
                                            <h3 className="font-bold text-blue-700 text-lg flex items-center gap-2">Bước 1: Lấy Lệnh (Prompt)</h3>
                                            <button onClick={copyPrompt} className="text-sm bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-blue-700 transition">COPY</button>
                                        </div>
                                        <p className="text-base text-blue-800 font-medium relative z-10">Copy lệnh này dán vào AI để lấy bộ câu hỏi IELTS chuẩn 100%.</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-400 mb-2 uppercase ml-2">Bước 2: Dán JSON</label>
                                        <textarea value={jsonInput} onChange={e=>setJsonInput(e.target.value)} placeholder='[{"type":"mc",...}]' className="w-full h-48 p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-rose-400 rounded-3xl outline-none font-mono text-sm transition"></textarea>
                                    </div>
                                    <div className="mt-4">
                                        <button onClick={handleStartManual} className="btn-pushable">
                                            <span className="shadow"></span>
                                            <span className="edge"></span>
                                            <span className="front">BẮT ĐẦU NGAY</span>
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6 pt-4 animate-in fade-in">
                                    <div>
                                        <label className="block text-sm font-bold text-purple-400 mb-2 uppercase ml-2">API Key Gemini</label>
                                        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full p-5 bg-purple-50 border-2 border-transparent focus:bg-white focus:border-purple-400 rounded-2xl outline-none text-lg transition"/>
                                    </div>
                                    <div className="mt-8">
                                        <button onClick={handleStartAI} disabled={loading} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-5 rounded-2xl font-bold text-xl shadow-xl transition-all flex justify-center items-center gap-3 disabled:opacity-70">
                                            {loading ? <RefreshCw className="animate-spin" size={24}/> : <Zap size={24}/>} 
                                            {loading ? 'Đang tạo dữ liệu...' : 'TẠO BÀI TẬP'}
                                        </button>
                                    </div>
                                </div>
                            )}
                            {error && <div className="p-4 bg-red-50 text-red-500 rounded-2xl text-center text-base font-bold border border-red-100 animate-pulse">{error}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- LEARNING SESSION ---
        const QuestionCard = ({ data, onAnswer, feedback, sound }) => {
            const [userAnswer, setUserAnswer] = useState(null);
            
            useEffect(() => {
                setUserAnswer(null);
            }, [data]);

            const submitAnswer = (ans) => {
                if (feedback) return;
                sound.play('click');
                setUserAnswer(ans);
                
                let isCorrect = false;
                if (data.type === 'mc') isCorrect = (ans === data.answer);
                if (data.type === 'tf') isCorrect = (ans === data.answer);
                if (data.type === 'fill') isCorrect = (ans.toLowerCase().trim() === data.answer.toLowerCase().trim());
                if (data.type === 'order') isCorrect = (ans === data.answer);
                
                onAnswer(isCorrect, ans);
            };

            const renderContent = () => {
                switch (data.type) {
                    case 'mc':
                        return (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                                {data.options.map((opt, idx) => (
                                    <button 
                                        key={idx} 
                                        disabled={!!feedback} 
                                        onClick={() => submitAnswer(idx)} 
                                        className={`p-6 rounded-3xl border-b-[6px] text-left font-bold text-lg text-slate-700 transition-all active:scale-[0.98] 
                                        ${userAnswer === idx ? 'bg-rose-200 border-rose-300' : 'bg-slate-50 border-slate-200 hover:bg-white hover:border-pink-200'}`}
                                    >
                                        <span className="inline-block w-8 h-8 bg-white rounded-full text-center text-rose-500 text-lg mr-3 leading-8 shadow-sm">{String.fromCharCode(65+idx)}</span>
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        );
                    case 'tf':
                        return (
                            <div className="flex gap-4 md:gap-8 mt-12">
                                {[true, false].map((val) => (
                                    <button 
                                        key={val} 
                                        disabled={!!feedback} 
                                        onClick={() => submitAnswer(val)} 
                                        className={`flex-1 py-10 rounded-[2.5rem] border-b-[8px] font-black text-3xl transition-all active:scale-95 active:border-b-0 active:translate-y-2
                                        ${val 
                                            ? (userAnswer===true ? 'bg-green-100 border-green-300 text-green-700' : 'bg-green-50 border-green-200 text-green-600 hover:bg-green-100') 
                                            : (userAnswer===false ? 'bg-rose-100 border-rose-300 text-rose-700' : 'bg-rose-50 border-rose-200 text-rose-600 hover:bg-rose-100')}`}
                                    >
                                        {val ? "TRUE" : "FALSE"}
                                    </button>
                                ))}
                            </div>
                        );
                    case 'fill':
                        return (
                            <div className="mt-12">
                                <input type="text" disabled={!!feedback} placeholder="Type your answer..." 
                                    className="w-full p-8 border-4 border-slate-200 rounded-3xl text-3xl outline-none focus:border-rose-400 font-bold text-center text-rose-600 placeholder-slate-300 bg-white transition shadow-inner"
                                    onBlur={(e) => { if(!feedback && e.target.value) submitAnswer(e.target.value); }}
                                    onKeyDown={(e) => { if (e.key === 'Enter') submitAnswer(e.target.value); }}
                                />
                                <div className="text-center text-slate-400 text-sm font-bold mt-4 uppercase tracking-widest">(Nhấn Enter để gửi)</div>
                            </div>
                        );
                    case 'order':
                        const [currentOrder, setCurrentOrder] = useState([]);
                        const [scrambleOrder, setScrambleOrder] = useState([]);
                        
                        useEffect(() => {
                            if (data.type === 'order') {
                                const words = data.answer.split(' ').map((w, i) => ({ id: i, text: w }));
                                for (let i = words.length - 1; i > 0; i--) {
                                    const j = Math.floor(Math.random() * (i + 1));
                                    [words[i], words[j]] = [words[j], words[i]];
                                }
                                setScrambleOrder(words);
                                setCurrentOrder([]);
                            }
                        }, [data]);

                        const handleWordClick = (word) => { 
                            if (feedback) return; 
                            sound.play('click');
                            setCurrentOrder([...currentOrder, word]); 
                            setScrambleOrder(scrambleOrder.filter(w => w.id !== word.id)); 
                        };
                        const handleReset = () => { 
                            if (feedback) return; 
                            sound.play('click');
                            const words = data.answer.split(' ').map((w, i) => ({ id: i, text: w })); for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [words[i], words[j]] = [words[j], words[i]]; } setScrambleOrder(words); setCurrentOrder([]); 
                        };
                        const checkOrder = () => { submitAnswer(currentOrder.map(w => w.text).join(' ')); };

                        return (
                            <div className="mt-8 space-y-6">
                                <div className="min-h-[120px] p-6 bg-slate-50 border-2 border-dashed border-slate-300 rounded-3xl flex flex-wrap gap-3 items-center justify-center transition">
                                    {currentOrder.map((word, idx) => (<motion.span layout key={idx} className="bg-white border-b-4 border-rose-200 text-rose-700 px-4 py-3 rounded-xl font-bold text-lg shadow-sm">{word.text}</motion.span>))}
                                    {currentOrder.length === 0 && <span className="text-slate-300 text-lg font-bold">Chọn từ bên dưới...</span>}
                                </div>
                                <div className="flex flex-wrap gap-3 justify-center">
                                    <AnimatePresence>
                                    {scrambleOrder.map((word) => (<motion.button layout initial={{scale: 0}} animate={{scale: 1}} exit={{scale: 0}} key={word.id} onClick={() => handleWordClick(word)} disabled={!!feedback} className="bg-white border-b-4 border-slate-200 text-slate-600 px-4 py-3 rounded-2xl font-bold active:border-b-0 active:translate-y-1 transition-all text-lg hover:bg-rose-50 hover:text-rose-500 hover:border-rose-200">{word.text}</motion.button>))}
                                    </AnimatePresence>
                                </div>
                                {!feedback && (
                                    <div className="grid grid-cols-3 gap-4 mt-6 max-w-xl mx-auto">
                                        <button onClick={handleReset} className="col-span-1 bg-slate-200 text-slate-500 rounded-2xl font-bold py-4 text-base hover:bg-slate-300 transition">Xếp Lại</button>
                                        <button onClick={checkOrder} className="col-span-2 bg-rose-500 text-white rounded-2xl font-bold py-4 shadow-xl active:scale-95 transition text-lg">Gửi Đáp Án</button>
                                    </div>
                                )}
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="bg-white/90 backdrop-blur-xl p-6 md:p-10 rounded-[3rem] shadow-2xl relative z-10 w-full max-w-5xl border-4 border-white mx-auto mt-4">
                    <div className="mb-6 md:mb-8">
                        <span className={`inline-block px-4 py-2 rounded-xl text-sm font-black uppercase mb-4 tracking-wider shadow-sm
                            ${data.type === 'mc' ? 'bg-blue-100 text-blue-600' : 
                              data.type === 'tf' ? 'bg-purple-100 text-purple-600' : 
                              data.type === 'fill' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`}>
                            {data.type === 'mc' ? 'Multiple Choice' : data.type === 'tf' ? 'True / False' : data.type === 'fill' ? 'Fill in Blank' : 'Sentence Order'}
                        </span>
                        <h3 className="text-2xl md:text-4xl font-black text-slate-800 leading-snug">{data.question}</h3>
                    </div>
                    {renderContent()}
                </div>
            );
        };

        const LearningSession = ({ questions, topic, onFinish, sound }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState(null);
            const [history, setHistory] = useState([]);

            const currentQ = questions[currentIdx];
            const progress = ((currentIdx + 1) / questions.length) * 100;

            const handleAnswer = (isCorrect, userAns) => {
                const fb = { isCorrect, userAns };
                setFeedback(fb);
                if (isCorrect) setScore(s => s + 1);
                
                setHistory([...history, {
                    question: currentQ.question,
                    isCorrect,
                    userAns,
                    correctAns: currentQ.answer,
                    vocab: currentQ.vocabulary || [],
                    explanation: currentQ.explanation
                }]);
            };

            const nextQuestion = () => {
                setFeedback(null);
                if (currentIdx < questions.length - 1) {
                    setCurrentIdx(c => c + 1);
                } else {
                    onFinish(score, questions.length, history);
                }
            };

            return (
                <div className="min-h-screen pb-10 flex flex-col items-center justify-start pt-24 px-4 relative">
                    {/* Top Bar */}
                    <div className="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-md z-40 px-6 py-4 flex justify-between items-center shadow-sm border-b border-white">
                        <div className="font-bold text-rose-500 text-lg truncate max-w-[200px] md:max-w-md">{topic}</div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => sound.setIsMuted(!sound.isMuted)} className="text-slate-400 hover:text-rose-500">
                                {sound.isMuted ? <VolumeX size={20}/> : <Volume2 size={20}/>}
                            </button>
                            <div className="font-black text-slate-700 bg-slate-100 px-4 py-2 rounded-full text-base">
                                {currentIdx + 1}/{questions.length}
                            </div>
                        </div>
                    </div>
                    {/* Progress */}
                    <div className="fixed top-[72px] left-0 w-full h-3 bg-slate-100 z-40">
                        <motion.div animate={{width: `${progress}%`}} className="h-full bg-rose-500 rounded-r-full shadow-[0_0_10px_rgba(225,29,72,0.5)]"></motion.div>
                    </div>

                    <QuestionCard 
                        key={currentIdx}
                        data={currentQ} 
                        onAnswer={handleAnswer} 
                        feedback={feedback}
                        sound={sound}
                    />

                    {/* POPUP FEEDBACK */}
                    <AnimatePresence>
                        {feedback && (
                            <FeedbackPopup 
                                feedback={feedback} 
                                data={currentQ} 
                                onNext={nextQuestion} 
                                isLast={currentIdx === questions.length - 1}
                                playSound={sound.play}
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const Summary = ({ score, total, detailHistory, onHome, sound }) => {
            const percentage = score/total;
            
            useEffect(() => {
                if(percentage > 0.5) sound.play('win');
            }, []);

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative z-10">
                    <div className="glass-panel p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-xl text-center bg-white relative overflow-hidden">
                        <div className="mb-8 mt-4">
                            <div className="text-9xl mb-6 animate-bounce drop-shadow-2xl">{percentage > 0.8 ? '😻' : (percentage > 0.5 ? '😺' : '😿')}</div>
                            <h2 className="text-5xl font-black text-rose-600 mb-3">KẾT QUẢ</h2>
                            <p className="text-slate-500 font-bold text-lg">{percentage > 0.8 ? 'Xuất sắc chuẩn IELTS!' : (percentage > 0.5 ? 'Cũng ổn, cố lên!' : 'Cần ôn lại nhé!')}</p>
                        </div>

                        <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 mb-10">
                            <div className="text-8xl font-black text-rose-500 tracking-tighter">{score}<span className="text-4xl text-slate-300">/{total}</span></div>
                            <div className="text-sm font-bold text-slate-400 uppercase tracking-widest mt-2">Câu đúng</div>
                        </div>

                        <button onClick={() => { sound.play('click'); onHome(); }} className="btn-pushable">
                            <span className="shadow"></span>
                            <span className="edge"></span>
                            <span className="front flex items-center justify-center gap-3 py-6">
                                <Home size={28}/> VỀ TRANG CHỦ
                            </span>
                        </button>
                    </div>
                </div>
            );
        };

        // History Detail Modal
        const HistoryDetailModal = ({ session, onClose, sound }) => {
            if (!session) return null;
            const allVocab = [...new Set(session.details.flatMap(d => d.vocab))];
            return (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/50 backdrop-blur-md">
                    <motion.div initial={{ y: "100%" }} animate={{ y: 0 }} className="bg-white w-full sm:max-w-4xl h-[90vh] sm:h-auto sm:max-h-[90vh] rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl border-4 border-white">
                        <div className="bg-slate-50 p-6 flex justify-between items-center border-b border-slate-100">
                            <h2 className="text-2xl font-black text-rose-600 flex items-center gap-2"><BookOpen size={28}/> Chi Tiết Bài Học</h2>
                            <button onClick={() => { sound.play('click'); onClose(); }} className="bg-white p-3 rounded-full text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition shadow-sm"><X size={24}/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-8 bg-white custom-scrollbar">
                            <section>
                                <h3 className="font-bold text-rose-500 mb-4 text-lg uppercase flex items-center gap-2 tracking-wider"><Sparkles size={20}/> Từ vựng IELTS ({allVocab.length})</h3>
                                {allVocab.length > 0 ? (
                                    <div className="flex flex-wrap gap-3">
                                        {allVocab.map((v, i) => <span key={i} className="bg-yellow-50 px-4 py-2 rounded-xl border border-yellow-200 text-base font-bold text-slate-700">{v}</span>)}
                                    </div>
                                ) : <p className="text-slate-400 italic">Không có từ vựng nào.</p>}
                            </section>
                            <section>
                                <h3 className="font-bold text-blue-500 mb-4 text-lg uppercase flex items-center gap-2 tracking-wider"><Lightbulb size={20}/> Phân Tích Câu Hỏi</h3>
                                <div className="space-y-6">
                                    {session.details.map((item, idx) => (
                                        <div key={idx} className={`p-6 rounded-3xl border-2 ${item.isCorrect ? 'border-green-100 bg-green-50/30' : 'border-rose-100 bg-rose-50/30'}`}>
                                            <div className="flex gap-4 mb-3">
                                                <div className={`w-4 min-w-[16px] h-4 rounded-full mt-1.5 ${item.isCorrect ? 'bg-green-400' : 'bg-rose-400'}`}></div>
                                                <h4 className="font-bold text-slate-800 text-lg leading-snug">{item.question}</h4>
                                            </div>
                                            <div className="text-sm text-slate-600 pl-8 space-y-1 mb-4">
                                                <div className="flex gap-2"><span className="font-bold bg-white px-2 rounded border border-slate-200">Đáp án:</span> {String(item.correctAns)}</div>
                                                {!item.isCorrect && <div className="flex gap-2"><span className="font-bold text-rose-500 bg-white px-2 rounded border border-rose-200">Bạn chọn:</span> <span className="text-rose-600 line-through">{String(item.userAns)}</span></div>}
                                            </div>
                                            <div className="bg-white p-5 rounded-2xl text-base text-slate-700 border border-slate-100 leading-relaxed font-medium shadow-sm">
                                                <span className="text-blue-500 font-bold mr-1">Giải thích:</span> {item.explanation || "..."}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState('dashboard');
            const [learnHistory, setLearnHistory] = useLocalStorage('english_meow_history', []);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentTopic, setCurrentTopic] = useState('');
            const [sessionResult, setSessionResult] = useState(null);
            const [viewingHistory, setViewingHistory] = useState(null);
            
            // Sound Hook
            const sound = useSound();

            const handleExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(learnHistory));
                const a = document.createElement('a'); a.href = dataStr; a.download = "meow_ielts_backup.json";
                document.body.appendChild(a); a.click(); a.remove();
            };

            const handleImport = (event) => {
                const fileReader = new FileReader();
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = e => {
                    try {
                        const d = JSON.parse(e.target.result);
                        if(Array.isArray(d)) { setLearnHistory(d); alert("Đã nhập dữ liệu thành công!"); }
                    } catch(err) { alert("File lỗi rồi sen ơi!"); }
                };
            };

            const startLearning = (questions, topic) => {
                setCurrentQuestions(questions); setCurrentTopic(topic); setScreen('learning');
            };

            const finishSession = (score, total, detail) => {
                const newRecord = { date: new Date().toISOString(), topic: currentTopic, score, total, details: detail };
                setLearnHistory([...learnHistory, newRecord]);
                setSessionResult({ score, total, detail });
                setScreen('summary');
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden selection:bg-rose-200 selection:text-rose-900">
                    <CuteBackground />
                    
                    {screen === 'dashboard' && (
                        <Dashboard 
                            history={learnHistory} 
                            onStartNew={() => setScreen('setup')}
                            onExport={handleExport}
                            onImport={handleImport}
                            onViewHistory={setViewingHistory}
                            sound={sound}
                        />
                    )}
                    {screen === 'setup' && (
                        <SetupSession onBack={() => setScreen('dashboard')} onStart={startLearning} sound={sound} />
                    )}
                    {screen === 'learning' && (
                        <LearningSession questions={currentQuestions} topic={currentTopic} onFinish={finishSession} sound={sound} />
                    )}
                    {screen === 'summary' && sessionResult && (
                        <Summary score={sessionResult.score} total={sessionResult.total} detailHistory={sessionResult.detail} onHome={() => setScreen('dashboard')} sound={sound} />
                    )}

                    {viewingHistory && (
                        <HistoryDetailModal session={viewingHistory} onClose={() => setViewingHistory(null)} sound={sound} />
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
