<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME GIÁO DỤC - THẦY THÁI MINH NGUYÊN</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX CSS (Cho công thức Toán) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <!-- THƯ VIỆN TOÁN HỌC & HÓA HỌC -->
    <!-- Function Plot: Vẽ đồ thị toán học (Phase 2) -->
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <!-- Smiles Drawer: Vẽ công thức hóa học (Trái tim của Phase 3) -->
    <script src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none; /* Chrome/Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+ */
            user-select: none; /* Standard */
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #fb923c; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ea580c; 
        }
        .bg-checkered {
            background-image: repeating-linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc), repeating-linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        
        /* Style cho Visual Content */
        .visual-container {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin: 16px auto;
            border: 2px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            max-width: 100%;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
            transition: all 0.3s ease;
        }
        
        /* TV Mode styles override */
        .tv-mode .visual-container {
            padding: 32px;
            border: 4px solid #3b82f6; /* Blue border for focus */
            background: #f8fafc;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Function Plot Customization */
        .function-plot text {
            font-family: 'Segoe UI', sans-serif !important;
            font-size: 12px !important;
        }
        .tv-mode .function-plot text {
            font-size: 16px !important; 
            font-weight: bold !important;
        }
    </style>

    <!-- SCRIPT BẢO VỆ MÃ NGUỒN (CHỐNG F12/CHUỘT PHẢI) -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { // F12
                return false;
            }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
                return false;
            }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
                return false;
            }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
                return false;
            }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U
                return false;
            }
        }
    </script>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            Trophy, Activity, Check, Play, Settings, RefreshCw, Calculator, 
            FlaskConical, Atom, Key, BookOpen, Users, Loader2, Edit3, Save, 
            Trash2, ArrowRight, Dna, Target, Timer, Zap, Crown, Skull, Swords, Medal, Gift, AlertTriangle, GraduationCap, Maximize, Minimize, Send, Hand, HelpCircle, Repeat, Home, Eye, Sigma, Beaker, Shapes, Monitor, FileText, Info, Lightbulb, Download, Upload, Copy, FileJson, Grid, Shuffle, User, X
        } from 'lucide-react';

        // --- DATA & CONSTANTS ---
        const REWARDS = [
            { label: "Cộng thêm 1 điểm 🥇", value: 1, type: 'score' },
            { label: "Cộng thêm 0.5 điểm 🥈", value: 0.5, type: 'score' },
            { label: "Một tràng pháo tay 👏", value: 0, type: 'fun' },
            { label: "Cộng... -1 điểm (Haha) 😈", value: -1, type: 'score' }, 
            { label: "Cộng -0.5 điểm 🤪", value: -0.5, type: 'score' }, 
            { label: "Quyền miễn tử (Thêm 2đ) 🛡️", value: 2, type: 'score' }
        ];

        const PUNISHMENTS = [
            { label: "Trừ 1 điểm 📉", value: -1, type: 'score' },
            { label: "Trừ 0.5 điểm 🤏", value: -0.5, type: 'score' },
            { label: "Hát một bài con vịt 🦆", value: 0, type: 'fun' },
            { label: "Trừ... -1 điểm (Là cộng đó) 😇", value: 1, type: 'score' }, 
            { label: "Trừ... -0.5 điểm (May nhé) 😉", value: 0.5, type: 'score' }, 
            { label: "Múa phụ họa 💃", value: 0, type: 'fun' }
        ];

        // --- HELPER: KATEX AUTO-RENDER ---
        const useKaTeXAutoRender = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            useEffect(() => {
                const loadScript = (src, globalKey) => {
                    return new Promise((resolve, reject) => {
                        if (window[globalKey]) return resolve();
                        const existing = document.querySelector(`script[src="${src}"]`);
                        if (existing) {
                            const interval = setInterval(() => {
                                if (window[globalKey]) { clearInterval(interval); resolve(); }
                            }, 100); return;
                        }
                        const script = document.createElement('script');
                        script.src = src; script.async = true;
                        script.onload = () => {
                            const interval = setInterval(() => {
                                if (window[globalKey]) { clearInterval(interval); resolve(); }
                            }, 50);
                        };
                        script.onerror = reject; document.body.appendChild(script);
                    });
                };
                loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js', 'katex')
                .then(() => loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js', 'renderMathInElement'))
                .then(() => setIsLoaded(true))
                .catch(err => console.error("Lỗi tải KaTeX:", err));
            }, []);
            return isLoaded;
        };

        const MathContent = ({ content, className = "" }) => {
            const containerRef = useRef(null);
            const isKaTeXLoaded = useKaTeXAutoRender();
            
            const safeContent = useMemo(() => {
                let text = typeof content === 'object' ? JSON.stringify(content) : String(content || "");
                return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }, [content]);

            useEffect(() => {
                if (isKaTeXLoaded && window.renderMathInElement && containerRef.current) {
                    try {
                        window.renderMathInElement(containerRef.current, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true }
                            ],
                            throwOnError: false, trust: true 
                        });
                    } catch (e) { console.warn("Lỗi render Math:", e); }
                }
            }, [safeContent, isKaTeXLoaded]);

            return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{ __html: safeContent }} />;
        };

        // --- UPDATED VISUAL RENDERERS (TV MODE SUPPORT) ---

        // 1. GraphRenderer
        const GraphRenderer = ({ formula, isTV }) => {
            const rootRef = useRef(null);
            
            useEffect(() => {
                if (!rootRef.current || !formula) return;
                
                let cleanFormula = formula.trim();
                cleanFormula = cleanFormula.replace(/^(y|f\(x\))\s*=\s*/i, "");
                cleanFormula = cleanFormula.replace(/\\sin/g, "sin").replace(/\\cos/g, "cos")
                                           .replace(/\\tan/g, "tan").replace(/\\ln/g, "ln")
                                           .replace(/\^\{(.+?)\}/g, "^($1)")
                                           .replace(/\\/g, "");

                try {
                    rootRef.current.innerHTML = '';
                    const width = isTV ? Math.min(window.innerWidth * 0.8, 900) : Math.min(window.innerWidth - 80, 500);
                    const height = isTV ? 600 : 350;

                    window.functionPlot({
                        target: rootRef.current,
                        width: width,
                        height: height,
                        yAxis: { domain: [-5, 5] },
                        xAxis: { domain: [-5, 5] },
                        grid: true,
                        data: [{ fn: cleanFormula, color: '#ea580c', graphType: 'polyline' }]
                    });
                } catch (e) {
                    console.error("Lỗi vẽ đồ thị:", e);
                    rootRef.current.innerHTML = `<div class="text-red-500 font-bold p-4 text-center">Lỗi cú pháp: ${cleanFormula}</div>`;
                }
            }, [formula, isTV]);
            
            return (
                <div className="flex flex-col items-center">
                    <div ref={rootRef} className={`rounded-lg overflow-hidden bg-white shadow-sm border border-slate-100 ${isTV ? 'border-4 border-blue-200' : ''}`}></div>
                    <div className={`mt-2 italic font-mono flex items-center gap-1 ${isTV ? 'text-lg text-slate-300' : 'text-xs text-slate-500'}`}><Activity size={isTV?20:12}/> Hàm số: {formula}</div>
                </div>
            );
        };

        // 2. TableRenderer
        const TableRenderer = ({ data, isTV }) => {
            if (!data) return null;
            const rows = data.trim().split('\n').map(row => row.split(','));
            const cellClass = isTV ? 'p-5 text-2xl' : 'p-3 text-sm';
            
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="overflow-x-auto w-full max-w-4xl rounded-xl border border-orange-200 shadow-sm">
                        <table className="min-w-full border-collapse bg-white">
                            <thead className="bg-gradient-to-r from-orange-100 to-amber-100 text-orange-900">
                                <tr>{rows[0].map((header, i) => (<th key={i} className={`${cellClass} font-bold border-b border-orange-200 uppercase tracking-wider`}>{header.trim()}</th>))}</tr>
                            </thead>
                            <tbody className="divide-y divide-orange-100">
                                {rows.slice(1).map((row, i) => (<tr key={i} className="hover:bg-orange-50/50 transition-colors">{row.map((cell, j) => (<td key={j} className={`${cellClass} text-center text-slate-700 font-medium ${j===0 ? 'font-bold text-orange-800 bg-orange-50/30' : ''}`}>{cell.trim()}</td>))}</tr>))}
                            </tbody>
                        </table>
                    </div>
                    <div className={`mt-2 italic flex items-center gap-1 ${isTV ? 'text-lg text-slate-300' : 'text-xs text-slate-500'}`}><Sigma size={isTV?20:12}/> Bảng số liệu</div>
                </div>
            );
        };

        // 3. ChemistryRenderer
        const ChemistryRenderer = ({ structure, isTV }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!structure || !canvasRef.current || !window.SmilesDrawer) return;

                const drawChemistry = () => {
                    const options = isTV ? {
                        width: 800, height: 600, bondThickness: 3, bondLength: 35, shortBondLength: 0.85, bondSpacing: 5,
                        atomVisualization: 'default', isomeric: true, debug: false, terminalCarbons: true, explicitHydrogens: false,
                        overlapSensitivity: 0.42, overlapResolutionIterations: 1, compactDrawing: false, fontSizeLarge: 14, fontSizeSmall: 10, padding: 20.0,
                        themes: { light: { C: '#222', O: '#e11d48', N: '#2563eb', F: '#059669', CL: '#16a34a', BR: '#9a3412', I: '#7c3aed', P: '#ea580c', S: '#d97706', B: '#db2777', SI: '#ca8a04', H: '#64748b', BACKGROUND: '#fff' } }
                    } : {
                        width: 400, height: 300, bondThickness: 1.2, bondLength: 18, shortBondLength: 0.85, bondSpacing: 0.18 * 18,
                        atomVisualization: 'default', isomeric: true, debug: false, terminalCarbons: true, explicitHydrogens: false,
                        overlapSensitivity: 0.42, overlapResolutionIterations: 1, compactDrawing: false, fontSizeLarge: 7, fontSizeSmall: 5, padding: 10.0,
                        themes: { light: { C: '#222', O: '#e11d48', N: '#2563eb', F: '#059669', CL: '#16a34a', BR: '#9a3412', I: '#7c3aed', P: '#ea580c', S: '#d97706', B: '#db2777', SI: '#ca8a04', H: '#64748b', BACKGROUND: '#fff' } }
                    };

                    try {
                        const smilesDrawer = new window.SmilesDrawer.Drawer(options);
                        window.SmilesDrawer.parse(structure, (tree) => {
                            smilesDrawer.draw(tree, canvasRef.current, 'light', false);
                        }, (err) => console.error("Lỗi parse SMILES:", err));
                    } catch (e) { console.error("Lỗi khởi tạo SmilesDrawer:", e); }
                };

                if (window.SmilesDrawer) drawChemistry(); else setTimeout(drawChemistry, 500);
            }, [structure, isTV]);

            return (
                <div className="flex flex-col items-center">
                    <div className="bg-white p-2 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>
                        <canvas ref={canvasRef} width={isTV ? "800" : "400"} height={isTV ? "600" : "300"} className="max-w-full h-auto"></canvas>
                    </div>
                    <div className={`mt-2 italic font-mono flex items-center gap-1 ${isTV ? 'text-lg text-slate-300' : 'text-xs text-slate-500'}`}><Beaker size={isTV?20:12}/> Cấu trúc: {structure}</div>
                </div>
            );
        };

        // 4. SVGRenderer
        const SVGRenderer = ({ svgCode, isTV }) => {
            const cleanSvg = useMemo(() => {
                if (!svgCode) return "";
                let code = svgCode;
                if (!code.trim().startsWith('<svg')) return `<div class='text-red-500'>Invalid SVG</div>`;
                if (!code.includes('class="')) {
                    code = code.replace('<svg', '<svg class="w-full h-full"');
                }
                return code;
            }, [svgCode]);

            return (
                <div className="flex flex-col items-center w-full">
                    <div className={`bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-center items-center ${isTV ? 'min-w-[600px] min-h-[400px] max-w-[900px]' : 'min-w-[300px] min-h-[200px]'}`}>
                        <div dangerouslySetInnerHTML={{ __html: cleanSvg }} className="w-full flex justify-center" />
                    </div>
                    <div className={`mt-2 italic font-mono flex items-center gap-1 ${isTV ? 'text-lg text-slate-300' : 'text-xs text-slate-500'}`}>
                        <Shapes size={isTV?20:12}/> Hình minh họa Vector
                    </div>
                </div>
            );
        };

        // --- VISUAL CONTENT CONTROLLER ---
        const VisualContent = ({ type, data, isTV }) => {
            if (!type || type === 'none' || !data) return null;

            return (
                <div className={`visual-container ${isTV ? 'tv-mode' : ''}`}>
                    {type === 'graph' && <GraphRenderer formula={data} isTV={isTV} />}
                    {type === 'table' && <TableRenderer data={data} isTV={isTV} />}
                    {type === 'chemistry' && <ChemistryRenderer structure={data} isTV={isTV} />}
                    {type === 'svg' && <SVGRenderer svgCode={data} isTV={isTV} />}
                </div>
            );
        };

        // --- API GEMINI (LOGIC FIX) ---
        const cleanGeminiJson = (text) => {
            let cleaned = text.replace(/^```json\s*/, '').replace(/\s*```$/, '');
            const pattern = "\\\\([^\"\\\\/bfnrtu])";
            const regex = new RegExp(pattern, "g");
            cleaned = cleaned.replace(regex, "\\\\$1");
            return cleaned;
        };

        const generateQuestionsWithGemini = async (apiKey, topic, numQuestions) => {
            const prompt = `
                Bạn là chuyên gia giáo dục. Tạo ${numQuestions} câu hỏi trắc nghiệm chủ đề: "${topic}".
                
                YÊU CẦU CẤU TRÚC JSON (Mảng đối tượng):
                [
                    {
                        "question": "Nội dung câu hỏi (text/latex)",
                        "options": ["A", "B", "C", "D"],
                        "correctAnswer": 0 (index 0-3),
                        "explanation": "Giải thích chi tiết",
                        "visualType": "none" | "graph" | "table" | "chemistry" | "svg",
                        "visualData": "Dữ liệu tương ứng"
                    }
                ]

                HƯỚNG DẪN VISUAL (QUAN TRỌNG):
                1. "graph": Hàm số. visualData="x^2" (KHÔNG dùng y=).
                2. "chemistry": Chất hóa học. visualData là chuỗi SMILES (vd: "c1ccccc1").
                3. "table": Bảng số liệu. visualData="X,Y\\n1,2\\n3,4".
                4. "svg": Vẽ hình học/Vật lý. visualData = CODE SVG THUẦN TÚY (<svg ...>...</svg>). Yêu cầu: Đơn giản, nét đen, nền trắng, không CSS ngoài.
                5. "none": Không hình.
            `;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                let rawText = data.candidates[0].content.parts[0].text;
                let parsedData;
                
                try { 
                    let cleanText = rawText.replace(/^```json\s*/, '').replace(/\s*```$/, '');
                    parsedData = JSON.parse(cleanText); 
                } catch (e1) { 
                    console.warn("Parse JSON lần 1 thất bại, đang thử Cleaning Pipeline...", e1);
                    try {
                        const fixedText = cleanGeminiJson(rawText);
                        parsedData = JSON.parse(fixedText);
                    } catch (e2) {
                        console.error("Parse JSON thất bại hoàn toàn:", rawText);
                        throw new Error("AI trả về dữ liệu lỗi cú pháp JSON/LaTeX. Hãy thử lại!");
                    }
                }
                
                return parsedData.map(q => ({
                    ...q,
                    question: typeof q.question === 'object' ? JSON.stringify(q.question) : String(q.question || ""),
                    options: Array.isArray(q.options) ? q.options.map(o => typeof o === 'object' ? JSON.stringify(o) : String(o || "")) : [],
                    explanation: typeof q.explanation === 'object' ? JSON.stringify(q.explanation) : String(q.explanation || ""),
                    visualType: q.visualType || 'none',
                    visualData: q.visualData || ''
                }));
            } catch (error) { throw error; }
        };

        // --- MODALS (GIỮ NGUYÊN) ---
        const ResultWheel = ({ type, onClose }) => {
            const [result, setResult] = useState(null);
            const [spinning, setSpinning] = useState(false);
            
            const items = type === 'reward' ? REWARDS : PUNISHMENTS;
            const title = type === 'reward' ? '🎉 VÒNG QUAY PHẦN THƯỞNG 🎉' : '💀 VÒNG QUAY HÌNH PHẠT 💀';
            const color = type === 'reward' ? 'text-yellow-600 border-yellow-500' : 'text-red-600 border-red-600';

            const spin = () => {
                setSpinning(true);
                let count = 0; const maxSpins = 20;
                const interval = setInterval(() => {
                    setResult(items[Math.floor(Math.random() * items.length)]);
                    count++;
                    if (count > maxSpins) { clearInterval(interval); setSpinning(false); }
                }, 100);
            };

            const handleConfirm = () => { if (!result) return; onClose(result); };

            return (
                <div className="fixed inset-0 z-[120] bg-black/80 flex items-center justify-center p-4">
                    <motion.div initial={{scale:0}} animate={{scale:1}} className={`bg-white rounded-3xl p-8 max-w-md w-full text-center relative border-8 ${color}`}>
                        <h3 className={`text-2xl font-black ${type === 'reward' ? 'text-yellow-600' : 'text-red-600'} mb-6`}>{title}</h3>
                        <div className="min-h-[120px] flex items-center justify-center bg-orange-50 rounded-2xl p-6 mb-8 border-4 border-dashed border-orange-200">
                            {result ? (
                                <motion.div key={result.label} initial={{scale:0.8}} animate={{scale:1.2}} className="text-2xl font-bold text-slate-800">{result.label}</motion.div>
                            ) : <span className="text-orange-300 text-6xl">❓</span>}
                        </div>
                        {!result || spinning ? (
                            <button disabled={spinning} onClick={spin} className={`w-full py-4 rounded-full font-bold text-white text-xl shadow-lg transform active:scale-95 transition ${type==='reward'?'bg-yellow-500 hover:bg-yellow-400':'bg-red-600 hover:bg-red-500'}`}>
                                {spinning ? 'ĐANG QUAY...' : 'QUAY NGAY!'}
                            </button>
                        ) : (
                            <button onClick={handleConfirm} className="w-full py-4 bg-orange-600 hover:bg-orange-500 text-white rounded-full font-bold text-xl shadow-lg animate-pulse">CHẤP NHẬN KẾT QUẢ</button>
                        )}
                    </motion.div>
                </div>
            );
        };

        // NEW: STUDENT SPINNER (Vòng quay tên học sinh)
        const StudentSpinner = ({ students, onComplete }) => {
            const [currentName, setCurrentName] = useState("...");
            const [spinning, setSpinning] = useState(true);

            useEffect(() => {
                if (!students || students.length === 0) return;
                
                let count = 0; const max = 30;
                const interval = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * students.length);
                    setCurrentName(students[randomIndex].name);
                    count++; 
                    if (count > max) { 
                        clearInterval(interval); 
                        setSpinning(false);
                        const finalIndex = Math.floor(Math.random() * students.length);
                        setCurrentName(students[finalIndex].name);
                        setTimeout(() => onComplete(students[finalIndex]), 1500);
                    }
                }, 80);
                return () => clearInterval(interval);
            }, [students]);

            return (
                <div className="fixed inset-0 z-[150] bg-black/90 flex items-center justify-center p-4">
                    <div className="text-center w-full max-w-2xl">

                    <div className="p-8 overflow-y-auto bg-slate-50 space-y-8">
                        <div className="flex gap-4"><div className="flex-shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-xl">1</div><div><h3 className="text-xl font-bold text-slate-800 mb-2">Chọn Chế Độ Dữ Liệu</h3><p className="text-slate-600"><strong>AI Tự Động:</strong> Cần Key, AI tự soạn câu hỏi.<br/><strong>Thủ Công:</strong> Không cần Key, tải file JSON hoặc dán nội dung.</p></div></div>

        // --- MINI GAMES (UPDATED LOGIC) ---
        
        // 1. Penalty Game (Giữ nguyên)
        const PenaltyGame = ({ onComplete, teamName }) => {
            const [gameState, setGameState] = useState('selecting'); 
            const [ballPos, setBallPos] = useState({ x: 50, y: 80 });
            const [goaliePos, setGoaliePos] = useState(50);
            const [resultMessage, setResultMessage] = useState('');
            const zones = [{ id: 'TL', label: 'Góc Cao Trái', x: 20, y: 15, difficulty: 0.4 }, { id: 'TR', label: 'Góc Cao Phải', x: 80, y: 15, difficulty: 0.4 }, { id: 'BL', label: 'Góc Thấp Trái', x: 20, y: 45, difficulty: 0.7 }, { id: 'BR', label: 'Góc Thấp Phải', x: 80, y: 45, difficulty: 0.7 }];
            const handleZoneSelect = (zone) => {
                setGameState('kicking');
                const isGoal = Math.random() < zone.difficulty; 
                const goalieTarget = isGoal ? (zone.x > 50 ? 20 : 80) : zone.x; 
                setGoaliePos(goalieTarget);
                setTimeout(() => {
                    setBallPos({ x: zone.x, y: zone.y });
                    setTimeout(() => { setResultMessage(isGoal ? `VÀO! TUYỆT VỜI!` : 'KHÔNG VÀO! TIẾC QUÁ'); setGameState('result'); setTimeout(() => onComplete(isGoal), 2000); }, 600);
                }, 100);
            };
            return (
                <div className="w-full max-w-3xl mx-auto bg-green-600 rounded-xl overflow-hidden shadow-2xl border-4 border-white relative h-[500px] select-none">
                    <div className="absolute top-[10%] left-1/2 transform -translate-x-1/2 w-3/4 h-2/5 border-t-8 border-l-8 border-r-8 border-white bg-green-800/30 z-10"><div className="w-full h-full opacity-20 bg-[radial-gradient(circle,white_1px,transparent_1px)] bg-[size:10px_10px]"></div></div>
                    <motion.div className="absolute top-[20%] z-20 text-7xl transform -translate-x-1/2 transition-all duration-500" style={{ left: `${goaliePos}%` }}>🧤</motion.div>
                    {gameState === 'selecting' && zones.map(zone => (
                        <button key={zone.id} onClick={() => handleZoneSelect(zone)} className="absolute z-30 transform -translate-x-1/2 -translate-y-1/2 w-24 h-24 bg-white/20 hover:bg-yellow-400/80 border-2 border-dashed border-white rounded-full flex flex-col items-center justify-center text-white font-bold text-sm transition-all hover:scale-110 cursor-pointer shadow-lg backdrop-blur-sm" style={{ left: `${zone.x}%`, top: `${zone.y}%` }}>{zone.label}</button>
                    ))}
                    <motion.div className="absolute z-40 text-6xl transform -translate-x-1/2 -translate-y-1/2" initial={{ left: '50%', top: '80%' }} animate={{ left: `${ballPos.x}%`, top: `${ballPos.y}%` }} transition={{ duration: 0.5, ease: "easeOut" }}>⚽</motion.div>
                    {gameState === 'result' && <div className="absolute inset-0 flex items-center justify-center z-50 bg-black/40"><h2 className="text-5xl font-black text-yellow-400 drop-shadow-lg animate-bounce">{resultMessage}</h2></div>}
                </div>
            );
        };

        // 2. Basketball Game (UPDATED: Static Hoop, Random Flight)
        const BasketballGame = ({ onComplete, teamName }) => {
            const [gameState, setGameState] = useState('selecting'); 
            const [ballStyle, setBallStyle] = useState({ bottom: '20px', left: '50%', scale: 1 });
            const [msg, setMsg] = useState('');
            const styles = [ { id: 'safe', name: 'Ném An Toàn', chance: 0.8 }, { id: 'normal', name: 'Ném Kỹ Thuật', chance: 0.6 }, { id: 'three', name: 'Ném 3 Điểm', chance: 0.4 }, { id: 'super', name: 'Ném Siêu Xa', chance: 0.2 } ];
            
            const handleSelectStyle = (style) => {
                setGameState('shooting');
                const isSuccess = Math.random() < style.chance;
                setTimeout(() => {
                    // Logic bay: Nếu trúng thì vào giữa (50%), nếu trượt thì lệch sang trái (20%) hoặc phải (80%)
                    let finalLeft = '50%';
                    if (!isSuccess) {
                        finalLeft = Math.random() > 0.5 ? '20%' : '80%';
                    }

                    setBallStyle({ bottom: '350px', left: finalLeft, scale: 0.5 });
                    
                    setTimeout(() => { 
                        setMsg(isSuccess ? 'BÓNG VÀO RỔ!' : 'TRƯỢT RỒI!'); 
                        setGameState('result'); 
                        setTimeout(() => onComplete(isSuccess), 2000); 
                    }, 800);
                }, 500);
            };

            return (
                <div className="w-full max-w-lg mx-auto bg-orange-50 rounded-xl border-4 border-orange-500 h-[500px] relative overflow-hidden flex flex-col items-center">

                    {msg && <div className="absolute top-1/2 text-4xl font-black text-red-600 bg-white p-4 rounded shadow-xl z-50 animate-bounce">{msg}</div>}
                    
                    {gameState === 'selecting' && <div className="absolute bottom-0 w-full bg-black/80 z-40 p-4 rounded-t-xl"><h3 className="text-white text-lg font-bold mb-2 text-center">Đội {teamName} chọn kiểu ném:</h3><div className="grid grid-cols-2 gap-2">{styles.map(s => (<button key={s.id} onClick={() => handleSelectStyle(s)} className="py-3 px-2 rounded-lg bg-orange-500 text-white font-bold hover:bg-orange-400">{s.name} ({s.chance * 100}%)</button>))}</div></div>}
                </div>
            );
        };

        // 3. Racing Game (UPDATED: Bigger Animals)
        const RacingGame = ({ onComplete, teamName }) => {
            const animals = [ { id: 'tortoise', icon: '🐢', name: 'Rùa' }, { id: 'rabbit', icon: '🐇', name: 'Thỏ' }, { id: 'horse', icon: '🐎', name: 'Ngựa' }, { id: 'cheetah', icon: '🐆', name: 'Báo' } ];
            const [selectedAnimal, setSelectedAnimal] = useState(null);
            const [positions, setPositions] = useState({ tortoise: 0, rabbit: 0, horse: 0, cheetah: 0 });
            const [gameState, setGameState] = useState('selecting'); 
            const [winner, setWinner] = useState(null);
            
            useEffect(() => {
                if (gameState !== 'racing') return;
                const interval = setInterval(() => {
                    setPositions(prev => {
                        const newPos = { ...prev }; let raceFinished = false; let winId = null;
                        animals.forEach(a => { if (newPos[a.id] < 90) newPos[a.id] += Math.random() * 5; if (newPos[a.id] >= 90 && !raceFinished) { raceFinished = true; winId = a.id; } });
                        if (raceFinished) { setWinner(winId); setGameState('finished'); setTimeout(() => onComplete(winId === selectedAnimal), 2500); }
                        return newPos;
                    });
                }, 100); return () => clearInterval(interval);
            }, [gameState, selectedAnimal]);

            return (
                <div className="w-full max-w-2xl mx-auto bg-slate-800 rounded-xl p-6 text-white relative border-4 border-slate-600">
                    <h2 className="text-center text-2xl font-bold mb-6 text-cyan-400">ĐUA THÚ TRANH TÀI</h2>
                    {gameState === 'selecting' ? (
                        <div className="grid grid-cols-4 gap-2">{animals.map(a => (<button key={a.id} onClick={() => { setSelectedAnimal(a.id); setGameState('racing'); }} className="bg-slate-700 hover:bg-slate-600 p-2 rounded-xl flex flex-col items-center gap-2 border-2 border-transparent hover:border-yellow-400 transition h-40 justify-center"><span className="text-7xl transform scale-125">{a.icon}</span><span className="font-bold text-sm mt-2">{a.name}</span></button>))}</div>
                    ) : (
                        <div className="space-y-6 pt-4 pb-4">{animals.map(a => (<div key={a.id} className="relative h-16 flex items-center"><div className="w-full h-4 bg-gray-700 rounded-full relative overflow-visible"><motion.div className="absolute -top-10 text-7xl z-10" style={{ left: `${positions[a.id]}%` }} animate={{ y: [0, -5, 0] }} transition={{ repeat: Infinity, duration: 0.3 }}><span className="transform scale-x-[-1] inline-block">{a.icon}</span>{selectedAnimal === a.id && <span className="absolute -top-4 left-0 text-[10px] bg-yellow-400 text-black px-1 rounded font-bold">YOU</span>}</motion.div><div className="absolute right-0 top-0 bottom-0 w-2 bg-checkered bg-white/30 z-0"></div></div></div>))}
                        {gameState === 'finished' && <div className="text-center text-3xl font-black animate-bounce mt-4">{winner === selectedAnimal ? <span className="text-green-400">CHIẾN THẮNG! 🏆</span> : <span className="text-gray-400">THUA RỒI! 😭</span>}</div>}</div>
                    )}
                </div>
            );
        };

        // 4. Paper Plane (Giữ nguyên)
        const PaperPlaneGame = ({ onComplete, teamName }) => {
            const [gameState, setGameState] = useState('selecting');
            const [selectedPlane, setSelectedPlane] = useState(null);
            const [planesState, setPlanesState] = useState([0,0,0,0]);
            const [winner, setWinner] = useState(null);
            const planes = [{ id: 0, color: 'text-red-500', name: 'Hỏa Tiễn' }, { id: 1, color: 'text-blue-500', name: 'Tia Chớp' }, { id: 2, color: 'text-green-500', name: 'Lá Chắn' }, { id: 3, color: 'text-yellow-500', name: 'Ong Vàng' }];
            useEffect(() => {
                if (gameState !== 'flying') return;
                const distances = planes.map(() => Math.floor(Math.random() * 80) + 10);
                const interval = setInterval(() => {
                    setPlanesState(prev => {
                        const next = prev.map((pos, idx) => { if (pos < distances[idx]) return pos + 2; return pos; });
                        if (next.every((pos, idx) => pos >= distances[idx])) { clearInterval(interval); const maxDist = Math.max(...distances); const winIdx = distances.indexOf(maxDist); setWinner(winIdx); setGameState('finished'); setTimeout(() => onComplete(winIdx === selectedPlane), 2500); }
                        return next;
                    });
                }, 50); return () => clearInterval(interval);
            }, [gameState]);
            return (
                <div className="w-full max-w-2xl mx-auto bg-sky-100 rounded-xl p-6 relative border-4 border-sky-300 h-[500px] overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full opacity-30 bg-[url('https://www.transparenttextures.com/patterns/clouds.png')]"></div>
