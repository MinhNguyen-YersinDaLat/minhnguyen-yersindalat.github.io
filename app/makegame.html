                    {gameState === 'selecting' ? (
                        <div className="grid grid-cols-2 gap-6 relative z-10">{planes.map(p => (<button key={p.id} onClick={() => { setSelectedPlane(p.id); setGameState('flying'); }} className="bg-white hover:bg-sky-50 p-6 rounded-2xl flex flex-col items-center gap-4 shadow-lg transform hover:scale-105 transition"><Send size={60} className={`${p.color} transform -rotate-45`}/><span className="font-bold text-xl text-slate-600">{p.name}</span></button>))}</div>
                    ) : (
                        <div className="space-y-8 relative z-10 mt-10 pr-10">{planes.map((p, idx) => (<div key={p.id} className="relative h-10 border-b-2 border-slate-300 border-dashed"><motion.div className={`absolute -top-8 ${p.color}`} style={{ left: `${planesState[idx]}%` }}><Send size={40} className="transform rotate-12"/>{selectedPlane === idx && <span className="absolute -top-5 left-0 text-xs bg-sky-500 text-white px-2 py-0.5 rounded-full font-bold">YOU</span>}</motion.div></div>))}
                        {gameState === 'finished' && (<div className="absolute inset-0 flex items-center justify-center bg-black/40 z-50 rounded-xl"><div className="text-5xl font-black animate-bounce text-white drop-shadow-lg">{winner === selectedPlane ? <span className="text-green-400">BAY XA NHẤT! ✈️</span> : <span className="text-red-400">RỚT MẤT RỒI! ☁️</span>}</div></div>)}</div>
                    )}
                </div>
            );
        };

        // 5. Claw Machine (UPDATED: Select First, Then Auto-Run)
        const ClawMachineGame = ({ onComplete, teamName }) => {
            const [gameState, setGameState] = useState('selecting'); 
            const [clawX, setClawX] = useState(50); 
            const [clawY, setClawY] = useState(10); 
            const [hasPrize, setHasPrize] = useState(false);
            const [selectedToyId, setSelectedToyId] = useState(null);
            
            // Initial positions need to be fixed for logic to work consistently
            const [toys, setToys] = useState([ { id: 1, icon: '🧸', x: 20 }, { id: 2, icon: '🤖', x: 40 }, { id: 3, icon: '🦄', x: 60 }, { id: 4, icon: '🦖', x: 80 } ]);

            // Animation loop for 'playing' state
            useEffect(() => { 
                if (gameState === 'playing') { 
                    const interval = setInterval(() => { 
                        setClawX(prev => { if (prev >= 90) return 10; return prev + 1; }); 
                    }, 20); // Faster movement
                    return () => clearInterval(interval); 
                } 
            }, [gameState]);

            const handleSelectToy = (toyId) => {
                setSelectedToyId(toyId);
                setGameState('playing');
                
                // Determine result immediately (Win/Loss logic)
                // 50% chance to win (or customized)
                const isWin = Math.random() > 0.4; // 60% win rate for fun
                
                // After 2-3 seconds, stop and drop
                setTimeout(() => {
                    setGameState('dropping');
                    
                    let targetX;
                    const targetToy = toys.find(t => t.id === toyId);
                    const otherToys = toys.filter(t => t.id !== toyId);
                    
                    if (isWin && targetToy) {
                        targetX = targetToy.x;
                    } else {
                        // If lose, pick a random spot (either empty or wrong toy)
                        const randomOther = otherToys[Math.floor(Math.random() * otherToys.length)];
                        // Mix of hitting wrong toy or missing entirely
                        targetX = Math.random() > 0.5 ? randomOther.x : (Math.random() * 80 + 10);
                        // Ensure it's not the winning spot if we are supposed to lose
                        if (Math.abs(targetX - targetToy.x) < 5) targetX += 20; 
                    }

                    // Move claw to targetX visually (quick snap or simulated stop)
                    setClawX(targetX);

                    // Drop animation
                    let dropInterval = setInterval(() => { 
                        setClawY(prev => { 
                            if (prev >= 80) { 
                                clearInterval(dropInterval); 
                                checkGrab(targetX, toyId); 
                                return prev; 
                            } 
                            return prev + 2; 
                        }); 
                    }, 20);

                }, 2500);
            };

            const checkGrab = (currentClawX, targetId) => { 
                const caughtToy = toys.find(t => Math.abs(t.x - currentClawX) < 5); 
                
                // Win condition: Must catch a toy AND it must be the one user selected
                const success = caughtToy && caughtToy.id === targetId; 

                if (caughtToy) { 
                    setHasPrize(true); 
                    setToys(prev => prev.filter(t => t.id !== caughtToy.id)); 
                } 
                
                setTimeout(() => { 
                    let riseInterval = setInterval(() => { 
                        setClawY(prev => { 
                            if (prev <= 10) { 
                                clearInterval(riseInterval); 
                                setGameState('result'); 
                                setTimeout(() => onComplete(success), 2000); 
                                return prev; 
                            } 
                            return prev - 2; 
                        }); 
                    }, 20); 
                }, 500); 
            };

            return (
                <div className="w-full max-w-lg mx-auto bg-pink-100 rounded-3xl border-8 border-pink-400 h-[500px] relative overflow-hidden shadow-2xl">
                    <div className="absolute top-0 left-0 w-full h-16 bg-pink-300 z-20 shadow-md flex justify-center items-center"><h2 className="text-pink-800 font-black text-2xl">GẮP THÚ VUI VẺ</h2></div>
                    
                    {/* Claw */}
                    <div className="absolute z-10 transition-none" style={{ left: `${clawX}%`, top: 0, height: `${clawY}%` }}><div className="w-2 h-full bg-slate-400 mx-auto"></div><div className="transform -translate-x-1/2"><Hand size={48} className={`text-slate-600 ${hasPrize ? 'text-pink-600' : ''}`} />{hasPrize && <div className="text-4xl absolute top-8 left-1/2 -translate-x-1/2">🎁</div>}</div></div>
                    
                    {/* Toys */}
                    <div className="absolute bottom-4 w-full h-20 px-4">
                        {toys.map(t => (
                            <button 
                                key={t.id} 
                                disabled={gameState !== 'selecting'}
                                onClick={() => handleSelectToy(t.id)}
                                className={`absolute bottom-0 text-5xl transform -translate-x-1/2 transition-all hover:scale-125 focus:outline-none ${selectedToyId === t.id ? 'scale-125 filter drop-shadow-[0_0_10px_rgba(236,72,153,0.8)]' : ''}`} 
                                style={{ left: `${t.x}%` }}
                            >
                                {t.icon}
                                {gameState === 'selecting' && <div className="text-xs bg-white text-pink-600 font-bold px-2 rounded-full absolute -top-4 left-1/2 -translate-x-1/2 whitespace-nowrap opacity-0 hover:opacity-100">Chọn tớ!</div>}
                            </button>
                        ))}
                    </div>
                    
                    {gameState === 'selecting' && (
                        <div className="absolute top-20 left-0 w-full text-center z-30 animate-bounce">
                            <span className="bg-white text-pink-600 px-4 py-2 rounded-full font-bold shadow-lg border-2 border-pink-400">👇 Bấm vào con thú bạn muốn gắp! 👇</span>
                        </div>
                    )}
                    
                    {gameState === 'playing' && (
                        <div className="absolute top-20 left-0 w-full text-center z-30">
                            <span className="bg-white text-pink-600 px-4 py-2 rounded-full font-bold shadow-lg">Máy đang tự động chạy... 🤖</span>
                        </div>
                    )}

                    {gameState === 'result' && (<div className="absolute inset-0 bg-black/50 z-50 flex items-center justify-center"><h2 className="text-5xl font-black text-white drop-shadow-lg animate-bounce">{hasPrize ? (selectedToyId ? 'GẮP TRÚNG RỒI! 🎉' : 'GẮP NHẦM RỒI! 😅') : 'TRƯỢT RỒI! 😭'}</h2></div>)}
                </div>
            );
        };

        const Confetti = () => { const colors = ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899']; return (<div className="absolute inset-0 overflow-hidden pointer-events-none z-0">{[...Array(50)].map((_, i) => (<motion.div key={i} className="absolute w-3 h-3 rounded-sm" style={{ backgroundColor: colors[Math.floor(Math.random() * colors.length)], left: `${Math.random() * 100}%`, top: -20 }} animate={{ top: '110%', rotate: [0, 360], x: [0, Math.random() * 100 - 50] }} transition={{ duration: Math.random() * 2 + 3, repeat: Infinity, ease: "linear", delay: Math.random() * 2 }} />))}</div>); };

        // --- MAIN APP ---
        const App = () => {
            const [wizardStep, setWizardStep] = useState(0); 
            const [inputMode, setInputMode] = useState('ai'); 
            const [gameMode, setGameMode] = useState('teams'); 
            
            const [apiKey, setApiKey] = useState('');
            const [topic, setTopic] = useState('');
            const [numTeams, setNumTeams] = useState(2);
            const [numQuestions, setNumQuestions] = useState(10);
            
            const [teams, setTeams] = useState([]);
            const [students, setStudents] = useState([]); 
            const [questions, setQuestions] = useState([]);
            const [boardCards, setBoardCards] = useState([]);
            const [customRewards, setCustomRewards] = useState(REWARDS);
            const [customPunishments, setCustomPunishments] = useState(PUNISHMENTS);
            
            const [currentTurn, setCurrentTurn] = useState(0); 
            const [currentStudent, setCurrentStudent] = useState(null); 
            const [activeCard, setActiveCard] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [miniGameType, setMiniGameType] = useState(null); 
            const [wheelType, setWheelType] = useState(null); 
            const [showExplanation, setShowExplanation] = useState(false); 
            const [isCorrectAnswer, setIsCorrectAnswer] = useState(false); 
            const [isTVMode, setIsTVMode] = useState(false);
            const [showStudentSpinner, setShowStudentSpinner] = useState(false);

            const [loadingMsg, setLoadingMsg] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [showTutorial, setShowTutorial] = useState(false);
            const [jsonInput, setJsonInput] = useState(''); 
            const [studentListInput, setStudentListInput] = useState(''); 

            useEffect(() => {
                setTeams(Array.from({ length: numTeams }, (_, i) => ({
                    id: i, name: `Team ${i + 1}`, score: 0, color: `hsl(${i * (360 / numTeams)}, 70%, 45%)`
                })));
            }, [numTeams]);

            const toggleFullscreen = () => { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); setIsFullscreen(true); } else { if (document.exitFullscreen) { document.exitFullscreen(); setIsFullscreen(false); } } };
            const rankedTeams = useMemo(() => { 
                const list = gameMode === 'teams' ? teams : students;
                const sorted = [...list].sort((a, b) => b.score - a.score); 
                return list.map(t => ({ ...t, rank: sorted.findIndex(s => s.id === t.id) + 1 })); 
            }, [teams, students, gameMode]);

            // --- HANDLERS ---
            const parseStudentList = () => {
                const names = studentListInput.split('\n')
                    .map(s => s.replace(/\t/g, ' ').replace(/\s+/g, ' ').trim())
                    .filter(name => name.length > 0);

                if (names.length === 0) {
                    alert("⚠️ Danh sách trống! Vui lòng dán tên học sinh vào ô bên dưới.");
                    return false;
                }

                const newStudents = names.map((name, i) => ({ 
                    id: i, name: name, score: 0, color: `hsl(${Math.random()*360}, 70%, 45%)` 
                }));
                setStudents(newStudents);
                return true;
            };

            const handleUpdateReward = (idx, field, val) => { const n = [...customRewards]; n[idx][field] = val; setCustomRewards(n); };
            const handleAddReward = () => setCustomRewards([...customRewards, { label: "Mới...", value: 0, type: 'fun' }]);
            const handleRemoveReward = (idx) => setCustomRewards(customRewards.filter((_,i)=>i!==idx));
            
            const handleUpdatePunishment = (idx, field, val) => { const n = [...customPunishments]; n[idx][field] = val; setCustomPunishments(n); };
            const handleAddPunishment = () => setCustomPunishments([...customPunishments, { label: "Mới...", value: 0, type: 'fun' }]);
            const handleRemovePunishment = (idx) => setCustomPunishments(customPunishments.filter((_,i)=>i!==idx));

            const handleCreateContent = async () => {
                if (gameMode === 'students') {
                    if (!parseStudentList()) return;
                }
                
                if (inputMode === 'ai') {
                    if (!topic) return setErrorMsg("Vui lòng nhập chủ đề!");
                    setWizardStep(3); setLoadingMsg(`AI đang vẽ ${numQuestions} câu hỏi "${topic}"...`);
                    try {
                        const qData = await generateQuestionsWithGemini(apiKey, topic, numQuestions);
                        setQuestions(qData.map((q, i) => ({ ...q, id: i, uId: `q-${i}` }))); setWizardStep(4); 
                    } catch (err) { 
                        setWizardStep(2); 
                        if (err.message.includes("Quota exceeded") || err.message.includes("429")) {
                             setErrorMsg("⚠️ Hệ thống AI đang quá tải. Hãy thử dùng tính năng 'Nhập Dữ Liệu Thủ Công' bên dưới!");
                        } else {
                             setErrorMsg("Lỗi tạo câu hỏi: " + err.message);
                        }
                    }
                } else {
                    setWizardStep(4); // Manual mode goes straight to edit
                }
            };

            const handleStartGame = () => { setBoardCards(questions.map((q, idx) => ({ id: idx, status: 'hidden', question: q }))); setCurrentTurn(0); setCurrentStudent(null); setWizardStep(5); };
            const handleTeamNameChange = (idx, name) => { const newTeams = [...teams]; newTeams[idx].name = name; setTeams(newTeams); };
            const nextTurn = () => { 
                const remainingCards = boardCards.filter(c => c.status !== 'solved'); 
                if (remainingCards.length === 0) { setTimeout(() => setWizardStep(6), 1000); } 
                else { 
                    if (gameMode === 'teams') setCurrentTurn(prev => (prev + 1) % teams.length);
                    else setCurrentStudent(null); // Reset for next spin
                } 
            };

            const handleAnswerSelect = (isCorrect) => {
                setShowAnswer(true); setIsCorrectAnswer(isCorrect);
                if (isCorrect) { 
                    if (gameMode === 'teams') setTeams(prev => prev.map((t, i) => i === currentTurn ? { ...t, score: t.score + 1 } : t));
                    else if (currentStudent) setStudents(prev => prev.map(s => s.id === currentStudent.id ? { ...s, score: s.score + 1 } : s));
                }
                setTimeout(() => { setShowExplanation(true); }, 1500);
            };

            const handleExplanationNext = () => {
                setShowExplanation(false); setShowAnswer(false); 
                setBoardCards(prev => prev.map(c => c.question.uId === activeCard.uId ? { ...c, status: 'solved' } : c)); setActiveCard(null); 
                if (isCorrectAnswer) { const games = ['penalty', 'basketball', 'racing', 'paperPlane', 'clawMachine']; setMiniGameType(games[Math.floor(Math.random() * games.length)]); } else { setWheelType('punishment'); }
            };

            const handleMiniGameComplete = (isWin) => { setMiniGameType(null); setActiveCard(null); setWheelType(isWin ? 'reward' : 'punishment'); };
            const handleWheelComplete = (result) => { 
                setWheelType(null); 
                if (result.type === 'score' && result.value !== 0) { 
                    if (gameMode === 'teams') setTeams(prev => prev.map((t, i) => i === currentTurn ? { ...t, score: t.score + result.value } : t));
                    else if (currentStudent) setStudents(prev => prev.map(s => s.id === currentStudent.id ? { ...s, score: s.score + result.value } : s));
                } 
                nextTurn(); 
            };
            
            const handleQuestionChange = (id, f, v) => setQuestions(p => p.map(q => q.id === id ? { ...q, [f]: v } : q));
            const handleOptionChange = (id, idx, v) => setQuestions(p => p.map(q => q.id === id ? { ...q, options: q.options.map((o,i)=>i===idx?v:o) } : q));
            const handleDeleteQuestion = (id) => questions.length > 1 && setQuestions(p => p.filter(q => q.id !== id));
            const handleAddQuestion = () => { const newId = questions.length > 0 ? Math.max(...questions.map(q=>q.id)) + 1 : 0; setQuestions([...questions, { id: newId, uId: `q-man-${newId}`, question: "Câu hỏi mới...", options: ["A", "B", "C", "D"], correctAnswer: 0, explanation: "...", visualType: 'none', visualData: '' }]); };
            const validateImportedQuestions = (data) => { if (!Array.isArray(data)) throw new Error("Dữ liệu phải là mảng []"); return data.map((q, i) => ({ ...q, id: i, uId: `q-imp-${i}`, visualType: q.visualType||'none', visualData: q.visualData||'' })); };
            const handleJsonImport = () => { try { const p = JSON.parse(jsonInput); setQuestions(validateImportedQuestions(p)); setWizardStep(4); } catch (e) { setErrorMsg("Lỗi: " + e.message); } };
            const handleFileUpload = (e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>{ try{ setQuestions(validateImportedQuestions(JSON.parse(ev.target.result))); setWizardStep(4); }catch(err){setErrorMsg(err.message)} }; r.readAsText(f); };
            const handleDownloadTemplate = () => { const t = [{"question": "1+1=?", "options": ["1","2","3","4"], "correctAnswer": 1, "explanation": "..."}]; const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(t, null, 2)); const a = document.createElement('a'); a.href = d; a.download = "mau.json"; a.click(); };
            const handleExportQuestions = () => { const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(questions, null, 2)); const a = document.createElement('a'); a.href = d; a.download = "data.json"; a.click(); };
            const handleCopyPrompt = () => { navigator.clipboard.writeText(`Tạo JSON trắc nghiệm...`); alert("Đã copy!"); };

            // --- RENDERERS ---
            const renderIntro = () => (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-orange-400 via-amber-500 to-orange-600 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle,white_1px,transparent_1px)] bg-[size:20px_20px]"></div>
                    <motion.div initial={{scale:0.8, opacity:0}} animate={{scale:1, opacity:1}} className="bg-white/95 backdrop-blur-md p-10 rounded-[3rem] shadow-2xl max-w-2xl w-full text-center border-4 border-white/50">
                        <img src="logo.png" onError={(e) => e.target.style.display = 'none'} className="w-40 h-40 object-contain drop-shadow-xl mx-auto mb-6" />
                        <h1 className="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600 uppercase tracking-tight">GAME GIÁO DỤC</h1>
                        <h2 className="text-3xl font-bold text-orange-500 mb-8">HỌC MÀ CHƠI - CHƠI MÀ HỌC</h2>
                        <div className="bg-orange-50 p-6 rounded-2xl mb-8 border border-orange-100">
                            <p className="text-gray-500 uppercase text-xs font-bold tracking-widest mb-2">Tác giả</p>
                            <div className="flex flex-col items-center gap-2"><GraduationCap className="text-orange-500" size={32} /><h3 className="text-xl font-bold text-slate-800">Thầy THÁI MINH NGUYÊN</h3><p className="text-slate-600 font-medium">GV Trường TH, THCS & THPT YERSIN ĐÀ LẠT</p></div>
                        </div>
                        <div className="space-y-4">
                            <button onClick={() => setWizardStep(0.5)} className="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white text-2xl font-black py-5 rounded-2xl shadow-lg transform hover:-translate-y-1 transition-all flex items-center justify-center gap-3"><Play size={28} fill="currentColor"/> BẮT ĐẦU</button>
                            <button onClick={() => setShowTutorial(true)} className="w-full bg-white text-orange-600 border-2 border-orange-200 hover:bg-orange-50 text-xl font-bold py-4 rounded-2xl shadow-sm flex items-center justify-center gap-2 transition-all"><Info size={24}/> Hướng Dẫn / Cách Chơi</button>
                        </div>
                    </motion.div>
                </div>
            );

            // --- STEP 0.5: MODE SELECT ---
            const renderModeSelection = () => (
                <div className="min-h-screen flex items-center justify-center bg-orange-50 p-4">
                    <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="bg-white p-10 rounded-3xl shadow-2xl max-w-4xl w-full border-4 border-orange-200">
                        <h2 className="text-3xl font-black text-center mb-10 text-orange-600 uppercase">Chọn Chế Độ Dữ Liệu</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <button onClick={() => { setInputMode('ai'); setWizardStep(1); }} className="group relative bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 p-8 rounded-2xl transition-all hover:-translate-y-2">
                                <div className="absolute top-4 right-4 bg-blue-500 text-white text-xs font-bold px-2 py-1 rounded">Cần Key</div>
                                <Zap size={60} className="text-blue-500 mb-4 mx-auto group-hover:scale-110 transition"/>
                                <h3 className="text-2xl font-bold text-blue-700 mb-2 text-center">AI Tự Động</h3>
                                <p className="text-blue-600 text-center text-sm">Nhập chủ đề, AI sẽ tự soạn câu hỏi và đáp án cho bạn.</p>
                            </button>
                            <button onClick={() => { setInputMode('manual'); setWizardStep(2); }} className="group relative bg-purple-50 hover:bg-purple-100 border-2 border-purple-200 p-8 rounded-2xl transition-all hover:-translate-y-2">
                                <div className="absolute top-4 right-4 bg-purple-500 text-white text-xs font-bold px-2 py-1 rounded">Miễn Phí</div>
                                <FileJson size={60} className="text-purple-500 mb-4 mx-auto group-hover:scale-110 transition"/>
                                <h3 className="text-2xl font-bold text-purple-700 mb-2 text-center">Thủ Công / File</h3>
                                <p className="text-purple-600 text-center text-sm">Tự nhập JSON hoặc tải file câu hỏi đã soạn sẵn.</p>
                            </button>
                        </div>
                        <button onClick={() => setWizardStep(0)} className="mt-8 w-full py-3 text-gray-400 font-bold hover:text-gray-600 text-center">Quay lại màn hình chính</button>
                    </motion.div>
                </div>
            );

            // --- STEP 1: KEY ---
            const renderStep1_Key = () => (
                <div className="min-h-screen flex items-center justify-center p-4 bg-orange-50">
                    <motion.div initial={{opacity:0}} animate={{opacity:1}} className="max-w-xl w-full bg-white p-8 rounded-2xl shadow-xl border-t-8 border-orange-500">
                        <button onClick={() => setWizardStep(0.5)} className="mb-4 text-gray-400 hover:text-orange-500 flex items-center gap-1 text-sm font-bold">← Chọn lại chế độ</button>
                        <h2 className="text-2xl font-bold mb-4 flex items-center gap-2 text-orange-600"><Key/> Nhập API Key (Gemini)</h2>
                        <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full p-4 border rounded-xl mb-4 bg-orange-50 focus:ring-2 focus:ring-orange-400 outline-none" placeholder="Paste API Key vào đây..." />
                        <button onClick={() => apiKey ? setWizardStep(2) : setErrorMsg('Vui lòng nhập Key!')} className="w-full bg-orange-600 text-white py-4 rounded-xl font-bold flex justify-center gap-2 shadow-lg">Tiếp Tục <ArrowRight/></button>
                        {errorMsg && <p className="text-red-500 mt-2 text-center">{errorMsg}</p>}
                    </motion.div>
                </div>
            );

            // --- STEP 2: CONFIG ---
            const renderStep2_Config = () => (
                <div className="min-h-screen p-8 bg-orange-50 flex justify-center items-start">
                    <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="max-w-5xl w-full bg-white p-8 rounded-3xl shadow-xl border-t-8 border-orange-500">
                        <h2 className="text-3xl font-bold mb-8 text-orange-600 flex items-center gap-2"><Settings className="text-orange-500"/> Cấu Hình Trò Chơi</h2>
                        
                        {/* 1. CHỌN CHẾ ĐỘ CHƠI */}
                        <div className="mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                            <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Users size={20}/> Cách Chơi</h3>
                            <div className="flex gap-4 mb-4">
                                <button onClick={() => setGameMode('teams')} className={`flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all border-2 ${gameMode==='teams' ? 'bg-orange-100 border-orange-500 text-orange-700' : 'bg-white border-transparent text-gray-400 hover:bg-gray-100'}`}><Grid/> Chia Đội (Teams)</button>
                                <button onClick={() => setGameMode('students')} className={`flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all border-2 ${gameMode==='students' ? 'bg-green-100 border-green-500 text-green-700' : 'bg-white border-transparent text-gray-400 hover:bg-gray-100'}`}><Shuffle/> Cá Nhân (Random)</button>
                            </div>
                            
                            <div className="mt-4">
                                {gameMode === 'teams' ? (
                                    <div>
                                        <label className="block text-sm font-bold text-gray-500 mb-2">Số lượng đội: <span className="text-orange-600 text-lg">{numTeams}</span></label>
                                        <input type="range" min="2" max="16" value={numTeams} onChange={e => setNumTeams(Number(e.target.value))} className="w-full h-2 bg-orange-200 rounded-lg appearance-none cursor-pointer accent-orange-600" />
                                        <div className="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">{teams.map((t, i) => (<div key={i} className="flex items-center gap-2 p-2 bg-white rounded border"><div className="w-4 h-4 rounded-full" style={{backgroundColor: t.color}}></div><input type="text" value={t.name} onChange={(e) => handleTeamNameChange(i, e.target.value)} className="w-full text-sm outline-none font-bold" /></div>))}</div>
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-sm font-bold text-gray-500 mb-2">Nhập danh sách học sinh (Mỗi tên 1 dòng - Copy từ Excel):</label>
                                        <textarea value={studentListInput} onChange={e => setStudentListInput(e.target.value)} className="w-full p-4 border rounded-xl h-32 focus:outline-green-500 font-mono text-sm resize-none" placeholder="Nguyễn Văn A&#10;Trần Thị B&#10;Lê Văn C..."></textarea>
                                        <button onClick={parseStudentList} className="mt-2 bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-green-700">✅ Xác nhận danh sách ({studentListInput.split('\n').filter(Boolean).length})</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 2. REWARDS */}
                        <div className="mb-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                                <h3 className="font-bold text-yellow-700 mb-2 flex justify-between"><span>🎁 Phần Thưởng</span><button onClick={handleAddReward} className="text-xs bg-yellow-200 px-2 py-1 rounded hover:bg-yellow-300 transition">+ Thêm</button></h3>
                                <div className="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                                    {customRewards.map((r, i) => ( <div key={i} className="flex gap-2 items-center"><input value={r.label} onChange={(e)=>handleUpdateReward(i,'label',e.target.value)} className="flex-1 text-sm p-1 border rounded bg-white" /><input type="number" value={r.value} onChange={(e)=>handleUpdateReward(i,'value',Number(e.target.value))} className="w-16 text-sm p-1 border rounded text-center bg-white" /><button onClick={()=>handleRemoveReward(i)} className="text-red-400 hover:text-red-600"><X size={16}/></button></div> ))}
                                </div>
                            </div>
                            <div className="bg-red-50 p-4 rounded-xl border border-red-200">
                                <h3 className="font-bold text-red-700 mb-2 flex justify-between"><span>💀 Hình Phạt</span><button onClick={handleAddPunishment} className="text-xs bg-red-200 px-2 py-1 rounded hover:bg-red-300 transition">+ Thêm</button></h3>
                                <div className="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                                    {customPunishments.map((r, i) => ( <div key={i} className="flex gap-2 items-center"><input value={r.label} onChange={(e)=>handleUpdatePunishment(i,'label',e.target.value)} className="flex-1 text-sm p-1 border rounded bg-white" /><input type="number" value={r.value} onChange={(e)=>handleUpdatePunishment(i,'value',Number(e.target.value))} className="w-16 text-sm p-1 border rounded text-center bg-white" /><button onClick={()=>handleRemovePunishment(i)} className="text-red-400 hover:text-red-600"><X size={16}/></button></div> ))}
                                </div>
                            </div>
                        </div>

                        {/* 3. INPUT DATA */}
                        <div className="border-t pt-6">
                            {inputMode === 'ai' ? (
                                <div className="space-y-4">
                                    <h3 className="font-bold text-blue-600 text-lg">🤖 AI Tự Động:</h3>
                                    <div className="flex gap-4">
                                        <input type="text" value={topic} onChange={e => setTopic(e.target.value)} className="flex-[2] p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Chủ đề (VD: Lịch sử VN, Toán 12 Hàm số)..." />
                                        <input type="number" min="5" max="30" value={numQuestions} onChange={e => setNumQuestions(Number(e.target.value))} className="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" title="Số lượng câu hỏi" />
                                    </div>
                                    <button onClick={handleCreateContent} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg flex justify-center gap-2"><RefreshCw/> Tạo Câu Hỏi</button>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <h3 className="font-bold text-purple-600 text-lg">📝 Thủ Công / File:</h3>
                                    <div className="flex gap-2 mb-2">
                                        <button onClick={handleDownloadTemplate} className="flex-1 bg-gray-100 hover:bg-gray-200 border text-gray-600 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-1"><Download size={14}/> Tải Mẫu</button>
                                        <button onClick={handleCopyPrompt} className="flex-1 bg-gray-100 hover:bg-gray-200 border text-gray-600 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-1"><Copy size={14}/> Copy Prompt</button>
                                    </div>
                                    <textarea value={jsonInput} onChange={e => setJsonInput(e.target.value)} className="w-full p-3 border rounded-lg font-mono text-xs h-24" placeholder='Dán chuỗi JSON vào đây: [{"question": "...", "options": [...]}]'></textarea>
                                    <div className="flex gap-2">
                                        <button onClick={handleJsonImport} className="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-bold shadow-md transition">Xử lý Text</button>
                                        <label className="flex-1 bg-white border-2 border-purple-600 text-purple-600 py-3 rounded-lg font-bold shadow-md text-center cursor-pointer hover:bg-purple-50 transition flex items-center justify-center gap-2">
                                            <Upload size={18}/> Upload File
                                            <input type="file" accept=".json" onChange={handleFileUpload} className="hidden" />
                                        </label>
                                    </div>
                                </div>
                            )}
                        </div>
                        {errorMsg && <div className="mt-4 text-red-500 font-bold text-center">{errorMsg}</div>}
                        <button onClick={() => setWizardStep(inputMode==='ai'?1:0.5)} className="mt-6 text-gray-400 font-bold text-sm">← Quay lại bước trước</button>
                    </motion.div>
                </div>
            );

            const renderStep4_Edit = () => (
                <motion.div initial={{opacity:0}} animate={{opacity:1}} className="bg-white w-full max-w-6xl h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border-4 border-orange-500">
                    <div className="bg-gradient-to-r from-orange-500 to-amber-500 p-5 flex justify-between items-center text-white shadow-md">
                        <h2 className="text-xl font-bold flex gap-2"><Edit3/> Chỉnh sửa bộ câu hỏi</h2>
                        <div className="flex gap-2">
                            <button onClick={handleExportQuestions} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 border border-white/30 transition"><Download size={16}/> Lưu File JSON</button>
                            <button onClick={handleAddQuestion} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-bold border border-white/30">+ Thêm câu</button>
                            <div className="bg-black/20 px-4 py-2 rounded-lg text-sm font-bold border border-white/10">Tổng: {questions.length}</div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8 bg-slate-100 space-y-6">
                        {questions.map((q, idx) => (
                            <div key={q.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative group">
                                <button onClick={() => handleDeleteQuestion(q.id)} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><Trash2 size={24}/></button>
                                <div className="flex gap-6">
                                    <div className="font-black text-orange-500 text-2xl w-12 flex-shrink-0 pt-2">#{idx + 1}</div>
                                    <div className="flex-1 space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-gray-400 uppercase">Nội dung câu hỏi</label>
                                                <textarea value={q.question} onChange={(e) => handleQuestionChange(q.id, 'question', e.target.value)} className="w-full p-4 border rounded-xl min-h-[120px] text-lg focus:ring-2 focus:ring-orange-400 outline-none" />
                                                <div className="text-sm bg-orange-50 p-3 rounded-lg text-slate-600 border border-orange-100"><strong>Preview:</strong> <MathContent content={q.question} /></div>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-bold text-gray-400 uppercase">Hình ảnh minh họa</label>
                                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 h-full">
                                                    <div className="flex gap-2 mb-2">
                                                        <select value={q.visualType} onChange={(e) => handleQuestionChange(q.id, 'visualType', e.target.value)} className="p-2 border rounded-lg bg-white text-sm flex-1">
                                                            <option value="none">Không có</option>
                                                            <option value="graph">Đồ thị</option>
                                                            <option value="chemistry">Hóa học</option>
                                                            <option value="table">Bảng</option>
                                                            <option value="svg">SVG</option>
                                                        </select>
                                                        <input type="text" value={q.visualData} onChange={(e) => handleQuestionChange(q.id, 'visualData', e.target.value)} className="p-2 border rounded-lg bg-white text-sm flex-[2]" placeholder="Dữ liệu (vd: x^2)"/>
                                                    </div>
                                                    {q.visualType !== 'none' && <div className="flex justify-center p-2"><VisualContent type={q.visualType} data={q.visualData} isTV={false}/></div>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {q.options.map((opt, oIdx) => (
                                                <div key={oIdx} className="flex gap-2 items-center">
                                                    <input type="radio" checked={q.correctAnswer===oIdx} onChange={()=>handleQuestionChange(q.id,'correctAnswer',oIdx)} className="w-6 h-6 accent-green-600 cursor-pointer"/>
                                                    <input type="text" value={opt} onChange={(e)=>handleOptionChange(q.id,oIdx,e.target.value)} className={`flex-1 p-3 border rounded-lg ${q.correctAnswer===oIdx?'border-green-500 bg-green-50 font-bold text-green-800':'focus:border-orange-400 outline-none'}`}/>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="pt-4 border-t border-dashed border-slate-300">
                                            <label className="text-sm font-bold text-blue-600 uppercase mb-2 flex items-center gap-2"><Lightbulb size={16}/> Giải thích chi tiết (Hiện khi xem đáp án)</label>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <textarea value={q.explanation} onChange={(e)=>handleQuestionChange(q.id,'explanation',e.target.value)} className="w-full p-4 border rounded-xl min-h-[150px] bg-yellow-50 focus:ring-2 focus:ring-yellow-400 outline-none text-slate-700 font-mono text-sm" placeholder="Nhập lời giải chi tiết (hỗ trợ LaTeX)..."/>
                                                <div className="bg-yellow-50/50 p-4 rounded-xl border border-yellow-200 min-h-[150px] overflow-y-auto max-h-[300px]">
                                                    <div className="text-xs text-gray-400 uppercase mb-1 font-bold">Xem trước hiển thị:</div>
                                                    <div className="prose prose-sm max-w-none whitespace-pre-wrap"><MathContent content={q.explanation || "Chưa có giải thích"} /></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-5 border-t bg-white flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                        <button onClick={()=>setWizardStep(2)} className="text-gray-500 font-bold hover:text-orange-600">← Quay lại</button>
                        <button onClick={handleStartGame} className="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white py-4 px-10 rounded-xl font-black text-xl flex gap-2 shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all"><Play size={24}/> BẮT ĐẦU GAME</button>
                    </div>
                </motion.div>
            );

            const renderPlaying = () => (
                <div className={`flex flex-col h-screen overflow-hidden relative ${isTVMode ? 'bg-black' : 'bg-orange-50'}`}>
                    <div className="absolute top-2 right-2 z-50 flex gap-2">
                        <button onClick={() => setIsTVMode(!isTVMode)} className={`p-2 rounded-full shadow-md transition-all border-2 ${isTVMode ? 'bg-blue-600 text-white border-blue-400 hover:bg-blue-500' : 'bg-white/50 text-slate-600 border-transparent hover:bg-white'}`} title="Chế độ TV / Trình chiếu"><Monitor size={24}/></button>
                        <button onClick={toggleFullscreen} className={`p-2 rounded-full shadow-md transition-all border-2 ${isTVMode ? 'bg-slate-700 text-white border-slate-500' : 'bg-white/50 text-slate-600 border-transparent hover:bg-white'}`}>{isFullscreen ? <Minimize size={24}/> : <Maximize size={24}/>}</button>
                    </div>

                    {/* HEADER - TỐI GIẢN KHI BẬT TV MODE */}
                    <div className={`shadow-md flex gap-3 items-center overflow-x-auto border-b-4 transition-all duration-500 ${
                        isTVMode 
                        ? 'bg-slate-900 border-slate-700 h-[70px] opacity-80 hover:opacity-100 p-1 px-4' 
                        : 'bg-white border-orange-300 min-h-[110px] p-2'
                    }`}>
                        {gameMode === 'teams' ? (
                            rankedTeams.map((team, idx) => {
                                let borderClass = "border-transparent"; let icon = null; let scale = "scale-100";
                                if (team.rank === 1) { borderClass = isTVMode ? "border-yellow-500" : "border-yellow-400 bg-yellow-50"; icon = <Crown size={isTVMode?16:20} className="text-yellow-500 absolute -top-3 -right-2 animate-bounce"/>; scale = isTVMode ? "" : "scale-105 shadow-md"; }
                                else if (team.rank === 2) { borderClass = isTVMode ? "border-slate-500" : "border-slate-400 bg-slate-50"; icon = <Medal size={isTVMode?14:18} className="text-slate-400 absolute -top-3 -right-2"/>; }
                                
                                return (
                                    <div key={team.id} className={`relative rounded-xl border-2 transition-all flex flex-col items-center justify-center 
                                        ${isTVMode ? 'px-2 py-0 min-w-[80px] bg-slate-800 text-white' : 'px-4 py-2 min-w-[110px] bg-white'} 
                                        ${borderClass} ${scale} ${currentTurn === team.id ? 'ring-2 ring-orange-500 ring-offset-2' : 'opacity-90'}`}>
                                        {icon}
                                        <div className={`${isTVMode ? 'text-[10px]' : 'text-xs'} font-bold uppercase truncate max-w-[100px]`} style={{color: team.color}}>{team.name}</div>
                                        <div className={`${isTVMode ? 'text-xl' : 'text-3xl'} font-black ${isTVMode ? 'text-white' : 'text-slate-800'}`}>{team.score}</div>
                                    </div>
                                );
                            })
                        ) : (
                            // CHẾ ĐỘ RANDOM HỌC SINH: HIỂN THỊ NGƯỜI CHƠI HIỆN TẠI & NÚT QUAY
                            <div className="flex items-center gap-4 w-full px-4">
                                <div className="flex-1 flex items-center gap-4">
                                    <button onClick={() => setShowStudentSpinner(true)} className="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 animate-pulse transition"><Shuffle size={20}/> QUAY TÊN HS</button>
                                    
                                    {currentStudent ? (
                                        <div className={`flex items-center gap-3 px-6 py-2 rounded-xl border-2 ${isTVMode?'bg-slate-800 border-green-500 text-white':'bg-green-50 border-green-200'}`}>
                                            <User size={32} className="text-green-600"/>
                                            <div>
                                                <div className="text-xs text-gray-400 font-bold uppercase">Người chơi hiện tại</div>
                                                <div className="text-2xl font-black text-green-600">{currentStudent?.name || "..."}</div>
                                            </div>
                                            <div className="ml-4 text-3xl font-black text-orange-500">{currentStudent?.score || 0}đ</div>
                                        </div>
                                    ) : (
                                        <div className="text-gray-400 font-bold italic flex items-center gap-2"><ArrowRight size={16}/> Hãy quay số để chọn học sinh!</div>
                                    )}
                                </div>
                                <div className="text-xs text-gray-400 font-bold">Sĩ số: {students.length}</div>
                            </div>
                        )}
                        
                        {gameMode === 'teams' && (
                            <div className={`ml-auto flex items-center gap-2 rounded-xl font-bold shadow-lg whitespace-nowrap ${isTVMode ? 'bg-slate-800 text-white px-4 py-1 text-sm' : 'bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-3 text-white'}`}>
                                Lượt: <span className={`${isTVMode ? 'text-lg text-yellow-400' : 'text-2xl text-white ml-2 drop-shadow-md'}`}>{teams[currentTurn]?.name || "..."}</span>
                            </div>
                        )}
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto flex items-center justify-center">
                        {activeCard ? (
                            <div className={`fixed inset-0 z-[100] backdrop-blur-sm flex items-center justify-center p-4 transition-colors duration-500 ${isTVMode ? 'bg-black' : 'bg-black/60'}`}>
                                <motion.div initial={{scale:0.9}} animate={{scale:1}} className={`rounded-3xl shadow-2xl overflow-hidden flex flex-col transition-all duration-500 
                                    ${isTVMode 
                                        ? 'bg-slate-900 w-[98vw] h-[98vh] border-0 text-slate-100' // TV Mode: Fullscreen, Dark, Huge
                                        : 'bg-white w-full max-w-5xl max-h-[90vh] border-4 border-orange-500' // Normal: Card
                                    }`}>
                                    
                                    <div className={`${isTVMode ? 'bg-slate-800 p-4' : 'bg-gradient-to-r from-orange-500 to-amber-500 p-6'} font-bold text-2xl flex justify-between shadow-md text-white`}>
                                        <span>Câu hỏi dành cho: {gameMode === 'teams' ? (teams[currentTurn]?.name || "...") : (currentStudent?.name || '...')}</span>
                                        {isTVMode && <span className="text-yellow-400 text-xl animate-pulse">TV MODE ON</span>}
                                    </div>

                                    <div className={`p-8 overflow-y-auto flex-1 ${isTVMode ? 'bg-slate-900' : 'bg-orange-50/30'}`}>
                                        <div className={`${isTVMode ? 'text-4xl text-white leading-relaxed text-center mt-4' : 'text-3xl text-slate-800 leading-normal'} font-bold mb-6`}>
                                            <MathContent content={activeCard.question} />
                                        </div>
                                        
                                        <div className="flex justify-center my-8">
                                            <VisualContent type={activeCard.visualType} data={activeCard.visualData} isTV={isTVMode} />
                                        </div>

                                        <div className={`grid gap-4 mt-6 ${isTVMode ? 'grid-cols-2 gap-8' : 'grid-cols-1'}`}>
                                            {activeCard.options.map((opt, i) => (
                                                <button key={i} disabled={showAnswer} onClick={() => handleAnswerSelect(i === activeCard.correctAnswer)}
                                                    className={`
                                                        p-6 rounded-2xl border-2 text-left transition-all flex items-center gap-6 shadow-sm
                                                        ${isTVMode ? 'text-3xl border-slate-600 hover:border-blue-500 hover:bg-slate-800 text-slate-200' : 'text-2xl hover:bg-orange-100 hover:border-orange-400 border-slate-200 text-slate-800'}
                                                        ${showAnswer ? (i===activeCard.correctAnswer?'bg-green-600 border-green-500 text-white shadow-md transform scale-[1.02] ring-4 ring-green-300':'opacity-40') : 'bg-transparent'}
                                                    `}>
                                                    <span className={`font-bold w-16 h-16 flex items-center justify-center rounded-full flex-shrink-0 ${isTVMode ? 'text-3xl' : 'text-xl'} ${showAnswer && i===activeCard.correctAnswer ? 'bg-white text-green-600' : 'bg-slate-700 text-white'}`}>{String.fromCharCode(65+i)}</span>
                                                    <div className="flex-1 font-medium"><MathContent content={opt}/></div>
                                                    {showAnswer && i === activeCard.correctAnswer && <Check className="text-white w-12 h-12"/>}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </motion.div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-6 w-full max-w-6xl content-start">
                                {boardCards.map((card, idx) => (
                                    <motion.button key={idx} 
                                        onClick={() => {
                                            if (gameMode === 'students' && !currentStudent) {
                                                alert("Vui lòng quay tên học sinh trước khi chọn câu hỏi!");
                                                return;
                                            }
                                            if (card.status === 'hidden') {
                                                card.status = 'active'; setActiveCard(card.question); setShowAnswer(false);
                                            }
                                        }}
                                        disabled={card.status !== 'hidden'} 
                                        whileHover={{ scale: 1.05 }}
                                        whileTap={{ scale: 0.95 }}
                                        className={`aspect-square rounded-3xl shadow-lg flex items-center justify-center text-4xl font-black transition-all 
                                        ${card.status === 'solved' 
                                            ? 'bg-slate-200 text-slate-300 shadow-none' 
                                            : isTVMode 
                                                ? 'bg-slate-800 text-blue-400 border-b-8 border-slate-950 hover:border-blue-500 hover:text-blue-300' 
                                                : 'bg-white text-orange-600 border-b-8 border-orange-200 hover:border-orange-400'
                                        }`}>
                                        {card.status === 'solved' ? <Check size={48}/> : idx+1}
                                    </motion.button>
                                ))}
                            </div>
                        )}
                    </div>
                    {/* NEW: SPINNER CHO HỌC SINH */}
                    {showStudentSpinner && <StudentSpinner students={students} onComplete={(s) => { 
                        if(s) {
                            setCurrentStudent(s); 
                            setShowStudentSpinner(false); 
                        } else {
                            setShowStudentSpinner(false);
                        }
                    }} />}
                    
                    {showExplanation && activeCard && <ExplanationModal content={activeCard.explanation} onClose={handleExplanationNext} />}
                    {miniGameType && (
                        <div className="fixed inset-0 z-[60] bg-black/90 flex flex-col items-center justify-center p-4">
                            <div className="w-full max-w-4xl relative">
                                <button onClick={() => handleMiniGameComplete(false)} className="absolute -top-12 right-0 text-white hover:text-red-400 font-bold bg-white/10 px-4 py-2 rounded-full">Bỏ qua Minigame</button>
                                <h2 className="text-5xl font-black text-center text-amber-400 mb-8 animate-bounce uppercase drop-shadow-lg">{miniGameType === 'penalty' && "⚽ Đá Phạt Đền! ⚽"}{miniGameType === 'basketball' && "🏀 Siêu Sao Bóng Rổ! 🏀"}{miniGameType === 'racing' && "🐎 Đua Thú Tranh Tài! 🐎"}{miniGameType === 'paperPlane' && "✈️ Phi Đội Máy Bay Giấy! ✈️"}{miniGameType === 'clawMachine' && "🧸 Gắp Thú Vui Vẻ! 🧸"}</h2>
                                {miniGameType === 'penalty' && <PenaltyGame onComplete={handleMiniGameComplete} teamName={gameMode === 'teams' ? teams[currentTurn]?.name : currentStudent?.name} />}{miniGameType === 'basketball' && <BasketballGame onComplete={handleMiniGameComplete} teamName={gameMode === 'teams' ? teams[currentTurn]?.name : currentStudent?.name} />}{miniGameType === 'racing' && <RacingGame onComplete={handleMiniGameComplete} teamName={gameMode === 'teams' ? teams[currentTurn]?.name : currentStudent?.name} />}{miniGameType === 'paperPlane' && <PaperPlaneGame onComplete={handleMiniGameComplete} teamName={gameMode === 'teams' ? teams[currentTurn]?.name : currentStudent?.name} />}{miniGameType === 'clawMachine' && <ClawMachineGame onComplete={handleMiniGameComplete} teamName={gameMode === 'teams' ? teams[currentTurn]?.name : currentStudent?.name} />}
                            </div>
                        </div>
                    )}
                    {wheelType && <ResultWheel type={wheelType} items={wheelType === 'reward' ? customRewards : customPunishments} onClose={handleWheelComplete} />}
                </div>
            );

            const renderSummary = () => {
                // LOGIC XẾP HẠNG CHO CẢ 2 CHẾ ĐỘ
                const winners = rankedTeams.slice(0, 3);
                const [first, second, third, ...others] = winners;
                
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-b from-indigo-900 to-purple-900 relative overflow-hidden text-white">
                        <Confetti />
                        <h1 className="text-5xl font-black text-yellow-400 mb-8 uppercase drop-shadow-[0_0_15px_rgba(250,204,21,0.8)] tracking-wide relative z-10 animate-bounce">🏆 TỔNG KẾT TRAO GIẢI 🏆</h1>
                        <div className="flex items-end justify-center gap-4 mb-12 relative z-10 w-full max-w-4xl h-80">
                            {second && (<motion.div initial={{y: 100, opacity: 0}} animate={{y: 0, opacity: 1}} transition={{delay: 0.5}} className="flex flex-col items-center w-1/3"><div className="mb-2 text-center"><div className="text-xl font-bold text-slate-300">{second.name}</div><div className="text-3xl font-black">{second.score}đ</div></div><div className="w-full h-40 bg-gradient-to-t from-slate-400 to-slate-200 rounded-t-lg shadow-2xl border-t-4 border-slate-300 flex items-center justify-center text-4xl font-black text-slate-600">2</div></motion.div>)}
                            {first && (<motion.div initial={{y: 100, opacity: 0}} animate={{y: 0, opacity: 1}} transition={{delay: 0.2}} className="flex flex-col items-center w-1/3 -mt-10 z-20"><Crown size={60} className="text-yellow-400 mb-2 floating drop-shadow-lg" fill="currentColor"/><div className="mb-2 text-center"><div className="text-2xl font-bold text-yellow-200">{first.name}</div><div className="text-5xl font-black text-white drop-shadow-md">{first.score}đ</div></div><div className="w-full h-64 bg-gradient-to-t from-yellow-500 to-yellow-300 rounded-t-lg shadow-[0_0_50px_rgba(234,179,8,0.5)] border-t-4 border-yellow-200 flex items-center justify-center text-6xl font-black text-yellow-800">1</div></motion.div>)}
                            {third && (<motion.div initial={{y: 100, opacity: 0}} animate={{y: 0, opacity: 1}} transition={{delay: 0.8}} className="flex flex-col items-center w-1/3"><div className="mb-2 text-center"><div className="text-xl font-bold text-orange-300">{third.name}</div><div className="text-3xl font-black">{third.score}đ</div></div><div className="w-full h-24 bg-gradient-to-t from-orange-600 to-orange-400 rounded-t-lg shadow-2xl border-t-4 border-orange-300 flex items-center justify-center text-4xl font-black text-orange-900">3</div></motion.div>)}
                        </div>
                        <div className="w-full max-w-2xl bg-white/10 backdrop-blur-md rounded-2xl p-4 relative z-10 max-h-48 overflow-y-auto mb-8 border border-white/20">
                            {/* Hiển thị danh sách còn lại */}
                            {gameMode === 'students' && rankedTeams.slice(3).map((t, i) => (<div key={t.id} className="flex justify-between items-center p-3 border-b border-white/10 last:border-0 text-slate-200"><span className="font-bold">#{i + 4} {t.name}</span><span className="font-mono font-bold">{t.score} điểm</span></div>))}
                        </div>
                        <div className="flex gap-4 relative z-10"><button onClick={() => setWizardStep(0)} className="bg-white/20 hover:bg-white/30 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 transition"><Home/> Về Trang Chủ</button><button onClick={() => setWizardStep(2)} className="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 transition animate-pulse"><Repeat/> Chơi Lại Game Này</button></div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen font-sans text-slate-800 bg-orange-50 selection:bg-orange-200">
                    {showTutorial && <InstructionModal onClose={() => setShowTutorial(false)} />}
                    {wizardStep === 0 && renderIntro()}
                    
                    {/* STEP 0.5: MODE SELECTION */}
                    {wizardStep === 0.5 && renderModeSelection()}

                    {wizardStep > 0 && wizardStep < 5 && (
                        <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-orange-400 to-amber-600">
                            {wizardStep === 1 && renderStep1_Key()}
                            {wizardStep === 2 && renderStep2_Config()}
                            {wizardStep === 3 && <div className="text-center text-white"><Loader2 size={80} className="animate-spin mb-6 mx-auto opacity-80"/><h2 className="text-3xl font-bold">{loadingMsg}</h2></div>}
                            {wizardStep === 4 && renderStep4_Edit()}
                        </div>
                    )}
                    
                    {wizardStep === 5 && renderPlaying()}
                    {wizardStep === 6 && renderSummary()}
                </div>
            );
        };

        // Render React App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
