<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Công cụ Hỗ trợ Khảo sát Hàm số - Thầy Thái Minh Nguyên</title>
    
    <!-- Core Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <!-- UI Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
                        glass: { panel: 'rgba(255, 255, 255, 0.95)', border: 'rgba(253, 186, 116, 0.3)' }
                    },
                    fontFamily: { sans: ['"Be Vietnam Pro"', 'sans-serif'], serif: ['"Lora"', 'serif'] },
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <!-- MathJax Config -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
            svg: { fontCache: 'global', scale: 1.15 },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        body { background: #fff7ed; background-image: radial-gradient(circle at 10% 20%, rgba(254, 215, 170, 0.4) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(253, 186, 116, 0.3) 0%, transparent 40%); min-height: 100vh; color: #334155; }
        mjx-container { font-family: 'Lora', serif !important; margin: 0 !important; outline: none; display: inline-block !important; }
        .glass-panel { background: var(--glass-panel, rgba(255, 255, 255, 0.95)); border: 1px solid rgba(251, 146, 60, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 1rem; }
        .modern-input { background: #fff; border: 2px solid #fed7aa; transition: all 0.2s ease; font-family: 'Lora', serif; font-weight: 700; color: #c2410c; }
        .modern-input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15); outline: none; transform: translateY(-1px); }
        .compact-p { padding: 1.25rem; }
        .math-tex { font-family: 'Lora', serif; color: #0f172a; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==================== 1. MATH ENGINE ====================
        const MathUtils = {
            gcd: (a, b) => b ? MathUtils.gcd(b, a % b) : Math.abs(a),
            createFrac: (tu, mau = 1) => { 
                if (mau === 0) return null; 
                if (Math.abs(tu) < 1e-10) return {t:0, m:1};
                if (mau < 0) { tu = -tu; mau = -mau; } 
                const c = MathUtils.gcd(tu, mau); 
                return { t: tu / c, m: mau / c }; 
            },
            addFrac: (f1, f2) => MathUtils.createFrac(f1.t * f2.m + f2.t * f1.m, f1.m * f2.m),
            subFrac: (f1, f2) => MathUtils.createFrac(f1.t * f2.m - f2.t * f1.m, f1.m * f2.m),
            mulFrac: (f1, f2) => MathUtils.createFrac(f1.t * f2.t, f1.m * f2.m),
            divFrac: (f1, f2) => MathUtils.createFrac(f1.t * f2.m, f1.m * f2.t),
            powFrac: (f, k) => MathUtils.createFrac(Math.pow(f.t, k), Math.pow(f.m, k)),
            fracToLatex: (f) => f.m === 1 ? `${f.t}` : `\\frac{${f.t}}{${f.m}}`,
            fracToString: (f) => f.m === 1 ? `${f.t}` : `${f.t}/${f.m}`,
            
            formatLinear: (a, b) => {
                let s = "";
                if (a === 1) s += "x"; else if (a === -1) s += "-x"; else if (a !== 0) s += `${a}x`;
                if (b > 0) s += (s ? "+" : "+") + b; else if (b < 0) s += (s ? "-" : "-") + Math.abs(b);
                s = s.replace(/^\+/, "").trim();
                if (!s) return "0";
                return s;
            },
            formatTerm: (coeff, power, isFirst = false) => {
                if (coeff === 0) return "";
                let sign = coeff > 0 ? (isFirst ? "" : "+ ") : (isFirst ? "-" : "- ");
                let abs = Math.abs(coeff);
                let val = (abs === 1 && power > 0) ? "" : `${abs}`;
                let pow = power === 0 ? "" : (power === 1 ? "x" : `x^${power}`);
                return `${sign}${val}${pow}`;
            },
            formatConst: (val) => val > 0 ? `+ ${val}` : (val < 0 ? `- ${Math.abs(val)}` : ""),
            polyToString: (a, b, c, d) => {
                let s = MathUtils.formatTerm(a, 3, true);
                s += " " + MathUtils.formatTerm(b, 2, s === "");
                s += " " + MathUtils.formatTerm(c, 1, s === "" && b === 0);
                s += " " + MathUtils.formatTerm(d, 0, s === "" && b === 0 && c === 0);
                return s.trim();
            },
            evalCubicFrac: (coeffs, xFrac) => {
                const {a,b,c,d} = coeffs; const x2=MathUtils.powFrac(xFrac,2), x3=MathUtils.powFrac(xFrac,3);
                let s = MathUtils.addFrac(MathUtils.mulFrac(MathUtils.createFrac(a),x3), MathUtils.mulFrac(MathUtils.createFrac(b),x2));
                return MathUtils.addFrac(MathUtils.addFrac(s, MathUtils.mulFrac(MathUtils.createFrac(c),xFrac)), MathUtils.createFrac(d));
            },
            evalRat21Extremum: (coeffs, xFrac) => {
                const {a,b,d} = coeffs;
                const num = MathUtils.addFrac(MathUtils.mulFrac(MathUtils.createFrac(2*a), xFrac), MathUtils.createFrac(b));
                return MathUtils.divFrac(num, MathUtils.createFrac(d));
            },
            solveQuadraticExact: (a, b, c) => {
                const delta = b*b - 4*a*c;
                if (delta < 0) return { delta, roots: [], latexRoots: [], fracRoots: [] };
                const sqrtD = Math.sqrt(delta);
                if (Number.isInteger(sqrtD)) {
                    let r1 = MathUtils.createFrac(-b - sqrtD, 2*a), r2 = MathUtils.createFrac(-b + sqrtD, 2*a);
                    if (r1.t/r1.m > r2.t/r2.m) [r1, r2] = [r2, r1];
                    return { delta, roots: [r1.t/r1.m, r2.t/r2.m], fracRoots: [r1, r2], latexRoots: [MathUtils.fracToLatex(r1), MathUtils.fracToLatex(r2)] };
                }
                let r1 = (-b - sqrtD)/(2*a), r2 = (-b + sqrtD)/(2*a);
                let lr = [`\\frac{${-b} - \\sqrt{${delta}}}{${2*a}}`, `\\frac{${-b} + \\sqrt{${delta}}}{${2*a}}`];
                if (r1 > r2) { [r1, r2] = [r2, r1]; [lr[0], lr[1]] = [lr[1], lr[0]]; } 
                return { delta, roots: [r1, r2], fracRoots: [], latexRoots: lr };
            },
            solveCubicExact: (a, b, c, d) => {
                let roots = [], ad = Math.abs(d);
                if (ad === 0) {
                    roots.push(0);
                    let qRes = MathUtils.solveQuadraticExact(a, b, c);
                    qRes.roots.forEach(r => roots.push(r));
                    return { roots: qRes.roots, latexRoots: qRes.latexRoots };
                } else {
                    for(let x = -20; x <= 20; x++) {
                        if (x === 0) continue;
                        if (Math.abs(a*x*x*x + b*x*x + c*x + d) < 1e-9) {
                            roots.push(x);
                            let A = a;
                            let B = b + a*x;
                            let C = c + B*x;
                            let qRes = MathUtils.solveQuadraticExact(A, B, C);
                            qRes.roots.forEach(r => roots.push(r));
                            let allRoots = [x.toString(), ...qRes.latexRoots];
                            allRoots = [...new Set(allRoots)];
                            return { roots: [x, ...qRes.roots], latexRoots: allRoots }
                        }
                    }
                }
                return { roots: [], latexRoots: [] }; 
            },
            solveCubicReal: (a, b, c, d) => { 
                if(Math.abs(a)<1e-8) return []; 
                let A=b/a, B=c/a, C=d/a, p=B-A*A/3, q=A*(2*A*A/9-B)/3+C, D=q*q/4+p*p*p/27;
                if(Math.abs(D)<1e-8) D=0;
                if(D>0) { let u=Math.cbrt(-q/2+Math.sqrt(D)), v=Math.cbrt(-q/2-Math.sqrt(D)); return [u+v-A/3]; }
                if(D===0) { let u=Math.cbrt(-q/2); return q===0 ? [-A/3] : [2*u-A/3, -u-A/3].sort((x,y)=>x-y); }
                let phi=Math.acos(-q/2/Math.sqrt(-p*p*p/27)), t=2*Math.sqrt(-p/3);
                return [t*Math.cos(phi/3)-A/3, t*Math.cos((phi+2*Math.PI)/3)-A/3, t*Math.cos((phi+4*Math.PI)/3)-A/3].sort((x,y)=>x-y);
            },
            evalPolyExact: (coeffs, xVal) => {
                let x = typeof xVal === 'object' ? xVal : MathUtils.createFrac(xVal, 1);
                const {a,b,c,d} = coeffs;
                const fa = MathUtils.createFrac(a), fb = MathUtils.createFrac(b), fc = MathUtils.createFrac(c), fd = MathUtils.createFrac(d);
                let term1 = MathUtils.mulFrac(fa, MathUtils.powFrac(x, 3));
                let term2 = MathUtils.mulFrac(fb, MathUtils.powFrac(x, 2));
                let term3 = MathUtils.mulFrac(fc, x);
                let res = MathUtils.addFrac(term1, term2);
                res = MathUtils.addFrac(res, term3);
                res = MathUtils.addFrac(res, fd);
                return res;
            }
        };

        // ==================== 2. COMPONENTS ====================
        const Latex = ({ content, block, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if(ref.current && window.MathJax) {
                    window.MathJax.typesetPromise([ref.current]).catch(()=>{});
                }
            }, [content]);

            if (typeof content !== 'string') return <span className={className}>{content}</span>;

            const parts = content.split('$');
            const Container = block ? 'div' : 'span';

            return (
                <Container ref={ref} className={`${block ? 'my-2' : 'inline-block mx-1'} ${className}`}>
                    {parts.map((part, i) => {
                        if (i % 2 === 1) { 
                            return <span key={i} className="math-tex">{`\\(${part}\\)`}</span>;
                        } else if (part.trim() !== "") { 
                            return <span key={i} className="font-sans text-slate-800">{part}</span>;
                        }
                        return null;
                    })}
                </Container>
            );
        };

        const DoubleBar = () => (
            <div className="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 w-[4px] border-l border-r border-slate-600 h-full"></div>
        );

        const GraphCanvas = ({ type, params, specialPoints, limits }) => {
            const cvs = useRef(null);
            useEffect(() => {
                if(!cvs.current) return;
                const ctx = cvs.current.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const width = cvs.current.clientWidth;
                const height = cvs.current.clientHeight;
                cvs.current.width = width * dpr;
                cvs.current.height = height * dpr;
                ctx.scale(dpr, dpr);

                let pts = [...specialPoints.filter(p => !isNaN(p.x) && !isNaN(p.y) && Math.abs(p.x) < 50 && Math.abs(p.y) < 50)];
                if (pts.length === 0) pts = [{x:-5,y:-5}, {x:5,y:5}];
                let xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
                if (limits?.va !== undefined) { xs.push(limits.va - 4, limits.va + 4); } else { xs.push(-6, 6); }
                if (limits?.ha !== undefined) { ys.push(limits.ha - 4, limits.ha + 4); } else { ys.push(-6, 6); }
                let minX = Math.min(...xs), maxX = Math.max(...xs);
                let minY = Math.min(...ys), maxY = Math.max(...ys);
                let rangeX = maxX - minX, rangeY = maxY - minY;
                let xMin = minX - rangeX * 0.25, xMax = maxX + rangeX * 0.25;
                let yMin = minY - rangeY * 0.25, yMax = maxY + rangeY * 0.25;
                if(xMax - xMin < 16) { let mid = (xMin+xMax)/2; xMin = mid - 8; xMax = mid + 8; }
                if(yMax - yMin < 16) { let mid = (yMin+yMax)/2; yMin = mid - 8; yMax = mid + 8; }

                const mapX = x => ((x-xMin)/(xMax-xMin))*width;
                const mapY = y => height - ((y-yMin)/(yMax-yMin))*height;
                const line = (x1,y1,x2,y2,c,w=1,d=[]) => { ctx.beginPath(); ctx.strokeStyle=c; ctx.lineWidth=w; ctx.setLineDash(d); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.setLineDash([]); };
                const text = (str,x,y,a,b,c='#64748b') => { ctx.fillStyle=c; ctx.font='bold 12px "Be Vietnam Pro"'; ctx.textAlign=a; ctx.textBaseline=b; ctx.fillText(str,x,y); };

                ctx.fillStyle='white'; ctx.fillRect(0,0,width,height);
                for(let i=Math.ceil(xMin); i<=Math.floor(xMax); i++) line(mapX(i),0,mapX(i),height,'#fff7ed');
                for(let i=Math.ceil(yMin); i<=Math.floor(yMax); i++) line(0,mapY(i),width,mapY(i),'#fff7ed');

                let ox=mapX(0), oy=mapY(0);
                line(0,oy,width,oy,'#334155',1.5); line(ox,height,ox,0,'#334155',1.5);
                ctx.fillStyle='#334155';
                ctx.beginPath(); ctx.moveTo(width,oy); ctx.lineTo(width-8,oy-4); ctx.lineTo(width-8,oy+4); ctx.fill();
                ctx.beginPath(); ctx.moveTo(ox,0); ctx.lineTo(ox-4,8); ctx.lineTo(ox+4,8); ctx.fill();
                text('x',width-10,oy+18,'right','middle'); text('y',ox-12,10,'right','middle'); text('O',ox-10,oy+18,'right','middle');

                if(limits?.va !== undefined) { let vaX = mapX(limits.va); line(vaX, 0, vaX, height, '#f59e0b', 2, [5,5]); }
                if(limits?.ha !== undefined) { let haY = mapY(limits.ha); line(0, haY, width, haY, '#f59e0b', 2, [5,5]); }
                if(limits?.sa) { let y1 = limits.sa.a * xMin + limits.sa.b; let y2 = limits.sa.a * xMax + limits.sa.b; line(0, mapY(y1), width, mapY(y2), '#f59e0b', 2, [5,5]); }

                ctx.beginPath(); ctx.strokeStyle='#ea580c'; ctx.lineWidth=2.5;
                let first = true;
                const step = (xMax - xMin) / (width * 2); 
                for(let x=xMin; x<=xMax; x+=step) {
                    if(limits?.va !== undefined && Math.abs(x - limits.va) < step) { first = true; continue; }
                    let y;
                    if (type === 'CUBIC') y = params.a*x*x*x + params.b*x*x + params.c*x + params.d;
                    else if (type === 'RAT_1_1') y = (params.a*x + params.b) / (params.c*x + params.d);
                    else if (type === 'RAT_2_1') y = (params.a*x*x + params.b*x + params.c) / (params.d*x + params.e);
                    if (isNaN(y) || Math.abs(y) > Math.max(Math.abs(yMin), Math.abs(yMax)) * 5) { first = true; continue; }
                    let px = mapX(x), py = mapY(y);
                    if(first) { ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
                }
                ctx.stroke();

                specialPoints.forEach(p => {
                    let px = mapX(p.x), py = mapY(p.y);
                    if (px < -20 || px > width+20 || py < -20 || py > height+20) return;
                    ctx.beginPath(); ctx.arc(px,py,4,0,7); ctx.fillStyle=p.color||'#ea580c'; ctx.fill();
                    if(p.showVal) {
                        if(Math.abs(p.y)>0.1 && Math.abs(p.x)<50) text(p.yLabel || p.y.toFixed(1), ox+(p.x>0?-6:6), py+4, p.x>0?'right':'left','middle', '#475569');
                        if(Math.abs(p.x)>0.1 && Math.abs(p.x)<50) text(p.xLabel || p.x.toFixed(1), px, oy+(p.y>0?16:-8), 'center','middle', '#475569');
                    }
                });
            }, [type, params, specialPoints, limits]);
            return <canvas ref={cvs} style={{width:'100%', height:'350px'}} className="bg-white rounded-lg border border-orange-100 shadow-inner touch-none"/>;
        };

        const VariationTable = ({ rows }) => (
            <div className="border border-orange-200 rounded-lg overflow-x-auto bg-white shadow-sm mt-3">
                <div className="min-w-[400px]">
                    {rows.map((row, idx) => (
                        <div key={idx} className={`grid grid-cols-[60px_1fr] ${idx < rows.length-1 ? 'border-b border-orange-100' : ''} ${row.h ? row.h : ''}`}>
                            <div className="bg-orange-50 flex items-center justify-center font-serif italic font-bold text-orange-800 border-r border-orange-100 py-3"><Latex content={row.label} /></div>
                            <div className="relative w-full h-full p-2">{row.content}</div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // ==================== 3. SOLVER COMPONENTS ====================
        const CubicSolver = ({ p }) => { 
            const {a,b,c,d} = p;
            const ap=3*a, bp=2*b, cp=c; 
            const solver = MathUtils.solveQuadraticExact(ap, bp, cp);
            let yExts=[], extPts=[];
            if(solver.roots.length > 0) {
                if(solver.fracRoots.length > 0) {
                    solver.fracRoots.forEach(r => {
                        let yF = MathUtils.evalCubicFrac(p, r);
                        let yLatex = MathUtils.fracToLatex(yF);
                        yExts.push(yLatex);
                        extPts.push({ x: r.t/r.m, y: yF.t/yF.m, color: '#ea580c', showVal: true, xLabel: MathUtils.fracToString(r), yLabel: MathUtils.fracToString(yF) });
                    });
                } else {
                    solver.roots.forEach((x, i) => {
                        let y = a*x*x*x + b*x*x + c*x + d;
                        yExts.push(`y(${solver.latexRoots[i]})`);
                        extPts.push({x: x, y: y, color: '#ea580c', showVal: true});
                    });
                }
            }
            const infXFrac = MathUtils.createFrac(-b, 3*a);
            const infX = -b/(3*a);
            const infYFrac = MathUtils.evalCubicFrac(p, infXFrac);
            const infY = infXFrac.t/infXFrac.m;
            const infPt = {x: infX, y: a*infX*infX*infX+b*infX*infX+c*infX+d, color: '#8b5cf6', showVal:true};
            let oxRoots = [], oxStr = "", oxSolverPoints = [], foundRoots = [];
            const cubicRes = MathUtils.solveCubicExact(a, b, c, d);
            if (cubicRes.latexRoots.length > 0) {
                 oxStr = cubicRes.latexRoots.map((val, i) => {
                    const name = String.fromCharCode(66 + i); 
                    return `$${name}(${val}; 0)$`;
                 }).join(', ');
                 oxSolverPoints = cubicRes.roots.map(r => ({x: r, y: 0, color:'#f97316', showVal:true}));
            } else {
                 oxStr = "Nghiệm vô tỷ (xấp xỉ)";
                 const realRoots = MathUtils.solveCubicReal(a, b, c, d);
                 oxSolverPoints = realRoots.map(r => ({x: r, y: 0, color:'#f97316', showVal:false}));
            }
            const oyPt = {x:0, y:d, color: '#10b981', showVal:true, yLabel: d.toString()};
            const limStr = a > 0 ? ["-\\infty", "+\\infty"] : ["+\\infty", "-\\infty"];
            const isUp = a > 0;
            const Arrow = () => (
                <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none"><defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#475569"/></marker></defs>
                    {solver.delta > 0 ? (
                        <React.Fragment> <line x1="5%" y1={isUp?"85%":"15%"} x2="30%" y2={isUp?"15%":"85%"} stroke="#475569" strokeWidth="1.5" markerEnd="url(#arr)"/> <line x1="35%" y1={isUp?"15%":"85%"} x2="60%" y2={isUp?"85%":"15%"} stroke="#475569" strokeWidth="1.5" markerEnd="url(#arr)"/> <line x1="65%" y1={isUp?"85%":"15%"} x2="95%" y2={isUp?"15%":"85%"} stroke="#475569" strokeWidth="1.5" markerEnd="url(#arr)"/> </React.Fragment>
                    ) : <line x1="5%" y1={isUp?"85%":"15%"} x2="95%" y2={isUp?"15%":"85%"} stroke="#475569" strokeWidth="1.5" markerEnd="url(#arr)"/>}
                </svg>
            );
            return (
                <div className="space-y-6">
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">1. Tập xác định</h3><div className="ml-4 text-lg"><Latex content="$\mathcal{D} = \mathbb{R}$" /><div className="text-sm text-slate-500 mt-1 italic font-serif"><Latex content="Hướng dẫn: Hàm đa thức xác định $\forall x \in \mathbb{R}$." /></div></div></div>
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">2. Sự biến thiên</h3><div className="ml-4 space-y-6 text-lg"><div><div className="font-bold text-orange-600">a) Đạo hàm & Cực trị</div><div className="bg-orange-50 p-3 rounded border border-orange-100 mt-2"><div className="text-sm italic text-slate-500 mb-1"><Latex content="Công thức: $(ax^n)' = an x^{n-1}$" /></div><div><Latex content={`$y' = ${MathUtils.polyToString(ap, bp, cp, 0)}$`} /></div><div><Latex content="Cho $y' = 0$:" /></div>{solver.delta >= 0 ? <div className="mt-1"><Latex content={`$\\Leftrightarrow ${MathUtils.formatTerm(ap,2,true)} ${MathUtils.formatTerm(bp,1)} ${MathUtils.formatConst(cp)} = 0 \\Rightarrow x \\in \\{ ${solver.latexRoots.join('; ')} \\}$`} /></div> : <div><Latex content="Phương trình vô nghiệm." /></div>}</div></div><div><div className="font-bold text-orange-600">b) Giới hạn</div><div className="mt-1"><div className="text-sm text-slate-500 italic mb-1 font-serif"><Latex content="Phương pháp: Đặt nhân tử chung $x^3$ (bậc cao nhất)." /></div><Latex content={`$\\lim_{x\\to\\pm\\infty} y = \\lim_{x\\to\\pm\\infty} x^3(${a} + \\frac{${b}}{x} + \\frac{${c}}{x^2} + \\frac{${d}}{x^3}) = ${a>0?"\\pm":"\\mp"}\\infty$`} block /></div></div><div><div className="font-bold text-orange-600">c) Bảng biến thiên</div><VariationTable rows={[{label: '$x$', content: <div className="flex justify-between px-4"><Latex content="$-\infty$"/> {solver.latexRoots.map((r,i)=><b key={i}><Latex content={`$${r}$`}/></b>)} <Latex content="$+\infty$"/></div>},{label: "$y'$", content: <div className="flex justify-between px-8 text-slate-500">{solver.delta>0 ? <><span></span>{isUp?'+':'-'}<span>0</span>{isUp?'-':'+'}<span>0</span>{isUp?'+':'-'}<span></span></> : <center>{isUp?'+':'-'}</center>}</div>},{label: '$y$', h:'h-32', content: <div className="w-full h-full relative"><Arrow/>{solver.delta>0 ? <><div className="absolute left-[5%]" style={{top:isUp?'85%':'15%'}}><Latex content={`$${limStr[0]}$`}/></div><div className="absolute left-[32%]" style={{top:isUp?'15%':'85%'}}><Latex content={`$${yExts[0]}$`}/></div><div className="absolute left-[63%]" style={{top:isUp?'85%':'15%'}}><Latex content={`$${yExts[1]}$`}/></div><div className="absolute left-[95%]" style={{top:isUp?'15%':'85%'}}><Latex content={`$${limStr[1]}$`}/></div></> : <> <div className="absolute left-[5%]" style={{top:isUp?'85%':'15%'}}><Latex content={`$${limStr[0]}$`}/></div> <div className="absolute right-[5%]" style={{top:isUp?'15%':'85%'}}><Latex content={`$${limStr[1]}$`}/></div> </>}</div>}]} /><div className="mt-3 text-lg space-y-1">{solver.delta > 0 ? (a > 0 ? <><div><Latex content={`Hàm số đồng biến trên $(-\\infty; ${solver.latexRoots[0]})$ và $(${solver.latexRoots[1]}; +\\infty)$`} /></div><div><Latex content={`Hàm số nghịch biến trên $(${solver.latexRoots[0]}; ${solver.latexRoots[1]})$`} /></div><div><Latex content={`Cực đại: $x=${solver.latexRoots[0]}, y_{CĐ}=${yExts[0]}$`} /></div><div><Latex content={`Cực tiểu: $x=${solver.latexRoots[1]}, y_{CT}=${yExts[1]}$`} /></div></> : <><div><Latex content={`Hàm số nghịch biến trên $(-\\infty; ${solver.latexRoots[0]})$ và $(${solver.latexRoots[1]}; +\\infty)$`} /></div><div><Latex content={`Hàm số đồng biến trên $(${solver.latexRoots[0]}; ${solver.latexRoots[1]})$`} /></div><div><Latex content={`Cực tiểu: $x=${solver.latexRoots[0]}, y_{CT}=${yExts[0]}$`} /></div><div><Latex content={`Cực đại: $x=${solver.latexRoots[1]}, y_{CĐ}=${yExts[1]}$`} /></div></>) : <div><Latex content={`Hàm số ${a>0?"đồng":"nghịch"} biến trên $\\mathbb{R}$ và không có cực trị.`} /></div>}</div></div></div></div>
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">3. Đồ thị</h3><div className="ml-4 text-lg"><div className="mb-4 space-y-2"><div><Latex content={`$\\bullet$ Giao $Oy$: $A(0; ${d})$ (Cho $x=0$)`} /></div><div><Latex content={`$\\bullet$ Giao $Ox$: ${oxStr} (Cho $y=0$)`} /></div><div><Latex content={`$\\bullet$ Tâm đối xứng $I(${MathUtils.fracToLatex(infXFrac)}; ${MathUtils.fracToLatex(infYFrac)})$ (Nghiệm $y''=0$)`} /></div></div><GraphCanvas type="CUBIC" params={p} specialPoints={[...extPts, ...oxSolverPoints, oyPt, {x:infX, y:infY, color:'#8b5cf6'}]} /></div></div>
                </div>
            );
        };

        const Rat11Solver = ({ p }) => { 
            const {a,b,c,d} = p;
            const num = a*d - b*c; const va = -d/c, ha = a/c; const isInc = num > 0;
            const yPrimeStr = String.raw`y' = \frac{(${a})(${MathUtils.formatLinear(c,d)}) - (${MathUtils.formatLinear(a,b)})(${c})}{(${MathUtils.formatLinear(c,d)})^2} = \frac{${num}}{(${MathUtils.formatLinear(c,d)})^2}`;
            const vaLatex = MathUtils.fracToLatex(MathUtils.createFrac(-d,c));
            const haLatex = MathUtils.fracToLatex(MathUtils.createFrac(a,c));
            const oyVal = MathUtils.fracToLatex(MathUtils.createFrac(b,d));
            const oxVal = MathUtils.fracToLatex(MathUtils.createFrac(-b,a));
            const Rat11Arrow = () => (
                <svg className="absolute inset-0 w-full h-full"><defs><marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#475569"/></marker></defs>
                    {isInc ? <><line x1="5%" y1="80%" x2="45%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="55%" y1="80%" x2="95%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/></> : <><line x1="5%" y1="20%" x2="45%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="55%" y1="20%" x2="95%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/></>}
                </svg>
            );
            return (
                <div className="space-y-6">
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">1. Tập xác định</h3><div className="ml-4 text-lg"><Latex content={`$\\mathcal{D} = \\mathbb{R} \\setminus \\{ ${vaLatex} \\}$`} /><div className="text-sm text-slate-500 mt-1 italic font-serif"><Latex content={`Hướng dẫn: Mẫu số khác 0 $\\Leftrightarrow ${MathUtils.formatLinear(c,d)} \\neq 0 \\Leftrightarrow x \\neq ${vaLatex}$`} /></div></div></div>
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">2. Sự biến thiên</h3><div className="ml-4 space-y-6 text-lg"><div><div className="font-bold text-orange-600">a) Đạo hàm</div><div className="bg-orange-50 p-3 rounded border border-orange-100 mt-2"><div className="text-sm italic text-slate-500 mb-1"><Latex content={String.raw`Công thức: $(\frac{u}{v})' = \frac{u'v-uv'}{v^2}$`} /></div><Latex content={`$${yPrimeStr}$`} block /><div><Latex content={`$\\Rightarrow y' ${isInc?'>':'<'} 0, \\forall x \\in \\mathcal{D}$`} /></div><div><Latex content="Hàm số không có cực trị." /></div></div></div><div><div className="font-bold text-orange-600">b) Tiệm cận</div><div className="mt-2 space-y-2"><div className="text-sm text-slate-500 italic font-serif"><Latex content="Phương pháp: Tìm giới hạn khi $x$ tiến tới nghiệm mẫu (TCĐ) và vô cực (TCN)." /></div><div><Latex content={`$\\bullet$ Tiệm cận đứng: $x = ${vaLatex}$ (Nghiệm mẫu)`} /></div><div><Latex content={`$\\bullet$ Tiệm cận ngang: $y = ${haLatex}$`} /></div><div className="text-sm text-slate-500 italic"><Latex content={String.raw`Vì $\lim_{x \to \pm\infty} y = ${haLatex}$`} /></div></div></div><div><div className="font-bold text-orange-600">c) Bảng biến thiên</div><VariationTable rows={[{label: '$x$', content: <div className="flex justify-between px-4"><Latex content="$-\infty$"/> <b><Latex content={`$${vaLatex}$`}/></b> <Latex content="$+\infty$"/></div>},{label: "$y'$", content: <div className="flex justify-around text-slate-500 w-full relative"><span>{isInc?'+':'-'}</span> <DoubleBar /> <span>{isInc?'+':'-'}</span></div>},{label: '$y$', h:'h-28', content: <div className="w-full h-full relative"><DoubleBar /><Rat11Arrow /></div>}]} /><div className="mt-2"><Latex content={`Kết luận: Hàm số ${isInc?"đồng":"nghịch"} biến trên các khoảng $(-\\infty; ${vaLatex})$ và $(${vaLatex}; +\\infty)$.`} /></div></div></div></div>
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">3. Đồ thị</h3><div className="ml-4 text-lg"><div className="mb-4 space-y-2"><div><Latex content={`$\\bullet$ Giao $Oy$: $(0; ${oyVal})$ (Cho $x=0$)`} /></div><div><Latex content={`$\\bullet$ Giao $Ox$: $(${oxVal}; 0)$ (Cho $y=0$)`} /></div><div><Latex content={`$\\bullet$ Tâm đối xứng $I$: $(${vaLatex}; ${haLatex})$ (Giao 2 tiệm cận)`} /></div></div><GraphCanvas type="RAT_1_1" params={p} specialPoints={[{x:0, y:b/d, color:'#10b981', showVal:true, yLabel:MathUtils.fracToString(MathUtils.createFrac(b,d))}, {x:-b/a, y:0, color:'#f97316', showVal:true, xLabel:MathUtils.fracToString(MathUtils.createFrac(-b,a))}, {x:va, y:ha, color:'#8b5cf6'}]} limits={{va, ha}} /></div></div>
                </div>
            );
        };

        const Rat21Solver = ({ p }) => { 
            const {a,b,c,d,e} = p;
            const va = -e/d; const sa_a = a/d, sa_b = (b*d - a*e)/(d*d);
            const saStr = `y = ${MathUtils.fracToLatex(MathUtils.createFrac(a,d))}x ${sa_b>=0?'+':''} ${MathUtils.fracToLatex(MathUtils.createFrac(b*d - a*e, d*d))}`;
            const nA = a*d, nB = 2*a*e, nC = b*e - c*d;
            const solver = MathUtils.solveQuadraticExact(nA, nB, nC);
            const vaLatex = MathUtils.fracToLatex(MathUtils.createFrac(-e,d));
            const nASign = nA > 0; const oyVal = MathUtils.fracToLatex(MathUtils.createFrac(c,e));
            const oxSolver = MathUtils.solveQuadraticExact(a, b, c);
            const oxLatex = oxSolver.latexRoots.length > 0 ? oxSolver.latexRoots.map(r => `(${r}; 0)`).join(', ') : "\\text{Vô nghiệm}";
            const oxPts = oxSolver.roots.map(r => ({x: r, y: 0, color: '#f97316', showVal: true}));

            let extPts = [], yLatexVals = [];
            if(solver.roots.length > 0) {
                if (solver.fracRoots.length > 0) {
                    solver.fracRoots.forEach(r => {
                        if (Math.abs(r.t/r.m - va) > 0.001) {
                            let yF = MathUtils.evalRat21Extremum({a,b,d}, r);
                            yLatexVals.push(MathUtils.fracToLatex(yF));
                            extPts.push({x: r.t/r.m, y: yF.t/yF.m, color: '#ea580c', showVal: true, xLabel: MathUtils.fracToString(r), yLabel: MathUtils.fracToString(yF)});
                        }
                    });
                } else {
                    solver.roots.forEach((x, i) => {
                        if (Math.abs(x - va) > 0.001) {
                            let y = (a*x*x+b*x+c)/(d*x+e);
                            yLatexVals.push(`y(${solver.latexRoots[i]})`);
                            extPts.push({x, y, color:'#ea580c', showVal:true});
                        }
                    });
                }
            }
            const isOuterPos = nA > 0; 
            const RatArrow = () => {
                let content;
                if (solver.delta > 0) {
                    if (isOuterPos) {
                        content = <React.Fragment><line x1="5%" y1="80%" x2="25%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="30%" y1="20%" x2="45%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="55%" y1="20%" x2="70%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="75%" y1="80%" x2="95%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/></React.Fragment>;
                    } else {
                        content = <React.Fragment><line x1="5%" y1="20%" x2="25%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="30%" y1="80%" x2="45%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="55%" y1="80%" x2="70%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="75%" y1="20%" x2="95%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/></React.Fragment>;
                    }
                } else {
                    if (isOuterPos) {
                        content = <React.Fragment><line x1="5%" y1="80%" x2="45%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="55%" y1="80%" x2="95%" y2="20%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/></React.Fragment>;
                    } else {
                        content = <React.Fragment><line x1="5%" y1="20%" x2="45%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/><line x1="55%" y1="20%" x2="95%" y2="80%" stroke="#475569" strokeWidth="1.5" markerEnd="url(#a)"/></React.Fragment>;
                    }
                }
                return <svg className="absolute inset-0 w-full h-full"><defs><marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#475569"/></marker></defs>{content}</svg>;
            };

            return (
                <div className="space-y-6">
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">1. Tập xác định</h3><div className="ml-4 text-lg"><Latex content={`$\\mathcal{D} = \\mathbb{R} \\setminus \\{ ${vaLatex} \\}$`} /><div className="text-sm text-slate-500 mt-1 italic font-serif"><Latex content={`Hướng dẫn: Mẫu số khác 0 $\\Leftrightarrow ${MathUtils.formatLinear(d,e)} \\neq 0 \\Leftrightarrow x \\neq ${vaLatex}$`} /></div></div></div>
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">2. Sự biến thiên</h3><div className="ml-4 space-y-6 text-lg"><div><div className="font-bold text-orange-600">a) Đạo hàm & Cực trị</div><div className="bg-orange-50 p-3 rounded border border-orange-100 mt-2"><div className="text-sm italic text-slate-500 mb-1"><Latex content={String.raw`Công thức: $(\frac{u}{v})' = \frac{u'v-uv'}{v^2}$`} /></div><Latex content={`$y' = \\frac{${MathUtils.polyToString(nA, nB, nC, 0).trim()}}{(${MathUtils.formatLinear(d,e)})^2}$`} block /><div><Latex content="Cho $y'=0$:" /></div>{solver.delta > 0 ? <div><Latex content={`Có 2 cực trị tại $x \\in \\{ ${solver.latexRoots.join('; ')} \\}$`} /></div> : <div><Latex content="Vô nghiệm (hoặc nghiệm kép). Hàm số không có cực trị." /></div>}</div></div><div><div className="font-bold text-orange-600">b) Tiệm cận</div><div className="mt-2 space-y-2"><div className="text-sm text-slate-500 italic font-serif"><Latex content="Phương pháp: Tìm giới hạn khi $x$ tiến tới nghiệm mẫu (TCĐ) và vô cực (TCN)." /></div><div><Latex content={`$\\bullet$ Tiệm cận đứng: $x = ${vaLatex}$ (Nghiệm mẫu)`} /></div><div><Latex content={`$\\bullet$ Tiệm cận xiên: $${saStr}$ (Thương của phép chia tử cho mẫu)`} /></div><div className="text-sm text-slate-500 italic"><Latex content={String.raw`Vì $\lim_{x \to \pm\infty} [y - (\text{TCX})] = 0$`} /></div></div></div><div><div className="font-bold text-orange-600">c) Bảng biến thiên</div><VariationTable rows={[{label: '$x$', content: <div className="flex justify-between px-4"><Latex content="$-\infty$"/> {extPts.map((p,i)=><b key={i}><Latex content={`$${solver.latexRoots[i]}$`}/></b>)} <b><Latex content={`$${vaLatex}$`}/></b> <Latex content="$+\infty$"/></div>},{label: "$y'$", content: <div className="flex justify-around text-slate-500 w-full relative">{solver.delta > 0 ? (isOuterPos ? <><span>+</span><span>0</span><span>-</span> <DoubleBar /> <span>-</span><span>0</span><span>+</span></> : <><span>-</span><span>0</span><span>+</span> <DoubleBar /> <span>+</span><span>0</span><span>-</span></>) : (<><span>{isOuterPos?'+':'-'}</span> <DoubleBar /> <span>{isOuterPos?'+':'-'}</span></>)}</div>},{label: '$y$', h:'h-40', content: <div className="w-full h-full relative"><DoubleBar /><RatArrow />{solver.delta > 0 && extPts.length > 0 && <><div className="absolute left-[25%] text-xs font-bold bg-white/80 px-1 rounded" style={{top: isOuterPos?'20%':'80%'}}><Latex content={`$${yLatexVals[0]}$`}/></div><div className="absolute right-[25%] text-xs font-bold bg-white/80 px-1 rounded" style={{top: isOuterPos?'80%':'20%'}}><Latex content={`$${yLatexVals[1]}$`}/></div></>}<div className="absolute left-[2%] text-xs" style={{top: isOuterPos?'80%':'20%'}}><Latex content={isOuterPos?"$-\\infty$":"$+\\infty$"}/></div><div className="absolute right-[2%] text-xs" style={{top: isOuterPos?'20%':'80%'}}><Latex content={isOuterPos?"$+\\infty$":"$-\\infty$"}/></div><div className="absolute left-[48%] text-xs" style={{top: isOuterPos?'80%':'20%'}}><Latex content={isOuterPos?"$-\\infty$":"$+\\infty$"}/></div><div className="absolute right-[48%] text-xs" style={{top: isOuterPos?'20%':'80%'}}><Latex content={isOuterPos?"$+\\infty$":"$-\\infty$"}/></div></div>}]} />{extPts.length > 0 && <div className="mt-2 text-sm space-y-1"><li><Latex content={`Cực đại: $(${solver.latexRoots[isOuterPos?0:1]}; ${yLatexVals[isOuterPos?0:1]})$`} /></li><li><Latex content={`Cực tiểu: $(${solver.latexRoots[isOuterPos?1:0]}; ${yLatexVals[isOuterPos?1:0]})$`} /></li></div>}</div></div></div>
                    <div className="glass-panel compact-p"><h3 className="text-xl font-bold text-orange-700 mb-2 border-b border-orange-100 pb-1">3. Đồ thị</h3><div className="ml-4 text-lg"><div className="mb-4 space-y-2"><div><Latex content={`$\\bullet$ Giao $Oy$: $(0; ${oyVal})$ (Cho $x=0$)`} /></div><div><Latex content={`$\\bullet$ Giao $Ox$: $\\text{Giải PT } ${MathUtils.polyToString(a,b,c,0)}=0: ${oxLatex}$`} /></div><div><Latex content={`$\\bullet$ Tâm đối xứng $I$: $(${vaLatex}; ${MathUtils.fracToLatex(MathUtils.createFrac(b*d-a*e, d*d))})$ (Giao 2 tiệm cận)`} /></div></div><GraphCanvas type="RAT_2_1" params={p} specialPoints={[{x:0, y:c/e, color:'#10b981', showVal:true, yLabel:MathUtils.fracToString(MathUtils.createFrac(c,e))}, ...extPts, ...oxPts]} limits={{va, sa:{a:sa_a, b:sa_b}}} /></div></div>
                </div>
            );
        };

        const TheoryView = () => (
            <div className="max-w-4xl mx-auto animate-fade-in pb-10 px-4">
                <div className="text-center mb-8"><h2 className="text-3xl font-bold text-orange-900 font-serif mb-2">Sơ Đồ Khảo Sát Hàm Số</h2><p className="text-orange-700/60">Quy trình chuẩn theo Bộ Giáo Dục</p></div>
                <div className="space-y-6">
                    <div className="glass-panel p-6"><h3 className="text-xl font-bold text-orange-600 mb-4">1. Tìm Tập Xác Định</h3><ul className="list-disc pl-5 space-y-2 text-slate-700 text-lg"><li><strong>Hàm đa thức:</strong> <Latex content="$\mathcal{D} = \mathbb{R}$" /></li><li><strong>Hàm phân thức:</strong> <Latex content="$\mathcal{D} = \mathbb{R} \setminus \{ \text{nghiệm mẫu} \}$" /></li></ul></div>
                    <div className="glass-panel p-6"><h3 className="text-xl font-bold text-orange-600 mb-4">2. Sự Biến Thiên</h3><div className="space-y-3 text-slate-700 text-lg"><div><strong>a) Giới hạn & Tiệm cận:</strong><ul className="list-disc pl-5 mt-1"><li>Tìm <Latex content="$\lim_{x \to \pm \infty} y$" /> để xác định TCN.</li><li>Tìm <Latex content="$\lim_{x \to x_0^\pm} y$" /> tại các điểm không xác định để tìm TCĐ.</li><li>Với hàm phân thức bậc 2/1, thực hiện phép chia đa thức để tìm TCX <Latex content="$y=ax+b$" />.</li></ul></div><div><strong>b) Đạo hàm & Cực trị:</strong><ul className="list-disc pl-5 mt-1"><li>Tính <Latex content="$y'$" />. Giải phương trình <Latex content="$y'=0$" />.</li><li>Lập bảng xét dấu <Latex content="$y'$" /> để tìm khoảng đơn điệu và cực trị.</li></ul></div><div><strong>c) Bảng biến thiên:</strong> Tổng hợp sự biến thiên.</div></div></div>
                    <div className="glass-panel p-6"><h3 className="text-xl font-bold text-orange-600 mb-4">3. Đồ Thị</h3><ul className="list-disc pl-5 space-y-2 text-slate-700 text-lg"><li>Tìm giao điểm với <Latex content="$Ox$" /> (cho <Latex content="$y=0$" />) và <Latex content="$Oy$" /> (cho <Latex content="$x=0$" />).</li><li>Tìm tâm đối xứng (điểm uốn hoặc giao 2 tiệm cận).</li><li>Vẽ hệ trục, các đường tiệm cận, điểm đặc biệt rồi vẽ đường cong.</li></ul></div>
                </div>
            </div>
        );

        // --- WIZARD AND PRACTICE VIEW DEFINITIONS (MOVED UP) ---

        const Wizard = ({ onFinish }) => {
            const [type, setType] = useState('CUBIC');
            const [p, setP] = useState({a:'',b:'',c:'',d:'',e:''});
            const r = {a:useRef(), b:useRef(), c:useRef(), d:useRef(), e:useRef()};
            const handleEnter = (currentKey, nextKey) => (e) => {
                if (e.key === 'Enter') {
                    if (nextKey && r[nextKey].current) r[nextKey].current.focus();
                    else done();
                }
            };
            const done = () => {
                const v={a:parseFloat(p.a)||0, b:parseFloat(p.b)||0, c:parseFloat(p.c)||0, d:parseFloat(p.d)||0, e:parseFloat(p.e)||0};
                if(v.a===0 && type!=='RAT_1_1') return alert("Hệ số a phải khác 0"); 
                onFinish({ type, params: v });
            };
            useEffect(() => { if (r.a.current) r.a.current.focus(); }, [type]);

            return (
                <div className="min-h-[90vh] flex flex-col justify-center items-center px-4 animate-fade-in">
                    <div className="text-center mb-8"><h1 className="text-4xl md:text-5xl font-extrabold text-orange-900 mb-2 font-serif">CÔNG CỤ HỖ TRỢ KHẢO SÁT HÀM SỐ</h1><p className="text-orange-700/60 font-semibold">Chuẩn chương trình giáo dục của BGD VIỆT NAM hiện hành</p></div>
                    <div className="glass-panel p-8 w-full max-w-4xl relative">
                        <div className="flex flex-wrap justify-center gap-4 mb-10">
                            {[{id:'CUBIC', lbl:'Hàm Bậc 3'}, {id:'RAT_1_1', lbl:'Hàm Bậc 1/1'}, {id:'RAT_2_1', lbl:'Hàm Bậc 2/1'}].map(t => (
                                <button key={t.id} onClick={()=>{setType(t.id); setP({a:'',b:'',c:'',d:'',e:''})}} className={`px-6 py-3 rounded-xl font-bold transition-all border-2 ${type===t.id ? 'bg-orange-500 border-orange-600 text-white shadow-lg transform -translate-y-1' : 'bg-white border-slate-200 text-slate-500 hover:border-orange-300'}`}>{t.lbl}</button>
                            ))}
                        </div>
                        <div className="flex justify-center items-center text-3xl font-serif text-slate-700 mb-10 min-h-[120px]">
                            <span className="italic text-orange-600 font-bold mr-4">y =</span>
                            {type === 'CUBIC' && (<div className="flex flex-wrap items-center gap-3"><input ref={r.a} type="number" placeholder="a" value={p.a} onChange={e=>setP({...p,a:e.target.value})} onKeyDown={handleEnter('a','b')} className="modern-input w-20 h-16 text-center rounded-xl" /><span>x³ +</span><input ref={r.b} type="number" placeholder="b" value={p.b} onChange={e=>setP({...p,b:e.target.value})} onKeyDown={handleEnter('b','c')} className="modern-input w-20 h-16 text-center rounded-xl" /><span>x² +</span><input ref={r.c} type="number" placeholder="c" value={p.c} onChange={e=>setP({...p,c:e.target.value})} onKeyDown={handleEnter('c','d')} className="modern-input w-20 h-16 text-center rounded-xl" /><span>x +</span><input ref={r.d} type="number" placeholder="d" value={p.d} onChange={e=>setP({...p,d:e.target.value})} onKeyDown={handleEnter('d',null)} className="modern-input w-20 h-16 text-center rounded-xl" /></div>)}
                            {type === 'RAT_1_1' && (<div className="flex flex-col items-center"><div className="flex items-center gap-2 border-b-2 border-slate-800 pb-2 mb-2 px-4"><input ref={r.a} type="number" placeholder="a" value={p.a} onChange={e=>setP({...p,a:e.target.value})} onKeyDown={handleEnter('a','b')} className="modern-input w-20 h-14 text-center rounded-lg text-2xl" /><span>x +</span><input ref={r.b} type="number" placeholder="b" value={p.b} onChange={e=>setP({...p,b:e.target.value})} onKeyDown={handleEnter('b','c')} className="modern-input w-20 h-14 text-center rounded-lg text-2xl" /></div><div className="flex items-center gap-2"><input ref={r.c} type="number" placeholder="c" value={p.c} onChange={e=>setP({...p,c:e.target.value})} onKeyDown={handleEnter('c','d')} className="modern-input w-20 h-14 text-center rounded-lg text-2xl" /><span>x +</span><input ref={r.d} type="number" placeholder="d" value={p.d} onChange={e=>setP({...p,d:e.target.value})} onKeyDown={handleEnter('d',null)} className="modern-input w-20 h-14 text-center rounded-lg text-2xl" /></div></div>)}
                            {type === 'RAT_2_1' && (<div className="flex flex-col items-center"><div className="flex items-center gap-2 border-b-2 border-slate-800 pb-2 mb-2 px-4"><input ref={r.a} type="number" placeholder="a" value={p.a} onChange={e=>setP({...p,a:e.target.value})} onKeyDown={handleEnter('a','b')} className="modern-input w-16 h-12 text-center rounded-lg text-xl" /><span className="text-xl">x² +</span><input ref={r.b} type="number" placeholder="b" value={p.b} onChange={e=>setP({...p,b:e.target.value})} onKeyDown={handleEnter('b','c')} className="modern-input w-16 h-12 text-center rounded-lg text-xl" /><span className="text-xl">x +</span><input ref={r.c} type="number" placeholder="c" value={p.c} onChange={e=>setP({...p,c:e.target.value})} onKeyDown={handleEnter('c','d')} className="modern-input w-16 h-12 text-center rounded-lg text-xl" /></div><div className="flex items-center gap-2"><input ref={r.d} type="number" placeholder="d" value={p.d} onChange={e=>setP({...p,d:e.target.value})} onKeyDown={handleEnter('d','e')} className="modern-input w-16 h-12 text-center rounded-lg text-xl" /><span className="text-xl">x +</span><input ref={r.e} type="number" placeholder="e" value={p.e} onChange={e=>setP({...p,e:e.target.value})} onKeyDown={handleEnter('e',null)} className="modern-input w-16 h-12 text-center rounded-lg text-xl" /></div></div>)}
                        </div>
                        <div className="text-center"><button onClick={done} className="bg-orange-600 hover:bg-orange-700 text-white font-bold py-4 px-16 rounded-full shadow-lg hover:scale-105 transition-transform text-xl">Khảo Sát Ngay</button></div>
                    </div>
                </div>
            );
        };

        const PracticeView = () => {
            const [examState, setExamState] = useState('menu'); 
            const [questions, setQuestions] = useState({ part1: [], part2: [], part3: [] });
            const [userAnswers, setUserAnswers] = useState({});
            const [score, setScore] = useState({ p1: 0, p2: 0, p3: 0, total: 0 });
            const [timeLeft, setTimeLeft] = useState(5400); // 90 minutes

            const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            useEffect(() => {
                let interval;
                if (examState === 'taking' && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && examState === 'taking') {
                    submitExam();
                }
                return () => clearInterval(interval);
            }, [examState, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };
            
            const generateQuiz = () => {
                setTimeLeft(5400);
                const qs = { part1: [], part2: [], part3: [] };
                
                // PART 1
                for (let i = 0; i < 12; i++) {
                    const qType = i % 12; 
                    let q = { id: `p1_${i}`, text: '', options: [], correct: '' };
                    
                    if (qType === 0) { 
                        const a = rnd(1,2), b = rnd(-3,3), c = -3*a; 
                        q.text = `Tìm khoảng đồng biến của hàm số $y = ${a}x^3 + ${b}x^2 + ${c}x$.`;
                        q.correct = `(-\\infty; x_1) \\text{ và } (x_2; +\\infty)`; 
                        q.options = ["(x_1; x_2)", "(- \\infty; x_1)", "R", `(-\\infty; x_1) \\text{ và } (x_2; +\\infty)`].sort(()=>Math.random()-0.5);
                    } else if (qType === 1) { 
                        q.text = `Hàm số $y = x^4 - 2x^2 + 1$ có bao nhiêu điểm cực trị?`;
                        q.correct = "3";
                        q.options = ["1", "2", "3", "0"].sort(()=>Math.random()-0.5);
                    } else if (qType === 2) { 
                        q.text = `Giá trị nhỏ nhất của hàm số $y = x^3 - 3x$ trên đoạn [0; 2] là:`;
                        q.correct = "-2";
                        q.options = ["-2", "0", "2", "-1"].sort(()=>Math.random()-0.5);
                    } else if (qType === 3) { 
                        q.text = `Tiệm cận đứng của đồ thị $y = \\frac{2x-1}{x+1}$ là:`;
                        q.correct = "x=-1";
                        q.options = ["x=-1", "x=1", "y=2", "y=-1"].sort(()=>Math.random()-0.5);
                    } else if (qType === 4) { 
                        q.text = `Tiệm cận ngang của đồ thị $y = \\frac{1-x}{2x+1}$ là:`;
                        q.correct = "y=-1/2";
                        q.options = ["y=-1/2", "y=1/2", "x=-1/2", "y=-1"].sort(()=>Math.random()-0.5);
                    } else if (qType === 5) { 
                         q.text = `Tiệm cận xiên của đồ thị $y = \\frac{x^2+2x}{x-1}$ có dạng $y=ax+b$. Tính $a+b$.`;
                         q.correct = "4";
                         q.options = ["4", "3", "2", "1"].sort(()=>Math.random()-0.5);
                    } else if (qType === 6) { 
                         const t0 = rnd(2,6);
                         q.text = `Một vật chuyển động theo quy luật $s(t) = -t^3 + ${3*t0}t^2$ với $t$ (giây). Vận tốc của vật đạt giá trị lớn nhất tại thời điểm nào?`;
                         q.correct = `t=${t0}`;
                         q.options = [`t=${t0}`, `t=${t0-1}`, `t=${t0+1}`, `t=${2*t0}`].sort(()=>Math.random()-0.5);
                    } else if (qType === 7) { 
                         q.text = `Số giao điểm của đồ thị $y=x^3$ và đường thẳng $y=x$ là:`;
                         q.correct = "3";
                         q.options = ["3", "1", "2", "0"].sort(()=>Math.random()-0.5);
                    } else if (qType === 8) { 
                         q.text = `Cho $y=\\frac{1}{3}x^3 - 2x^2 + 3x$. Giải phương trình $y'=0$.`;
                         q.correct = "x=1, x=3";
                         q.options = ["x=1, x=3", "x=-1, x=-3", "x=0", "Vô nghiệm"].sort(()=>Math.random()-0.5);
                    } else if (qType === 9) { 
                         q.text = `Hệ số góc của tiếp tuyến đồ thị $y=x^2$ tại $x=2$ là:`;
                         q.correct = "4";
                         q.options = ["4", "2", "1", "0"].sort(()=>Math.random()-0.5);
                    } else if (qType === 10) { 
                         q.text = `Tâm đối xứng của đồ thị $y=x^3-3x^2$ là:`;
                         q.correct = "(1; -2)";
                         q.options = ["(1; -2)", "(0; 0)", "(-1; -4)", "(1; 0)"].sort(()=>Math.random()-0.5);
                    } else { 
                         q.text = `Tìm $m$ để hàm số $y=\\frac{x-m}{x+1}$ đồng biến trên từng khoảng xác định.`;
                         q.correct = "m > -1";
                         q.options = ["m > -1", "m < -1", "m > 1", "m < 1"].sort(()=>Math.random()-0.5);
                    }
                    qs.part1.push(q);
                }
                
                // PART 2
                const t0_1 = rnd(2, 5);
                qs.part2.push({
                    id: 'p2_1',
                    text: `Một vật chuyển động với $s(t) = t^3 - ${3*t0_1}t^2 + 5$ (m), $t > 0$.`,
                    subs: [
                        { id: 'a', text: `Vận tốc tại $t=${t0_1}$ là ${-3*t0_1*t0_1} m/s$.`, correct: true }, 
                        { id: 'b', text: `Gia tốc của vật triệt tiêu tại $t=${t0_1}$.`, correct: true }, 
                        { id: 'c', text: "Vật đổi chiều chuyển động tại $t=0$.", correct: false }, 
                        { id: 'd', text: "Quãng đường sau 1s là 5m.", correct: false } 
                    ]
                });

                const k2 = rnd(2,5);
                qs.part2.push({
                    id: 'p2_2',
                    text: `Nồng độ thuốc sau $t$ giờ là $C(t) = \\frac{${k2}t}{t^2 + 1}$ (mg/L).`,
                    subs: [
                        { id: 'a', text: `Nồng độ thuốc tăng trong khoảng $(0; 1)$ giờ.`, correct: true },
                        { id: 'b', text: "Nồng độ thuốc đạt cực đại sau 1 giờ.", correct: true },
                        { id: 'c', text: `Giá trị cực đại là ${k2/2} mg/L.`, correct: true },
                        { id: 'd', text: "Sau 5 giờ thuốc đào thải hết (C=0).", correct: false } 
                    ]
                });

                qs.part2.push({
                    id: 'p2_3',
                    text: `Giả sử doanh thu (triệu đồng) khi bán $x$ sản phẩm là $R(x) = 10x - 0.01x^2$.`,
                    subs: [
                        { id: 'a', text: "Doanh thu biên là $R'(x) = 10 - 0.02x$.", correct: true },
                        { id: 'b', text: "Doanh thu đạt cực đại khi bán 500 sản phẩm.", correct: true }, 
                        { id: 'c', text: "Doanh thu luôn tăng với mọi $x > 0$.", correct: false },
                        { id: 'd', text: "Tại $x=600$, doanh thu bắt đầu giảm.", correct: true } 
                    ]
                });

                const perimeter = rnd(10, 20) * 2;
                qs.part2.push({
                    id: 'p2_4',
                    text: `Một khu vườn hình chữ nhật có chu vi ${perimeter}m. Gọi $x$ là chiều rộng.`,
                    subs: [
                        { id: 'a', text: `Chiều dài khu vườn là ${perimeter/2} - x$.`, correct: true },
                        { id: 'b', text: `Diện tích khu vườn là $S(x) = x(${perimeter/2} - x)$.`, correct: true },
                        { id: 'c', text: "Diện tích lớn nhất khi khu vườn là hình vuông.", correct: true },
                        { id: 'd', text: `Diện tích lớn nhất là ${(perimeter/4)**2 + 10} $m^2$.`, correct: false }
                    ]
                });

                // PART 3
                const p3 = [];
                const t1 = rnd(2,5);
                p3.push({id: 'p3_1', text: `Một vật chuyển động với phương trình $s(t) = t^3 - 3t^2 + 2t$. Tính vận tốc (m/s) tại thời điểm $t=${t1}$s.`, correct: (3*t1*t1 - 6*t1 + 2).toString()});
                const profitMax = 2000;
                p3.push({id: 'p3_2', text: `Hàm lợi nhuận của một công ty là $P(x) = -x^2 + 100x - 500$ (triệu đồng). Lợi nhuận tối đa là bao nhiêu triệu đồng?`, correct: profitMax.toString()});
                const timeMaxWater = 20;
                p3.push({id: 'p3_3', text: `Lượng nước trong hồ sau $t$ ngày xả lũ được tính bởi $V(t) = -t^3 + 30t^2$ ($m^3$). Sau bao nhiêu ngày thì lượng nước đạt cực đại?`, correct: timeMaxWater.toString()});
                const k = rnd(2,5);
                const slope = 2*k;
                p3.push({id: 'p3_4', text: `Tìm hệ số góc của tiếp tuyến với đồ thị $y=x^2$ tại điểm có hoành độ $x=${k}$.`, correct: slope.toString()});
                p3.push({id: 'p3_5', text: `Tìm giá trị cực đại của hàm số $y = -x^4 + 2x^2$.`, correct: '1'});
                p3.push({id: 'p3_6', text: `Nồng độ thuốc trong máu sau $t$ giờ là $C(t) = \\frac{5t}{t^2 + 1}$ (mg/L). Nồng độ lớn nhất đạt được là bao nhiêu?`, correct: '2.5'});

                setQuestions({ part1: qs.part1, part2: qs.part2, part3: p3 });
                setExamState('taking');
                setUserAnswers({});
            };

            const submitExam = () => {
                let s1 = 0, s2 = 0, s3 = 0;

                // Score P1
                questions.part1.forEach(q => {
                    if (userAnswers[q.id] === q.correct) s1 += 0.25;
                });

                // Score P2
                questions.part2.forEach(q => {
                    let correctCount = 0;
                    q.subs.forEach(sub => {
                        const userVal = userAnswers[`${q.id}_${sub.id}`];
                        if ((userVal === 'true') === sub.correct) correctCount++;
                    });
                    if (correctCount === 1) s2 += 0.1;
                    else if (correctCount === 2) s2 += 0.25;
                    else if (correctCount === 3) s2 += 0.5;
                    else if (correctCount === 4) s2 += 1.0;
                });

                // Score P3
                questions.part3.forEach(q => {
                     if (userAnswers[q.id] && userAnswers[q.id].trim() === q.correct) s3 += 0.5;
                });

                setScore({ p1: s1, p2: s2, p3: s3, total: s1 + s2 + s3 });
                setExamState('result');
            };

            if (examState === 'menu') {
                return (
                    <div className="max-w-2xl mx-auto text-center animate-fade-in py-10">
                        <h2 className="text-3xl font-bold text-orange-900 mb-6">Ôn Luyện & Kiểm Tra</h2>
                        <div className="glass-panel p-8">
                            <p className="mb-6 text-lg text-slate-700">Hệ thống đề thi chuẩn cấu trúc 2025.</p>
                            <div className="flex flex-col gap-2 mb-6 text-left text-sm text-slate-600 bg-orange-50 p-4 rounded-lg">
                                <p><strong>Phần I:</strong> 12 câu trắc nghiệm (3 điểm)</p>
                                <p><strong>Phần II:</strong> 4 câu đúng/sai (4 điểm) - Toán thực tế</p>
                                <p><strong>Phần III:</strong> 6 câu trả lời ngắn (3 điểm)</p>
                            </div>
                            <button onClick={generateQuiz} className="bg-orange-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-orange-700 transition">Bắt Đầu Làm Bài</button>
                        </div>
                    </div>
                );
            }

            if (examState === 'result') {
                return (
                    <div className="max-w-2xl mx-auto text-center animate-fade-in py-10">
                        <h2 className="text-3xl font-bold text-orange-900 mb-6">Kết Quả Chi Tiết</h2>
                        <div className="glass-panel p-8">
                            <div className="text-6xl font-bold text-orange-600 mb-2">{score.total.toFixed(2)}</div>
                            <div className="text-slate-500 mb-6 font-serif italic">Điểm tổng kết thang 10</div>
                            <div className="grid grid-cols-3 gap-4 mb-8">
                                <div className="bg-blue-50 p-3 rounded">
                                    <div className="text-xs uppercase font-bold text-blue-400">Phần I</div>
                                    <div className="text-xl font-bold text-blue-700">{score.p1} / 3.0</div>
                                </div>
                                <div className="bg-purple-50 p-3 rounded">
                                    <div className="text-xs uppercase font-bold text-purple-400">Phần II</div>
                                    <div className="text-xl font-bold text-purple-700">{score.p2} / 4.0</div>
                                </div>
                                <div className="bg-emerald-50 p-3 rounded">
                                    <div className="text-xs uppercase font-bold text-emerald-400">Phần III</div>
                                    <div className="text-xl font-bold text-emerald-700">{score.p3} / 3.0</div>
                                </div>
                            </div>
                            <button onClick={() => setExamState('menu')} className="bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-slate-900 transition">Quay Lại</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto pb-20 animate-fade-in px-4">
                    <div className="flex justify-between items-center mb-6 sticky top-20 bg-orange-50/90 backdrop-blur p-4 rounded-xl z-40 border border-orange-200 shadow-sm">
                        <div>
                            <h2 className="text-2xl font-bold text-orange-900">Đề Thi Thử Tốt Nghiệp 2025</h2>
                            <p className="text-sm text-orange-700">90 Phút</p>
                        </div>
                        <div className="text-3xl font-mono font-bold text-red-600 bg-white px-4 py-2 rounded-lg shadow-inner border border-red-100">
                            {formatTime(timeLeft)}
                        </div>
                    </div>

                    {/* PART 1 */}
                    <div className="mb-8">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2">PHẦN I. Trắc nghiệm nhiều lựa chọn (12 câu)</h3>
                        <div className="space-y-6">
                            {questions.part1.map((q, idx) => (
                                <div key={q.id} className="glass-panel p-5">
                                    <div className="font-bold text-slate-800 mb-3 flex gap-2"><span>Câu {idx + 1}:</span> <Latex content={q.text} /></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {q.options.map((opt, oid) => (
                                            <label key={oid} className={`flex items-center p-3 rounded border cursor-pointer hover:bg-orange-50 transition ${userAnswers[q.id] === opt ? 'bg-orange-100 border-orange-500' : 'border-slate-200'}`}>
                                                <input type="radio" name={q.id} value={opt} onChange={() => setUserAnswers({...userAnswers, [q.id]: opt})} className="mr-3 accent-orange-600 w-4 h-4" />
                                                <span className="text-sm"><Latex content={`$${opt}$`} /></span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* PART 2 */}
                    <div className="mb-8">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2">PHẦN II. Trắc nghiệm Đúng/Sai (4 câu)</h3>
                        <div className="space-y-8">
                            {questions.part2.map((q, idx) => (
                                <div key={q.id} className="glass-panel p-5">
                                    <div className="font-bold text-slate-800 mb-3 flex gap-2"><span>Câu {idx + 1}:</span> <Latex content={q.text} /></div>
                                    <div className="space-y-2">
                                        {q.subs.map(sub => (
                                            <div key={sub.id} className="flex items-center justify-between p-3 bg-white/60 rounded border border-slate-100">
                                                <div className="flex-1 mr-4 flex gap-2"><strong className="mr-2 text-slate-500">{sub.id})</strong> <Latex content={sub.text} /></div>
                                                <div className="flex gap-4 min-w-[120px]">
                                                    <label className="flex items-center gap-1 cursor-pointer hover:text-green-700">
                                                        <input type="radio" name={`${q.id}_${sub.id}`} value="true" onChange={(e) => setUserAnswers({...userAnswers, [`${q.id}_${sub.id}`]: e.target.value})} className="accent-green-600 w-4 h-4" /> 
                                                        <span className="text-sm font-bold">Đúng</span>
                                                    </label>
                                                    <label className="flex items-center gap-1 cursor-pointer hover:text-red-700">
                                                        <input type="radio" name={`${q.id}_${sub.id}`} value="false" onChange={(e) => setUserAnswers({...userAnswers, [`${q.id}_${sub.id}`]: e.target.value})} className="accent-red-600 w-4 h-4" /> 
                                                        <span className="text-sm font-bold">Sai</span>
                                                    </label>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* PART 3 */}
                    <div className="mb-8">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 border-b pb-2">PHẦN III. Trắc nghiệm trả lời ngắn (6 câu)</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {questions.part3.map((q, idx) => (
                                <div key={q.id} className="glass-panel p-5">
                                    <div className="font-bold text-slate-800 mb-3 flex gap-2"><span>Câu {idx + 1}:</span> <Latex content={q.text} /></div>
                                    <div className="mt-2">
                                        <input type="text" placeholder="Nhập đáp án số..." className="modern-input w-full p-3 rounded text-lg" 
                                            onChange={(e) => setUserAnswers({...userAnswers, [q.id]: e.target.value})} />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="text-center mt-12 pb-20">
                        <button onClick={submitExam} className="bg-gradient-to-r from-orange-600 to-red-600 text-white px-16 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition text-xl">
                            Nộp Bài
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [state, setState] = useState(null);
            return (
                <div className="min-h-screen py-6">
                    {!state ? <Wizard onFinish={setState}/> : (
                        <div>
                            <div className="max-w-4xl mx-auto px-4 mb-4">
                                <button onClick={()=>setState(null)} className="text-orange-600 hover:text-orange-800 font-bold text-sm flex items-center gap-1">
                                    <i className="fas fa-arrow-left"></i> Chọn hàm khác
                                </button>
                            </div>
                            {state.type === 'CUBIC' && <CubicSolver p={state.params} />}
                            {state.type === 'RAT_1_1' && <Rat11Solver p={state.params} />}
                            {state.type === 'RAT_2_1' && <Rat21Solver p={state.params} />}
                        </div>
                    )}
                </div>
            );
        };

        const MainLayout = () => {
            const [view, setView] = useState('tool');

            return (
                <div className="min-h-screen pb-10">
                    <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-orange-100 shadow-sm mb-6">
                        <div className="max-w-5xl mx-auto px-4">
                            <div className="flex justify-between items-center h-16">
                                <div className="font-bold text-xl text-orange-600 font-serif flex items-center gap-2">
                                    <i className="fas fa-square-root-variable"></i> MathSolver 12
                                </div>
                                <div className="flex gap-1 md:gap-4">
                                    {[
                                        {id: 'tool', label: 'Công Cụ', icon: 'fa-calculator'},
                                        {id: 'theory', label: 'Lý Thuyết', icon: 'fa-book'},
                                        {id: 'practice', label: 'Ôn Luyện', icon: 'fa-pen-to-square'}
                                    ].map(item => (
                                        <button key={item.id} onClick={() => setView(item.id)}
                                            className={`px-3 md:px-4 py-2 rounded-lg text-sm md:text-base font-medium transition-colors flex items-center gap-2 ${view === item.id ? 'bg-orange-100 text-orange-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                                            <i className={`fas ${item.icon}`}></i> <span className="hidden md:inline">{item.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </nav>

                    {view === 'tool' && <App />}
                    {view === 'theory' && <TheoryView />}
                    {view === 'practice' && <PracticeView />}

                    <div className="mt-12 text-center text-slate-500 text-sm border-t border-slate-200 pt-6">
                        <p className="font-bold text-orange-800">CÔNG CỤ HỖ TRỢ KHẢO SÁT HÀM SỐ</p>
                        <p>Chuẩn chương trình giáo dục của BGD VIỆT NAM hiện hành</p>
                        <p className="mt-1">Tác giả: <strong>Thầy Thái Minh Nguyên</strong> - Giáo viên Toán trường TH, THCS & THPT YERSIN ĐÀ LẠT</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainLayout />);
    </script>
</body>
</html>
