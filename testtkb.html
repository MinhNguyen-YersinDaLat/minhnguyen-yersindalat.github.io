<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartSchedule - Yersin Pro Edition (V10 - Monthly Stats)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- XLSX-JS-STYLE (Hỗ trợ xuất Excel có màu sắc/border) -->

    <!-- HTML2Canvas -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase to Global Scope for React
        window.firebaseModules = { initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously, getFirestore, doc, setDoc, getDoc, serverTimestamp };
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Be Vietnam Pro', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412' },
                        slate: { 850: '#1e293b' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(234, 88, 12, 0.15), 0 2px 10px -2px rgba(0, 0, 0, 0.05)',
                        'card': '0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #fff7ed; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Checkbox */
        .custom-checkbox:checked {
            background-color: #ea580c;
            border-color: #ea580c;
        }

        /* Sticky Columns for Table */
        .sticky-col-1 { position: sticky; left: 0; z-index: 10; background-color: inherit; }
        .sticky-col-2 { position: sticky; left: 48px; z-index: 10; background-color: inherit; }
        .sticky-header { position: sticky; top: 0; z-index: 20; }

        @media print {
            @page { margin: 5mm; size: landscape; }
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .tab-content { display: block !important; }
            .mobile-view { display: none !important; }
            .desktop-view { display: block !important; }
        }

        /* Start Screen Styles */
        .start-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }

<body class="text-slate-800 antialiased selection:bg-brand-100 selection:text-brand-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo } = React;
        
        // --- FIREBASE INIT ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        // Modules from window (loaded via module script)
        let auth, db, googleProvider;
        let firebaseReady = false;

        const initFirebase = async () => {
            if (window.firebaseModules && !firebaseReady) {
                const { initializeApp, getAuth, getFirestore, GoogleAuthProvider } = window.firebaseModules;
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                googleProvider = new GoogleAuthProvider();
                googleProvider.setCustomParameters({ prompt: 'select_account' });
                firebaseReady = true;
            }
        };

        // --- ICONS ---
        const Icons = {
            Sun: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Upload: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Eye: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
            X: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>,
            Filter: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>,
            Home: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
            Camera: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>,
            ArrowRight: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>,
            UserGroup: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Reload: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            ChevronDown: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>,
            ChevronUp: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7" /></svg>,
            Bolt: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Cog: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Excel: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" /></svg>,
            Google: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M23.766 12.2764C23.766 11.4607 23.6999 10.6406 23.5588 9.83807H12.24V14.4591H18.7217C18.4528 15.9494 17.5885 17.2678 16.323 18.1056V21.1039H20.19C22.4608 19.0139 23.766 15.9274 23.766 12.2764Z" fill="#4285F4"/><path d="M12.2401 24.0008C15.4766 24.0008 18.2059 22.9382 20.1945 21.1039L16.3275 18.1055C15.2517 18.8375 13.8627 19.252 12.2445 19.252C9.11388 19.252 6.45946 17.1399 5.50705 14.3003H1.5166V17.3912C3.55371 21.4434 7.7029 24.0008 12.2401 24.0008Z" fill="#34A853"/><path d="M5.50253 14.3003C5.00236 12.8099 5.00236 11.1961 5.50253 9.70575V6.61481H1.51649C-0.18551 10.0056 -0.18551 14.0004 1.51649 17.3912L5.50253 14.3003Z" fill="#FBBC05"/><path d="M12.2401 4.74966C13.9509 4.7232 15.6044 5.36697 16.8434 6.54867L20.2695 3.12262C18.1001 1.0855 15.2208 -0.034466 12.2401 0.000808666C7.7029 0.000808666 3.55371 2.55822 1.5166 6.61481L5.50264 9.70575C6.45064 6.86173 9.10947 4.74966 12.2401 4.74966Z" fill="#EA4335"/></svg>,
            Logout: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        };

        const COLLECTIVE_KEYWORDS = ['CHÀO CỜ', 'CC', 'SINH HOẠT CỜ', 'LỄ', 'TẬP THỂ', 'TOÀN TRƯỜNG', 'SHDC', 'HỘI THAO', 'GOT TALENT'];
        const HOMEROOM_KEYWORDS = ['GVCN', 'SHTT', 'SHCN', 'SINH HOẠT LỚP', 'HĐTN', 'SHL', 'SHTT'].filter(k => k !== 'HĐTN');
        const HDTN_KEYWORDS = ['HĐTN', 'HOẠT ĐỘNG TRẢI NGHIỆM', 'HN', 'HƯỚNG NGHIỆP'];

        // --- HELPER FUNCTIONS ---
        const getCanonicalName = (rawName) => {
            if (!rawName) return '';
            let name = rawName.trim().toLowerCase();
            if (name.includes('bảo')) {
                if (/^t\s|^t\./.test(name)) return "t_" + name.replace(/^(t\.|t)\s*/, '').trim(); 
                if (/^thầy/.test(name)) return "thay_" + name.replace(/^thầy\s*/, '').trim();
            }
            name = name.replace(/^(thầy|cô|g\.?v\.?|th\.|t\.|c\.)\s*/i, '');
            name = name.replace(/^(t|c)\s+/i, ''); 
            name = name.replace(/[.,:;!@#$%^&*()_+\-=\[\]{}|\\<>\/?]/g, ' ');
            return name.replace(/\s+/g, ' ').trim();
        };

        function isTeacherNameLikely(str) {
            if (!str) return false;
            const s = str.trim();
            if (s.toUpperCase().startsWith("GVNN")) return false; 
            const strictPrefixRegex = /^(t\.|c\.|th\.|thầy|cô|gv|g\.v|t\s|c\s|th\s)\s*/i; 
            if (strictPrefixRegex.test(s)) return true;
            return false;
        }

        const getPeriodsForSession = (schedule, session) => {
            const sessionItems = schedule.filter(d => d.session.toUpperCase() === session);
            let periods = [1,2,3,4,5]; 
            if (sessionItems.length > 0) {
                    const ps = [...new Set(sessionItems.map(d => d.period))].sort((a,b)=>a-b);
                    if (ps.length > 0) periods = ps; 
            }
            while(periods.length < 5) periods.push((periods[periods.length-1] || 0) + 1);
            return periods.filter(p => p !== 16 && p !== 17);
        };

        function parseMultiValueCell(cellText, baseMeta = {}){
            if(!cellText || typeof cellText !== 'string') return [];
            let raw = cellText.trim();
            raw = raw.replace(/^(ÔN THI\s*(TN)?|LỚP|HỌC|HỌC LẠI)\s*[-:]?\s*/i, '');
            raw = raw.replace(/[\n\r\/]+/g, ';');
            const ph = [];
            let protectedRaw = raw.replace(/\(([^)]+)\)/g, (m) => { ph.push(m); return `__P${ph.length-1}__`; });
            protectedRaw = protectedRaw.replace(/,/g, ';'); 
            let tokens = protectedRaw.split(';').map(t => t.trim()).filter(Boolean);
            const results = [];

            for (let token of tokens) {
                token = token.replace(/__P(\d+)__/g, (m, i) => ph[i]);
                const parenMatch = token.match(/^([^\(\)]+?)\s*\(([^)]+)\)$/);
                
                let item = null;

                if (parenMatch) {
                    const subjectRaw = parenMatch[1].trim();
                    const insideRaw = parenMatch[2].trim(); 
                    let teacherRaw = '', className = '';
                    const insideParts = insideRaw.split(/\s*[-–]\s*/);
                    if (insideParts.length === 1) {
                         if (isTeacherNameLikely(insideParts[0]) || insideParts[0].length > 3) teacherRaw = insideParts[0];
                         else className = insideParts[0];
                    } else {
                        const tIdx = insideParts.findIndex(p => isTeacherNameLikely(p));
                        if (tIdx !== -1) {
                            teacherRaw = insideParts[tIdx];
                            className = insideParts.filter((_,i) => i !== tIdx).join(' - ');
                        } else {
                            teacherRaw = insideParts[0];
                            className = insideParts.slice(1).join(' - ');
                        }
                    }
                    item = { subject: subjectRaw, teacherRaw, teacherCanonical: getCanonicalName(teacherRaw), className, raw: token, ...baseMeta };
                } else {
                    const parts = token.split(/\s*[-–]\s*/);
                    if (parts.length >= 2) {
                        let tIdx = parts.findIndex(p => isTeacherNameLikely(p));
                        if (tIdx !== -1) {
                            const teacherRaw = parts[tIdx];
                            const subject = parts.slice(0, tIdx).join(' - ');
                            const className = parts.slice(tIdx + 1).join(' - ');
                            item = { subject: subject || parts[0], teacherRaw, teacherCanonical: getCanonicalName(teacherRaw), className, raw: token, ...baseMeta };
                        } else {
                            if (parts[0].toUpperCase().includes('GVCN')) {
                                item = { subject: parts[0], teacherRaw: parts[1], teacherCanonical: getCanonicalName(parts[1]), className: '', raw: token, ...baseMeta };
                            } else {
                                const teacherRaw = parts[parts.length-1];
                                const subject = parts.slice(0, parts.length-1).join(' - ');
                                item = { subject, teacherRaw, teacherCanonical: getCanonicalName(teacherRaw), className: '', raw: token, ...baseMeta };
                            }
                        }
                    } else {
                        item = { subject: token, teacherRaw: '', teacherCanonical: '', className: '', raw: token, ambiguous: true, ...baseMeta };
                    }
                }

                // --- SPECIAL LOGIC: SPLIT HUY (QP vs GDKTPL) ---
                if (item && item.teacherCanonical === 'huy') {
                    const s = item.subject.toUpperCase();
                    if (s.includes('QP') || s.includes('QUỐC PHÒNG')) {
                        item.teacherCanonical = 'huy_qp';
                        if (!item.teacherRaw.includes('(QP)')) item.teacherRaw = `${item.teacherRaw} (QP)`;
                    } else if (s.includes('KTPL') || s.includes('GDKTPL') || s.includes('PHÁP LUẬT') || s.includes('GD KINH TẾ')) {
                        item.teacherCanonical = 'huy_ktpl';
                        if (!item.teacherRaw.includes('(KTPL)')) item.teacherRaw = `${item.teacherRaw} (KTPL)`;
                    }
                }

                if(item) results.push(item);
            }
            return results;
        }

        // --- SUB-COMPONENTS (DEFINED BEFORE APP) ---

        const PeriodCell = memo(({ matches, day, period, session, handleInspect, selectedHomeroom }) => {
            const groups = {};
            matches.forEach(m => {
                const key = `${m.teacherCanonical}|${m.subject}`;
                if (!groups[key]) groups[key] = { ...m, classes: [m.clazz] };
                else if (!groups[key].classes.includes(m.clazz)) groups[key].classes.push(m.clazz);
            });
            const uniqueMatches = Object.values(groups);

            if (uniqueMatches.length > 0) {
                return (
                    <div className="flex flex-col gap-1 h-full">
                        {uniqueMatches.map((m, idx) => {
                            let classListDisplay = "";
                            const roomRegex = /\s*\(([^)]+)\)$/;
                            const firstMatch = m.classes[0].match(roomRegex);
                            const commonRoom = firstMatch ? firstMatch[1] : null;
                            let allShareRoom = false;
                            if (commonRoom) allShareRoom = m.classes.every(c => { const match = c.match(roomRegex); return match && match[1] === commonRoom; });
                            if (allShareRoom) classListDisplay = `${m.classes.map(c => c.replace(roomRegex, '').trim()).join(', ')} (${commonRoom})`;
                            else classListDisplay = m.classes.join(', ');

                            const isCN = (selectedHomeroom && m.classes.some(c => c.includes(selectedHomeroom)) && HOMEROOM_KEYWORDS.some(k => m.raw.toUpperCase().includes(k)));
                            const isCollective = m.isCollective;
                            let bgClass = "bg-white border-l-4 border-brand-500 text-slate-800";
                            if (isCollective) bgClass = "bg-red-50 border-l-4 border-red-500 text-red-800";
                            else if (isCN) bgClass = "bg-amber-50 border-l-4 border-amber-500 text-amber-900";
                            
                            return (
                                <div key={idx} className={`p-2 rounded-r border border-slate-200 ${bgClass} shadow-sm relative group text-left`}>
                                    {isCN && <span className="absolute top-1 right-1 px-1 bg-amber-100 text-amber-700 text-[8px] font-bold rounded uppercase">CN</span>}
                                    {isCollective ? <div className="text-center font-bold text-[10px] uppercase py-1">{m.raw}</div> : 
                                        <>
                                            <div className="font-bold text-sm leading-tight mb-0.5 break-words">{classListDisplay}</div>
                                            <div className="text-[10px] font-semibold opacity-70 uppercase truncate">{m.subject}</div>
                                        </>}
                                </div>
                            )
                        })}
                    </div>
                )
            }
            return (
                <div onClick={() => handleInspect(day, period, session)} className="w-full h-full min-h-[50px] bg-slate-50/50 rounded border border-dashed border-slate-200 hover:border-brand-300 hover:bg-brand-50 transition-all cursor-pointer flex items-center justify-center group no-capture empty-slot-hover" title="Bấm để kiểm tra">
                    <div className="opacity-0 group-hover:opacity-100 text-brand-400 transition-opacity"><Icons.Eye /></div>
                </div>
            );
        });

        const DesktopTable = memo(({ session, finalSchedule, handleInspect, selectedHomeroom }) => {
            const periods = useMemo(() => getPeriodsForSession(finalSchedule, session), [finalSchedule, session]);
            const days = ['2', '3', '4', '5', '6', '7'];
            const headerClass = session === 'SÁNG' ? 'bg-sky-100 text-sky-800' : 'bg-orange-100 text-orange-800';
            return (
                <div className="bg-white rounded-xl shadow-card border border-slate-200 overflow-hidden mb-8">
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm border-collapse min-w-[800px]">
                            <thead>
                                <tr>
                                    <th className={`p-3 w-16 text-center font-bold border-b border-r border-slate-200 ${headerClass}`}>{session}</th>
                                    {days.map(d => <th key={d} className="p-3 font-bold text-slate-600 text-xs uppercase border-b border-r border-slate-200 bg-slate-50">Thứ {d}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {periods.map(p => (
                                    <tr key={p} className="hover:bg-slate-50/50">
                                        <td className="p-2 border-r border-b border-slate-200 text-center bg-slate-50 font-bold text-slate-500">{p}</td>
                                        {days.map(d => {
                                            const matches = finalSchedule.filter(s => (s.day === d || s.day.includes(d)) && s.period === p && s.session.toUpperCase() === session);
                                            return <td key={d} className="p-1 border-r border-b border-slate-200 align-top h-auto min-h-[60px] w-[16.6%]"><PeriodCell matches={matches} day={d} period={p} session={session} handleInspect={handleInspect} selectedHomeroom={selectedHomeroom} /></td>
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        });

        const MobileListView = memo(({ session, finalSchedule, activeMobileDay, setActiveMobileDay, handleInspect, selectedHomeroom }) => {
            const periods = useMemo(() => getPeriodsForSession(finalSchedule, session), [finalSchedule, session]);
            const activeColor = session === 'SÁNG' ? 'bg-sky-600' : 'bg-orange-600';
            return (
                <div className="pb-20">
                    <div className="flex gap-2 overflow-x-auto pb-4 px-1 snap-x hide-scroll sticky top-0 bg-[#f8fafc]/95 backdrop-blur z-10 pt-2 no-capture">
                        {['2', '3', '4', '5', '6', '7'].map(d => (
                            <button key={d} onClick={() => setActiveMobileDay(d)} className={`flex-none w-14 h-16 rounded-xl flex flex-col items-center justify-center snap-start transition-all border ${activeMobileDay === d ? `${activeColor} text-white border-transparent shadow-lg` : 'bg-white text-slate-400 border-slate-200'}`}>
                                <span className="text-[10px] font-bold opacity-80 uppercase">Thứ</span>
                                <span className="text-xl font-bold">{d}</span>
                            </button>
                        ))}
                    </div>
                    <div className="space-y-3 mt-2">
                        {periods.map(p => {
                            const matches = finalSchedule.filter(s => (s.day === activeMobileDay || s.day.includes(activeMobileDay)) && s.period === p && s.session.toUpperCase() === session);
                            const hasContent = matches.length > 0;
                            return (
                                <div key={p} className="flex gap-3 items-stretch">
                                    <div className={`w-10 flex-none flex items-center justify-center rounded-lg font-bold text-sm border ${hasContent ? 'bg-white border-slate-200 text-slate-700' : 'bg-transparent border-transparent text-slate-300'}`}>{p}</div>
                                    <div className="flex-1 min-h-[60px]">
                                        {hasContent ? <PeriodCell matches={matches} day={activeMobileDay} period={p} session={session} handleInspect={handleInspect} selectedHomeroom={selectedHomeroom} /> : <div className="w-full h-full min-h-[50px] bg-slate-50/30 rounded border border-dashed border-slate-200"></div>}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        });

        // --- HOMEROOM CONFIG MODAL ---
        const HomeroomConfigModal = memo(({ classes, teacherConfigs, homeroomMap, onSave, onClose }) => {
            const [localMap, setLocalMap] = useState({ ...homeroomMap });
            const teacherList = useMemo(() => Object.keys(teacherConfigs).map(k => ({
                key: k, name: teacherConfigs[k].displayName
            })).sort((a,b) => a.name.localeCompare(b.name)), [teacherConfigs]);

            const handleChange = (cls, teacherKey) => {
                setLocalMap(prev => ({ ...prev, [cls]: teacherKey }));
            };

            const handleSave = () => {
                onSave(localMap);
            };

            return (
                 <div className="fixed inset-0 z-[120] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in" onClick={e => e.stopPropagation()}>
                    <div className="bg-white w-full max-w-lg h-[80vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-200 bg-brand-600 text-white flex justify-between items-center">
                            <h3 className="font-bold text-xl flex items-center gap-2"><Icons.Cog /> Cấu hình Giáo Viên Chủ Nhiệm</h3>
                            <button onClick={onClose} className="p-2 hover:bg-white/20 rounded-full"><Icons.X /></button>
                        </div>
                        <div className="p-4 bg-orange-50 text-xs text-orange-800 border-b border-orange-100">
                            <strong>Lưu ý:</strong> Khi bạn gán GVCN cho một lớp, hệ thống sẽ tự động tính tất cả các tiết SHCN, SHTT, Chào cờ của lớp đó cho giáo viên này, kể cả khi trong TKB không ghi tên.
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 bg-slate-50">
                            <div className="grid gap-3">
                                {classes.map(cls => (
                                    <div key={cls} className="flex items-center justify-between bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                        <div className="font-bold text-slate-700 w-24">{cls}</div>
                                        <select 
                                            value={localMap[cls] || ''} 
                                            onChange={(e) => handleChange(cls, e.target.value)}
                                            className="flex-1 p-2 rounded border border-slate-300 text-sm focus:border-brand-500 outline-none"
                                        >
                                            <option value="">-- Chọn GVCN --</option>
                                            {teacherList.map(t => (
                                                <option key={t.key} value={t.key}>{t.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-4 border-t border-slate-200 bg-white flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 rounded-lg text-slate-600 font-bold hover:bg-slate-100">Hủy</button>
                            <button onClick={handleSave} className="px-6 py-2 rounded-lg bg-brand-600 text-white font-bold hover:bg-brand-700 shadow-lg flex items-center gap-2"><Icons.Save /> Lưu Cấu Hình</button>
                        </div>
                    </div>
                 </div>
            );
        });

        // --- STATISTICS COMPONENT (COMPACT) ---
        const StatisticsModal = memo(({ allRawData, teacherConfigs, classes, homeroomMap, onUpdateHomeroomMap, onClose }) => {
            const [search, setSearch] = useState('');
            const [sort, setSort] = useState('count'); 
            const [showConfig, setShowConfig] = useState(false);

            // Special subjects that get their own columns
            const SPECIAL_SUBJECTS = ['LIM', 'STEM'];

            const stats = useMemo(() => {
                const map = {};
                const processed = new Set(); // Track unique time slots per teacher
                
                Object.keys(teacherConfigs).forEach(key => {
                      map[key] = {
                            name: teacherConfigs[key].displayName,
                            canonical: key,
                            teachingTotal: 0,
                            homeroomTotal: 0,
                            hdtnTotal: 0,
                            limCount: 0,
                            stemCount: 0,
                            generalSubjects: {}, // Stores other subjects { "Toán": 5, "Văn": 3 }
                            homeroomDetails: {}
                      };
                });

                allRawData.forEach(item => {
                    const isHomeroomSubject = HOMEROOM_KEYWORDS.some(k => item.subject.toUpperCase().includes(k) || item.raw.toUpperCase().includes(k));
                    const isHDTN = HDTN_KEYWORDS.some(k => item.subject.toUpperCase().includes(k));
                    const cleanClass = item.clazz.replace(/\s*\([^)]+\)/, '').trim(); 
                    
                    let targetTeacherCanonical = item.teacherCanonical;

                    // --- FORCE ASSIGNMENT LOGIC ---
                    if (isHomeroomSubject && homeroomMap[cleanClass]) {
                        targetTeacherCanonical = homeroomMap[cleanClass];
                    }

                    if (!targetTeacherCanonical) return;
                    
                    // --- ONE PERIOD PER TIME SLOT CHECK ---
                    // Updated Key for Monthly: Include fileIndex to differentiate weeks
                    const uniqueKey = `${targetTeacherCanonical}|${item.fileIndex}|${item.day}|${item.session}|${item.period}`;
                    
                    if (processed.has(uniqueKey)) return; 
                    processed.add(uniqueKey);

                    if (!map[targetTeacherCanonical]) {
                        map[targetTeacherCanonical] = {
                            name: item.teacherRaw || targetTeacherCanonical, 
                            canonical: targetTeacherCanonical,
                            teachingTotal: 0,
                            homeroomTotal: 0,
                            hdtnTotal: 0,
                            limCount: 0,
                            stemCount: 0,
                            generalSubjects: {},
                            homeroomDetails: {}
                        };
                    }
                    
                    if(item.teacherRaw && item.teacherRaw.length > map[targetTeacherCanonical].name.length) {
                        map[targetTeacherCanonical].name = item.teacherRaw;
                    } else if (map[targetTeacherCanonical].name === targetTeacherCanonical && teacherConfigs[targetTeacherCanonical]) {
                         map[targetTeacherCanonical].name = teacherConfigs[targetTeacherCanonical].displayName;
                    }

                    const subjKey = item.subject.trim(); // Normalize subject
                    const detailKey = `${cleanClass}`;
                    const upperSubj = subjKey.toUpperCase();

                    if (isHomeroomSubject) {
                        map[targetTeacherCanonical].homeroomTotal++;
                        if (!map[targetTeacherCanonical].homeroomDetails[detailKey]) map[targetTeacherCanonical].homeroomDetails[detailKey] = 0;
                        map[targetTeacherCanonical].homeroomDetails[detailKey]++;
                    } else {
                        // Trust item.teacherCanonical for teaching
                        if (item.teacherCanonical === targetTeacherCanonical) {
                             if (isHDTN) {
                                 map[targetTeacherCanonical].hdtnTotal++;
                             } else if (upperSubj.includes('LIM')) {
                                 map[targetTeacherCanonical].limCount++;
                                 map[targetTeacherCanonical].teachingTotal++;
                             } else if (upperSubj.includes('STEM')) {
                                 map[targetTeacherCanonical].stemCount++;
                                 map[targetTeacherCanonical].teachingTotal++;
                             } else {
                                 // General Subjects
                                 map[targetTeacherCanonical].teachingTotal++;
                                 if (!map[targetTeacherCanonical].generalSubjects[subjKey]) map[targetTeacherCanonical].generalSubjects[subjKey] = 0;
                                 map[targetTeacherCanonical].generalSubjects[subjKey]++;
                             }
                        }
                    }
                });
                
                return Object.values(map).filter(s => (s.teachingTotal + s.homeroomTotal + s.hdtnTotal) > 0);
            }, [allRawData, homeroomMap, teacherConfigs]);

            const filteredStats = useMemo(() => {
                let res = stats.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));
                if (sort === 'count') {
                    res.sort((a,b) => (b.teachingTotal + b.homeroomTotal + b.hdtnTotal) - (a.teachingTotal + a.homeroomTotal + a.hdtnTotal));
                } else {
                    res.sort((a,b) => a.name.localeCompare(b.name));
                }
                return res;
            }, [stats, search, sort]);

            // --- EXPORT TO EXCEL FUNCTION (COMPACT) ---
            const handleExportExcel = () => {
                try {
                    // 1. Prepare Data
                    const header = ["STT", "Giáo Viên", "Tổng Dạy", "Các Môn Khác (Chi tiết)", "Lim", "Stem", "HĐTN", "Tiết CN", "Lớp CN", "TỔNG CỘNG"];
                    
                    const rows = filteredStats.map((s, idx) => {
                        // Format General Subjects Details: "Toán: 5, Lý: 3"
                        const generalDetails = Object.entries(s.generalSubjects).map(([subj, count]) => {
                            return `${subj}: ${count}`;
                        }).join(', ');

                        // Format Homeroom Details
                        const hDetails = Object.entries(s.homeroomDetails).map(([k, v]) => {
                            return `${k}`;
                        }).join(', ');

                        const grandTotal = s.teachingTotal + s.homeroomTotal + s.hdtnTotal;

                        return [
                            idx + 1,
                            s.name,
                            s.teachingTotal || 0,
                            generalDetails || "-",
                            s.limCount || 0,
                            s.stemCount || 0,
                            s.hdtnTotal || 0,
                            s.homeroomTotal || 0,
                            hDetails || "-",
                            grandTotal
                        ];
                    });

                    // 2. Create Workbook & Worksheet
                    const wb = XLSX.utils.book_new();
                    const ws_data = [header, ...rows];
                    const ws = XLSX.utils.aoa_to_sheet(ws_data);

                    // 3. Styling
                    const headerStyle = {
                        font: { bold: true, color: { rgb: "FFFFFF" } },
                        fill: { fgColor: { rgb: "EA580C" } }, 
                        alignment: { horizontal: "center", vertical: "center" },
                        border: {
                            top: { style: "thin", color: { rgb: "000000" } },
                            bottom: { style: "thin", color: { rgb: "000000" } },
                            left: { style: "thin", color: { rgb: "000000" } },
                            right: { style: "thin", color: { rgb: "000000" } }
                        }
                    };

                    const cellStyle = {
                        border: {
                            top: { style: "thin", color: { rgb: "000000" } },
                            bottom: { style: "thin", color: { rgb: "000000" } },
                            left: { style: "thin", color: { rgb: "000000" } },
                            right: { style: "thin", color: { rgb: "000000" } }
                        },
                        alignment: { vertical: "center", wrapText: true }
                    };

                    const centerStyle = { ...cellStyle, alignment: { horizontal: "center", vertical: "center" } };
                    const boldCenterStyle = { ...centerStyle, font: { bold: true } };

                    // Apply styles
                    const range = XLSX.utils.decode_range(ws['!ref']);
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const addr = XLSX.utils.encode_cell({ r: 0, c: C });
                        if (!ws[addr]) continue;
                        ws[addr].s = headerStyle;
                    }

                    for (let R = 1; R <= range.e.r; ++R) {
                        for (let C = 0; C <= range.e.c; ++C) {
                            const addr = XLSX.utils.encode_cell({ r: R, c: C });
                            if (!ws[addr]) ws[addr] = { v: "", t: 's' }; 
                            
                            // Center align numeric columns
                            // STT(0), Total(2), Lim(4), Stem(5), HDTN(6), CN(7), Grand Total(9)
                            if ([0, 2, 4, 5, 6, 7, 9].includes(C)) { 
                                ws[addr].s = (C === 9) ? boldCenterStyle : centerStyle;
                            } else {
                                ws[addr].s = cellStyle;
                            }
                        }
                    }

                    // Set Column Widths
                    ws['!cols'] = [
                        { wch: 5 },  // STT
                        { wch: 25 }, // Name
                        { wch: 10 }, // Total Teach
                        { wch: 40 }, // General Details
                        { wch: 8 },  // Lim
                        { wch: 8 },  // Stem
                        { wch: 8 },  // HDTN
                        { wch: 10 }, // Total CN
                        { wch: 20 }, // Details CN
                        { wch: 12 }  // Grand Total
                    ];

                    XLSX.utils.book_append_sheet(wb, ws, "ThongKe_Gon");
                    XLSX.writeFile(wb, "ThongKe_TKB_Yersin_Compact.xlsx");

                } catch (err) {
                    console.error("Export Error:", err);
                    alert("Lỗi xuất file: " + err.message);
                }
            };

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-white w-full max-w-6xl h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        
                        {/* Header */}
                        <div className="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                            <div>
                                <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2"><Icons.Chart /> Thống Kê Gọn (Compact)</h3>
                                <div className="text-sm text-slate-500">Chỉ chia cột riêng cho Lim, Stem và HĐTN.</div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowConfig(true)} className="px-4 py-2 bg-brand-100 text-brand-700 rounded-lg font-bold hover:bg-brand-200 flex items-center gap-2 text-sm"><Icons.Cog /> Cấu hình GVCN</button>
                                <button onClick={handleExportExcel} className="px-4 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 flex items-center gap-2 text-sm shadow-md transition-all active:scale-95"><Icons.Excel /> Xuất Excel</button>
                                <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-500"><Icons.X /></button>
                            </div>
                        </div>
                        
                        {/* Filters */}
                        <div className="p-4 bg-white border-b border-slate-100 flex gap-4 flex-col md:flex-row">
                            <div className="relative flex-1">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                                <input type="text" placeholder="Tìm tên giáo viên..." className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:border-brand-500 outline-none" 
                                    value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setSort('count')} className={`px-4 py-2 rounded-lg font-bold text-sm border ${sort === 'count' ? 'bg-brand-50 border-brand-500 text-brand-700' : 'bg-white border-slate-300 text-slate-600'}`}>Nhiều tiết nhất</button>
                                <button onClick={() => setSort('name')} className={`px-4 py-2 rounded-lg font-bold text-sm border ${sort === 'name' ? 'bg-brand-50 border-brand-500 text-brand-700' : 'bg-white border-slate-300 text-slate-600'}`}>Tên A-Z</button>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="flex-1 overflow-auto p-0 relative">
                            <table className="min-w-max text-sm text-left border-collapse">
                                <thead className="bg-slate-100 text-slate-600 uppercase text-xs shadow-sm sticky-header">
                                    <tr>
                                        <th className="px-4 py-3 w-12 text-center sticky-col-1 bg-slate-100 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">STT</th>
                                        <th className="px-4 py-3 w-48 sticky-col-2 bg-slate-100 border-r border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">Giáo Viên</th>
                                        <th className="px-4 py-3 bg-brand-50/50 text-brand-800 w-20 text-center border-r border-slate-200">Tổng Dạy</th>
                                        <th className="px-4 py-3 w-64 border-r border-slate-200">Các Môn Khác (Chi tiết)</th>
                                        <th className="px-2 py-3 w-16 text-center border-r border-slate-200">Lim</th>
                                        <th className="px-2 py-3 w-16 text-center border-r border-slate-200">Stem</th>
                                        <th className="px-2 py-3 bg-purple-50 text-purple-800 w-20 text-center border-r border-slate-200">HĐTN</th>
                                        <th className="px-2 py-3 bg-orange-50 text-orange-800 w-20 text-center border-r border-slate-200">Tiết CN</th>
                                        <th className="px-4 py-3 w-32 border-r border-slate-200">Lớp CN</th>
                                        <th className="px-4 py-3 w-24 text-center font-black bg-slate-200">TỔNG</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredStats.map((s, idx) => (
                                        <tr key={s.canonical} className="hover:bg-slate-50 transition-colors">
                                            <td className="px-4 py-3 text-center font-mono text-slate-400 sticky-col-1 bg-white hover:bg-slate-50 border-r border-slate-100">{idx + 1}</td>
                                            <td className="px-4 py-3 font-bold text-slate-800 text-base sticky-col-2 bg-white hover:bg-slate-50 border-r border-slate-100 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">{s.name}</td>
                                            
                                            {/* Total Teaching */}
                                            <td className="px-4 py-3 text-center bg-brand-50/30 font-bold text-brand-700 border-r border-slate-100">
                                                {s.teachingTotal > 0 ? s.teachingTotal : '-'}
                                            </td>

                                            {/* General Subjects Details */}
                                            <td className="px-4 py-3 text-slate-600 border-r border-slate-100">
                                                <div className="flex flex-wrap gap-1">
                                                    {Object.entries(s.generalSubjects).map(([subj, count]) => (
                                                        <span key={subj} className="inline-flex items-center gap-1 px-2 py-1 rounded border border-slate-200 bg-white text-xs">
                                                            <span className="font-semibold text-slate-700">{subj}:</span>
                                                            <span className="font-bold text-slate-900 bg-slate-100 px-1.5 rounded">{count}</span>
                                                        </span>
                                                    ))}
                                                    {Object.keys(s.generalSubjects).length === 0 && <span className="text-xs text-slate-300 italic">-</span>}
                                                </div>
                                            </td>

                                            {/* Lim */}
                                            <td className="px-2 py-3 text-center border-r border-slate-100">
                                                {s.limCount > 0 ? <span className="font-bold text-slate-700">{s.limCount}</span> : <span className="text-slate-200">-</span>}
                                            </td>

                                            {/* Stem */}
                                            <td className="px-2 py-3 text-center border-r border-slate-100">
                                                {s.stemCount > 0 ? <span className="font-bold text-slate-700">{s.stemCount}</span> : <span className="text-slate-200">-</span>}
                                            </td>

                                            {/* HDTN */}
                                            <td className="px-2 py-3 bg-purple-50/30 border-r border-slate-100 text-center">
                                                {s.hdtnTotal > 0 ? (
                                                     <span className="font-bold text-purple-700">{s.hdtnTotal}</span>
                                                ) : <span className="text-slate-200">-</span>}
                                            </td>

                                            {/* Homeroom Total */}
                                            <td className="px-2 py-3 border-r border-slate-100 bg-orange-50/30 text-center">
                                                 {s.homeroomTotal > 0 ? (
                                                     <span className="font-bold text-orange-700">{s.homeroomTotal}</span>
                                                ) : <span className="text-slate-200">-</span>}
                                            </td>

                                             {/* Homeroom Details */}
                                            <td className="px-4 py-3 text-slate-600 border-r border-slate-100 text-xs">
                                                <div className="flex flex-wrap gap-1">
                                                    {Object.entries(s.homeroomDetails).map(([key, count]) => (
                                                        <span key={key} className="inline-block px-1.5 py-0.5 rounded border border-orange-100 bg-orange-50 text-orange-800 font-bold">
                                                            {key}
                                                        </span>
                                                    ))}
                                                </div>
                                            </td>

                                            {/* Grand Total */}
                                            <td className="px-4 py-3 text-center bg-slate-50">
                                                <span className="font-black text-slate-800 text-lg">{s.teachingTotal + s.homeroomTotal + s.hdtnTotal}</span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filteredStats.length === 0 && <div className="p-10 text-center text-slate-400">Không tìm thấy dữ liệu.</div>}
                        </div>

                        {/* Nested Modal for Config */}
                        {showConfig && (
                            <HomeroomConfigModal 
                                classes={classes}
                                teacherConfigs={teacherConfigs}
                                homeroomMap={homeroomMap}
                                onSave={(newMap) => {
                                    onUpdateHomeroomMap(newMap);
                                    setShowConfig(false);
                                }}
                                onClose={() => setShowConfig(false)}
                            />
                        )}
                    </div>
                </div>
            );
        });


        const AutoSelectionScreen = memo(({ teacherConfigs, onSelectTeacher, onBack, searchTerm, setSearchTerm }) => {
            const sortedKeys = useMemo(() => {
                return Object.keys(teacherConfigs).sort((a,b) => teacherConfigs[a].displayName.localeCompare(teacherConfigs[b].displayName));
            }, [teacherConfigs]);

            const filteredKeys = sortedKeys.filter(key => {
                return teacherConfigs[key].displayName.toLowerCase().includes(searchTerm.toLowerCase());
            });

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4">
                    <div className="w-full max-w-lg bg-white rounded-[2rem] border border-white shadow-soft overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-6 bg-brand-600 text-white">
                            <h2 className="text-2xl font-bold flex items-center gap-2"><Icons.Bolt /> <span className="ml-2">Chế độ Tự Động</span></h2>
                            <p className="opacity-90 text-sm mt-1 ml-8">Chọn tên giáo viên để xem TKB ngay.</p>
                        </div>
                        <div className="p-4 border-b border-slate-200 bg-slate-50 flex gap-4 items-center">
                            <div className="relative flex-1">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                                <input type="text" placeholder="Tìm tên giáo viên..." className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:border-brand-500 outline-none shadow-sm"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 bg-slate-100/50">
                            <div className="space-y-2">
                                {filteredKeys.map(key => (
                                    <button 
                                        key={key} 
                                        onClick={() => onSelectTeacher(key)}
                                        className="w-full text-left p-4 rounded-xl border border-white bg-white hover:border-brand-300 hover:shadow-md transition-all flex items-center justify-between group"
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500 group-hover:bg-brand-100 group-hover:text-brand-600 transition-colors">
                                                {teacherConfigs[key].displayName.charAt(0).toUpperCase()}
                                            </div>
                                            <span className="font-bold text-slate-700 text-lg group-hover:text-brand-700">{teacherConfigs[key].displayName}</span>
                                        </div>
                                        <div className="text-slate-300 group-hover:text-brand-500"><Icons.ArrowRight /></div>
                                    </button>
                                ))}
                                {filteredKeys.length === 0 && <div className="text-center py-10 text-slate-400">Không tìm thấy kết quả.</div>}
                            </div>
                        </div>
                        <div className="p-4 border-t border-slate-200 bg-white">
                            <button onClick={onBack} className="w-full py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100">Quay lại</button>
                        </div>
                    </div>
                </div>
            );
        });

        const ConfigScreen = memo(({ teacherConfigs, selectedSignatures, handleToggleOption, handleSelectAll, searchTerm, setSearchTerm, expandedKey, setExpandedKey, onBack, onView }) => {
            // ... existing implementation ...
            const sortedKeys = useMemo(() => {
                const keys = Object.keys(teacherConfigs);
                const isSelected = (key) => {
                    const options = teacherConfigs[key].options;
                    return Object.keys(options).some(sig => selectedSignatures.has(sig));
                };
                return keys.sort((a,b) => {
                    const selA = isSelected(a);
                    const selB = isSelected(b);
                    if (selA && !selB) return -1;
                    if (!selA && selB) return 1;
                    return teacherConfigs[a].displayName.localeCompare(teacherConfigs[b].displayName);
                });
            }, [teacherConfigs, selectedSignatures]);
            
            const filteredKeys = sortedKeys.filter(key => {
                const group = teacherConfigs[key];
                const searchLower = searchTerm.toLowerCase();
                if (group.displayName.toLowerCase().includes(searchLower)) return true;
                return Object.values(group.options).some(opt => opt.label.toLowerCase().includes(searchLower));
            });

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4">
                    <div className="w-full max-w-4xl bg-white rounded-[2rem] border border-white shadow-soft overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-6 bg-brand-600 text-white">
                            <h2 className="text-2xl font-bold flex items-center gap-2"><Icons.Cog /> <span className="ml-2">Cấu hình Thủ Công</span></h2>
                            <p className="opacity-90 text-sm mt-1 ml-9">Chọn chính xác các lớp bạn dạy để loại bỏ trùng tên.</p>
                        </div>
                        <div className="p-4 border-b border-slate-200 bg-slate-50 flex gap-4 items-center">
                            <div className="relative flex-1">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                                <input type="text" placeholder="Tìm tên giáo viên..." className="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:border-brand-500 outline-none shadow-sm"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="text-sm text-slate-500 font-bold">Đã chọn: <span className="text-brand-600 text-lg">{selectedSignatures.size}</span> mục</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 bg-slate-100/50">
                            <div className="space-y-3">
                                {filteredKeys.map(key => {
                                    const group = teacherConfigs[key];
                                    const isExpanded = expandedKey === key;
                                    const options = Object.entries(group.options);
                                    const isAnySelected = options.some(([sig]) => selectedSignatures.has(sig));

                                    return (
                                        <div key={key} className={`bg-white rounded-xl border transition-all overflow-hidden ${isAnySelected ? 'border-brand-500 ring-1 ring-brand-200' : 'border-slate-200 hover:border-brand-300'}`}>
                                            <div 
                                                className="p-4 flex items-center justify-between cursor-pointer hover:bg-slate-50"
                                                onClick={() => setExpandedKey(isExpanded ? null : key)}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm transition-colors ${isAnySelected ? 'bg-brand-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                                                        {group.displayName.charAt(0).toUpperCase()}
                                                    </div>
                                                    <div>
                                                        <div className="font-bold text-slate-800">{group.displayName} {isAnySelected && <span className="text-brand-600 text-xs ml-2">(Đã chọn)</span>}</div>
                                                        <div className="text-xs text-slate-500">{options.length} nhóm môn học</div>
                                                    </div>
                                                </div>
                                                <div className="text-slate-400">
                                                    {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                                                </div>
                                            </div>
                                            
                                            {isExpanded && (
                                                <div className="border-t border-slate-100 bg-slate-50/50 p-4 animate-fade-in" onClick={e => e.stopPropagation()}>
                                                    <div className="flex justify-end mb-2">
                                                        <button onClick={() => handleSelectAll(key)} className="text-xs font-bold text-brand-600 hover:underline">Chọn tất cả</button>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                        {options.map(([sig, data]) => (
                                                            <label key={sig} className="flex items-start gap-3 p-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-brand-300 transition-all select-none">
                                                                <input 
                                                                    type="checkbox" 
                                                                    className="custom-checkbox w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500 mt-0.5"
                                                                    checked={selectedSignatures.has(sig)}
                                                                    onChange={(e) => handleToggleOption(sig, e.target.checked, key)}
                                                                />
                                                                <div className="flex-1">
                                                                    <div className="font-bold text-slate-700 text-sm">{data.label}</div>
                                                                    <div className="text-xs text-slate-500 mt-1">Xuất hiện: {data.count} lần</div>
                                                                </div>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                                {filteredKeys.length === 0 && <div className="text-center py-10 text-slate-400">Không tìm thấy giáo viên nào khớp với từ khóa.</div>}
                            </div>
                        </div>
                        <div className="p-4 border-t border-slate-200 bg-white flex justify-between items-center">
                            <button onClick={onBack} className="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100">Quay lại</button>
                            <button onClick={onView} disabled={selectedSignatures.size === 0} className={`px-8 py-3 rounded-xl font-bold text-white shadow-lg flex items-center gap-2 ${selectedSignatures.size === 0 ? 'bg-slate-300 cursor-not-allowed' : 'bg-brand-600 hover:bg-brand-700 active:scale-95 transition-all'}`}>Xem TKB <Icons.ArrowRight /></button>
                        </div>
                    </div>
                </div>
            )
        });

        const StartScreen = memo(({ onLogin }) => {
            return (
                <div className="fixed inset-0 z-50 start-bg flex flex-col items-center justify-center text-white p-6 animate-fade-in">
                    <div className="mb-8 relative animate-slide-up" style={{ animationDelay: '0.1s' }}>
                        <div className="w-24 h-24 bg-white rounded-3xl p-4 shadow-2xl transform rotate-3 hover:rotate-0 transition-transform duration-500 cursor-pointer">
                            <img src="logo.png" alt="YERSIN" className="w-full h-full object-contain" onError={(e) => { e.target.onerror = null; e.target.src = "https://via.placeholder.com/150x150?text=LOGO"; }} />
                        </div>
                    </div>
                    <div className="text-center space-y-3 mb-10 animate-slide-up relative z-10" style={{ animationDelay: '0.2s' }}>
                        <h1 className="text-3xl md:text-5xl font-black tracking-tight uppercase leading-tight">SmartSchedule<br/><span className="text-brand-400">Yersin Pro</span></h1>
                        <div className="flex items-center justify-center gap-2 text-brand-100 text-sm font-medium bg-white/10 py-1 px-4 rounded-full backdrop-blur-sm mx-auto w-fit">
                            <span>Thầy Thái Minh Nguyên</span><span className="w-1 h-1 bg-white rounded-full"></span><span>Yersin Đà Lạt</span>
                        </div>
                    </div>
                    <div className="flex flex-col gap-4 w-full max-w-sm animate-slide-up relative z-10" style={{ animationDelay: '0.3s' }}>
                        <button onClick={onLogin} className="w-full bg-white text-slate-800 font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-brand-500/20 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-3 group border border-slate-100 relative overflow-hidden">
                            <Icons.Google />
                            <span className="text-base font-extrabold tracking-tight">Đăng nhập Google</span>
                        </button>
                    </div>
                </div>
            );
        });

        // --- MAIN APP ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            
            // --- FIREBASE AUTH EFFECT ---
            useEffect(() => {
                const initAuth = async () => {
                    await initFirebase();
                    const { onAuthStateChanged, signInWithCustomToken, signInAnonymously } = window.firebaseModules;
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            console.error("Token login failed, falling back to anonymous", e);
                            await signInAnonymously(auth);
                        }
                    } else {
                        // In dev mode or without token, wait for manual login
                    }

                    const unsubscribe = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setIsAuthLoading(false);
                    });
                    return () => unsubscribe();
                };
                initAuth();
            }, []);

            const handleGoogleLogin = async () => {
                if (!auth) await initFirebase();
                const { signInWithPopup, GoogleAuthProvider } = window.firebaseModules;
                try {
                    await signInWithPopup(auth, googleProvider);
                } catch (err) {
                    alert("Lỗi đăng nhập: " + err.message);
                }
            };

            const handleLogout = async () => {
                if (!auth) return;
                const { signOut } = window.firebaseModules;
                if (confirm("Đăng xuất?")) {
                    await signOut(auth);
                    window.location.reload();
                }
            };

            const handleManualSync = async () => {
                if (!user) {
                    alert("Vui lòng đăng nhập để lưu dữ liệu!");
                    return;
                }
                if (!currentTeacherKey && selectedSignatures.size === 0) {
                    alert("Chưa có dữ liệu cấu hình để lưu!");
                    return;
                }
                
                // Save config to Firestore
                try {
                    const { setDoc, doc, getFirestore, serverTimestamp } = window.firebaseModules;
                    const configData = {
                        currentTeacherKey,
                        selectedSignatures: Array.from(selectedSignatures),
                        homeroomMap,
                        selectedHomeroom,
                        updatedAt: serverTimestamp()
                    };
                    
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'default'), configData);
                    alert("Đã lưu cấu hình lên đám mây thành công!");
                } catch (e) {
                    console.error("Sync error:", e);
                    alert("Lỗi lưu dữ liệu: " + e.message);
                }
            };

            const [stage, setStage] = useState('upload'); 
            const [files, setFiles] = useState([]); // Changed from single file to array of files
            const [allRawData, setAllRawData] = useState([]); 
            const [teacherConfigs, setTeacherConfigs] = useState({}); 
            const [selectedSignatures, setSelectedSignatures] = useState(new Set()); 
            const [currentTeacherKey, setCurrentTeacherKey] = useState(null); 
            const [expandedKey, setExpandedKey] = useState(null);
            const [classes, setClasses] = useState([]);
            const [selectedHomeroom, setSelectedHomeroom] = useState('');
            const [activeSession, setActiveSession] = useState('SÁNG');
            const [activeMobileDay, setActiveMobileDay] = useState('2');
            const [inspectData, setInspectData] = useState(null);
            const [isCapturing, setIsCapturing] = useState(false);
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('');
            const [error, setError] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [showStats, setShowStats] = useState(false); 
            const [homeroomMap, setHomeroomMap] = useState({}); // Stores Class -> Teacher Canonical Key
            const captureRef = useRef(null);

            useEffect(() => {
                const h = new Date().getHours();
                if (h >= 12) setActiveSession('CHIỀU');
            }, []);

            // --- PROCESS FILE ---
            const handleFiles = async (fileList) => {
                if (!fileList || fileList.length === 0) return;
                
                setLoading(true); setError(''); setStatus('Đang đọc file...');
                const extractedAll = [];
                let combinedClasses = new Set();
                let combinedConfigs = {};

                try {
                    // Convert FileList to Array
                    const files = Array.from(fileList);
                    setFiles(files); // Store files

                    for (let fIdx = 0; fIdx < files.length; fIdx++) {
                        const file = files[fIdx];
                        setStatus(`Đang xử lý file ${fIdx + 1}/${files.length}: ${file.name}...`);
                        
                        const data = await file.arrayBuffer();
                        const workbook = XLSX.read(data);
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];

                        if (worksheet['!merges']) {
                            worksheet['!merges'].forEach(range => {
                                const startCell = worksheet[XLSX.utils.encode_cell(range.s)];
                                if (startCell) {
                                    for (let R = range.s.r; R <= range.e.r; ++R) {
                                        for (let C = range.s.c; C <= range.e.c; ++C) {
                                            const addr = XLSX.utils.encode_cell({c: C, r: R});
                                            if (!worksheet[addr]) worksheet[addr] = { ...startCell };
                                        }
                                    }
                                }
                            });
                        }

                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
                        let headerRowIndex = -1;
                        for (let i = 0; i < Math.min(jsonData.length, 30); i++) {
                            const rowStr = jsonData[i].join(' ').toUpperCase();
                            if (rowStr.includes('THỨ') && rowStr.includes('TIẾT')) { headerRowIndex = i; break; }
                        }
                        if (headerRowIndex === -1) throw new Error(`File ${file.name}: Không tìm thấy dòng tiêu đề chuẩn (Thứ/Tiết).`);

                        const classMap = {};
                        let dayCol = -1, periodCol = -1, sessionCol = -1;

                        jsonData[headerRowIndex].forEach((cell, idx) => {
                            const c = cell.toString().trim().toUpperCase();
                            if (c.includes('THỨ')) dayCol = idx;
                            else if (c.includes('TIẾT')) periodCol = idx;
                            else if (c.includes('BUỔI')) sessionCol = idx;
                            else if (c.length > 0 && c.length < 15 && !['SÁNG','CHIỀU'].includes(c)) {
                                classMap[idx] = cell.toString().trim();
                                combinedClasses.add(cell.toString().trim());
                            }
                        });

                        let currentDay = '', currentSession = '';

                        for (let i = headerRowIndex + 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (row[dayCol]) currentDay = row[dayCol].toString().trim();
                            const rawPeriod = row[periodCol]?.toString().trim();
                            if (!rawPeriod || isNaN(parseInt(rawPeriod))) continue;
                            const period = parseInt(rawPeriod);
                            if (sessionCol !== -1 && row[sessionCol]) currentSession = row[sessionCol].toString().trim();
                            else currentSession = period <= 5 ? 'SÁNG' : 'CHIỀU';

                            Object.keys(classMap).forEach(colIdxStr => {
                                const colIdx = parseInt(colIdxStr);
                                const cellContent = row[colIdx]?.toString().trim();
                                
                                if (cellContent) {
                                    // Pass fileIndex into meta data
                                    const parsedItems = parseMultiValueCell(cellContent, { 
                                        day: currentDay, 
                                        session: currentSession, 
                                        period: period,
                                        fileIndex: fIdx  // CRITICAL ADDITION FOR MONTHLY STATS
                                    });
                                    
                                    parsedItems.forEach(item => {
                                        if (item.teacherCanonical && !['gvcn','gvtg'].includes(item.teacherCanonical)) {
