                    {statsModal}
                    <TeachingLogModal isOpen={showLogModal} onClose={() => setShowLogModal(false)} schedule={finalSchedule} onSave={handleSaveWeeklyLogs} teacherName={currentTeacherKey ? teacherConfigs[currentTeacherKey]?.displayName : ''} />
                    {inspectData && (
                        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-slate-900/40 backdrop-blur-sm" onClick={() => setInspectData(null)}>
                            <div className="bg-white w-full max-w-2xl md:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-slide-up" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50"><div><h3 className="font-bold text-slate-800 flex items-center gap-2"><Icons.Eye /> X-Ray Scanner</h3><div className="text-xs text-slate-500 font-medium">Thứ {inspectData.day} &bull; Tiết {inspectData.period}</div></div><button onClick={() => setInspectData(null)} className="p-2 hover:bg-slate-200 rounded-full"><Icons.X /></button></div>
                                <div className="p-4 overflow-y-auto flex-1 bg-white"><div className="grid grid-cols-2 md:grid-cols-4 gap-2">{inspectData.data.map((item, i) => { const isMine = selectedSignatures.has(item.signature); return ( <div key={i} className={`p-2 rounded border text-sm ${isMine ? 'bg-brand-50 border-brand-200 shadow-sm ring-1 ring-brand-100' : 'bg-slate-50 border-slate-100'}`}><div className="font-bold text-slate-800">{item.clazz}</div><div className="text-xs text-slate-500 truncate">{item.subject} - {item.teacherRaw || "---"}</div>{item.fileIndex !== undefined && files.length > 1 && (<div className="text-[10px] text-slate-400 mt-1">File {item.fileIndex + 1}</div>)}</div> ) })}</div>{inspectData.data.length === 0 && <div className="text-center py-8 text-slate-400">Trống tiết toàn trường</div>}</div>
                                <div className="p-4 border-t border-slate-100"><button onClick={() => setInspectData(null)} className="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Đóng</button></div>
                            </div>
                        </div>
                    )}
                    <div className="bg-white sticky top-0 z-30 shadow-sm border-b border-slate-200 no-print">
                        <div className="max-w-6xl mx-auto px-4 py-2">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-3">
                                <div className="flex-1 flex gap-2">
                                    <button onClick={() => { setStage('mode_select'); setSelectedSignatures(new Set()); setSearchTerm(''); }} className="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-bold text-sm whitespace-nowrap transition-colors border border-slate-200"><Icons.Filter /> Chọn lại GV</button>
                                    <button onClick={() => setView('diary')} className="flex items-center gap-2 px-4 py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-lg font-bold text-sm whitespace-nowrap transition-colors border border-purple-200 shadow-sm"><Icons.Calendar /> Nhật Ký</button>
                                    <div className="w-32 md:w-40 relative group"><div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Home /></div><select value={selectedHomeroom} onChange={e => setSelectedHomeroom(e.target.value)} className="w-full pl-9 pr-8 py-2 bg-slate-50 rounded-lg font-bold text-slate-700 text-sm outline-none border border-slate-200 focus:border-brand-500 appearance-none cursor-pointer"><option value="">Lớp CN...</option>{classes.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    <button onClick={handleManualSync} className="flex items-center gap-2 px-4 py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-lg font-bold text-sm whitespace-nowrap transition-colors border border-emerald-200" title="Lưu cấu hình lên đám mây"><Icons.Save /> Lưu</button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowLogModal(true)} className="flex items-center gap-2 px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-bold text-sm shadow-md transition-all active:scale-95" title="Chuyển đổi sang Nhật Ký Dạy"><Icons.Check /> Chốt Sổ</button>
                                    <div className="flex bg-slate-100 p-1 rounded-lg"><button onClick={() => setActiveSession('SÁNG')} className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${activeSession === 'SÁNG' ? 'bg-white text-sky-700 shadow-sm' : 'text-slate-400'}`}>Sáng</button><button onClick={() => setActiveSession('CHIỀU')} className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${activeSession === 'CHIỀU' ? 'bg-white text-orange-700 shadow-sm' : 'text-slate-400'}`}>Chiều</button></div>
                                    <button onClick={() => { setFiles([]); setStage('upload'); setAllRawData([]); }} className="p-2 bg-white border border-slate-200 text-slate-500 hover:text-red-500 rounded-lg" title="Tải lại file"><Icons.Reload /></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="max-w-6xl mx-auto px-4 py-6">
                        <div ref={captureRef} className={`p-4 bg-white md:bg-transparent rounded-xl border border-slate-200 md:border-none shadow-sm md:shadow-none ${isCapturing ? 'w-[1280px] mx-auto bg-white p-8' : ''}`}>
                            <div className="text-center mb-6 flex flex-col md:flex-row items-center justify-center gap-4 relative"><div><h1 className="text-2xl font-black uppercase text-slate-800">Thời Khóa Biểu</h1><div className="text-sm text-slate-500 font-bold mt-1">GV: {currentTeacherKey && teacherConfigs[currentTeacherKey] ? teacherConfigs[currentTeacherKey].displayName : (selectedSignatures.size > 0 ? 'Đã chọn nhiều GV' : 'Tùy chỉnh')} {selectedHomeroom && <span className="ml-2 text-amber-600">★ CN: {selectedHomeroom}</span>} {files.length > 1 && <div className="text-xs text-brand-600 mt-1">(Đang xem tổng hợp {files.length} file)</div>}</div></div><div className="md:absolute md:right-0 no-capture flex gap-2"><button onClick={() => setShowStats(true)} className="flex items-center gap-2 bg-white text-brand-600 border border-brand-200 px-4 py-2 rounded-lg text-sm font-bold hover:bg-brand-50 transition-all shadow-sm active:scale-95"><Icons.Chart /> Thống Kê</button><button onClick={handleExportImage} className="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-900 transition-all shadow-lg active:scale-95"><Icons.Camera /> Lưu Ảnh</button></div></div>
                            <div className={`tab-content ${(activeSession === 'SÁNG' || isCapturing) ? 'block' : 'hidden md:hidden print:block'}`}><div className={`${isCapturing ? 'block' : 'hidden md:block'}`}><DesktopTable session="SÁNG" finalSchedule={finalSchedule} handleInspect={handleInspect} selectedHomeroom={selectedHomeroom} /></div><div className={`${isCapturing ? 'hidden' : 'md:hidden'}`}><MobileListView session="SÁNG" finalSchedule={finalSchedule} activeMobileDay={activeMobileDay} setActiveMobileDay={setActiveMobileDay} handleInspect={handleInspect} selectedHomeroom={selectedHomeroom} /></div></div>
                            <div className={`tab-content ${(activeSession === 'CHIỀU' || isCapturing) ? 'block' : 'hidden md:hidden print:block'}`}><div className={`${isCapturing ? 'block' : 'hidden md:block'}`}><DesktopTable session="CHIỀU" finalSchedule={finalSchedule} handleInspect={handleInspect} selectedHomeroom={selectedHomeroom} /></div><div className={`${isCapturing ? 'hidden' : 'md:hidden'}`}><MobileListView session="CHIỀU" finalSchedule={finalSchedule} activeMobileDay={activeMobileDay} setActiveMobileDay={setActiveMobileDay} handleInspect={handleInspect} selectedHomeroom={selectedHomeroom} /></div></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
