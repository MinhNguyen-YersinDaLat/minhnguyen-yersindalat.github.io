<html lang="vi">
<head>

    <!-- Import Map: Khai báo các thư viện React, Framer Motion, Lucide Icons, FIREBASE -->

    {

    <!-- Babel: Trình biên dịch JSX để chạy React trực tiếp trên trình duyệt -->

    <!-- CSS Tùy chỉnh: Hiệu ứng 3D, Font chữ, Scrollbar -->
    <style>
        /* Import Font chữ dễ đọc (Quicksand) và Font học thuật (Merriweather) */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff0f5; /* Lavender Blush - Màu nền nhẹ nhàng */
            color: #4a044e; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            font-size: 18px; 
        }
        
        /* Font riêng cho phần trích dẫn học thuật (Pro/God Mode) */
        .academic-font {
            font-family: 'Merriweather', serif;
        }

        /* Tùy chỉnh thanh cuộn cho đẹp và mượt mà */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        
        /* Panel hiệu ứng kính (Glassmorphism) - Đã tối ưu hiệu năng */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            /* Lưu ý: Đã tắt backdrop-filter toàn màn hình để tránh lag trên thiết bị yếu */
            border: 2px solid #fff;
            box-shadow: 0 15px 35px -5px rgba(255, 182, 193, 0.4);
        }
        
        /* Họa tiết nền chân mèo dễ thương */
        .cat-pattern {
            background-image: 
                radial-gradient(#fbcfe8 15%, transparent 16%),
                radial-gradient(#fbcfe8 15%, transparent 16%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.3;
        }

        /* Style nút bấm 3D (Pushable Button) - Tạo cảm giác bấm thật */
        .btn-pushable {
            position: relative;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            outline-offset: 4px;
            transition: filter 250ms;
            width: 100%;
            touch-action: manipulation;
        }
        .shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            background: rgba(0,0,0,0.2);
            transform: translateY(6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
        }
        .edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            background: linear-gradient(to left, #be185d 0%, #db2777 8%, #db2777 92%, #be185d 100%);
        }
        .front {
            display: block;
            position: relative;
            padding: 18px 24px;
            border-radius: 1.5rem;
            font-size: 1.25rem;
            color: white;
            background: #ec4899;
            will-change: transform;
            transform: translateY(-6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        .btn-pushable:active .front { transform: translateY(-2px); }
        .btn-pushable:active .shadow { transform: translateY(2px); }
        .btn-pushable:focus:not(:focus-visible) { outline: none; }
        
        /* Toggle Switch Style - Nút gạt bật tắt */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #be185d;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #be185d;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        // FIXED IMPORT: Removed CloudDownload/CloudUpload, replaced with standard Upload/Download or Arrow icons
        import { 
            BookOpen, Brain, Save, Download, Upload, RefreshCw,

            ExternalLink, Repeat, SkipForward, GraduationCap, Quote, Library, Languages, Search, Bookmark, Crown,

        // =================================================================================================
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, setDoc, getDoc, serverTimestamp } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyDUJiSbxjmyvnTR1pzNzwDw2h9xr-MzPW0",
            authDomain: "thay-thaiminhnguyen.firebaseapp.com",
            projectId: "thay-thaiminhnguyen",
            storageBucket: "thay-thaiminhnguyen.firebasestorage.app",
            messagingSenderId: "407056816096",
            appId: "1:407056816096:web:7fd8d02ab9210a1a96fd85",
            measurementId: "G-9F8S1P3NQF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // =================================================================================================
        // PHẦN 1: HỆ THỐNG PROMPT (LOGIC CỐT LÕI - KHÔNG ĐƯỢC SAI SÓT)
        // Đây là phần quan trọng nhất để tạo ra chất lượng câu hỏi khác biệt.
        // =================================================================================================

        // 1.1 MASTER PROMPT BASIC: Dành cho người mới, tập trung vào từ vựng cơ bản và phản xạ
        const MASTER_PROMPT_BASIC = `
YOU ARE A WORLD-CLASS ENGLISH TEACHER (IELTS EXAMINER).
Your task is to generate a high-quality, academic English dataset for a learning app based on the user's topic.

### INPUT PARAMETERS:
- **Topic**: "{TOPIC}"
- **Target Level**: "{LEVEL}" (CEFR/IELTS Scale)
- **Content Context**: "{CONTENT}"
- **Quantity**: {NUM} questions.

### STRICT OUTPUT RULES (DO NOT VIOLATE):
1. **Output Format**: PURE JSON ARRAY only. Do NOT output markdown code blocks (no \`\`\`json). Do NOT output any introductory text. Just the raw array.
2. **JSON Safety Rule**: When writing explanations or definitions in JSON strings, YOU MUST USE SINGLE QUOTES (') for emphasis or internal quoting. **NEVER** use double quotes (") inside a JSON value string as it breaks the format.
   - *Bad Example*: "explanation": "She said "Hello"."
   - *Good Example*: "explanation": "She said 'Hello'."
3. **Language**: 
   - Questions & Options: Academic English.
   - Explanations & Vocabulary Meanings: **VIETNAMESE** (Tiếng Việt).
4. **Vocabulary Quantity**: You must extract **3 to 5 important vocabulary words** per question. Do not just give 1 word.

### QUESTION TYPES & STRUCTURE:
1. **"mc" (Multiple Choice)**: 4 options. Randomize the correct answer position (0-3).
2. **"tf" (True/False)**: Statement. Answer is boolean (true/false).
3. **"fill" (Fill in the Blank)**: Sentence with one blank (___). Answer is the missing word string.
4. **"order" (Sentence Scramble)**:
   - Question: A list of scrambled words separated by slashes (e.g., "is / a / Earth / planet").
   - Answer: **THE FULL CORRECT SENTENCE STRING** (e.g., "Earth is a planet"). Do NOT return an array of numbers.

### JSON STRUCTURE EXAMPLE (Follow strictly):
[
  {
    "type": "mc",
    "question": "Which of the following best describes...?",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "answer": 2,
    "explanation": "Giải thích chi tiết tại sao chọn đáp án này bằng tiếng Việt...",
    "vocabulary": [
        "Word1: Nghĩa tiếng Việt",
        "Word2: Nghĩa tiếng Việt",
        "Word3: Nghĩa tiếng Việt"
    ]
  },
  {
    "type": "order",
    "question": "important / is / Vocabulary / very",
    "options": [],
    "answer": "Vocabulary is very important",
    "explanation": "Giải thích cấu trúc ngữ pháp...",
    "vocabulary": ["Vocabulary: Từ vựng"]
  }
]
`;

        // 1.2 MASTER PROMPT ACADEMIC (PRO): Dành cho nghiên cứu, có trích dẫn nguồn và IPA
        const MASTER_PROMPT_ACADEMIC = `
YOU ARE A LINGUISTICS PROFESSOR & LEXICOGRAPHER (OXFORD/CAMBRIDGE).
Your task is to generate a DEEP ACADEMIC DATASET with CITATIONS and DETAILED LEXICAL ANALYSIS.

### INPUT PARAMETERS:
- **Topic**: "{TOPIC}"
- **Target Level**: "{LEVEL}" (IELTS Standard)
- **Context**: "{CONTENT}"
- **Quantity**: {NUM} questions.

### CRITICAL OUTPUT REQUIREMENTS (MUST FOLLOW):
1. **Output Format**: PURE JSON ARRAY only. NO markdown blocks.
2. **JSON Safety (VERY IMPORTANT)**: When providing explanations, examples, or sources in JSON strings, YOU MUST USE SINGLE QUOTES (') for emphasis or internal quoting. DO NOT use double quotes (") inside value strings to avoid breaking JSON syntax.
3. **Citation Requirement**: You MUST fabricate or attribute a realistic academic source/context for each question (e.g., "Adapted from The Guardian", "Based on Cambridge IELTS 15", "Science Daily", "BBC Future").
4. **Lexical Depth**: Vocabulary MUST be an Array of Objects including IPA, Word Type, and detailed definition. **EXTRACT 3-5 ADVANCED WORDS per question.**

### QUESTION TYPES:
- **"mc"**: Multiple Choice (0-3).
- **"tf"**: True/False (boolean).
- **"fill"**: Fill blank (string).
- **"order"**: Sentence Scramble (Answer MUST be a complete STRING).

### JSON STRUCTURE (STRICTLY FOLLOW THIS SCHEMA):
[
  {
    "type": "mc",
    "question": "The question text...",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "answer": 2, 
    "explanation": "Analyze in VIETNAMESE. Explain why the answer fits the context and why others are wrong. Use 'single quotes' for specific terms.",
    "academic_info": {
        "source_ref": "Adapted from [Source Name], [Year/Context]",
        "grammar_point": "Focus grammar point (e.g., Inversion, Passive Voice)"
    },
    "vocabulary": [
      {
        "word": "Ubiquitous",
        "ipa": "/juːˈbɪk.wɪ.təs/",
        "type": "adj",
        "meaning_vn": "Phổ biến ở mọi nơi",
        "example": "Plastic containers are 'ubiquitous' nowadays.",
        "collocation": "become ubiquitous"
      },
      {
        "word": "Detrimental",
        "ipa": "/ˌdet.rɪˈmen.təl/",
        "type": "adj",
        "meaning_vn": "Có hại, gây bất lợi",
        "example": "Smoking has a 'detrimental' effect on health.",
        "collocation": "detrimental to"
      }
    ]
  },
  {
    "type": "order",
    "question": "scrambled / sentence / words / here",
    "options": [],
    "answer": "The correct complete sentence string here.",
    "explanation": "Detailed Vietnamese explanation...",
    "academic_info": { "source_ref": "Reference..." },
    "vocabulary": []
  }
]
`;

        // 1.3 MASTER PROMPT EXAMINER (GOD MODE): Siêu khó, bẫy từ vựng và sắc thái, dành cho Band 9.0
        const MASTER_PROMPT_EXAMINER = `
YOU ARE A STRICT IELTS BAND 9.0 EXAMINER & LINGUISTICS EXPERT.
Your task is to generate a "GOD TIER" DIFFICULTY DATASET that tests NUANCE, REGISTER, and COLLOCATION flexibility.

### INPUT PARAMETERS:
- **Topic**: "{TOPIC}"
- **Target Level**: BAND 9.0 (Native/Expert)
- **Context**: "{CONTENT}"
- **Quantity**: {NUM} questions.

### CRITICAL RULES FOR EXAMINER MODE:
1. **The "Trap" (Distractors)**: For Multiple Choice ("mc"), ALL options must be GRAMMATICALLY CORRECT or very close synonyms. The user must choose the BEST fit based on *Context*, *Collocation*, or *Tone* (Formal vs Informal).
   - *Example*: "The CEO [refuted/denied/rejected] the allegations." -> User must pick the most precise one for legal/formal contexts.
2. **Examiner Explanation**: The explanation (in VIETNAMESE) must analyze WHY the chosen word is better than the others (e.g., "A is too informal", "B is grammatically correct but unnatural here", "C is the standard collocation").
3. **JSON Safety**: Use SINGLE QUOTES (') inside value strings. NO double quotes.
4. **Format**: Same detailed JSON structure as Academic Mode (include 'academic_info' and rich 'vocabulary').

### JSON STRUCTURE:
[
  {
    "type": "mc",
    "question": "Despite the evidence, the suspect ______ that he had been at the scene.",
    "options": ["refused", "denied", "rejected", "declined"],
    "answer": 1, 
    "explanation": "Đáp án đúng là 'denied' (phủ nhận cáo buộc). 'Refused' thường đi với to-infinitive (từ chối làm gì). 'Rejected' mang nghĩa bác bỏ đề xuất. 'Declined' là từ chối lịch sự lời mời. Đây là bẫy về Collocation và Semantic Nuance.",
    "academic_info": { "source_ref": "Cambridge Advanced Learner's Dictionary", "grammar_point": "Reporting Verbs Nuance" },
    "vocabulary": [ { "word": "Deny", "ipa": "/dɪˈnaɪ/", "type": "verb", "meaning_vn": "Phủ nhận", "example": "He 'denied' all responsibility.", "collocation": "strenuously deny" } ]
  }
]
`;

        // =================================================================================================
        // PHẦN 2: HOOKS & UTILITIES (CÔNG CỤ HỖ TRỢ)
        // =================================================================================================

        // --- TTS HOOK (Text-to-Speech) - Đọc văn bản tiếng Anh ---
        const useTTS = () => {
            const speak = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel(); 
                // Xử lý chuỗi trước khi đọc: thay thế gạch dưới bằng "blank", bỏ dấu gạch chéo
                const cleanText = text.replace(/_+/g, ' blank ').replace(/\//g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            };
            return { speak };
        };

        // --- SOUND MANAGER - Quản lý âm thanh hiệu ứng ---
        const useSound = () => {
            const [isMuted, setIsMuted] = useState(false);
            const sounds = {
                correct: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3',
                wrong: 'https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3',
                click: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3',
                win: 'https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'
            };
            const play = (type) => {
                if (isMuted) return;
                try {
                    const audio = new Audio(sounds[type]);
                    audio.volume = 0.5;
                    audio.play().catch(e => {});
                } catch (e) {}
            };
            return { isMuted, setIsMuted, play };
        };

        // --- STORAGE MANAGER - Lưu trữ dữ liệu LocalStorage an toàn ---
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) { console.error(error); }
            };
            return [storedValue, setValue];
        };

        // --- HELPER: CHECK ANSWER (KIỂM TRA ĐÁP ÁN THÔNG MINH) ---
        const checkAnswer = (type, userAns, correctAns) => {
            // 1. MC (Trắc nghiệm): So sánh Index (0, 1, 2, 3)
            if (type === 'mc') return Number(userAns) === Number(correctAns);
            // 2. TF (Đúng/Sai): Xử lý cả Boolean và số 0/1 phòng khi AI trả về lạ
            if (type === 'tf') {
                if (typeof userAns === 'boolean') {
                    if (typeof correctAns === 'boolean') return userAns === correctAns;
                    if (typeof correctAns === 'number') return (userAns === true && correctAns === 1) || (userAns === false && correctAns === 0); 
                }
                return String(userAns).toLowerCase() === String(correctAns).toLowerCase();
            }
            // 3. Fill/Order: So sánh chuỗi (Xóa khoảng trắng thừa, không phân biệt hoa thường)
            if (type === 'fill' || type === 'order') return String(userAns).trim().toLowerCase() === String(correctAns).trim().toLowerCase();
            return false;
        };

        // =================================================================================================
        // PHẦN 3: VISUAL COMPONENTS (GIAO DIỆN NGƯỜI DÙNG)
        // =================================================================================================

        // 3.1 Background Animation - Nền hoạt hình dễ thương
        const CuteBackground = () => (
            <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden bg-gradient-to-br from-purple-50 via-pink-50 to-white">
                <div className="absolute inset-0 cat-pattern"></div>
                <motion.div animate={{ y: [0, -15, 0], rotate: [0, 5, 0] }} transition={{ duration: 6, repeat: Infinity }} className="absolute top-10 left-[10%] text-5xl opacity-20 filter blur-[1px]">🐾</motion.div>
                <motion.div animate={{ y: [0, 20, 0], rotate: [0, -10, 0] }} transition={{ duration: 7, repeat: Infinity }} className="absolute bottom-20 right-[15%] text-6xl opacity-20 filter blur-[1px]">🧶</motion.div>
                <motion.div animate={{ scale: [1, 1.1, 1] }} transition={{ duration: 5, repeat: Infinity }} className="absolute top-1/2 right-10 text-4xl opacity-20">✨</motion.div>
            </div>
        );

        // 3.2 Smart Vocab Display: Hiển thị từ vựng thông minh (Xử lý cả Basic String và Pro Object)
        const SmartVocabDisplay = ({ vocabList, speak }) => {
            if (!vocabList || vocabList.length === 0) return null;

            return (
                <div className="bg-yellow-50 p-5 rounded-2xl border border-yellow-100 text-left mt-4">
                    <h4 className="flex items-center gap-2 font-bold text-yellow-600 text-base mb-3"><Sparkles size={20}/> Vocabulary & Collocation:</h4>
                    <div className="space-y-3">
                        {vocabList.map((v, i) => {
                            // Trường hợp 1: Basic Mode (Chuỗi "Word: Nghĩa")
                            if (typeof v === 'string') {
                                return (
                                    <button key={i} onClick={() => speak(v.split(':')[0])} className="bg-white px-3 py-1.5 rounded-lg text-base font-bold text-slate-700 shadow-sm border border-yellow-200 hover:bg-yellow-100 transition flex items-center gap-1 mr-2 mb-2 inline-flex">
                                        {v} <Volume2 size={16} className="text-yellow-500 opacity-50 hover:opacity-100"/>
                                    </button>
                                );
                            } else {
                                // Trường hợp 2: Pro/God Mode (Object chi tiết)
                                return (
                                    <div key={i} className="bg-white p-3 rounded-xl border border-yellow-200 shadow-sm flex flex-col md:flex-row gap-3 items-start md:items-center">
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => speak(v.word)} className="p-2 bg-yellow-100 text-yellow-600 rounded-full hover:bg-yellow-200 transition flex-shrink-0"><Volume2 size={18}/></button>
                                            <div>
                                                <div className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                                    {v.word} 
                                                    {v.type && <span className="text-xs font-normal text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded font-mono">{v.type}</span>}
                                                </div>
                                                <div className="text-sm text-slate-500 font-mono">{v.ipa}</div>
                                            </div>
                                        </div>
                                        <div className="flex-1 border-l-0 md:border-l-2 border-yellow-100 md:pl-3">
                                            <div className="font-bold text-slate-700">{v.meaning_vn}</div>
                                            {v.example && <div className="text-xs text-slate-500 italic mt-1">Ex: "{v.example}"</div>}
                                            {v.collocation && <div className="text-xs text-blue-500 font-bold mt-0.5">Collo: {v.collocation}</div>}
                                        </div>
                                    </div>
                                );
                            }
                        })}
                    </div>
                </div>
            );
        };

        // 3.3 Feedback Popup: Thông báo kết quả (Đã tối ưu không lag và to trên PC)
        const FeedbackPopup = ({ feedback, data, onNext, isLast, playSound }) => {
            if (!feedback) return null;
            const { speak } = useTTS();

            useEffect(() => {
                if(feedback.isCorrect) playSound('correct');
                else playSound('wrong');
            }, []);

            return (
                // OPTIMIZATION: Tắt backdrop-blur để không lag trên máy yếu
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80">
                    <motion.div 
                        // OPTIMIZATION: Dùng tween animation nhanh gọn, không nhún nhảy (spring) gây nặng
                        initial={{ scale: 0.9, opacity: 0 }} 
                        animate={{ scale: 1, opacity: 1 }}
                        exit={{ scale: 0.9, opacity: 0 }}
                        transition={{ duration: 0.2, ease: "easeOut" }}
                        // OPTIMIZATION: max-w-4xl để popup to đẹp trên PC
                        className="w-full max-w-xl md:max-w-4xl relative"
                    >
                        <div className="absolute -top-16 left-1/2 -translate-x-1/2 z-20">

                            </motion.div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white pt-20 pb-8 px-8 relative max-h-[80vh] md:max-h-[90vh] flex flex-col">
                            <div className={`absolute top-0 left-0 w-full h-28 opacity-20 ${feedback.isCorrect ? 'bg-green-400' : 'bg-rose-400'}`}></div>

                            <div className="text-center relative z-10 flex-shrink-0">
                                <h3 className={`text-4xl font-black mb-2 tracking-tight ${feedback.isCorrect ? 'text-green-600' : 'text-rose-600'}`}>
                                    {feedback.isCorrect ? 'CHÍNH XÁC!' : 'SAI RỒI!'}
                                </h3>
                                <p className="text-slate-400 font-bold text-sm mb-6">{feedback.isCorrect ? 'Giỏi quá đi sen ơi!' : 'Không sao, xem giải thích nào!'}</p>
                            </div>

                            <div className="overflow-y-auto custom-scrollbar space-y-4 px-2 flex-1">
                                {!feedback.isCorrect && (
                                    <div className="bg-rose-50 p-4 rounded-2xl border border-rose-100 text-center">
                                        <div className="text-xs text-rose-400 font-bold uppercase mb-1">Đáp án đúng</div>
                                        <div className="text-2xl font-black text-rose-600">
                                            {data.type === 'mc' ? data.options[data.answer] : (
                                                data.type === 'tf' ? (data.answer ? "TRUE" : "FALSE") : String(data.answer)
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* ACADEMIC SOURCE CITATION (Hiện khi có dữ liệu nguồn - Pro/God Mode) */}
                                {data.academic_info && data.academic_info.source_ref && (
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex items-start gap-3">

                                            <div className="text-xs font-bold text-slate-400 uppercase">Nguồn trích dẫn / Reference</div>
                                            <div className="text-sm font-serif italic text-slate-600 academic-font">{data.academic_info.source_ref}</div>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 text-left">
                                    <h4 className="flex items-center gap-2 font-bold text-blue-600 text-base mb-2"><Info size={20}/> Giải thích IELTS:</h4>
                                    <p className="text-slate-700 text-lg leading-relaxed font-medium">{data.explanation}</p>
                                </div>

                                <SmartVocabDisplay vocabList={data.vocabulary} speak={speak} />
                            </div>

                            <div className="mt-6 pt-4 border-t border-slate-100 flex-shrink-0">
                                <button onClick={() => { playSound('click'); onNext(); }} className="btn-pushable w-full">
                                    <span className="shadow"></span>
                                    <span className="edge"></span>
                                    <span className="front flex items-center justify-center gap-2">
                                        {isLast ? "XEM KẾT QUẢ" : "CÂU TIẾP THEO"} <ArrowRight/>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // 3.4 Personal Dictionary: Từ điển cá nhân (Tự động tổng hợp từ lịch sử)
        const PersonalDictionary = ({ history, onBack, sound }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const { speak } = useTTS();

            // Logic: Quét toàn bộ lịch sử, chuẩn hóa từ vựng, lọc trùng và sắp xếp A-Z
            const allVocab = useMemo(() => {
                const map = new Map();
                
                history.forEach(session => {
                    if (!session.details) return;
                    session.details.forEach(detail => {
                        if (!detail.vocab) return;
                        detail.vocab.forEach(v => {
                            let item;
                            // Chuẩn hóa dữ liệu từ 2 nguồn (Basic string và Pro object)
                            if (typeof v === 'string') {
                                const parts = v.split(':');
                                const word = parts[0].trim();
                                const meaning = parts.slice(1).join(':').trim();
                                item = { 
                                    word, 
                                    meaning_vn: meaning, 
                                    type: '', 
                                    ipa: '', 
                                    source: 'Basic Mode', 
                                    isPro: false 
                                };
                            } else {
                                item = { 
                                    ...v, 
                                    source: 'Pro Mode',
                                    isPro: true
                                };
                            }
                            
                            const key = item.word.toLowerCase();
                            
                            // Logic ưu tiên: Nếu từ chưa có -> thêm vào. 
                            // Nếu có rồi mà từ mới là Pro (chi tiết hơn) -> ghi đè từ cũ (Basic).
                            if (!map.has(key)) {
                                map.set(key, item);
                            } else {
                                const existing = map.get(key);
                                if (!existing.isPro && item.isPro) {
                                    map.set(key, item);
                                }
                            }
                        });
                    });
                });

                return Array.from(map.values()).sort((a, b) => a.word.localeCompare(b.word));
            }, [history]);

            // Filter logic (Tìm kiếm Anh hoặc Việt)
            const filteredVocab = allVocab.filter(v => 
                v.word.toLowerCase().includes(searchTerm.toLowerCase()) || 
                v.meaning_vn.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="w-full max-w-5xl mx-auto p-4 md:p-8 min-h-screen flex flex-col relative z-10">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <button onClick={() => { sound.play('click'); onBack(); }} className="self-start flex items-center text-slate-500 hover:text-rose-500 font-bold gap-2 bg-white px-5 py-3 rounded-full shadow-sm hover:bg-rose-50 transition">

                        </button>
                        <h1 className="text-3xl md:text-4xl font-black text-rose-600 flex items-center gap-3">
                            <Bookmark className="fill-current"/> TỪ ĐIỂN CỦA TÔI
