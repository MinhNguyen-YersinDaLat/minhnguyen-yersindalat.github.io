        const STANDARD_SUBJECTS = ["Toán học", "Vật lý", "Hóa học", "Sinh học", "Tin học", "Ngữ văn", "Lịch sử", "Địa lí", "Ngoại ngữ", "Giáo dục thể chất", "Giáo dục quốc phòng và an ninh", "Công nghệ", "Nội dung giáo dục của địa phương", "Hoạt động trải nghiệm, hướng nghiệp", "Giáo dục kinh tế và pháp luật", "Chào cờ", "Sinh hoạt lớp", "Tự chọn", "KT/Tự học", "Đọc sách"];
        const VNEDU_SUGGESTIONS = ["KT/Tự học", "Hoạt động trải nghiệm, hướng nghiệp", "Sinh hoạt lớp", "Chào cờ", "Ngoại khóa", "Tự chọn", "Toán học", "Ngữ văn", "Đọc sách"];

        const PREFERRED_ORDER = [
            "10H", "10A1", "10A2", "10A3", "10H'", 
            "11H", "11B1", "11B2", "11B3", "11B4", "11B5", "11H'", "11B5'",
            "12C1", "12C2", "12C3", "12C4", "12C5"
        ];

        // --- GLOBAL HELPER FUNCTIONS ---
        
        async function processFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
                        if (worksheet['!merges']) {
                            worksheet['!merges'].forEach(range => {
                                const startRow = range.s.r; const startCol = range.s.c; const endRow = range.e.r; const endCol = range.e.c;
                                let cellValue = null;
                                if (rawData[startRow] && rawData[startRow][startCol] !== undefined) cellValue = rawData[startRow][startCol];
                                for (let r = startRow; r <= endRow; r++) {
                                    if (!rawData[r]) rawData[r] = []; 
                                    for (let c = startCol; c <= endCol; c++) rawData[r][c] = cellValue;
                                }
                            });
                        }
                        resolve(rawData);
                    } catch (error) { reject(error); }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function stripTeacherName(rawSubject) {
            if (!rawSubject) return null;
            let s = String(rawSubject).trim();
            if (!s) return null;
            const upperS = s.toUpperCase();
            const junkKeywords = ["HIỆU TRƯỞNG", "PHÓ HIỆU TRƯỞNG", "P. HIỆU TRƯỞNG", "P.HT", "BGH", "NGƯỜI LẬP", "LẬP BẢNG", "DUYỆT", "KÝ TÊN", "ĐÓNG DẤU", "NGÀY", "THÁNG", "NĂM"];
            if (junkKeywords.some(kw => upperS.includes(kw))) return null; 
            const separators = ['-', '–', '\n', '('];
            let splitIndex = -1;
            for (let sep of separators) {
                const idx = s.indexOf(sep);
                if (idx !== -1 && (splitIndex === -1 || idx < splitIndex)) splitIndex = idx;
            }
            if (splitIndex !== -1) s = s.substring(0, splitIndex).trim();
            return s;
        }

        function predictVnEduName(cleanSubject) {
            const s = cleanSubject;
            const upperS = s.toUpperCase();
            if (upperS === 'TOÁN') return { name: 'Toán học', category: 'standard' };
            if (upperS === 'LÝ' || upperS === 'VẬT LÝ') return { name: 'Vật lý', category: 'standard' };
            if (upperS === 'HÓA' || upperS === 'HÓA HỌC') return { name: 'Hóa học', category: 'standard' };
            if (upperS === 'SINH' || upperS === 'SINH HỌC') return { name: 'Sinh học', category: 'standard' };
            if (upperS === 'TIN' || upperS === 'TIN HỌC') return { name: 'Tin học', category: 'standard' };
            if (upperS === 'VĂN' || upperS === 'NGỮ VĂN') return { name: 'Ngữ văn', category: 'standard' };
            if (upperS === 'SỬ' || upperS === 'LỊCH SỬ') return { name: 'Lịch sử', category: 'standard' };
            if (upperS === 'ĐỊA' || upperS === 'ĐỊA LÍ' || upperS === 'ĐỊA LÝ') return { name: 'Địa lí', category: 'standard' };
            if (upperS === 'ANH' || upperS === 'TIẾNG ANH' || upperS === 'NGOẠI NGỮ') return { name: 'Ngoại ngữ', category: 'standard' };
            if (upperS === 'TD' || upperS === 'THỂ DỤC' || upperS === 'GDTC') return { name: 'Giáo dục thể chất', category: 'standard' };
            if (upperS === 'QP' || upperS === 'QPAN' || upperS === 'GDQP') return { name: 'Giáo dục quốc phòng và an ninh', category: 'standard' };
            if (upperS === 'CN' || upperS === 'CÔNG NGHỆ') return { name: 'Công nghệ', category: 'standard' };
            if (upperS === 'GDĐP') return { name: 'Nội dung giáo dục của địa phương', category: 'standard' };
            if (upperS === 'CC' || upperS === 'CHÀO CỜ') return { name: 'Chào cờ', category: 'standard' };
            if (upperS === 'SH' || upperS === 'SHL') return { name: 'Sinh hoạt lớp', category: 'standard' };
            if (upperS === 'ĐS' || upperS === 'ĐỌC SÁCH') return { name: 'Đọc sách', category: 'standard' };
            
            // Updates here:
            if (upperS.includes("SHTT") || upperS.includes("TNHN") || upperS.includes("HĐTN")) return { name: "Hoạt động trải nghiệm, hướng nghiệp", category: 'exception' };
            if (upperS.includes("GDKTPL")) return { name: "Giáo dục kinh tế và pháp luật", category: 'standard' }; 
            
            if (upperS.includes("KTTX")) return { name: "KT/Tự học", category: 'exception' };
            if (upperS.includes("TƯ VẤN") || upperS.includes("HƯỚNG NGHIỆP")) return { name: "KT/Tự học", category: 'exception' };
            if (upperS.includes("ÔN THI TN") || upperS.includes("ÔN TN") || /-\s*C\d/.test(upperS) || /-\s*TN/.test(upperS) || (upperS.includes("KTPL") && upperS.includes("C5"))) return { name: "Ôn TN", category: 'exception' };
            if (upperS.includes("NGOẠI KHÓA") || upperS.includes("20/11") || upperS.includes("HỘI THAO")) return { name: "Hoạt động trải nghiệm, hướng nghiệp", category: 'exception' };
            return { name: s, category: 'exception' };
        }

        function customClassSort(a, b) {
            // Priority order for specific classes
            const indexA = PREFERRED_ORDER.indexOf(a);
            const indexB = PREFERRED_ORDER.indexOf(b);

            if (indexA !== -1 && indexB !== -1) return indexA - indexB;
            if (indexA !== -1) return -1;
            if (indexB !== -1) return 1;

            // Fallback: Smart alphanumeric sort
            return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
        }

        // --- HELPER FOR SPLIT CLASSES ---
        const processCellContent = (rawContent, isClone) => {
            if (!rawContent) return null;
            const parts = String(rawContent).split(/\r?\n/);
            if (parts.length > 1) {
                const part = isClone ? parts[1] : parts[0];
                return part ? part.trim() : null;
            } else {
                return String(rawContent).trim();
            }
        };

        // --- COMPONENTS ---

        const FloatingIcons = () => {
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            useEffect(() => {
                const handleMouseMove = (e) => {
                    const x = (e.clientX - window.innerWidth / 2) / 30; 
                    const y = (e.clientY - window.innerHeight / 2) / 30;
                    setOffset({ x, y });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="absolute inset-0 overflow-hidden pointer-events-none">
                    <div className="floating-icon animate-float-slow" style={{ top: '15%', left: '10%', transform: `translate(${offset.x * -1}px, ${offset.y * -1}px)` }}><Icon path={paths.math} size={64} /></div>
                    <div className="floating-icon animate-float-medium" style={{ top: '25%', right: '12%', transform: `translate(${offset.x}px, ${offset.y}px)` }}><Icon path={paths.book} size={48} /></div>
                    <div className="floating-icon animate-float-fast" style={{ bottom: '20%', left: '20%', transform: `translate(${offset.x * 0.5}px, ${offset.y * 0.5}px)` }}><Icon path={paths.file} size={72} /></div>
                    <div className="floating-icon animate-float-slow" style={{ bottom: '30%', right: '10%', transform: `translate(${offset.x * -0.8}px, ${offset.y * -0.8}px)` }}><Icon path={paths.zap} size={56} /></div>
                    <div className="floating-icon animate-float-medium" style={{ top: '60%', left: '50%', transform: `translate(${offset.x * 0.2}px, ${offset.y * 0.2}px)` }}><Icon path={paths.settings} size={40} /></div>
                </div>
            );
        };

        const HologramFooter = () => {
            const cardRef = useRef(null);
            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const centerX = rect.width / 2; const centerY = rect.height / 2;
                const rotateX = (centerY - y) / 10; const rotateY = (x - centerX) / 10;
                cardRef.current.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
            };
            const handleMouseLeave = () => { if (cardRef.current) cardRef.current.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)'; };
            return (
                <footer className="py-6 flex justify-center z-10 relative flex-shrink-0">
                    <div ref={cardRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} className="holo-card px-8 py-3 bg-white/30 dark:bg-black/30 backdrop-blur-md rounded-2xl border border-white/40 dark:border-white/10 shadow-lg text-center cursor-default transition-transform duration-200">
                        <p className="text-xs text-gray-500 dark:text-gray-400 font-medium tracking-wide">
                            Phát triển bởi <span className="text-yersin-600 dark:text-yersin-400 font-bold uppercase">Thầy Thái Minh Nguyên</span> - TRƯỜNG TH, THCS & THPT YERSIN ĐÀ LẠT
                        </p>
                    </div>
                </footer>
            );
        };

        const StepIndicator = ({ currentStep }) => {
            const steps = [ { num: 1, label: 'Tải File' }, { num: 2, label: 'Định Chuẩn' }, { num: 3, label: 'Sắp Lớp' }, { num: 4, label: 'Xem & Sửa' }, { num: 5, label: 'Hoàn Tất' } ];
            let activeStepIdx = 0;
            if (currentStep === 1.5) activeStepIdx = 1;
            if (currentStep === 1.8) activeStepIdx = 2; 
            if (currentStep === 2) activeStepIdx = 3; 
            if (currentStep === 3) activeStepIdx = 4; 

            return (
                <div className="w-full max-w-4xl mx-auto mb-6 px-4 relative z-20 flex-shrink-0">
                    <div className="flex items-center justify-between relative">
                        <div className="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-white/30 dark:bg-white/10 -z-10 rounded-full"></div>
                        <div className="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-yersin-500 rounded-full transition-all duration-1000 ease-out" style={{ width: `${(activeStepIdx / 4) * 100}%` }}></div>
                        {steps.map((s, idx) => (
                            <div key={idx} className="flex flex-col items-center bg-transparent">
                                <div className={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-bold text-xs md:text-sm transition-all duration-500 border-2 ${idx <= activeStepIdx ? 'bg-yersin-500 border-yersin-500 text-white shadow-lg shadow-yersin-200 scale-110' : 'bg-white/80 dark:bg-slate-800 dark:border-slate-600 border-gray-300 text-gray-400'}`}>{s.num}</div>
                                <span className={`mt-2 text-[9px] md:text-xs font-medium transition-colors duration-500 ${idx <= activeStepIdx ? 'text-yersin-700 dark:text-yersin-400' : 'text-gray-400 dark:text-slate-500'}`}>{s.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [step, setStep] = useState(0); 
            const [sourceFile, setSourceFile] = useState(null);
            const [rawData, setRawData] = useState(null);
            const [resultData, setResultData] = useState(null);
            const [previewData, setPreviewData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [mappingTable, setMappingTable] = useState({});
            const [subjectCategories, setSubjectCategories] = useState({});
            const [activeTab, setActiveTab] = useState('standard');
            const [config, setConfig] = useState({ stripTeacher: true, outputFileName: 'vnedu_import_final.xls' });
            
            // New State for Class Ordering and Splitting
            const [classList, setClassList] = useState([]);
            const [colMapGlobal, setColMapGlobal] = useState({});
            const [splitClasses, setSplitClasses] = useState(new Set()); // To track which classes are split

            useEffect(() => {
                if (darkMode) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const savedMappings = localStorage.getItem('vnedu_mappings');
                if (savedMappings) { try { setMappingTable(JSON.parse(savedMappings)); } catch (e) {} }
            }, []);

            const fireConfetti = () => {
                var count = 200;
                var defaults = { origin: { y: 0.7 } };
                function fire(particleRatio, opts) {
                    confetti(Object.assign({}, defaults, opts, {
                        particleCount: Math.floor(count * particleRatio)
                    }));
                }
                fire(0.25, { spread: 26, startVelocity: 55, colors: ['#f97316', '#ffffff'] });
                fire(0.2, { spread: 60, colors: ['#ea580c', '#fbbf24'] });
                fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8, colors: ['#ffffff', '#f97316'] });
                fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2, colors: ['#f97316'] });
                fire(0.1, { spread: 120, startVelocity: 45, colors: ['#fbbf24'] });
            };

            const handleFileDrop = (e) => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (file) setSourceFile(file); };
            const handleFileSelect = (e) => { const file = e.target.files[0]; if (file) setSourceFile(file); };

            const handleAnalyze = async () => {
                if (!sourceFile) return;
                setIsLoading(true); setError(null);
                
                const originalName = sourceFile.name;
                let newFileName = 'vnedu_import.xls';
                const match = originalName.match(/tu[^\d]*(\d+)/i);
                if (match) newFileName = `VnEdu_Import_Tuan${match[1]}_Yersin.xls`;
                else { const baseName = originalName.split('.').slice(0, -1).join('.'); newFileName = `VnEdu_Import_${baseName}.xls`; }
                setConfig(prev => ({ ...prev, outputFileName: newFileName }));

                try {
                    const data = await processFile(sourceFile);
                    setRawData(data);
                    
                    const uniqueSubjects = new Set();
                    let headerRowIndex = -1; let colMap = {};
                    for (let i = 0; i < data.length; i++) {
                        const row = data[i];
                        if (row && row.some(cell => cell && typeof cell === 'string' && cell.toLowerCase().includes('thứ'))) {
                            headerRowIndex = i;
                            for (let j = 0; j < row.length; j++) {
                                const cellVal = row[j];
                                if (cellVal && typeof cellVal === 'string' && /^\d+[A-Z]/.test(cellVal)) colMap[cellVal] = j;
                            }
                            break;
                        }
                    }
                    if (headerRowIndex === -1) throw new Error("Không tìm thấy tiêu đề (Thứ, Buổi, Tiết...).");

                    const foundClasses = Object.keys(colMap);
                    
                    // --- SPLIT LOGIC START ---
                    const foundSplitClasses = new Set();
                    
                    for (let i = headerRowIndex + 1; i < data.length; i++) {
                        const row = data[i];
                        if (!row || row.length === 0) continue;
                        
                        foundClasses.forEach(className => {
                            const rawContent = row[colMap[className]];
                            if (rawContent && String(rawContent).includes('\n')) {
                                foundSplitClasses.add(className);
                            }
                            if (rawContent) {
                                const parts = String(rawContent).split(/\r?\n/);
                                parts.forEach(part => {
                                    const strippedName = stripTeacherName(part);
                                    if (strippedName) uniqueSubjects.add(strippedName);
                                });
                            }
                        });
                    }
                    
                    setSplitClasses(foundSplitClasses);
                    setColMapGlobal(colMap);

                    let expandedClassList = [];
                    foundClasses.forEach(cls => {
                        expandedClassList.push(cls);
                        if (foundSplitClasses.has(cls)) {
                            expandedClassList.push(cls + "'");
                        }
                    });
                    
                    expandedClassList.sort(customClassSort);
                    setClassList(expandedClassList);
                    // --- SPLIT LOGIC END ---

                    const initialMapping = { ...mappingTable }; 
                    const initialCategories = {};
                    uniqueSubjects.forEach(subj => {
                        const prediction = predictVnEduName(subj);
                        
                        // Logic mới: Nếu là môn chuẩn đã được định nghĩa trong code, luôn ưu tiên dùng tên chuẩn
                        if (prediction.category === 'standard') {
                            initialMapping[subj] = prediction.name;
                        } 
                        // Nếu chưa có trong cache thì dùng dự đoán (cho môn ngoại lệ)
                        else if (!initialMapping[subj]) {
                            initialMapping[subj] = prediction.name;
                        }
                        
                        initialCategories[subj] = prediction.category;
                    });
                    setMappingTable(initialMapping);
                    setSubjectCategories(initialCategories);
                    setStep(1.5);
                } catch (err) { console.error(err); setError(err.message || "Lỗi xử lý file."); } finally { setIsLoading(false); }
            };

            const autoSortClasses = () => {
                const sorted = [...classList].sort(customClassSort);
                setClassList(sorted);
            };

            const moveClass = (index, direction) => {
                if ((direction === -1 && index === 0) || (direction === 1 && index === classList.length - 1)) return;
                const newList = [...classList];
                const temp = newList[index];
                newList[index] = newList[index + direction];
                newList[index + direction] = temp;
                setClassList(newList);
            };

            const removeClass = (index) => {
                 const newList = classList.filter((_, i) => i !== index);
                 setClassList(newList);
            };

            const generatePreview = () => {
                try {
                    localStorage.setItem('vnedu_mappings', JSON.stringify(mappingTable));
                    let headerRowIndex = -1;
                    for (let i = 0; i < rawData.length; i++) {
                        const row = rawData[i];
                        if (row && row.some(cell => cell && typeof cell === 'string' && cell.toLowerCase().includes('thứ'))) {
                            headerRowIndex = i;
                            break;
                        }
                    }
                    
                    const extractedData = {}; 
                    classList.forEach(cls => { extractedData[cls] = {}; });
                    
                    let currentDay = ''; let currentSession = '';
                    
                    for (let i = headerRowIndex + 1; i < rawData.length; i++) {
                        const row = rawData[i];
                        if (!row || row.length === 0) continue;
                        const dayCell = row[0]; if (dayCell) currentDay = String(dayCell).trim();
                        const sessionCell = row[1]; if (sessionCell) currentSession = String(sessionCell).trim();
                        let periodRaw = row[2]; if (periodRaw === undefined || periodRaw === null) continue;
                        let periodNum = parseInt(periodRaw); if (isNaN(periodNum)) continue;
                        
                        let normalizedSession = 'S'; let normalizedPeriod = periodNum;
                        if (periodNum >= 6) { normalizedSession = 'C'; normalizedPeriod = periodNum - 5; }
                        else { if (currentSession && currentSession.toUpperCase().includes('CHIỀU')) normalizedSession = 'C'; else normalizedSession = 'S'; }
                        
                        classList.forEach(className => {
                            const isClone = className.endsWith("'");
                            const originalClassName = isClone ? className.slice(0, -1) : className;

                            const colIdx = colMapGlobal[originalClassName]; 
                            if (colIdx !== undefined) {
                                let rawContent = row[colIdx];
                                if (rawContent) {
                                    const processedContent = processCellContent(rawContent, isClone);
                                    
                                    if (processedContent) {
                                        const strippedName = stripTeacherName(processedContent);
                                        if (strippedName) {
                                            const finalSubject = mappingTable[strippedName] || strippedName;
                                            if (!extractedData[className][normalizedSession]) extractedData[className][normalizedSession] = {};
                                            if (!extractedData[className][normalizedSession][normalizedPeriod]) extractedData[className][normalizedSession][normalizedPeriod] = {};
                                            extractedData[className][normalizedSession][normalizedPeriod][currentDay] = finalSubject;
                                        }
                                    }
                                }
                            }
                        });
                    }

                    const vnEduRows = [];
                    vnEduRows.push(['Lớp học', 'Buổi', 'Tiết thứ', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ nhật']);
                    const dayKeys = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ nhật'];
                    const mapDayToKey = (d) => {
                        if (!d) return null; const dStr = String(d).toLowerCase();
                        if (dStr.includes('2')) return 'Thứ 2'; if (dStr.includes('3')) return 'Thứ 3'; if (dStr.includes('4')) return 'Thứ 4';
                        if (dStr.includes('5')) return 'Thứ 5'; if (dStr.includes('6')) return 'Thứ 6'; if (dStr.includes('7')) return 'Thứ 7';
                        if (dStr.includes('nhật') || dStr.includes('cn')) return 'Chủ nhật'; return null;
                    };

                    classList.forEach(className => {
                        ['S', 'C'].forEach(session => {
                            for (let p = 1; p <= 5; p++) {
                                // IMPORTANT: Use integer 'p' instead of 'p.0'
                                const rowData = [className, session, p];
                                dayKeys.forEach(dayHeader => {
                                    let subj = '';
                                    if (extractedData[className][session] && extractedData[className][session][p]) {
                                        const dayMap = extractedData[className][session][p];
                                        for (let storedDay in dayMap) { if (mapDayToKey(storedDay) === dayHeader) { subj = dayMap[storedDay]; break; } }
                                    }
                                    rowData.push(subj);
                                });
                                vnEduRows.push(rowData);
                            }
                        });
                    });
                    
                    setPreviewData(vnEduRows);
                    setStep(2); // Go to Preview
                } catch (err) { setError(err.message); }
            };

            const handlePreviewEdit = (rowIndex, colIndex, value) => {
                const newData = [...previewData];
                newData[rowIndex][colIndex] = value;
                setPreviewData(newData);
            };

            const confirmAndExport = () => {
                setResultData(previewData);
                setStep(3);
                setTimeout(fireConfetti, 300);
            };

            const handleDownload = () => {
                if (!resultData) return;
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(resultData);
                ws['!cols'] = [{ wch: 10 }, { wch: 8 }, { wch: 8 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }];
                XLSX.utils.book_append_sheet(wb, ws, "TKB_VnEdu");
                XLSX.writeFile(wb, config.outputFileName, { bookType: 'xls' });
            };

            const reset = () => { setStep(1); setSourceFile(null); setResultData(null); setError(null); };

            return (
                <div className="flex flex-col h-full relative font-sans text-slate-800 dark:text-slate-100 selection:bg-yersin-200 selection:text-yersin-900 overflow-hidden">
                    <FloatingIcons />
                    <button onClick={() => setDarkMode(!darkMode)} className="absolute top-4 right-4 z-50 p-3 rounded-full bg-white/20 dark:bg-black/20 hover:bg-white/40 backdrop-blur-md transition-all text-yersin-600 dark:text-yersin-400 border border-white/30 btn-icon-spin" title={darkMode ? "Chuyển sang Giao diện Sáng" : "Chuyển sang Giao diện Tối"}><Icon path={darkMode ? paths.sun : paths.moon} size={20} /></button>
                    <main className="flex-grow relative z-10 container mx-auto px-4 py-6 flex flex-col items-center justify-center min-h-0">
                        {step === 0 && (
                            <div className="text-center animate-fade-in-up flex flex-col items-center w-full max-w-3xl relative z-20"> 
                                <div className="mb-8 relative"><div className="absolute inset-0 bg-yersin-400/20 blur-3xl rounded-full animate-pulse"></div><img src="logo.png" alt="Yersin Logo" className="w-32 h-32 md:w-48 md:h-48 object-contain animate-breathe filter drop-shadow-2xl relative z-10 mx-auto" /></div>
                                <h1 className="text-3xl md:text-5xl font-extrabold text-wave mb-6 drop-shadow-md tracking-tight leading-normal uppercase py-4 px-4 relative z-30 font-sans">PHẦN MỀM CHUYỂN ĐỔI TKB<br/>SANG ĐỊNH DẠNG VNEDU</h1>
                                <p className="text-lg text-gray-600 dark:text-slate-400 mb-10 max-w-xl mx-auto font-light">Công cụ hỗ trợ giáo viên trường Yersin Đà Lạt.<br/><strong>Chính xác - Nhanh chóng - Chuẩn hoá</strong></p>
                                <button onClick={() => setStep(1)} className="glass-button px-12 py-4 rounded-full text-white text-xl font-bold flex items-center gap-3 transform transition hover:scale-105 active:scale-95 group shadow-2xl">BẮT ĐẦU NGAY <span className="bg-white/20 rounded-full p-1 group-hover:translate-x-1 transition-transform"><Icon path={paths.arrowRight} size={24} /></span></button>
                            </div>
                        )}
                        {step > 0 && (
                            <div className="w-full max-w-6xl animate-fade-in-up flex flex-col h-full max-h-[90vh]">
                                <StepIndicator currentStep={step} />
                                <div className="glass-panel rounded-3xl p-1 md:p-2 shadow-2xl relative z-20 flex-grow min-h-0 flex flex-col">
                                    <div className="bg-white/60 dark:bg-slate-900/60 glass-inner rounded-[20px] p-6 md:p-8 flex flex-col relative overflow-hidden backdrop-blur-sm h-full w-full transition-colors duration-500"> 
                                        {error && (<div className="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 text-red-700 dark:text-red-300 p-4 mb-4 rounded-r shadow-md flex items-start gap-3 flex-shrink-0"><Icon path={paths.alert} className="mt-0.5" /><div className="flex-1 text-sm font-medium">{error}</div><button onClick={() => setError(null)} className="text-red-400 hover:text-red-600 font-bold">✕</button></div>)}
                                        {step === 1 && (
                                            <div className="flex-1 flex flex-col items-center justify-center space-y-8 overflow-y-auto">
                                                <div className={`w-full max-w-xl border-3 border-dashed rounded-3xl p-10 text-center cursor-pointer transition-all duration-300 group relative flex-shrink-0 ${sourceFile ? 'border-yersin-400 bg-yersin-50/50 dark:bg-yersin-900/20' : 'border-gray-300 dark:border-slate-600 hover:border-yersin-300 hover:bg-white/60 dark:hover:bg-slate-800/60'}`} onDragOver={handleFileDrop} onDragLeave={(e) => e.target.classList.remove('bg-blue-50')} onDrop={handleFileDrop} onClick={() => document.getElementById('fileInput').click()}>
                                                    <input type="file" id="fileInput" className="hidden" accept=".xlsx, .xls" onChange={handleFileSelect} />
                                                    {sourceFile ? (<div className="animate-fade-in-up relative z-20"><div className="w-20 h-20 bg-green-100 dark:bg-green-900/50 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mb-4 mx-auto shadow-inner"><Icon path={paths.file} size={40} /></div><h3 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-2 px-4 break-words whitespace-normal leading-snug max-w-full">{sourceFile.name}</h3><p className="text-sm text-gray-500 dark:text-gray-400 mt-2">{(sourceFile.size / 1024).toFixed(2)} KB</p><div className="absolute top-2 right-2"><button onClick={(e) => { e.stopPropagation(); setSourceFile(null); }} className="p-2 text-gray-400 hover:text-red-500 transition-colors"><Icon path={paths.trash} size={18} /></button></div></div>) : (<div className="group-hover:scale-105 transition-transform duration-300"><div className="w-20 h-20 bg-yersin-100 dark:bg-yersin-900/40 text-yersin-500 rounded-full flex items-center justify-center mb-4 mx-auto shadow-inner"><Icon path={paths.upload} size={40} /></div><h3 className="text-xl font-bold text-gray-800 dark:text-gray-100 mb-2">Tải lên TKB Gốc</h3><p className="text-sm text-gray-500 dark:text-gray-400">Kéo thả hoặc click để chọn file Excel</p></div>)}
                                                </div>
                                                <div className="flex items-center gap-3 bg-white/60 dark:bg-slate-800/60 px-5 py-3 rounded-full border border-gray-200 dark:border-slate-700 shadow-sm w-full max-w-xl justify-between flex-shrink-0"><span className="text-gray-700 dark:text-gray-300 text-sm font-medium flex items-center gap-2"><Icon path={paths.settings} size={16} className="text-yersin-500"/> Tự động tách tên GV</span><div className={`w-12 h-6 rounded-full p-1 cursor-pointer transition-colors duration-300 ${config.stripTeacher ? 'bg-yersin-500' : 'bg-gray-300 dark:bg-gray-600'}`} onClick={() => setConfig({...config, stripTeacher: !config.stripTeacher})}><div className={`bg-white w-4 h-4 rounded-full shadow-md transform duration-300 ${config.stripTeacher ? 'translate-x-6' : ''}`}></div></div></div>
                                                <button onClick={handleAnalyze} disabled={!sourceFile || isLoading} className={`w-full max-w-md py-4 rounded-2xl font-bold text-lg text-white shadow-xl transition-all flex items-center justify-center gap-3 flex-shrink-0 ${!sourceFile ? 'bg-gray-300 dark:bg-slate-700 cursor-not-allowed' : 'glass-button hover:shadow-yersin-300/50 hover:-translate-y-1'}`}>{isLoading ? <div className="loading-spinner border-white border-t-transparent"></div> : <><Icon path={paths.refresh} size={22}/> PHÂN TÍCH DỮ LIỆU</>}</button>
                                            </div>
                                        )}
                                        {step === 1.5 && (
                                            <div className="flex-1 flex flex-col h-full min-h-0">
                                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4 flex-shrink-0">
                                                    <h2 className="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><div className="p-2 bg-yersin-100 dark:bg-yersin-900 rounded-lg text-yersin-600 dark:text-yersin-400"><Icon path={paths.check} size={20} /></div> Định chuẩn Tên Môn</h2>
                                                    <div className="flex bg-gray-100 dark:bg-slate-800 p-1 rounded-xl self-start md:self-auto">
                                                        <button onClick={() => setActiveTab('standard')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'standard' ? 'bg-white dark:bg-slate-700 text-yersin-600 dark:text-yersin-400 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>Môn Chuẩn <span className="bg-gray-200 dark:bg-slate-600 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded text-xs">{Object.values(subjectCategories).filter(c => c === 'standard').length}</span></button>
                                                        <button onClick={() => setActiveTab('exception')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'exception' ? 'bg-white dark:bg-slate-700 text-orange-600 dark:text-orange-400 shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>Môn Khác <span className={`px-1.5 py-0.5 rounded text-xs ${Object.values(subjectCategories).filter(c => c === 'exception').length > 0 ? 'bg-orange-100 dark:bg-orange-900/50 text-orange-600 dark:text-orange-300' : 'bg-gray-200 dark:bg-slate-600 text-gray-600'}`}>{Object.values(subjectCategories).filter(c => c === 'exception').length}</span></button>
                                                    </div>
                                                </div>
                                                <div className="flex-1 flex flex-col bg-white/40 dark:bg-slate-800/40 rounded-xl border border-white/50 dark:border-white/5 shadow-inner overflow-hidden min-h-0">
                                                    <div className="bg-yersin-50/80 dark:bg-slate-700/50 px-6 py-3 border-b border-gray-200 dark:border-slate-700 grid grid-cols-2 gap-4 font-bold text-xs text-gray-600 dark:text-gray-300 uppercase tracking-wider flex-shrink-0"><div>Tên gốc (Từ File)</div><div>Tên chuẩn (VnEdu)</div></div>
                                                    <div className="flex-1 overflow-y-auto custom-scroll p-0 table-scroll-area">
                                                        {Object.keys(mappingTable).filter(s => subjectCategories[s] === activeTab).length === 0 ? (<div className="flex flex-col items-center justify-center h-full text-gray-400 italic p-8"><Icon path={paths.check} size={32} className="mb-2 opacity-50"/>Không có môn nào trong danh mục này.</div>) : (<div className="divide-y divide-gray-100 dark:divide-slate-700">{Object.keys(mappingTable).filter(s => subjectCategories[s] === activeTab).map((subj, idx) => (<div key={idx} className="grid grid-cols-2 gap-4 px-6 py-3 hover:bg-white/60 dark:hover:bg-slate-700/50 transition-colors items-center"><div className="text-sm font-semibold text-gray-800 dark:text-gray-200 break-words pr-2">{subj}</div><div className="relative group"><input type="text" list={`sugg-${activeTab}-${idx}`} className={`w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-yersin-400 outline-none transition-all shadow-sm ${!mappingTable[subj] ? 'border-red-300 bg-red-50 dark:bg-red-900/20' : 'border-gray-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800'} dark:text-white`} value={mappingTable[subj] || ''} placeholder="Nhập tên chuẩn..." onChange={(e) => { const newVal = e.target.value; setMappingTable(prev => ({...prev, [subj]: newVal})); }} /><datalist id={`sugg-${activeTab}-${idx}`}>{VNEDU_SUGGESTIONS.map((s, i) => <option key={i} value={s} />)}{STANDARD_SUBJECTS.map((s, i) => <option key={`std-${i}`} value={s} />)}</datalist></div></div>))}</div>)}
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 mt-6 pt-2 flex-shrink-0"><button onClick={() => setStep(1)} className="px-6 py-3 rounded-xl border border-gray-300 dark:border-slate-600 font-bold text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-slate-700 transition-colors">Quay lại</button><button onClick={() => setStep(1.8)} className="flex-1 glass-button py-3 rounded-xl font-bold text-white shadow-lg hover:shadow-orange-300/50 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-0.5">TIẾP TỤC <Icon path={paths.arrowRight} size={18}/></button></div>
                                            </div>
                                        )}
                                        {step === 1.8 && (
                                            <div className="flex-1 flex flex-col h-full min-h-0">
                                                <div className="flex justify-between items-center mb-4 flex-shrink-0">
                                                    <h2 className="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><div className="p-2 bg-purple-100 dark:bg-purple-900 rounded-lg text-purple-600 dark:text-purple-400"><Icon path={paths.list} size={20} /></div> Sắp xếp Lớp</h2>
                                                    <button onClick={autoSortClasses} className="px-3 py-1.5 bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 text-xs font-bold rounded-lg hover:bg-blue-200 dark:hover:bg-blue-800 transition flex items-center gap-1"><Icon path={paths.sort} size={14} /> Tự động (Yersin Sort)</button>
                                                </div>
                                                {/* Smart Alert for Split Classes */}
                                                {splitClasses.size > 0 && (
                                                    <div className="mb-4 bg-orange-50 border-l-4 border-orange-400 p-3 rounded-r flex items-start gap-3 animate-fade-in-up">
                                                        <Icon path={paths.alert} className="text-orange-500 mt-0.5 flex-shrink-0" size={18} />
                                                        <div className="text-sm text-orange-800">
                                                            <strong>Phát hiện lớp phân nhóm:</strong> Hệ thống đã tự động tách các lớp có tiết học đôi ({Array.from(splitClasses).join(', ')}) thành lớp thường và lớp phẩy (') tương ứng.
                                                        </div>
                                                    </div>
                                                )}

                                                <div className="flex-1 bg-white/40 dark:bg-slate-800/40 rounded-xl border border-white/50 dark:border-white/5 shadow-inner overflow-hidden flex flex-col min-h-0">
                                                    <div className="bg-yersin-50/80 dark:bg-slate-700/50 px-6 py-3 border-b border-gray-200 dark:border-slate-700 grid grid-cols-12 gap-4 font-bold text-xs text-gray-600 dark:text-gray-300 uppercase tracking-wider flex-shrink-0"><div className="col-span-1">STT</div><div className="col-span-8">Tên Lớp</div><div className="col-span-3 text-center">Thao tác</div></div>
                                                    <div className="flex-1 overflow-y-auto custom-scroll p-0 table-scroll-area">
                                                        {classList.map((cls, idx) => (
                                                            <div key={cls} className="grid grid-cols-12 gap-4 px-6 py-3 hover:bg-white/60 dark:hover:bg-slate-700/50 transition-colors items-center border-b border-gray-100 dark:border-slate-700 last:border-0">
                                                                <div className="col-span-1 text-gray-500 font-mono text-xs">{idx + 1}</div>
                                                                <div className="col-span-8 font-bold text-gray-800 dark:text-white flex items-center">
                                                                    {cls} 
                                                                    {splitClasses.has(cls.replace("'", "")) && !cls.includes("'") && <span className="ml-2 text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold tracking-wider">GỐC</span>}
                                                                    {cls.includes("'") && <span className="ml-2 text-[9px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded font-bold tracking-wider">TÁCH</span>}
                                                                </div>
                                                                <div className="col-span-3 flex justify-center gap-2">
                                                                    <button onClick={() => moveClass(idx, -1)} disabled={idx === 0} className="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-slate-600 disabled:opacity-30 text-gray-600 dark:text-gray-300"><Icon path={paths.up} size={16}/></button>
                                                                    <button onClick={() => moveClass(idx, 1)} disabled={idx === classList.length - 1} className="p-1.5 rounded-md hover:bg-gray-200 dark:hover:bg-slate-600 disabled:opacity-30 text-gray-600 dark:text-gray-300"><Icon path={paths.down} size={16}/></button>
                                                                    <button onClick={() => removeClass(idx)} className="p-1.5 rounded-md hover:bg-red-100 dark:hover:bg-red-900/50 text-red-500"><Icon path={paths.trash} size={16}/></button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 mt-6 pt-2 flex-shrink-0"><button onClick={() => setStep(1.5)} className="px-6 py-3 rounded-xl border border-gray-300 dark:border-slate-600 font-bold text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-slate-700 transition-colors">Quay lại</button><button onClick={generatePreview} className="flex-1 glass-button py-3 rounded-xl font-bold text-white shadow-lg hover:shadow-orange-300/50 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-0.5">XEM TRƯỚC KẾT QUẢ <Icon path={paths.arrowRight} size={18}/></button></div>
                                            </div>
                                        )}
                                        {step === 2 && previewData && (
                                            <div className="flex-1 flex flex-col h-full min-h-0 animate-fade-in-up">
                                                <div className="flex justify-between items-center mb-4 flex-shrink-0"><h2 className="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><div className="p-2 bg-blue-100 dark:bg-blue-900/50 rounded-lg text-blue-600 dark:text-blue-400"><Icon path={paths.edit} size={20} /></div> Xem trước & Chỉnh sửa</h2><div className="text-xs text-gray-500 dark:text-gray-400 italic bg-white/50 dark:bg-slate-800/50 px-3 py-1 rounded-full border border-gray-200 dark:border-slate-700">* Click vào ô tên môn học để sửa trực tiếp</div></div>
                                                <div className="flex-1 overflow-hidden flex flex-col bg-white dark:bg-slate-800 rounded-xl border border-gray-300 dark:border-slate-600 shadow-md">
                                                    <div className="flex-1 overflow-auto custom-scroll relative table-scroll-area">
                                                        <table className="min-w-full divide-y divide-gray-200 dark:divide-slate-700 border-collapse text-sm"><thead className="bg-gray-100 dark:bg-slate-900 sticky top-0 z-10 shadow-sm"><tr>{previewData[0].map((header, i) => (<th key={i} className="px-4 py-3 text-left font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider border-b border-gray-300 dark:border-slate-600 whitespace-nowrap bg-gray-100 dark:bg-slate-900">{header}</th>))}</tr></thead><tbody className="bg-white dark:bg-slate-800 divide-y divide-gray-200 dark:divide-slate-700">{previewData.slice(1).map((row, rIdx) => (<tr key={rIdx} className="hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">{row.map((cell, cIdx) => (<td key={cIdx} className={`px-4 py-2 border-r border-gray-100 dark:border-slate-700 whitespace-nowrap ${cIdx > 2 ? 'cursor-pointer hover:bg-blue-100 dark:hover:bg-blue-900/40 font-medium text-gray-800 dark:text-gray-200' : 'text-gray-500 dark:text-gray-400 bg-gray-50 dark:bg-slate-900/50'}`}>{cIdx > 2 ? <input type="text" className="w-full bg-transparent outline-none focus:text-blue-600 dark:focus:text-blue-400 focus:font-bold" value={cell || ''} onChange={(e) => handlePreviewEdit(rIdx + 1, cIdx, e.target.value)} /> : (cell || '-')}</td>))}</tr>))}</tbody></table>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 mt-6 pt-2 flex-shrink-0"><button onClick={() => setStep(1.8)} className="px-6 py-3 rounded-xl border border-gray-300 dark:border-slate-600 font-bold text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-slate-700 transition-colors">Quay lại</button><button onClick={confirmAndExport} className="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-lg shadow-green-200 dark:shadow-none hover:shadow-green-300 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-0.5"><Icon path={paths.save} size={20} /> XÁC NHẬN & XUẤT FILE</button></div>
                                            </div>
                                        )}
                                        {step === 3 && (
                                            <div className="flex-1 flex flex-col items-center justify-center text-center animate-fade-in-up py-8">
                                                <div className="w-24 h-24 bg-green-100 dark:bg-green-900/50 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mb-6 shadow-xl shadow-green-100 dark:shadow-none ring-4 ring-white dark:ring-slate-700"><Icon path={paths.check} size={48} className="animate-pulse" /></div>
                                                <h2 className="text-3xl font-extrabold text-gray-800 dark:text-white mb-2">Chuyển đổi thành công!</h2>
                                                <p className="text-gray-500 dark:text-gray-400 mb-10 max-w-md mx-auto leading-relaxed">File <strong>.xls</strong> đã được tạo chuẩn 100% cho hệ thống VnEdu. Thầy có thể tải về và upload ngay.</p>
                                                <div className="flex flex-col sm:flex-row gap-4 w-full max-w-md"><button onClick={handleDownload} className="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-green-200 dark:shadow-none hover:shadow-green-300 transition-all flex items-center justify-center gap-2 transform hover:-translate-y-1"><Icon path={paths.download} size={20} /> TẢI VỀ MÁY</button><button onClick={reset} className="flex-1 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-gray-600 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-slate-600 py-4 rounded-xl font-bold shadow-sm transition-all flex items-center justify-center gap-2"><Icon path={paths.refresh} size={20} /> Làm file mới</button></div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <HologramFooter />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
