<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#0B0F19',
                        gold: '#F59E0B',
                        paper: '#FDFBF7',
                        glass: 'rgba(20, 30, 48, 0.7)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)',
                        vietnam: '#da251d',
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['"Be Vietnam Pro"', 'sans-serif'],
                        math: ['"Times New Roman"', 'serif'], 
                    },
                    animation: {
                        'float-slow': 'float 10s ease-in-out infinite',
                        'float-medium': 'float 7s ease-in-out infinite',
                        'float-fast': 'float 5s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.6, boxShadow: '0 0 10px rgba(245, 158, 11, 0.3)' },
                            '50%': { opacity: 1, boxShadow: '0 0 25px rgba(245, 158, 11, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        body { background-color: #0B0F19; color: #e2e8f0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .math-symbol {
            position: fixed;
            color: rgba(255, 255, 255, 0.04);
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-weight: bold;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            text-shadow: 0 0 5px rgba(255,255,255,0.1);
        }

        .timeline-track {
            position: absolute; left: 28px; top: 0; bottom: 0; width: 1px;
            background: linear-gradient(to bottom, transparent, #fbbf24, #ef4444, #38bdf8, #a855f7, transparent);
            z-index: 1;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }
        
        @media (min-width: 768px) {
            .timeline-track { left: 50%; transform: translateX(-50%); }
        }

        .milestone-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glassBorder);
            border-left: 2px solid rgba(251, 191, 36, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .milestone-card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .milestone-card:hover::before {
            transform: translateX(100%);
        }

        @media (hover: hover) {
            .milestone-card:hover {
                transform: translateY(-5px) scale(1.01);
                border-color: #fbbf24;
                box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.5);
            }
        }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(15px);
            z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-overlay.active { opacity: 1; pointer-events: auto; }
        
        .nav-content {
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .nav-overlay.active .nav-content { transform: scale(1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
    </style>
</head>
<body class="relative min-h-screen font-sans selection:bg-amber-500/30 selection:text-amber-200">

    <div id="nav-overlay" class="nav-overlay" onclick="toggleNav()">

            {
                year: 'Năm 1964', title: 'Tối Ưu Toàn Cục', figure: 'GS. Hoàng Tụy',
                desc: 'Cha đẻ của lý thuyết Tối ưu toàn cục (Global Optimization) với "Nhát cắt Tụy" nổi tiếng thế giới.',
                icon: 'fas fa-chart-line', file: 'hoangtuy.html', ready: true, special: true
            },
            {
                year: 'Năm 1975', title: 'Hình Học Fractal', figure: 'Benoit Mandelbrot',
                desc: 'Khám phá vẻ đẹp của sự hỗn loạn, hình học phân hình trong tự nhiên.',
                icon: 'fas fa-snowflake', file: 'mandelbrot.html', ready: true
            },
            {
                year: 'Năm 1994', title: 'Định Lý Cuối Cùng', figure: 'Andrew Wiles',
                desc: 'Giải mã bài toán hóc búa nhất lịch sử sau hơn 350 năm thách thức của Fermat.',
                icon: 'fas fa-check-double', file: 'wiles.html', ready: true
            },
            {
                year: 'Năm 2003', title: 'Giả Thuyết Poincaré', figure: 'Grigori Perelman',
                desc: 'Thiên tài ẩn dật giải quyết bài toán thế kỷ và từ chối giải thưởng 1 triệu đô la.',
                icon: 'fas fa-ghost', file: 'perelman.html', ready: true
            },
            {
                year: 'Năm 2010', title: 'Huy Chương Fields', figure: 'GS. Ngô Bảo Châu',
                desc: 'Chứng minh Bổ đề Cơ bản trong chương trình Langlands, vinh quang của Toán học Việt Nam.',
                icon: 'fas fa-medal', file: 'ngobaochau.html', ready: true, special: true
            },
            {
                year: 'Năm 2014', title: 'Huy Chương Fields Nữ', figure: 'Maryam Mirzakhani',
                desc: 'Người phụ nữ đầu tiên và duy nhất tính đến 2014 nhận giải Fields về hình học các mặt Riemann.',
                icon: 'fas fa-infinity', file: 'mirzakhani.html', ready: true
            }
        ];

        function initBackground() {
            const container = document.getElementById('math-bg-container');
            const symbols = ['π', '∞', '∑', '∫', '√', '∂', 'ƒ', '∆', 'e', 'i', 'sin', 'log', 'φ', 'Ω', 'λ', '∀', '∃', '∇'];
            const count = 30; 

            for(let i=0; i<count; i++) {
                const el = document.createElement('div');
                el.classList.add('math-symbol');
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                const size = Math.random() * 3 + 1; 
                el.style.fontSize = size + 'rem';
                el.style.opacity = Math.random() * 0.1 + 0.02; 
                el.style.transform = `rotate(${Math.random() * 360}deg)`;
                const anims = ['animate-float-slow', 'animate-float-medium', 'animate-float-fast'];
                el.classList.add(anims[Math.floor(Math.random() * anims.length)]);
                container.appendChild(el);
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            const navList = document.getElementById('nav-list');
            let counter = 0; 

            timelineData.forEach((item, index) => {
                if (item.type === 'era') {
                    const div = document.createElement('div');
                    div.id = item.id;
                    div.className = "flex justify-center items-center py-12 relative z-10 scroll-mt-32";
                    
                    const bgClass = item.bg || 'bg-slate-900';
                    const borderClass = item.border || 'border-amber-500/30';
                    
                    div.innerHTML = `
                        <div class="px-8 py-3 rounded-full border ${borderClass} ${bgClass} shadow-[0_0_30px_rgba(0,0,0,0.5)] transform hover:scale-105 transition duration-500 relative overflow-hidden group">
                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                            <span class="${item.color} font-serif font-bold tracking-[0.2em] text-sm md:text-xl text-center block uppercase flex items-center gap-3">
                                <i class="fas fa-bookmark text-xs opacity-70"></i> ${item.label} <i class="fas fa-bookmark text-xs opacity-70"></i>
                            </span>
                        </div>
                    `;
                    container.appendChild(div);

                    const navItem = document.createElement('button');
                    navItem.className = "w-full text-left px-4 py-4 rounded-xl hover:bg-white/5 transition flex items-center justify-between group border-b border-white/5 last:border-0";
                    navItem.onclick = () => scrollToEra(item.id);
                    navItem.innerHTML = `
                        <span class="${item.color} font-serif font-bold text-sm tracking-wider uppercase">${item.label}</span>
                        <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition text-xs"></i>
                    `;
                    navList.appendChild(navItem);

                } else {
                    const isEven = counter % 2 === 0;
                    const wrapper = document.createElement('div');
                    
                    const desktopClasses = isEven ? 'md:flex-row' : 'md:flex-row-reverse';
                    const paddingClasses = isEven ? 'md:pr-20 md:text-right' : 'md:pl-20 md:text-left';
                    const alignClasses = isEven ? 'md:items-end' : 'md:items-start';

                    const cardBorder = item.special ? 'border-red-500/40' : 'border-white/10';
                    const iconBg = item.special ? 'bg-red-900/40 border-red-500' : 'bg-[#0B0F19] border-slate-700';
                    const iconColor = item.special ? 'text-red-400' : 'text-slate-400';
                    const yearColor = item.special ? 'text-red-400' : 'text-amber-500';

                    wrapper.className = `flex flex-row ${desktopClasses} items-start md:items-center w-full group pl-12 md:pl-0 relative`;
                    
                    wrapper.innerHTML = `
                        <div class="w-full md:w-1/2 ${paddingClasses} mb-2 md:mb-0 relative z-10">
                            <div class="milestone-card p-6 md:p-8 rounded-lg relative overflow-hidden ${cardBorder} flex flex-col ${alignClasses}">
                                
                                <span class="${yearColor} font-math text-lg font-bold tracking-widest uppercase mb-1 flex items-center gap-2">
                                    ${isEven ? '' : '<i class="fas fa-clock text-xs opacity-50"></i>'}
                                    ${item.year}
                                    ${isEven ? '<i class="fas fa-clock text-xs opacity-50"></i>' : ''}
                                </span>
                                
                                <h2 class="text-2xl md:text-4xl font-serif font-bold text-slate-100 mb-2 group-hover:text-amber-300 transition-colors leading-tight">${item.figure}</h2>
                                <h3 class="text-slate-400 text-xs font-sans font-bold uppercase mb-4 tracking-[0.2em] border-b border-white/10 pb-2">${item.title}</h3>
                                
                                <p class="text-slate-300 font-sans font-light text-sm md:text-base leading-relaxed mb-6 line-clamp-3 md:line-clamp-none opacity-90">${item.desc}</p>
                                
                                <button onclick="openViewer('${item.file}', '${item.figure}')" class="px-6 py-2.5 bg-white/5 hover:bg-amber-600 hover:border-amber-500 text-slate-300 hover:text-white rounded-md transition-all duration-300 text-xs font-bold uppercase tracking-widest flex items-center gap-3 border border-white/10 w-fit group-btn">
                                    <span>Hồ Sơ</span> <i class="fas fa-arrow-right group-btn-hover:translate-x-1 transition-transform"></i>
                                </button>
                            </div>
                        </div>

                        <div class="absolute left-[28px] md:left-1/2 top-10 md:top-1/2 transform -translate-x-1/2 md:-translate-y-1/2 z-20 
                                    w-12 h-12 md:w-16 md:h-16 flex-shrink-0 ${iconBg} border-2 md:border-4 rounded-full flex items-center justify-center 
                                    shadow-[0_0_20px_rgba(0,0,0,0.5)] group-hover:scale-110 group-hover:border-amber-400 transition-all duration-500 bg-[#0B0F19]">
                            <i class="${item.icon} ${iconColor} text-lg md:text-2xl group-hover:text-amber-400 transition-colors"></i>
                        </div>

                        <div class="w-full md:w-1/2 hidden md:block"></div>
                    `;
                    container.appendChild(wrapper);
                    counter++;
                }
            });
        }

        function toggleNav() {
            document.getElementById('nav-overlay').classList.toggle('active');
        }

        function scrollToEra(id) {
            toggleNav();
            const element = document.getElementById(id);
            if(element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        const viewer = {
            modal: document.getElementById('story-viewer'),
            frame: document.getElementById('content-frame'),
            title: document.getElementById('viewer-title'),
            loader: document.getElementById('loader')
        };

        function openViewer(file, title) {
            viewer.title.textContent = title;
            viewer.loader.style.display = 'flex';
            viewer.frame.style.opacity = '0';
            
            // Fix: Add timestamp to force reload if needed, though simple src set is usually enough
            viewer.frame.src = file;
            
            viewer.modal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
            viewer.modal.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
            document.body.style.overflow = 'hidden';

            // FALLBACK TIMEOUT: Nếu iframe load thất bại sự kiện, tự động hiện sau 2s
            setTimeout(() => {
                if(viewer.frame.style.opacity === '0') {
                    onFrameLoad();
                }
            }, 2000);
        }

        function onFrameLoad() {
            viewer.loader.style.display = 'none';
            viewer.frame.style.opacity = '1';
        }
        
        viewer.frame.addEventListener('load', onFrameLoad);

        function closeViewer() {
            viewer.modal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            viewer.modal.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
            setTimeout(() => { viewer.frame.src = 'about:blank'; }, 300);
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeViewer(); });

        initBackground();
        renderTimeline();

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.milestone-card').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            observer.observe(el);
        });

    </script>
</body>
</html>
