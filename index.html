    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <!-- STYLES -->
    <style>
        :root {
            /* --- DARK MODE (Default) --- */
            --bg-deep: #020617; 
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --accent-glow: rgba(34, 211, 238, 0.4);
            
            --icon-color: #22d3ee; /* Neon Cyan */
            --hamburger-color: #22d3ee;
            
            --neon-cyan: #06b6d4;
            --neon-purple: #a855f7;
            --neon-amber: #f59e0b;
            --neon-rose: #f43f5e;
            --neon-emerald: #10b981;
        }

        /* --- LIGHT MODE (Optimized for readability & less glare) --- */
        [data-theme="light"] {
            --bg-deep: #f8fafc; /* Slate 50 - Softer than pure white */
            --text-primary: #0f172a; /* Slate 900 */
            --text-secondary: #475569; /* Slate 600 */
            --glass-bg: rgba(255, 255, 255, 0.85); /* Less transparent */
            --glass-border: rgba(203, 213, 225, 0.6); /* Slate 300 */
            --glass-shadow: rgba(148, 163, 184, 0.15);
            --accent-glow: rgba(8, 145, 178, 0.3);
            
            /* Darker colors for light mode visibility */
            --neon-cyan: #0284c7; /* Sky 600 */
            --neon-purple: #7c3aed; /* Violet 600 */
            --neon-amber: #d97706; /* Amber 600 */
            --neon-rose: #e11d48; /* Rose 600 */
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            margin: 0; padding: 0;
            overflow-x: hidden;
            cursor: default;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .font-math { font-family: 'Space Grotesk', sans-serif; }
        .font-symbol { font-family: 'Cormorant Garamond', serif; font-style: italic; }

        /* --- ADVANCED BACKGROUND --- */
        .math-universe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            overflow: hidden;
            transition: background 0.4s ease;
        }
        
        [data-theme="dark"] .math-universe {
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
        }
        [data-theme="light"] .math-universe {
            background: radial-gradient(circle at 50% -20%, #ffffff 0%, #f1f5f9 80%);
        }

        /* 3D Floating Math Symbols */
        .math-symbol {
            position: absolute;
            color: var(--text-secondary);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            user-select: none;
            will-change: transform, opacity;
            text-shadow: 0 0 10px var(--accent-glow);
        }
        
        [data-theme="dark"] .math-symbol {
            opacity: 0.15;
            mix-blend-mode: screen;
        }
        [data-theme="light"] .math-symbol {
            opacity: 0.08;
            mix-blend-mode: multiply;
        }

        /* --- GLASS CARD ULTRA --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); 
            box-shadow: 0 4px 20px var(--glass-shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }
        
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: var(--neon-cyan);
            box-shadow: 0 15px 40px -10px var(--accent-glow);
        }

        /* --- MOBILE OPTIMIZATIONS --- */
        @media (max-width: 768px) {
            .glass-card:hover { transform: none; } 
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .mobile-stack { flex-direction: column; }
            .mobile-compact-text { font-size: 0.9rem; }
            .mobile-hidden { display: none; }
            
            /* Better Touch Targets */
            button, a { min-height: 44px; }
        }

        /* --- ANIMATIONS --- */
        .fade-in-up { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .icon-glow-box { position: relative; z-index: 1; }
        .icon-glow-box::before {
            content: ''; position: absolute; inset: -5px; z-index: -1;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s;
        }
        .glass-card:hover .icon-glow-box::before { opacity: 0.6; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 10px; opacity: 0.3; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>

                            animationDelay: `${p.delay}s`,
                            filter: `blur(${p.blur}px)`,

                        }}>

            const [viewingResource, setViewingResource] = useState(null);
            const [theme, setTheme] = useState('dark');

            // Set theme effect
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            };

            // Xử lý mở tài nguyên
            const handleOpenResource = (resource) => {
                let basePath = '';
                if (resource.path) {
                    basePath = resource.path;
                } else {
                    switch(resource.category) {
                        case 'doc': basePath = 'tai-lieu/'; break;
                        case 'game': basePath = 'game/'; break;
                        case 'tool': basePath = 'app/'; break;
                        case 'infographic': basePath = 'infographic/'; break;
                        default: basePath = '';
                    }
                }

                const relativePath = basePath + resource.filename;
                
                // Logic Office Viewer
                const extension = resource.filename.split('.').pop().toLowerCase();
                let urlToOpen = relativePath;

                if (['docx', 'doc', 'xlsx', 'xls', 'pptx', 'ppt'].includes(extension)) {
                     let baseUrl = window.location.origin + window.location.pathname;
                    if (baseUrl.endsWith('index.html')) baseUrl = baseUrl.substring(0, baseUrl.lastIndexOf('index.html'));
                    if (!baseUrl.endsWith('/')) baseUrl += '/';
                    urlToOpen = `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(baseUrl + relativePath)}`;
                } else if (extension === 'pdf') {
                    // For PDF, we want a clean viewer, but simply linking to it in a new tab is the most robust "full screen" experience
                    // Users asked for "open directly"
                }

                window.open(encodeURI(urlToOpen), '_blank');
            };

            const getTitle = () => {
                switch(currentView) {
                    case 'dashboard': return 'Tổng Quan';
                    case 'leaderinme': return 'Leader in me'; 
                    case 'lifeskills': return 'Kỹ Năng Sống';
                    case 'infographics': return 'Infographic Toán';
                    case 'documents': return 'Tài Liệu';
                    case 'games': return 'Game Zone';
                    case 'tools': return 'Công Cụ';
                    default: return 'Trang Chủ';
                }
            };

            return (
                <div className="min-h-screen flex relative overflow-hidden">
                    <div className="math-universe">
                        <div className="grid-floor"></div>
                        <FloatingMathBackground />
                        <div className="absolute inset-0 bg-gradient-to-t from-[var(--bg-deep)] via-transparent to-transparent"></div>
                    </div>
                    
                    <Sidebar currentView={currentView} setView={setCurrentView} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />

                    <div className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden backdrop-blur-[2px]">
                        <Header title={getTitle()} setMobileOpen={setMobileOpen} searchQuery={searchQuery} setSearchQuery={setSearchQuery} toggleTheme={toggleTheme} theme={theme} />
                        <main className="flex-1 overflow-y-auto scroll-smooth">
                            {currentView === 'dashboard' && <DashboardView setView={setCurrentView} openViewer={handleOpenResource} searchQuery={searchQuery} allData={DATA_CONFIG} />} 
                            {currentView === 'leaderinme' && <LeaderInMeView openViewer={handleOpenResource} searchQuery={searchQuery} allData={DATA_CONFIG} />}
                            {currentView === 'lifeskills' && <LifeSkillsView openViewer={handleOpenResource} searchQuery={searchQuery} allData={DATA_CONFIG} />}
                            {currentView === 'infographics' && <InfographicsView openViewer={handleOpenResource} searchQuery={searchQuery} allData={DATA_CONFIG} />}
                            {currentView === 'documents' && <DocumentsView searchQuery={searchQuery} openViewer={handleOpenResource} allData={DATA_CONFIG} />}
                            {currentView === 'games' && <GamesView searchQuery={searchQuery} openViewer={handleOpenResource} allData={DATA_CONFIG} />}
                            {currentView === 'tools' && <ToolsView searchQuery={searchQuery} openViewer={handleOpenResource} allData={DATA_CONFIG} />}
                        </main>
                        <Footer />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
