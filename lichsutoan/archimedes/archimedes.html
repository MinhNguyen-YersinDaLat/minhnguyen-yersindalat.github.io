<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archimedes: Huyền Thoại Syracuse</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        syracuse: {
                            ocean: '#0e7490',   /* Deep Ocean */
                            dark: '#020617',    /* Night Sky */
                            bronze: '#d97706',  /* Ancient Bronze */
                            gold: '#fbbf24',    /* Gold */
                            accent: '#06b6d4',  /* Magic Blue */
                            panel: 'rgba(2, 6, 23, 0.95)'
                        }
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', '"Be Vietnam Pro"', 'serif'],
                        title: ['"Cinzel"', 'serif'],
                        sans: ['"Be Vietnam Pro"', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'breathe': 'breathe 8s ease-in-out infinite',
                        'gear-spin': 'spin 60s linear infinite',
                        'water-rise': 'rise 2s ease-out forwards',
                        'fire-flicker': 'flicker 0.2s infinite alternate',
                        'god-glow': 'glow 3s ease-in-out infinite alternate',
                        'bubble': 'bubble 1s ease-out forwards',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        breathe: { '0%, 100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.02)' } },
                        rise: { '0%': { transform: 'scaleY(1)' }, '100%': { transform: 'scaleY(var(--target-scale))' } },
                        flicker: { 
                            '0%': { opacity: 0.7, transform: 'scale(1) skewX(0deg)' }, 
                            '100%': { opacity: 1, transform: 'scale(1.1) skewX(5deg)' } 
                        },
                        glow: {
                            '0%': { filter: 'drop-shadow(0 0 10px rgba(251, 191, 36, 0.3)) brightness(1)' },
                            '100%': { filter: 'drop-shadow(0 0 25px rgba(251, 191, 36, 0.6)) brightness(1.1)' }
                        },
                        bubble: {
                            '0%': { transform: 'translateY(0) scale(0)', opacity: 0 },
                            '50%': { opacity: 1 },
                            '100%': { transform: 'translateY(-20px) scale(1.5)', opacity: 0 }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #020617; 
            color: #ecfeff; 
            font-family: 'Cormorant Garamond', serif; 
            overflow: hidden; 
            touch-action: pan-y;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(217, 119, 6, 0.08) 0%, transparent 50%);
        }

        .bg-gear-pattern {
            position: fixed; inset: 0; pointer-events: none; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0l4 10h10l-4 10 6 8-10 2v10l-6-8-6 8v-10l-10-2 6-8-4-10h10l4-10z' fill='%23b45309' fill-rule='evenodd'/%3E%3C/svg%3E");
            z-index: 0;
            animation: gear-spin 120s linear infinite;
        }

        .char-aura {
            position: absolute; width: 140%; height: 140%;
            background: radial-gradient(circle, rgba(14, 116, 144, 0.2) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; filter: blur(60px);
        }
        
        .char-img-effect {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .char-active {
            animation: god-glow 4s infinite alternate;
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        
        .dialog-box {
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(217, 119, 6, 0.3);
            border-top: 3px solid #d97706;
            border-bottom: 3px solid #0e7490;
            box-shadow: 0 20px 70px -10px rgba(0,0,0,0.9);
            transition: all 0.5s ease;
            display: flex; flex-direction: column;
        }

        .dialog-box.game-mode {
            background: rgba(8, 51, 68, 0.95);
            border-color: #22d3ee;
        }
        
        #story-text-container {
            transition: all 0.5s ease;
            overflow-y: auto;
            padding-right: 10px;
        }
        #story-text-container::-webkit-scrollbar { width: 6px; }
        #story-text-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        #story-text-container::-webkit-scrollbar-thumb { background: #d97706; border-radius: 3px; }

        .media-box, .svg-container {
            width: 100%; max-width: 600px;
            background: radial-gradient(circle at center, rgba(14, 116, 144, 0.3) 0%, rgba(2, 6, 23, 0.8) 100%);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 0 auto 15px auto; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
            transition: all 0.5s ease;
            position: relative;
            min-height: 25vh; 
        }
        
        @media (min-width: 768px) {
            .media-box, .svg-container {
                min-height: 220px;
                margin: 0 auto 20px auto; 
            }
        }
        
        .media-box img { 
            width: 100%; height: auto; 
            max-height: 35vh;
            object-fit: contain; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .btn-action {
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 700; 
            letter-spacing: 0.05em;
            background: linear-gradient(180deg, rgba(22, 78, 99, 0.9) 0%, rgba(8, 51, 68, 1) 100%);
            color: #fbbf24; 
            border: 1px solid rgba(217, 119, 6, 0.5);
            padding: 12px 16px; 
            border-radius: 6px;
            transition: all 0.3s; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 0.9rem;
            box-shadow: 0 4px 0 rgba(69, 26, 3, 0.8);
            text-transform: uppercase;
        }
        @media (min-width: 768px) {
            .btn-action {
                padding: 16px 24px;
                font-size: 1rem;
            }
        }

        .btn-action:hover { 
            border-color: #fcd34d; 
            background: linear-gradient(180deg, rgba(180, 83, 9, 0.9) 0%, rgba(120, 53, 15, 1) 100%);
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.8); 
            transform: translateY(-2px);
        }
        .btn-action:active { transform: translateY(2px); box-shadow: none; }
        
        .story-text { 
            font-size: 1.15rem; 
            line-height: 1.6; color: #e0f2fe; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }
        @media (min-width: 768px) {
            .story-text { 
                font-size: 1.35rem; 
                line-height: 1.7; 
            }
        }

        .text-bronze { color: #fbbf24; font-weight: bold; font-family: 'Cinzel', serif; }
        .katex { font-size: 1.2em; color: #22d3ee; }

        /* Game Elements */
        .slider-container { width: 90%; margin-top: 15px; position: relative; height: 40px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; 
            background: #fbbf24; border: 2px solid #78350f; margin-top: -12px; 
            box-shadow: 0 0 15px rgba(251, 191, 36, 1);
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        
        /* UI Buttons */
        .home-btn, .audio-btn {
            position: absolute; top: 1rem; 
            width: 40px; height: 40px; 
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; z-index: 50;
            transition: all 0.3s; backdrop-filter: blur(8px);
        }
        .home-btn { left: 1rem; }
        .audio-btn { right: 1rem; }
        @media (min-width: 768px) {
            .home-btn, .audio-btn { width: 48px; height: 48px; top: 1.5rem; }
            .home-btn { left: 1.5rem; }
            .audio-btn { right: 1.5rem; }
        }
        .home-btn:hover { border-color: #fbbf24; color: #fbbf24; transform: rotate(90deg); }
        .audio-btn:hover { border-color: #22d3ee; color: #22d3ee; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
    </style>
</head>
<body class="h-screen w-full relative flex flex-col md:flex-row overflow-hidden select-none">

    <button onclick="try{window.parent.closeViewer()}catch(e){location.reload()}" class="home-btn" title="Về Dòng Thời Gian">
        <i class="fas fa-arrow-left text-xl"></i>
    </button>
    
    <button id="audio-toggle" class="audio-btn" title="Âm Thanh">
        <i class="fas fa-volume-mute text-xl"></i>
    </button>
    
    <!-- Audio Sources -->
    <audio id="bgm" loop><source src="bgm_syracuse.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-water"><source src="sfx_water.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-metal"><source src="sfx_metal.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-fire"><source src="sfx_fire.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-win"><source src="sfx_win.mp3" type="audio/mpeg"></audio>

    <!-- Background Layers -->
    <div class="bg-gear-pattern"></div>
    <div class="absolute inset-0 bg-[url('bg_syracuse.jpg')] bg-cover bg-center opacity-30 pointer-events-none mix-blend-overlay"></div>

    <!-- LEFT AREA: CHARACTER -->
    <div class="w-full md:w-[40%] h-[15vh] md:h-full flex items-end md:items-center justify-center relative z-10 pointer-events-none transition-all duration-700" id="char-panel">
        <div class="char-container w-full h-full flex items-center justify-center relative">
            <div class="char-aura"></div>
            <!-- Character Image -->
            <img id="char-img" src="archimedes.png" 
                 onerror="this.style.display='none'" 
                 class="char-img-effect animate-breathe max-h-[140%] md:max-h-[90%] object-contain transform translate-y-[10%] md:translate-y-0 opacity-100 relative z-20" 
                 alt="Character">
            
            <!-- Name Tag -->
            <div id="name-tag" class="absolute bottom-1 md:bottom-16 bg-syracuse-dark/90 backdrop-blur-xl border-y border-syracuse-bronze/60 px-4 py-2 md:px-8 md:py-3 shadow-[0_0_30px_rgba(0,0,0,0.8)] z-30 transition-opacity duration-300 origin-bottom scale-75 md:scale-100">
                <h2 id="char-name" class="text-syracuse-gold font-title font-bold text-lg md:text-3xl tracking-[0.2em] text-center drop-shadow-md whitespace-nowrap">ARCHIMEDES</h2>
                <p id="char-role" class="text-syracuse-accent text-[10px] md:text-xs text-center uppercase tracking-widest font-sans mt-1">Thiên Tài Syracuse</p>
            </div>
        </div>
    </div>

    <!-- RIGHT AREA: INTERACTION -->
    <div class="w-full md:w-[60%] h-[85vh] md:h-full flex flex-col justify-end md:justify-center p-0 md:p-12 z-20 relative">
        <div id="main-dialog" class="dialog-box w-full h-full md:h-auto md:min-h-[600px] md:rounded-2xl p-3 md:p-10">
            
            <!-- Content Scroll Area -->
            <div class="flex-1 flex flex-col relative overflow-hidden" id="content-scroller">
                <!-- Visuals/Game Container -->
                <div id="visual-content" class="media-box empty:hidden flex-shrink-0 transition-all duration-500 opacity-0 transform translate-y-4"></div>
                
                <!-- Text Content -->
                <div id="story-text-container" class="flex-grow min-h-0 mt-2 md:mt-4">
                    <div id="story-content" class="story-text font-serif text-justify pr-2"></div>
                </div>
            </div>

            <!-- Action Area -->
            <div id="controls" class="flex flex-wrap gap-2 md:gap-4 justify-center md:justify-end items-center flex-shrink-0 pt-3 md:pt-6 border-t border-white/10 mt-2 md:mt-4"></div>
        </div>
    </div>

    <!-- ENDING / REWARD OVERLAY -->
    <div id="reward-overlay" class="fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center hidden backdrop-blur-xl p-8 text-center transition-opacity duration-1000">
        <div class="mb-8 animate-float relative">
            <div class="absolute inset-0 bg-syracuse-bronze/20 blur-[100px] rounded-full"></div>
            <i class="fas fa-infinity text-8xl md:text-9xl text-syracuse-gold drop-shadow-[0_0_50px_rgba(251,191,36,0.8)]"></i>
        </div>
        <h2 class="text-4xl md:text-6xl font-title font-bold text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-amber-700 mb-6 tracking-widest">DI SẢN BẤT TỬ</h2>
        <p class="text-slate-300 font-serif italic max-w-2xl mb-10 text-xl md:text-2xl leading-relaxed">
            "Người La Mã có thể chiếm được Syracuse, nhưng họ không bao giờ chiếm được trí tuệ của Archimedes."
        </p>
        <button onclick="try{window.parent.closeViewer()}catch(e){location.reload()}" class="btn-action w-64">
            Khép Lại Trang Sử
        </button>
    </div>

    <script>
        // --- 1. DỮ LIỆU & TÀI NGUYÊN (ASSETS) ---
        const CHARACTERS = {
            athena: { name: "NỮ THẦN ATHENA", role: "Vị Thần Trí Tuệ", img: "athena.png" },
            archimedes: { name: "ARCHIMEDES", role: "Nhà Toán Học Vĩ Đại", img: "archimedes.png" },
            hiero: { name: "VUA HIERO II", role: "Bạo Chúa Syracuse", img: "hiero.png" },
            soldier: { name: "MARCELLUS", role: "Đại Tướng La Mã", img: "soldier.png" },
            apollo: { name: "THẦN APOLLO", role: "Thần Mặt Trời", img: "apollo.png" },
            narrator: { name: "", role: "", img: "" }
        };

        const audio = {
            bgm: document.getElementById('bgm'),
            enabled: false,
            toggleBtn: document.getElementById('audio-toggle'),
            init: function() { this.toggleBtn.onclick = () => this.toggle(); },
            toggle: function() {
                this.enabled = !this.enabled;
                if (this.enabled) {
                    this.bgm.volume = 0.2; this.bgm.play().catch(()=>{});
                    this.toggleBtn.innerHTML = '<i class="fas fa-volume-up text-syracuse-gold"></i>';
                    this.toggleBtn.style.borderColor = '#fbbf24';
                } else {
                    this.bgm.pause();
                    this.toggleBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                    this.toggleBtn.style.borderColor = '#22d3ee';
                }
            },
            playSFX: function(id) {
                if (!this.enabled) return;
                const sfx = document.getElementById(id);
                if (sfx) { sfx.currentTime = 0; sfx.volume = 0.5; sfx.play().catch(()=>{}); }
            }
        };

        // --- 3. LOGIC GAME & VISUALIZATION ---
        let gameState = { crownTested: false, leverBalanced: false, piIterations: 0, fulcrumPos: 50, piStep: 0, mirrorAngle: 45 };

        // Game 1: Buoyancy - FIX: Using JS Animation instead of SVG SMIL
        function drawBuoyancyGame(showResult=false) { 
            const W=600,H=250; 
            const waterBaseY=180;
            
            // Logic: Render objects at START position (top) if animating, or HOLDING position if normal.
            // If showResult is true, we render them at TOP (y=60) and let JS animate them dropping.
            const itemStartY = 60; // Mouth of basin
            
            return `
            <div class="svg-container" style="background:transparent;box-shadow:none;border:none;">
                <svg viewBox="0 0 ${W} ${H}" class="w-full h-full">
                    <defs>
                        <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fce76c"/><stop offset="1" stop-color="#b45309"/></linearGradient>
                        <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.6"/><stop offset="1" stop-color="#0e7490" stop-opacity="0.9"/></linearGradient>
                    </defs>
                    
                    <!-- Tank 1 (Gold Block) -->
                    <g transform="translate(50, 0)">
                        <text x="80" y="30" fill="#fbbf24" font-size="12" font-weight="bold">KHỐI VÀNG</text>
                        <!-- Water -->
                        <rect id="water-gold" x="0" y="${waterBaseY}" width="160" height="40" fill="url(#waterGrad)" style="transform-box: fill-box; transform-origin: center bottom;">
                        </rect>
                        <!-- Tank Outline -->
                        <path d="M0,50 L0,220 L160,220 L160,50" fill="none" stroke="#94a3b8" stroke-width="2"/>
                        <!-- Item Group -->
                        <g id="g-gold" transform="translate(0, 0)">
                            <rect x="55" y="${itemStartY}" width="50" height="40" rx="4" fill="url(#goldGrad)" stroke="#fff">
                            </rect>
                        </g>
                        <!-- Splash -->
                        <circle id="splash-gold" cx="80" cy="${waterBaseY}" r="0" fill="white" class="opacity-0"></circle>
                        
                        <!-- Ruler Line -->
                        ${showResult ? `<line x1="165" y1="${waterBaseY - (40*0.15)}" x2="330" y2="${waterBaseY - (40*0.15)}" stroke="#64748b" stroke-dasharray="4" opacity="0.5"/>` : ''}
                    </g>

                    <!-- Tank 2 (Crown) -->
                    <g transform="translate(350, 0)">
                        <text x="80" y="30" fill="#fbbf24" font-size="12" font-weight="bold">VƯƠNG MIỆN</text>
                        <!-- Water -->
                        <rect id="water-crown" x="0" y="${waterBaseY}" width="160" height="40" fill="url(#waterGrad)" style="transform-box: fill-box; transform-origin: center bottom;">
                        </rect>
                        <!-- Tank Outline -->
                        <path d="M0,50 L0,220 L160,220 L160,50" fill="none" stroke="#94a3b8" stroke-width="2"/>
                        <!-- Item Group -->
                        <g id="g-crown" transform="translate(0, 0)">
                            <path d="M50,${itemStartY+40} L50,${itemStartY+10} L70,${itemStartY+30} L90,${itemStartY} L110,${itemStartY+30} L130,${itemStartY+10} L130,${itemStartY+40} Z" fill="url(#goldGrad)" stroke="#fff">
                            </path>
                        </g>
                        <!-- Splash -->
                        <circle id="splash-crown" cx="80" cy="${waterBaseY}" r="0" fill="white" class="opacity-0"></circle>
                    </g>

                    <!-- Comparison Text -->
                    ${showResult ? `
                        <g opacity="0" id="comparison-result">
                            <text x="280" y="${waterBaseY - 60}" fill="#ef4444" font-size="12" font-weight="bold" text-anchor="middle">CAO HƠN!</text>
                            <path d="M280,${waterBaseY-55} L280,${waterBaseY - (40*0.35) - 5}" stroke="#ef4444" marker-end="url(#arrow)" />
                        </g>
                    ` : ''}
                </svg>
            </div>`; 
        }

        // --- NEW ANIMATION LOGIC FOR BUOYANCY ---
        function runBuoyancyAnimation() {
            const duration = 1500;
            const startTime = performance.now();
            
            // Elements
            const gGold = document.getElementById('g-gold');
            const gCrown = document.getElementById('g-crown');
            const wGold = document.getElementById('water-gold');
            const wCrown = document.getElementById('water-crown');
            const sGold = document.getElementById('splash-gold');
            const sCrown = document.getElementById('splash-crown');
            const comp = document.getElementById('comparison-result');
            
            if(!gGold) return;

            // Physics Config
            const startY = 0; // Relative to Group
            const dropDist = 115; // 60 -> 175 = 115px
            const delayWater = 800; // ms

            function animate(t) {
                const elapsed = t - startTime;
                
                // 1. Drop Animation (Bounce effect)
                let pDrop = Math.min(elapsed / 1000, 1);
                // Ease Out Bounce simplified
                let easeDrop = 1 - Math.pow(1 - pDrop, 3); // Cubic out
                
                const currentY = startY + (dropDist * easeDrop);
                gGold.setAttribute('transform', `translate(0, ${currentY})`);
                gCrown.setAttribute('transform', `translate(0, ${currentY})`);

                // 2. Splash (Trigger once when drop finishes approx)
                if (elapsed > 900 && elapsed < 1000) {
                    sGold.classList.add('animate-bubble');
                    sCrown.classList.add('animate-bubble');
                }

                // 3. Water Rise (Delayed)
                if (elapsed > delayWater) {
                    const pWater = Math.min((elapsed - delayWater) / 1000, 1);
                    const easeWater = 1 - Math.pow(1 - pWater, 3);
                    
                    const scaleG = 1 + (0.15 * easeWater);
                    const scaleC = 1 + (0.35 * easeWater);
                    
                    wGold.setAttribute('transform', `scale(1, ${scaleG})`);
                    wCrown.setAttribute('transform', `scale(1, ${scaleC})`);
                }

                // 4. Comparison Result Fade In
                if (elapsed > 2000 && comp) {
                    comp.style.transition = 'opacity 1s';
                    comp.style.opacity = '1';
                }

                if (elapsed < 2500) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // Game 2: Lever
        function drawLeverGame(pos) { 
            const W=600,H=220; const barY=150; const barLen=500; const startX=(W-barLen)/2; 
            const isSuccess=pos<25; const fulcrumX=startX+(pos/100)*barLen; 
            const angle=isSuccess?12:-8; 
            const d1 = fulcrumX - startX; 
            const d2 = (startX + barLen) - fulcrumX; 
            
            return `
            <div class="svg-container" style="background:transparent;box-shadow:none;border:none;flex-direction:column;">
                <svg viewBox="0 0 ${W} ${H}" class="w-full h-full overflow-visible">
                    <defs>
                        <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fff" /></marker>
                    </defs>
                    <line x1="0" y1="${barY+30}" x2="${W}" y2="${barY+30}" stroke="#64748b" stroke-width="2"/>
                    
                    <!-- Lever Group -->
                    <g transform="rotate(${angle}, ${fulcrumX}, ${barY})">

                            <line x1="0" y1="0" x2="0" y2="80" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowHead)"/>
                            <text x="10" y="60" fill="#ef4444" font-weight="bold">P (Trọng Lực)</text>
                        </g>
                        
                        <!-- FORCE (Archimedes) -->

        // Game 3: Pi
        function drawPiGame(stepIndex) { 
            const sidesMap=[6,12,24,48,96]; const sides=sidesMap[stepIndex]; const R=80; const cx=300;const cy=110; 
            const piApprox=sides*Math.sin(Math.PI/sides); 
            
            let ptsInner=""; for(let i=0;i<sides;i++){const th=(i*2*Math.PI)/sides-Math.PI/2; ptsInner+=`${cx+R*Math.cos(th)},${cy+R*Math.sin(th)} `;}
            let ptsOuter=""; const R_out=R/Math.cos(Math.PI/sides); for(let i=0;i<sides;i++){const th=(i*2*Math.PI)/sides-Math.PI/2; ptsOuter+=`${cx+R_out*Math.cos(th)},${cy+R_out*Math.sin(th)} `;}

            return `<div class="svg-container" style="background:transparent;box-shadow:none;border:none;flex-direction:column;">
                <svg viewBox="0 0 600 240" class="w-full h-full overflow-visible">
                    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="4"/>
                    <polygon points="${ptsInner}" fill="rgba(34, 211, 238, 0.2)" stroke="#22d3ee" stroke-width="1"/>
                    <polygon points="${ptsOuter}" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2"/>
                    <text x="${cx}" y="${cy+R+40}" text-anchor="middle" fill="#ecfeff" font-family="Be Vietnam Pro" font-size="12">
                        Kẹp giữa đa giác nội tiếp (Xanh) và ngoại tiếp (Vàng)
                    </text>
                    <g transform="translate(100, 110)">
                        <text x="0" y="0" fill="#fbbf24" font-size="24" font-weight="bold" font-family="Cinzel">π ≈ ${piApprox.toFixed(5)}</text>
                        <text x="0" y="25" fill="#22d3ee" font-size="12">n = ${sides}</text>
                    </g>
                </svg>
                <div class="slider-container"><input type="range" min="0" max="4" value="${stepIndex}" step="1" oninput="updatePi(this.value)"></div>
            </div>`; 
        }

        // Game 4: Defense
        function drawDefenseGame(angle) { 
            const W=600,H=250; const sunX=50,sunY=30; const mirrorX=500,mirrorY=200; 
            const isHit=angle>=68&&angle<=74; 
            const visualAngleDeg=270-(angle*0.9); 
            const visualRad=visualAngleDeg*(Math.PI/180); 
            
            let endX=mirrorX+500*Math.cos(visualRad); 
            let endY=mirrorY+500*Math.sin(visualRad); 
            if(isHit) { endX = 100; endY = 180; } 

            return `
            <div class="svg-container" style="background:transparent;box-shadow:none;border:none;flex-direction:column;">
                <svg viewBox="0 0 ${W} ${H}" class="w-full h-full overflow-visible">
                    <defs><filter id="sunGlow"><feGaussianBlur stdDeviation="4" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                    <circle cx="${sunX}" cy="${sunY}" r="20" fill="#fbbf24" filter="url(#sunGlow)"/>
                    <line x1="${sunX}" y1="${sunY}" x2="${mirrorX}" y2="${mirrorY}" stroke="#fbbf24" stroke-width="2"/>
                    <line x1="${mirrorX}" y1="${mirrorY}" x2="${endX}" y2="${endY}" stroke="${isHit?'#ef4444':'#fbbf24'}" stroke-width="${isHit?4:2}" stroke-opacity="${isHit?1:0.5}" />
                    <line x1="${mirrorX}" y1="${mirrorY}" x2="${mirrorX - 50}" y2="${mirrorY - 50}" stroke="#fff" stroke-dasharray="4" opacity="0.5" transform="rotate(${angle-90}, ${mirrorX}, ${mirrorY})"/>
                    <g transform="translate(100, 190)">
                        <path d="M-30,0 Q0,20 30,0 L25,10 H-25 Z" fill="#3f2305"/>
                        <line x1="0" y1="0" x2="0" y2="-40" stroke="#5c3a12" stroke-width="3"/>
                        <path d="M0,-40 Q25,-30 0,-10" fill="${isHit?'#1f2937':'#e2e8f0'}" stroke="#94a3b8"/>
                        <g style="display:${isHit?'block':'none'}">
                            <circle cx="0" cy="-20" r="15" fill="#ef4444" opacity="0.8"><animate attributeName="r" values="10;15;10" duration="0.2s" repeatCount="indefinite"/></circle>
                            <circle cx="0" cy="-25" r="10" fill="#fbbf24"><animate attributeName="cy" values="-25;-30;-25" duration="0.3s" repeatCount="indefinite"/></circle>
                        </g>
                    </g>
                    <g transform="translate(${mirrorX}, ${mirrorY}) rotate(${angle/2})">
                        <path d="M0,-20 Q-10,0 0,20" stroke="#a3a3a3" stroke-width="4" fill="none"/>
                    </g>
                </svg>
                <div class="slider-container"><input type="range" min="0" max="100" value="${angle}" oninput="updateDefense(this.value)"></div>
            </div>`; 
        }

        window.updateLever = (val) => { gameState.fulcrumPos=parseInt(val); document.getElementById('visual-content').innerHTML=drawLeverGame(gameState.fulcrumPos); gameState.leverBalanced=gameState.fulcrumPos<25; };
        window.updatePi = (val) => { gameState.piStep=parseInt(val); document.getElementById('visual-content').innerHTML=drawPiGame(gameState.piStep); };
        window.updateDefense = (val) => { gameState.mirrorAngle=parseInt(val); document.getElementById('visual-content').innerHTML=drawDefenseGame(gameState.mirrorAngle); };

                char: 'narrator', 
                text: "Nhiệm vụ: Điều chỉnh góc nghiêng của các tấm gương đồng để chùm tia phản xạ hội tụ chính xác vào tiêu điểm là cánh buồm khô của tàu địch. Hãy nhớ góc tới bằng góc phản xạ ($i = i'$). (Gợi ý: Khoảng 70 độ).", 
                gameMode: true, 
                render: 'defense_game', 
                options: [{ label: "Khai hỏa!", action: 'check_defense' }] 
            },
            'game_defense_success': { 
                char: 'apollo', 
                text: "Ta, Apollo, Thần Mặt Trời, chứng giám cho trí tuệ của con người! Ngọn lửa công lý đã được thắp lên từ chính ánh sáng của ta. Kẻ xâm lăng kiêu ngạo sẽ phải trả giá bằng tro bụi!", 
                img: "img_burning_ship.png", 
                sfx: 'sfx-fire', 
                options: [{ label: "Kết cục bi tráng", next: 'scene_death' }] 
            },
            'game_defense_fail': { char: 'archimedes', type: 'feedback', text: "Chệch mục tiêu rồi! Năng lượng bị phân tán. Hãy tính toán lại góc phản xạ ngay để hội tụ ánh sáng vào một điểm!", options: [{ label: "Thử lại", next: 'game_defense_start' }] },
            'scene_death': {
                char: 'soldier',
                text: "Thành phố đã thất thủ do nội gián! Tướng quân Marcellus ra lệnh bắt sống Archimedes. Nhưng... này ông già kia! Đứng dậy ngay! Ngươi đang vẽ bậy gì trên đất thế?",
                img: "soldier.png",
                options: [{ label: "Archimedes phản ứng", next: 'scene_last_words' }]
            },
            'scene_last_words': {
                char: 'archimedes',
                text: "<span class='italic text-gray-400'>Vẫn cắm cúi giải bài toán hình học trên khay cát...</span><br><br>\"Tránh ra! Đừng làm hỏng các đường tròn của ta!\" (Noli turbare circulos meos!) Ta sắp tìm ra lời giải rồi...",
                img: "archimedes.png",
                options: [{ label: "Sự ra đi của huyền thoại", next: 'finish' }]
            },
            'finish': { action: 'show_reward', sfx: 'sfx-win' }
        };

        const ui = {
            dialog: document.getElementById('main-dialog'),
            textContainer: document.getElementById('story-text-container'),
            text: document.getElementById('story-content'),
            visual: document.getElementById('visual-content'),
            controls: document.getElementById('controls'),
            charImg: document.getElementById('char-img'),
            charName: document.getElementById('char-name'),
            charRole: document.getElementById('char-role'),
            charPanel: document.getElementById('char-panel'),
            nameTag: document.getElementById('name-tag')
        };

        function renderScene(id) {
            const scene = SCENES[id];
            if (!scene) return;
            if (scene.sfx) audio.playSFX(scene.sfx);
            
            if (scene.char) {
                const char = CHARACTERS[scene.char];
                if (ui.charName.innerText !== char.name || !ui.charImg.src.includes(char.img)) {
                    ui.charImg.classList.add('opacity-0', 'translate-y-4');
                    ui.nameTag.classList.add('opacity-0');
                    
                    setTimeout(() => {
                        if (char.img) {
                            ui.charImg.style.display = 'block';
                            ui.charImg.src = char.img; 
                            ui.nameTag.style.display = 'block';
                            
                            if (scene.char === 'archimedes' || scene.char === 'athena' || scene.char === 'apollo') {
                                ui.charImg.classList.add('char-active');
                            } else {
                                ui.charImg.classList.remove('char-active');
                            }
                        } else {
                            ui.charImg.style.display = 'none';
                            ui.nameTag.style.display = 'none';
                        }
                        
                        ui.charName.innerText = char.name; 
                        ui.charRole.innerText = char.role;
                        
                        ui.charImg.classList.remove('opacity-0', 'translate-y-4');
                        ui.nameTag.classList.remove('opacity-0');
                    }, 300);
                }
            }

            if (scene.gameMode) ui.dialog.classList.add('game-mode'); 
            else ui.dialog.classList.remove('game-mode');

            ui.text.innerHTML = scene.text || "";
            if (window.renderMathInElement) {
                renderMathInElement(ui.text, { 
                    delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}], 
                    throwOnError: false 
                });
            }
            
            ui.visual.innerHTML = ''; 
            ui.visual.classList.add('hidden'); 
            ui.visual.style.opacity = '0';
            
            setTimeout(() => {
                // FIXED LOGIC: Call Animation Function for Buoyancy
                if (scene.render === 'buoyancy_start') { 
                    ui.visual.classList.remove('hidden'); 
                    ui.visual.innerHTML = drawBuoyancyGame(false); 
                } 
                else if (scene.render === 'buoyancy_end') { 
                    ui.visual.classList.remove('hidden'); 
                    ui.visual.innerHTML = drawBuoyancyGame(true); 
                    // Trigger custom animation manually to guarantee execution
                    runBuoyancyAnimation();
                } 
                else if (scene.render === 'lever_game') { ui.visual.classList.remove('hidden'); ui.visual.innerHTML = drawLeverGame(gameState.fulcrumPos); } 
                else if (scene.render === 'pi_game') { ui.visual.classList.remove('hidden'); ui.visual.innerHTML = drawPiGame(gameState.piStep); } 
                else if (scene.render === 'defense_game') { ui.visual.classList.remove('hidden'); ui.visual.innerHTML = drawDefenseGame(gameState.mirrorAngle); }
                else if (scene.img) { ui.visual.classList.remove('hidden'); ui.visual.innerHTML = `<img src="${scene.img}" onerror="this.style.display='none'" class="rounded-lg shadow-lg w-full h-full object-contain animate-float" onload="this.style.opacity=1" style="opacity:0; transition: opacity 0.5s">`; }

                if (!ui.visual.classList.contains('hidden')) { 
                    ui.visual.style.opacity = '1'; 
                    ui.visual.style.transform = 'translateY(0)'; 
                }
            }, 100);

            ui.controls.innerHTML = '';
            if (scene.options) {
                scene.options.forEach(opt => {
                    const btn = document.createElement('button'); 
                    btn.className = 'btn-action flex-grow md:flex-grow-0 min-w-[160px]'; 
                    btn.innerText = opt.label;
                    btn.onclick = () => handleAction(opt, btn); 
                    ui.controls.appendChild(btn);
                });
            } else if (scene.action === 'show_reward') { 
                document.getElementById('reward-overlay').classList.remove('hidden'); 
                setTimeout(() => document.getElementById('reward-overlay').classList.remove('opacity-0'), 100); 
            }
        }

        function handleAction(opt, btn) {
            if (opt.action === 'drop_items') { renderScene('game_buoyancy_result'); return; }
            if (opt.action === 'check_lever') { 
                if (gameState.leverBalanced) { btn.classList.add('border-green-500'); renderScene('game_lever_success'); } 
                else { btn.classList.add('border-red-500', 'animate-pulse'); setTimeout(() => renderScene('game_lever_fail'), 1000); } 
                return; 
            }
            if (opt.action === 'check_pi') { 
                if (gameState.piStep >= 4) { btn.classList.add('border-green-500'); renderScene('game_pi_success'); } 
                else { btn.classList.add('border-red-500'); } 
                return; 
            }
            if (opt.action === 'check_defense') { 
                if (gameState.mirrorAngle >= 68 && gameState.mirrorAngle <= 74) { btn.classList.add('border-green-500'); renderScene('game_defense_success'); } 
                else { btn.classList.add('border-red-500'); setTimeout(() => renderScene('game_defense_fail'), 1000); } 
                return; 
            }
            if (opt.next) { renderScene(opt.next); return; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            audio.init();
            renderScene('intro'); 
        });
    </script>
</body>
</html>
