<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sử Ký Toán Học Toàn Thư</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deep: '#020617',
                        gold: '#fbbf24',
                        glass: 'rgba(15, 23, 42, 0.6)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)',
                        vietnam: '#da251d',
                    },
                    fontFamily: {
                        serif: ['Cinzel', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                        script: ['Dancing Script', 'cursive'],
                    },
                    animation: {
                        'float-slow': 'float 8s ease-in-out infinite',
                        'float-medium': 'float 5s ease-in-out infinite',
                        'float-fast': 'float 3s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.6, transform: 'scale(1)' },
                            '50%': { opacity: 1, transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: #e2e8f0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Math Symbols Background */
        .math-symbol {
            position: fixed;
            color: rgba(255, 255, 255, 0.03);
            font-family: 'Times New Roman', serif;
            font-style: italic;
            user-select: none;
            pointer-events: none;
            z-index: 0;
        }

        /* Timeline Line */
        .timeline-track {
            position: absolute; left: 24px; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(to bottom, transparent, #fbbf24, #ef4444, #38bdf8, #a855f7, transparent);
            z-index: 1;
        }
        
        @media (min-width: 768px) {
            .timeline-track { left: 50%; transform: translateX(-50%); }
        }

        /* Glassmorphism Card */
        .milestone-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glassBorder);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }
        .milestone-card:active { transform: scale(0.98); }
        @media (hover: hover) {
            .milestone-card:hover {
                transform: translateY(-5px);
                border-color: #fbbf24;
                box-shadow: 0 10px 40px -10px rgba(251, 191, 36, 0.15);
            }
        }

        /* Navigation Menu */
        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-overlay.active { opacity: 1; pointer-events: auto; }
        
        .nav-content {
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .nav-overlay.active .nav-content { transform: translateY(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="relative min-h-screen">

    <!-- Dynamic Background Symbols (Injected via JS) -->
    <div id="math-bg-container"></div>

    <!-- Header -->
    <header class="relative z-20 pt-16 pb-8 text-center px-4">
        <h1 class="text-3xl md:text-6xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-yellow-400 to-amber-600 mb-2 tracking-wider drop-shadow-lg">
            SỬ KÝ TOÁN HỌC
        </h1>
        <p class="text-slate-400 font-light text-xs md:text-sm tracking-[0.3em] uppercase opacity-80">
            Từ Bình Minh Cổ Đại Đến Kỷ Nguyên Số
        </p>
    </header>

    <!-- SEARCH / NAVIGATION FAB (Floating Action Button) -->
    <button onclick="toggleNav()" class="fixed bottom-6 right-6 z-50 w-14 h-14 bg-gradient-to-r from-amber-500 to-orange-600 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.5)] flex items-center justify-center text-white hover:scale-110 active:scale-95 transition-all duration-300 animate-pulse-glow">
        <i class="fas fa-compass text-2xl"></i>
    </button>

    <!-- NAVIGATION OVERLAY -->
    <div id="nav-overlay" class="nav-overlay" onclick="toggleNav()">
        <div class="nav-content bg-slate-900/90 border border-white/10 p-6 rounded-2xl w-[90%] max-w-md shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="toggleNav()" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            <h3 class="text-amber-400 font-serif font-bold text-xl mb-6 text-center border-b border-white/10 pb-3">MỤC LỤC THỜI ĐẠI</h3>
            <div id="nav-list" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Main Timeline -->
    <main class="relative z-10 container mx-auto px-4 pb-32 overflow-hidden">
        <div class="timeline-track"></div>
        <div id="timeline-container" class="space-y-16 md:space-y-24 relative pt-8">
            <!-- Content injected by JS -->
        </div>
    </main>

    <!-- STORY VIEWER (IFRAME MODAL) -->
    <div id="story-viewer" class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-xl transition-all duration-300 opacity-0 pointer-events-none transform scale-95 flex flex-col">
        <!-- Control Bar -->
        <div class="h-14 bg-slate-900/90 border-b border-white/10 flex items-center justify-between px-4 flex-shrink-0">
            <div class="flex items-center gap-3 overflow-hidden">
                <i class="fas fa-book-open text-amber-400 flex-shrink-0"></i>
                <span id="viewer-title" class="font-serif font-bold text-slate-200 text-sm md:text-base truncate">Đang tải...</span>
            </div>
            <button onclick="closeViewer()" class="flex items-center gap-2 px-3 py-1.5 bg-amber-500/20 text-amber-400 rounded-full hover:bg-amber-500 hover:text-white transition-colors">
                <i class="fas fa-home"></i> <span class="text-xs font-bold hidden md:inline">Đóng</span>
            </button>
        </div>
        <!-- Iframe -->
        <div class="flex-1 relative w-full h-full bg-black">
            <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center text-amber-500 gap-2">
                <i class="fas fa-circle-notch fa-spin text-3xl"></i>
                <span class="text-xs tracking-widest">ĐANG MỞ CỔNG TRI THỨC...</span>
            </div>
            <iframe id="content-frame" class="w-full h-full border-none opacity-0 transition-opacity duration-500"></iframe>
        </div>
    </div>

            {
                year: 'Năm 2014', title: 'Huy Chương Fields Nữ', figure: 'Maryam Mirzakhani',
                desc: 'Người phụ nữ đầu tiên và duy nhất tính đến 2014 nhận giải Fields về hình học các mặt Riemann.',
                icon: 'fas fa-infinity', file: 'mirzakhani.html', ready: true
            }
        ];

        // --- BACKGROUND EFFECT: FLOATING MATH ---
        function initBackground() {
            const container = document.getElementById('math-bg-container');
            const symbols = ['π', '∞', '∑', '∫', '√', '∂', 'ƒ', '∆', 'e', 'i', 'sin', 'log', 'φ', 'Ω', 'λ'];
            const count = 25; // Số lượng ký hiệu

            for(let i=0; i<count; i++) {
                const el = document.createElement('div');
                el.classList.add('math-symbol');
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Random position & animation
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.fontSize = (Math.random() * 40 + 20) + 'px';
                el.style.opacity = Math.random() * 0.15 + 0.05;
                
                // Random animation duration
                const anims = ['animate-float-slow', 'animate-float-medium', 'animate-float-fast'];
                el.classList.add(anims[Math.floor(Math.random() * anims.length)]);
                
                container.appendChild(el);
            }
        }

        // --- RENDER TIMELINE ---
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            const navList = document.getElementById('nav-list');
            let counter = 0; // Để đếm chẵn lẻ cho layout zigzag

            timelineData.forEach((item, index) => {
                if (item.type === 'era') {
                    // 1. Render ERA Divider
                    const div = document.createElement('div');
                    div.id = item.id; // Neo cho tìm kiếm
                    div.className = "flex justify-center items-center py-10 relative z-10 scroll-mt-24";
                    
                    const bgClass = item.bg || 'bg-slate-900/80';
                    const borderClass = item.border || 'border-white/10';
                    
                    div.innerHTML = `
                        <div class="px-8 py-3 rounded-full border ${borderClass} ${bgClass} backdrop-blur shadow-2xl transform hover:scale-105 transition duration-500">
                            <span class="${item.color} font-serif font-bold tracking-[0.2em] text-sm md:text-xl text-center block uppercase">
                                <i class="fas fa-bookmark mr-2 text-xs opacity-50"></i>${item.label}
                            </span>
                        </div>
                    `;
                    container.appendChild(div);

                    // 2. Add to Navigation Menu
                    const navItem = document.createElement('button');
                    navItem.className = "w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition flex items-center justify-between group border-b border-white/5 last:border-0";
                    navItem.onclick = () => scrollToEra(item.id);
                    navItem.innerHTML = `
                        <span class="${item.color} font-bold text-sm">${item.label}</span>
                        <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
                    `;
                    navList.appendChild(navItem);

                } else {
                    // 3. Render MILESTONE (Card)
                    const isEven = counter % 2 === 0;
                    const wrapper = document.createElement('div');
                    
                    // Desktop layout logic
                    const desktopClasses = isEven ? 'md:flex-row' : 'md:flex-row-reverse';
                    const paddingClasses = isEven ? 'md:pr-16 md:text-right' : 'md:pl-16 md:text-left';
                    const alignClasses = isEven ? 'md:items-end' : 'md:items-start';

                    // Special styling for Vietnam
                    const cardBorder = item.special ? 'border-red-500/30' : 'border-white/10';
                    const iconBg = item.special ? 'bg-red-900/20 border-red-500/50' : 'bg-deep border-slate-700';
                    const iconColor = item.special ? 'text-red-400' : 'text-slate-500';

                    wrapper.className = `flex flex-row ${desktopClasses} items-start md:items-center w-full group pl-10 md:pl-0 relative`;
                    
                    wrapper.innerHTML = `
                        <!-- Content Side -->
                        <div class="w-full md:w-1/2 ${paddingClasses} mb-2 md:mb-0">
                            <div class="milestone-card p-5 md:p-8 rounded-2xl relative overflow-hidden ${cardBorder} flex flex-col ${alignClasses}">
                                <!-- Glow Effect -->
                                <div class="absolute top-0 right-0 w-20 h-20 bg-amber-500/10 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>
                                
                                <span class="${item.special ? 'text-red-400' : 'text-amber-500'} font-mono text-xs font-bold tracking-widest uppercase mb-1">${item.year}</span>
                                <h2 class="text-xl md:text-2xl font-serif font-bold text-white mb-1 group-hover:text-amber-300 transition leading-tight">${item.figure}</h2>
                                <h3 class="text-slate-400 text-xs font-bold uppercase mb-3 tracking-wider">${item.title}</h3>
                                <p class="text-slate-300 font-light text-sm leading-relaxed mb-4 line-clamp-3 md:line-clamp-none">${item.desc}</p>
                                
                                <button onclick="openViewer('${item.file}', '${item.figure}')" class="px-5 py-2 bg-slate-800 hover:bg-amber-600 text-slate-300 hover:text-white rounded-lg transition-all duration-300 text-sm font-bold flex items-center gap-2 border border-white/5 w-fit">
                                    <span>Chi tiết</span> <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Center Icon (Desktop Center / Mobile Left) -->
                        <div class="absolute left-[17px] md:left-1/2 top-8 md:top-1/2 transform -translate-x-1/2 md:-translate-y-1/2 z-10 
                                    w-10 h-10 md:w-14 md:h-14 flex-shrink-0 ${iconBg} border-2 md:border-4 rounded-full flex items-center justify-center 
                                    shadow-lg group-hover:scale-110 group-hover:border-amber-400 transition-all duration-500 bg-deep">
                            <i class="${item.icon} ${iconColor} text-sm md:text-xl group-hover:text-amber-400 transition-colors"></i>
                        </div>

                        <!-- Empty Balance Side (Desktop only) -->
                        <div class="w-full md:w-1/2 hidden md:block"></div>
                    `;
                    container.appendChild(wrapper);
                    counter++;
                }
            });
        }

        // --- INTERACTION LOGIC ---
        
        // 1. Navigation Menu
        function toggleNav() {
            document.getElementById('nav-overlay').classList.toggle('active');
        }

        function scrollToEra(id) {
            toggleNav(); // Close menu
            const element = document.getElementById(id);
            if(element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 2. Viewer (Iframe)
        const viewer = {
            modal: document.getElementById('story-viewer'),
            frame: document.getElementById('content-frame'),
            title: document.getElementById('viewer-title'),
            loader: document.getElementById('loader')
        };

        function openViewer(file, title) {
            viewer.title.textContent = title;
            viewer.loader.style.display = 'flex';
            viewer.frame.style.opacity = '0';
            viewer.frame.src = file;
            
            viewer.modal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
            viewer.modal.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
            document.body.style.overflow = 'hidden';
        }

        function onFrameLoad() {
            viewer.loader.style.display = 'none';
            viewer.frame.style.opacity = '1';
        }
        
        // Add event listener safely
        viewer.frame.addEventListener('load', onFrameLoad);

        function closeViewer() {
            viewer.modal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            viewer.modal.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
            
            setTimeout(() => { viewer.frame.src = 'about:blank'; }, 300);
            document.body.style.overflow = '';
        }

        // Close on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeViewer();
        });

        // --- INIT ---
        initBackground();
        renderTimeline();

        // Reveal Animation on Scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        // Apply initial state for animation
        document.querySelectorAll('.milestone-card').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            observer.observe(el);
        });

    </script>
</body>
</html>
