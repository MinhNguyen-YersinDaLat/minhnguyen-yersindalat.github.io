<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pythagoras: Huyền Thoại Những Con Số</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0a0a0c',
                        gold: {
                            dim: '#856636',
                            base: '#d4af37',
                            light: '#f7e3a1',
                            glow: '#ffdf80'
                        },
                    },
                    fontFamily: {
                        title: ['"Cinzel"', 'serif'],
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"Merriweather"', 'serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } },
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } }
                    }
                }
            }
        }
    </script>

    <style>
        /* --- CORE --- */
        body { background-color: #050505; color: #e5e7eb; overflow: hidden; touch-action: manipulation; }

        /* --- LAYOUT STRUCTURE (The "Stage") --- */
        #stage {
            position: relative;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. VISUAL LAYER (Top/Center) */
        #visual-layer {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding-bottom: 200px; /* Leave space for dialog */
        }

        /* 2. CHARACTER LAYER (Bottom Left) */
        #char-layer {
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 400px; /* Fixed width to control aspect ratio */
            height: 80vh; /* Max height relative to screen */
            z-index: 5; /* Behind dialog, in front of BG */
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            transition: all 0.5s ease-out;
        }
        
        .char-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom left;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            transition: opacity 0.5s, transform 0.5s;
        }

        /* 3. DIALOGUE LAYER (Bottom Fixed) */
        #dialogue-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 280px; /* Fixed height for consistency */
            z-index: 20;
            display: flex;
            justify-content: center;
            padding: 0 2rem 2rem 2rem;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 60%, transparent 100%);
        }

        .dialog-box {
            width: 100%;
            max-width: 1000px;
            background: rgba(16, 12, 20, 0.95);
            border: 1px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            #visual-layer {
                padding-bottom: 0;
                align-items: flex-start;
                padding-top: 60px; /* Space for visual */
            }
            #char-layer {
                left: 50%;
                transform: translateX(-50%);
                width: 300px;
                height: 50vh;
                opacity: 0.4; /* Fade out on mobile to see text/visuals */
                bottom: 150px; /* Push up slightly behind text */
                z-index: 1; /* Send to back */
            }
            #dialogue-layer {
                height: auto;
                min-height: 250px;
                padding: 1rem;
                background: linear-gradient(to top, rgba(0,0,0,1) 20%, transparent 100%);
            }
            .dialog-box {
                flex-direction: column;
            }
            #choices-panel {
                border-left: none !important;
                border-top: 1px solid rgba(255,255,255,0.1);
                width: 100% !important;
                max-height: 100px;
            }
        }

        /* --- MATH PROOF ENGINE (Precise CSS Geometry) --- */
        /*
           We use a 280x280 container.
           a = 120px (3 units)
           b = 160px (4 units)
        */
        .proof-board {
            position: relative;
            width: 282px; height: 282px; /* +2px for border */
            border: 2px solid #555;
            background: #111;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }

        /* The 4 Triangles */
        .tri {
            position: absolute;
            transition: all 1.2s cubic-bezier(0.5, 0, 0.1, 1);
            opacity: 0.9;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2);
            /* Gradient Gold */
            background: linear-gradient(135deg, #b8860b, #eab308); 
        }

        /* Triangle Shapes defined by clip-path */
        /* T1: Width 120, Height 160. Right Angle Top-Left */
        .tri-1 { width: 120px; height: 160px; clip-path: polygon(0 0, 100% 0, 0 100%); }
        
        /* T2: Width 160, Height 120. Right Angle Top-Right */
        .tri-2 { width: 160px; height: 120px; clip-path: polygon(100% 0, 100% 100%, 0 0); }

        /* T3: Width 120, Height 160. Right Angle Bottom-Right */
        .tri-3 { width: 120px; height: 160px; clip-path: polygon(100% 100%, 0 100%, 100% 0); }

        /* T4: Width 160, Height 120. Right Angle Bottom-Left */
        .tri-4 { width: 160px; height: 120px; clip-path: polygon(0 100%, 0 0, 100% 100%); }

        /* --- STATE POSITIONS --- */
        
        /* STATE C (Initial): Center tilted square */
        .pos-c .tri-1 { top: 0; left: 0; }
        .pos-c .tri-2 { top: 0; right: 0; }
        .pos-c .tri-3 { bottom: 0; right: 0; }
        .pos-c .tri-4 { bottom: 0; left: 0; }

        /* STATE AB (Target): Two Rectangles */
        /* Goal: Create a^2 hole (Top-Right) and b^2 hole (Bottom-Left)? 
           Wait, standard proof creates a^2 (Top-Left) and b^2 (Bottom-Right).
           Let's align to make Rectangles at BL and TR.
        */
        /* Rectangle at Bottom-Left (120x160): Uses T1 and T3.
           T1 (starts TL): Moves down to (bottom:0, left:0) ? No, T1 is TL-oriented.
           It must sit at TOP of the BL-Rect. top: 120px (since 280-160=120). left:0.
           T3 (starts BR): Moves to (bottom:0, left:0).
        */
        .pos-ab .tri-1 { top: 120px; left: 0; } 
        .pos-ab .tri-3 { bottom: 0; left: 0; } /* T3 is BR-oriented, fits bottom of rect */
        
        /* Rectangle at Top-Right (160x120): Uses T2 and T4.
           T2 (starts TR): Stays at (top:0, right:0).
           T4 (starts BL): Moves to (top:0, right:0). T4 is BL-oriented, fits top-left of the TR-Rect? No.
           T4 is BL-oriented (width 160, height 120).
           Clip: (0 100%, 0 0, 100% 100%).
           If moved to Top-Right area...
           Let's move T4 to top:0, right:0.
           It sits on top of T2?
           T2 is TR-oriented. T4 is BL-oriented.
           They combine to form a 160x120 rectangle.
        */
        .pos-ab .tri-2 { top: 0; right: 0; }
        .pos-ab .tri-4 { top: 0; right: 0; } /* Slides all the way to TR corner */

        /* Math Labels */
        .lbl {
            position: absolute; color: white; font-family: 'Cinzel', serif; font-weight: bold;
            text-shadow: 0 0 5px black; opacity: 0; transition: opacity 1s; z-index: 20; pointer-events: none;
        }
        .pos-c .lbl-c { opacity: 1; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; }
        .pos-ab .lbl-a { opacity: 1; top: 60px; left: 60px; transform: translate(-50%, -50%); font-size: 24px; color: #facc15; } /* Top-Left Hole (120x120) */
        .pos-ab .lbl-b { opacity: 1; bottom: 80px; right: 80px; transform: translate(50%, 50%); font-size: 28px; color: #facc15; } /* Bottom-Right Hole (160x160) */

    </style>
</head>
<body>

    <!-- STAGE -->
    <div id="stage">
        
        <!-- Background -->
        <div id="bg-layer" class="absolute inset-0 z-0 bg-cover bg-center transition-all duration-1000 opacity-40"></div>
        <div class="absolute inset-0 z-0 bg-gradient-to-t from-void via-void/80 to-transparent pointer-events-none"></div>

        <!-- 1. Visual Layer (Math) -->
        <div id="visual-layer">
            <div id="visual-content" class="transition-all duration-500 transform scale-90 md:scale-100">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- 2. Character Layer -->
        <div id="char-layer">
            <img id="char-img" src="" class="char-img" alt="Character">
        </div>

        <!-- 3. Dialogue Layer -->
        <div id="dialogue-layer">
            <div class="dialog-box animate-slide-up">
                
                <!-- Left: Name & Text -->
                <div class="flex-1 flex flex-col p-6 relative">
                    <!-- Speaker Name -->
                    <div class="flex items-center gap-3 mb-2 border-b border-white/10 pb-2">
                        <h2 id="speaker-name" class="text-gold-base font-title text-xl tracking-widest uppercase"></h2>
                    </div>
                    
                    <!-- Text Content -->
                    <div class="flex-1 overflow-y-auto pr-2 custom-scroll">
                        <p id="dialogue-text" class="font-body text-lg leading-relaxed text-gray-200 text-justify"></p>
                        
                        <!-- Math Note (Conditional) -->
                        <div id="math-note-box" class="hidden mt-4 p-3 bg-black/40 border-l-2 border-gold-dim rounded-r">
                            <span class="text-gold-base text-xs font-bold uppercase block mb-1">Góc Toán Học</span>
                            <p id="math-note-text" class="text-sm text-slate-300 italic"></p>
                        </div>
                    </div>
                </div>

                <!-- Right: Choices -->
                <div id="choices-panel" class="w-72 bg-black/20 border-l border-white/10 p-4 flex flex-col gap-2 overflow-y-auto">
                    <!-- Buttons injected here -->
                </div>

            </div>
        </div>

    </div>

    <script>
        // --- ASSETS ---
        const ASSETS = {
            pythagoras: "pythagoras.png",
            theano: "theano.png",
            hippasus: "hippasus.png",
            blacksmith: "blacksmith_scene.png",
            monochord: "monochord_art.png",
            storm: "storm_ship.png",
            tetractys: "tetractys_symbol.png"
        };

        // --- MATH VISUALS ---
        
        // 1. Precise Proof Animation
        function renderProof(state) {
            // state: 'intro' (c^2) or 'slide' (a^2+b^2)
            const posClass = state === 'slide' ? 'pos-ab' : 'pos-c';
            
            return `
            <div class="flex flex-col items-center gap-6 animate-fade-in">
                <div class="proof-board ${posClass}">
                    <!-- Grid Lines (Subtle) -->
                    <div class="absolute inset-0 opacity-10 bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)] bg-[size:20px_20px]"></div>

                    <!-- Labels -->
                    <div class="lbl lbl-c">c²</div>
                    <div class="lbl lbl-a">a²</div>
                    <div class="lbl lbl-b">b²</div>

                    <!-- Triangles -->
                    <div class="tri tri-1"></div>
                    <div class="tri tri-2"></div>
                    <div class="tri tri-3"></div>
                    <div class="tri tri-4"></div>
                </div>
                <div class="bg-black/60 px-4 py-2 rounded-full border border-gold-dim/30">
                    <p class="text-xs text-slate-300 italic">
                        ${state === 'slide' ? 'Dịch chuyển tạo khoảng trống a² và b²' : 'Hình vuông c² ở giữa'}
                    </p>
                </div>
            </div>`;
        }

        // 2. Monochord
        function renderMonochord() {
            return `
            <div class="bg-black/80 p-6 rounded-lg border border-gold-dim shadow-2xl max-w-sm w-full animate-fade-in">
                <div class="flex justify-between text-xs text-gold-base mb-4 uppercase tracking-widest">
                    <span>Gốc (1:1)</span>
                    <span>Tỷ lệ vàng</span>
                    <span>Quãng 8</span>
                </div>
                <div class="relative h-12 flex items-center mb-2">
                    <div class="absolute w-full h-[2px] bg-gray-600"></div>
                    <div class="absolute w-full h-[4px] bg-gold-base opacity-50 animate-pulse"></div>
                    <div class="absolute left-2/3 top-1/2 transform -translate-y-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-r-[6px] border-b-[12px] border-l-transparent border-r-transparent border-b-white"></div>
                </div>
                <div class="text-center font-serif text-gold-light italic">"Tỷ lệ 2:3 tạo nên Quãng 5 hoàn hảo"</div>
            </div>`;
        }

        // --- STORY DATA ---
        const STORY = [
            {
                id: "intro",
                speaker: "",
                bg: "black",
                char: null,
                visual: `<div class="text-center"><h1 class="font-title text-6xl text-gold-base mb-4 animate-float drop-shadow-[0_0_15px_gold]">SAMOS</h1><p class="text-slate-500 text-sm tracking-[0.5em] uppercase">530 TCN</p></div>`,
                text: "Chào mừng người lữ hành. Bạn đang đứng trước cổng đền thờ tri thức. Hãy gạt bỏ mọi tạp niệm, bởi ở đây, chúng ta chỉ tôn thờ một thứ duy nhất: Chân Lý.",
                choices: [{ text: "Bước vào", next: "meet_pythagoras" }]
            },
            {
                id: "meet_pythagoras",
                speaker: "Pythagoras",
                bg: ASSETS.monochord,
                char: ASSETS.pythagoras,
                visual: null,
                text: "Ta là Pythagoras. Ngươi thấy thế giới này hỗn loạn ư? Không. Đó chỉ là ảo ảnh. Bản chất thực sự của vũ trụ là những con số (Arithmos). Mọi thứ đều có thể đo đếm được.",
                choices: [{ text: "Tại sao lại là Số?", next: "blacksmith" }]
            },
            {
                id: "blacksmith",
                speaker: "Pythagoras",
                bg: ASSETS.blacksmith,
                char: ASSETS.pythagoras,
                visual: renderMonochord(),
                text: "Ta đã nghe tiếng búa rèn sắt. Những chiếc búa có trọng lượng tỷ lệ đơn giản (1:2, 2:3) tạo ra âm thanh êm dịu. Những tỷ lệ lẻ loi tạo ra tiếng ồn. Âm nhạc chính là Toán học biết hát.",
                mathNote: "Pythagoras phát hiện ra mối liên hệ giữa độ dài dây đàn và cao độ âm thanh.",
                choices: [{ text: "Thật kỳ diệu", next: "meet_theano" }]
            },
            {
                id: "meet_theano",
                speaker: "Theano",
                bg: "black",
                char: ASSETS.theano,
                visual: `<img src="${ASSETS.tetractys}" class="w-48 animate-pulse-glow drop-shadow-[0_0_30px_gold]">`,
                text: "Ta là Theano. Nếu âm nhạc là số trong thời gian, thì Hình học là số trong không gian. Định lý vĩ đại nhất của chúng ta nói về sự bảo toàn diện tích.",
                choices: [{ text: "Định lý tam giác vuông?", next: "proof_start" }]
            },
            {
                id: "proof_start",
                speaker: "Theano",
                bg: "black",
                char: ASSETS.theano,
                visual: renderProof('intro'),
                text: "Hãy nhìn hình vuông lớn này. 4 tam giác vàng bao quanh một hình vuông nghiêng ở giữa. Đó là bình phương cạnh huyền \\(c^2\\).",
                mathNote: "Diện tích hình vuông nghiêng = Tổng diện tích - 4 tam giác.",
                choices: [{ text: "Chứng minh nó!", next: "proof_slide" }]
            },
            {
                id: "proof_slide",
                speaker: "Pythagoras",
                bg: "black",
                char: ASSETS.pythagoras,
                visual: renderProof('slide'),
                text: "Hãy quan sát! Ta trượt các tam giác đi. Diện tích màu đen không đổi, nhưng giờ nó tách thành hai hình vuông nhỏ: \\(a^2\\) và \\(b^2\\). Vậy \\(c^2 = a^2 + b^2\\). Chân lý đã hiện ra!",
                mathNote: "Chứng minh bằng phương pháp sắp xếp lại (Rearrangement Proof).",
                choices: [{ text: "Quá thuyết phục!", next: "meet_hippasus" }]
            },
            {
                id: "meet_hippasus",
                speaker: "Hippasus",
                bg: ASSETS.storm,
                char: ASSETS.hippasus,
                visual: null,
                text: "Thưa thầy... Định lý rất đẹp. Nhưng con đã tìm ra một con quái vật. Hình vuông cạnh 1 có đường chéo là bao nhiêu? Nó không phải là số nguyên, cũng không phải phân số!",
                choices: [{ text: "Số Vô Tỉ?", next: "crisis" }]
            },
            {
                id: "crisis",
                speaker: "Hippasus",
                bg: ASSETS.storm,
                char: ASSETS.hippasus,
                visual: `<h1 class="text-6xl text-red-600 font-title animate-pulse drop-shadow-[0_0_20px_red]">ALOGON</h1>`,
                text: "Đó là Alogon - Điều không thể nói ra. \\(\\sqrt{2}\\) là một vực thẳm vô tận. Sự hài hòa của vũ trụ đã bị phá vỡ!",
                mathNote: "Sự phát hiện ra số vô tỉ đã gây ra cuộc khủng hoảng toán học đầu tiên.",
                choices: [{ text: "Kết thúc", next: "ending" }]
            },
            {
                id: "ending",
                speaker: "",
                bg: ASSETS.storm,
                char: null,
                visual: `<p class="text-xl italic text-slate-300">"Chân lý không bao giờ chết."</p>`,
                text: "Hippasus đã phải trả giá bằng mạng sống, nhưng cánh cửa đến vô hạn đã mở ra. Toán học hiện đại bắt đầu từ sự đổ vỡ đó.",
                choices: [{ text: "Hành trình lại", next: "intro" }]
            }
        ];

        // --- ENGINE ---
        const ui = {
            bg: document.getElementById('bg-layer'),
            visual: document.getElementById('visual-content'),
            charImg: document.getElementById('char-img'),
            charLayer: document.getElementById('char-layer'),
            name: document.getElementById('speaker-name'),
            dialogue: document.getElementById('dialogue-text'),
            choices: document.getElementById('choices-panel'),
            mathNoteBox: document.getElementById('math-note-box'),
            mathNoteText: document.getElementById('math-note-text')
        };

        function renderScene(id) {
            const scene = STORY.find(s => s.id === id);
            if(!scene) return;

            // BG
            if(scene.bg.includes('.')) {
                ui.bg.style.backgroundImage = `url('${scene.bg}')`;
                ui.bg.classList.remove('bg-black');
            } else {
                ui.bg.style.backgroundImage = 'none';
                ui.bg.classList.add('bg-black');
            }

            // Character
            if(scene.char) {
                if(!ui.charImg.src.includes(scene.char)) {
                    ui.charLayer.style.opacity = 0;
                    ui.charLayer.style.transform = 'translateX(-20px)';
                    setTimeout(() => {
                        ui.charImg.src = scene.char;
                        ui.charLayer.style.opacity = 1;
                        ui.charLayer.style.transform = 'translateX(0)';
                    }, 400);
                } else {
                    ui.charLayer.style.opacity = 1;
                    ui.charLayer.style.transform = 'translateX(0)';
                }
            } else {
                ui.charLayer.style.opacity = 0;
            }

            // Visual
            ui.visual.innerHTML = scene.visual || '';
            if(scene.visual) renderMathInElement(ui.visual, {delimiters:[{left:"\\(",right:"\\)",display:false}]});

            // Text
            ui.name.innerText = scene.speaker;
            ui.dialogue.innerText = scene.text;
            if(scene.text) renderMathInElement(ui.dialogue, {delimiters:[{left:"\\(",right:"\\)",display:false}]});

            // Math Note
            if(scene.mathNote) {
                ui.mathNoteBox.classList.remove('hidden');
                ui.mathNoteText.innerText = scene.mathNote;
            } else {
                ui.mathNoteBox.classList.add('hidden');
            }

            // Choices
            ui.choices.innerHTML = '';
            scene.choices.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-3 text-gold-light border border-gold-dim/30 hover:bg-gold-dim/20 hover:border-gold-base transition-all rounded mb-2 font-heading text-sm';
                btn.innerHTML = `✦ ${opt.text}`;
                btn.onclick = () => renderScene(opt.next);
                ui.choices.appendChild(btn);
            });
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => renderScene('intro'));

    </script>
</body>
</html>
