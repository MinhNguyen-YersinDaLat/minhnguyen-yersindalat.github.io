    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0a0a0c',
                        gold: {
                            dim: '#856636',
                            base: '#d4af37',

                            glow: '#ffdf80'
                        },

                    },

    <style>
        /* --- CORE STYLES --- */
        body { background-color: #0a0a0c; color: #e5e7eb; overflow: hidden; touch-action: manipulation; }

        /* --- LAYOUT GRID --- */
        #main-container {
            display: grid;
            grid-template-rows: 1fr auto; /* Top takes remaining space, Bottom takes content size */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- VISUAL AREA (TOP) --- */
        #visual-area {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 10;
        }

        /* --- BOTTOM AREA (Dialogue + Char) --- */
        #bottom-area {
            position: relative;
            width: 100%;
            display: flex;
            align-items: flex-end; /* Align items to bottom */
            justify-content: center;
            padding: 0 1rem 1rem 1rem;
            z-index: 20;
            gap: 1rem; /* Space between char and box */
        }

        /* CHARACTER DISPLAY FIXES */
        .char-wrapper {
            flex-shrink: 0;
            width: 250px; /* Fixed width for character base */
            height: 350px; /* Reasonable height constraint */
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .char-portrait {
            max-width: 100%;
            max-height: 130%; /* Allow to grow upwards out of wrapper */
            object-fit: contain;
            object-position: bottom center;
            mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
            transition: all 0.5s ease-out;
            transform-origin: bottom center;
        }

        /* Responsive Character */
        @media (max-width: 768px) {
            #bottom-area {
                flex-direction: column-reverse; /* Stack dialogue below, char on top? No, usually side by side or char behind */
                align-items: center;
                padding-bottom: 0;
            }
            .char-wrapper {
                width: 120px;
                height: 120px;
                position: absolute;
                bottom: 100%; /* Sit on top of dialogue box */
                left: 0;
                z-index: 5;
            }
            .char-portrait {
                max-height: 150px;
            }
            /* Push dialogue down slightly or adjust padding */
            .glass-panel {
                border-radius: 12px 12px 0 0 !important;
            }
        }

        /* DIALOGUE BOX */
        .glass-panel {
            flex-grow: 1;
            max-width: 800px;
            background: rgba(10, 5, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid #d4af37;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.8);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 220px; /* Fixed height for stability */
        }
        
        @media (max-width: 768px) {
            .glass-panel {
                width: 100%;
                height: 40vh; /* Taller on mobile for text */
                border-radius: 16px 16px 0 0;
            }
        }

        .btn-choice {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.05), transparent);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-left: 3px solid #d4af37;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
            padding: 0.75rem 1rem;
            color: #f3e5ab;
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
        }
        .btn-choice:hover {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.25), rgba(212, 175, 55, 0.05));
            border-color: #ffdf80;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            padding-left: 1.5rem;
        }

        /* --- VISUAL PROOF (The Math Engine) --- */
        /* Canvas container for the proof */
        .proof-stage {
            position: relative;
            width: 300px; height: 300px;
            background: #1a1a1a;
            border: 2px solid #555;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            margin: auto;
            overflow: hidden;
        }

        /* DIMENSIONS:
           Side a = 120px
           Side b = 180px
           Total = 300px
        */
        
        .shape {
            position: absolute;
            transition: all 1.5s cubic-bezier(0.65, 0, 0.35, 1);
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
        }
        
        /* The 4 Congruent Right Triangles */
        /* Base: 120, Height: 180. Color: Gold/Amber */
        /* We use clip-path to cut rectangles into triangles */
        
        /* Triangle 1 */
        .tri-1 { 
            width: 120px; height: 180px; 
            background: linear-gradient(135deg, #b8860b, #d4af37);
            clip-path: polygon(0 0, 100% 0, 0 100%); /* Right angle Top-Left */
        }
        /* Triangle 2 */
        .tri-2 { 
            width: 180px; height: 120px; 
            background: linear-gradient(135deg, #b8860b, #d4af37);
            clip-path: polygon(100% 0, 100% 100%, 0 0); /* Right angle Top-Right */
        }
        /* Triangle 3 */
        .tri-3 { 
            width: 120px; height: 180px; 
            background: linear-gradient(135deg, #b8860b, #d4af37);
            clip-path: polygon(100% 100%, 0 100%, 100% 0); /* Right angle Bottom-Right */
        }
        /* Triangle 4 */
        .tri-4 { 
            width: 180px; height: 120px; 
            background: linear-gradient(135deg, #b8860b, #d4af37);
            clip-path: polygon(0 100%, 0 0, 100% 100%); /* Right angle Bottom-Left */
        }

        /* --- STATE LOGIC --- */
        /* STATE C: Inner Square c^2 */
        .state-c .tri-1 { top: 0; left: 0; }
        .state-c .tri-2 { top: 0; right: 0; }
        .state-c .tri-3 { bottom: 0; right: 0; }
        .state-c .tri-4 { bottom: 0; left: 0; }

        /* STATE AB: Two Rectangles (a^2 and b^2 revealed) */
        /* Move T1 down to join T4 (forms 120x300 rect on left) */
        .state-ab .tri-1 { top: 120px; left: 0; } 
        /* Move T3 up to join T2 (forms 180x300 rect on right) */
        .state-ab .tri-3 { bottom: 120px; right: 0; }
        /* T2 and T4 stay in corners, effectively */
        .state-ab .tri-2 { top: 0; right: 0; }
        .state-ab .tri-4 { bottom: 0; left: 0; }

        /* LABELS */
        .math-label {
            position: absolute; color: white; font-family: 'Cinzel', serif; font-weight: bold;
            text-shadow: 0 0 5px black; pointer-events: none; opacity: 0; transition: opacity 1s;
            z-index: 30;
        }
        .state-c .lbl-c { opacity: 1; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; }
        .state-ab .lbl-a { opacity: 1; top: 60px; left: 60px; transform: translate(-50%, -50%); font-size: 28px; color: #facc15; } /* Center of 120x120 */
        .state-ab .lbl-b { opacity: 1; bottom: 90px; right: 90px; transform: translate(50%, 50%); font-size: 32px; color: #facc15; } /* Center of 180x180 */

    </style>
</head>

    <script>
        // --- ASSETS ---
        const ASSETS = {

        // --- MATH VISUAL GENERATORS ---
        
        // 1. Precise Proof Animation (Rearrangement Proof)
        function getProofVisual(state) {
            let layoutClass = 'state-c';

            return `
            <div class="flex flex-col items-center gap-6 animate-fade-in">
                <div class="proof-stage ${layoutClass}">
                    <!-- Background Grid (Visual Aid) -->
                    <div class="absolute inset-0 opacity-10 bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)] bg-[size:30px_30px]"></div>

                    <!-- Labels -->
                    <div class="math-label lbl-c">c²</div>
                    <div class="math-label lbl-a">a²</div>
                    <div class="math-label lbl-b">b²</div>

                    <!-- 4 Moving Triangles -->
                    <div class="shape tri-1"></div>
                    <div class="shape tri-2"></div>
                    <div class="shape tri-3"></div>
                    <div class="shape tri-4"></div>
                </div>

                    </p>

            </div>`;
        }

                visual: `<div class="text-center drop-shadow-[0_0_15px_rgba(212,175,55,0.6)]"><h1 class="font-title text-6xl text-gold-base mb-4 animate-float">SAMOS</h1><p class="text-slate-400 text-sm tracking-[0.5em] uppercase border-t border-slate-700 pt-4 inline-block">530 Trước Công Nguyên</p></div>`,

                char: ASSETS.pythagoras,
                visual: `<h1 class="text-6xl text-red-600 font-title animate-pulse-glow tracking-widest drop-shadow-[0_0_20px_red]">ALOGON</h1>`,
                text: "Câm miệng! Alogon! Điều không thể nói ra! Vũ trụ của ta là sự hài hòa, không phải là vực thẳm vô tận không đáy này. Ngươi đang phá hủy nền móng của ngôi đền!",
                choices: [{ text: "Kết cục", next: "ending" }]
            },
            {
                id: "ending",
                speaker: "",
                bg: ASSETS.bg_storm,
                char: null,
                visual: `<div class="text-center w-3/4 mx-auto"><p class="italic text-slate-300 font-serif leading-relaxed text-xl">"Hippasus chìm xuống biển khơi, nhưng chân lý toán học thì nổi lên mặt nước."</p></div>`,
                text: "Toán học được xây dựng từ niềm tin và cả sự đổ vỡ. Pythagoras cho ta vẻ đẹp của sự hài hòa. Hippasus cho ta thấy sự vô tận của thực tại. Cả hai đều bất tử.",
                choices: [{ text: "Khởi đầu lại", next: "intro" }]
            }
        ];

        // --- CORE ENGINE ---
        const ui = {
            bg: document.getElementById('bg-layer'),
            visual: document.getElementById('visual-display'),
            charImg: document.getElementById('char-img'),
            name: document.getElementById('speaker-name'),
            dialogue: document.getElementById('dialogue-text'),
            choices: document.getElementById('choices-container'),
            mathNoteContainer: document.getElementById('math-note-container'),
            mathNoteContent: document.getElementById('math-note-content')
        };

        function renderScene(sceneId) {
            const scene = STORY.find(s => s.id === sceneId);
            if (!scene) return;

            // 1. Background
            if (scene.bg.includes('.')) {
                ui.bg.style.backgroundImage = `url('${scene.bg}')`;
                ui.bg.classList.remove('bg-black', 'bg-void');
            } else {
                ui.bg.style.backgroundImage = 'none';
                ui.bg.classList.add('bg-void');
            }

            // 2. Character Handling
            if (scene.char) {
                const isSameChar = ui.charImg.src.includes(scene.char);
                if (!isSameChar) {
                    ui.charImg.style.opacity = 0;
                    ui.charImg.style.transform = 'translateY(20px) scale(0.95)';
                    setTimeout(() => {
                        ui.charImg.src = scene.char;
                        ui.charImg.style.opacity = 1;
                        ui.charImg.style.transform = 'translateY(0) scale(1)';
                    }, 400);
                } else {
                    ui.charImg.style.opacity = 1;
                    ui.charImg.style.transform = 'translateY(0) scale(1)';
                }
            } else {
                ui.charImg.style.opacity = 0;
            }

            // 3. Visual Stage
            ui.visual.innerHTML = scene.visual || '';
            if (scene.visual) {
                renderMathInElement(ui.visual, { delimiters: [{left: "\\(", right: "\\)", display: false}] });
            }

            // 4. Text & Math Notes
            ui.name.innerText = scene.speaker;
            // Name tag visibility could be handled if needed, but keeping it simple
            
            ui.dialogue.innerHTML = scene.text;
            renderMathInElement(ui.dialogue, { delimiters: [{left: "\\(", right: "\\)", display: false}] });

            if (scene.mathNote) {
                ui.mathNoteContainer.classList.remove('hidden');
                ui.mathNoteContent.innerHTML = scene.mathNote;
                renderMathInElement(ui.mathNoteContent, { delimiters: [{left: "\\(", right: "\\)", display: false}] });
            } else {
                ui.mathNoteContainer.classList.add('hidden');
            }

            // 5. Choices
            ui.choices.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice w-full rounded';
                btn.innerHTML = `<i class="fas fa-caret-right mr-2 text-gold-base"></i> ${choice.text}`;
                btn.onclick = () => renderScene(choice.next);
                ui.choices.appendChild(btn);
            });
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderScene('intro');
        });

    </script>
</body>
</html>
